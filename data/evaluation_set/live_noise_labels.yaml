  source_url: https://jobs.ashbyhq.com/openai/f4cacc93-288b-425f-8bc2-5310d3f12d53
  description_text: 'About the Team Like every team at OpenAI, the Marketing team contributes to our broader mission of ensuring responsible and widespread adoption of artificial intelligence. With that aim in mind, we are responsible for developing and executing strategies that drive awareness, engagement, and usage for OpenAI’s products and platform amongst our core audiences. Our focus extends beyond just promoting product features; we aim to provide valuable insights and resources that help our users make the most out of AI technologies. The Marketing Insights & Analytics team aims to understand the markets, audiences, behaviors, attitudes and needs to shape outreach strategies and inform product and business decisions. We’re the strategic partner that discovers insights, specifically: foundational understanding, marketing strategy, thought leadership, measurement and tracking. About the Role You will be the Market Research Lead that translates insights into actionable marketing plans
    and executions, drive business results, and orient the team towards strategic thinking to drive brand outcomes. This is critical as we hope to reach millions of users and businesses worldwide. This role can be based in San Francisco, CA or NYC, NY utilizing a hybrid work model (3 days per week in-office). In this role, you will: - Play an integral part of Marketing and be a strategic partner to brand, product marketing, creative, product and beyond. - Design, execute, and deliver high-impact research using mixed methods. - Work on a diverse portfolio of business challenges - how do we reach the next billion people, how do we grow internationally, how do we position our suite of products, and how do we ship joy to our customers. - Translate business questions into research plans. - Translate data into clear, compelling narratives. - Develop deep empathy for developers, builders, and technical decision-makers, understanding their workflows, motivations, and pain points across the lifecycle
    - Shape go-to-market strategies for technical products including positioning, messaging, and developer segmentation. You might thrive in this role if you have: - 10+ years experience in data analysis, mix-method user or market research. - Experience with independently executing full-cycle research from research design to reporting. - Extensive background in quantitative and qualitative research, including hands-on experience in survey/discussion guide development and data analysis (weighting, data cleaning, regression, etc.). - Experience directing agencies/vendors to deliver results. - Experience using data from various sources, including behavioral and product usage data, to influence executives and stakeholders - Experience conducting research with developers, technical users, or B2B audiences. - Experience with product or GTM strategy research (positioning, messaging development, etc.), brand research, campaign development, and tracking - Experience with statistical analysis tools
