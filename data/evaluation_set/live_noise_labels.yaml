  description_text: 'About the opportunity We are seeking a Workday Finance Functional Analyst experienced in working within the Workday tool specifically covering Financial Management, Expenses and Procurement. Your background will have been working in Finance departments, you will understand the business processes to design a best in class service. You’re also a digital native, a quick learner that is always looking for opportunities to make things better. You understand that you need great processes and technology to get things done so we can use it to create amazing experiences. You love to share ideas and find untraditional ways to collaborate and co-create, you learn from feedback and want to grow by creating a truly positive impact. In this role, you will: Be the configuring Lead for Workday Financials, testing and documenting enhancements, improvements and bug fixing of our Workday Finance system. Work closely with our Finance, Sourcing and TechOps teams to develop our technology
    landscape and integration with the goal of creating a delightful modern digital experience Partner with business stakeholders across the organisation to identify needs and opportunities to improve our employee experience using technology Lead decision making on business processes, design and architecture, as well as training and change management activities, utilizing business process mapping Manage release cycles of new functionalities according to business Ensure smooth running of our technology landscape, supporting users, investigating and addressing issues and if necessary working with the vendors on resolution using our Jira ticketing system Lead implementation projects to introduce new solutions and capabilities Analyze and report metrics on our technology activities in support of strategic decision-making initiatives and for ongoing measurement and continual improvement Support data management and data architecture activities to ensure high quality data Create and manage documentation
    to align our business process and architecture with banking and privacy compliance requirements Report generation from Workday for key stakeholders What you need to be successful: Background:&nbsp; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;3+ years experience working with Workday Financials &nbsp; &nbsp; &nbsp; &nbsp; 5-6+ years experience working within Finance departments. Skills:&nbsp; Experience working with at least one or more modules in Workday - Financial Management, Expenses and/or Procurement (essential) Experience in process design and improvement Experience in data management, administration and system configuration Familiarity with Agile ways of working Experience with Finance best practices and implementing technology solutions to support compliance requirements. Love to learn and continuous improvement Growth mindset Great team player that loves to share and collaborate What’s in it for you: Accelerate your career growth by joining one of Europe’s most talked about
    disruptors 🚀. Employee benefits that range from a competitive personal development budget, work from home budget, discounts to fitness &amp; wellness memberships, language apps and public transportation.&nbsp; As an N26 employee you will have access to a Premium subscription on your personal N26 bank account. As well as subscriptions for friends and family members.&nbsp;&nbsp;&nbsp;&nbsp; Additional day of annual leave for each year of service.&nbsp;&nbsp; A high degree of autonomy and access to cutting edge technologies - all while working with a friendly team of peers of diverse nationalities, experiences, and backgrounds.&nbsp; A relocation package with visa support for those who need it. Who we are N26 has reimagined banking for today’s digital world. Technology and design empower everything we do and it’s how we are building the global banking platform the world loves to use. We''ve eliminated physical branches, paperwork, and hidden fees for an elegant digital experience and supreme
    savings. Giving people the power to live and bank their way is what gets us out of bed in the morning and inspires the work that we do.&nbsp; We are headquartered in Berlin with offices in multiple cities across Europe, including Vienna and Barcelona, and a 1,500-strong team of more than 80 nationalities.&nbsp; Do you see yourself thriving in this role? We’d love to see your application even if you don’t meet 100% of the criteria. You may just be the right fit for this or other roles! Equal opportunities for all At N26, we believe our strength lies in our people and the varied perspectives they bring. We strive to build diverse teams that drive innovation and business success. We actively seek talent from all backgrounds and welcome applications from all genders, cultures, sexual orientations, abilities, neurodiversities, and ages. We are committed to providing an excellent and accessible candidate experience. If you require any accommodations to make this process work for you, please
    let us know. We’re here to support you! Discover more about Diversity &amp; Inclusion at N26: https://n26.com/en-eu/diversity-and-inclusion'
