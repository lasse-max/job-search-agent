  description_text: 'About the team The Technical Success team is responsible for ensuring the safe and effective deployment of ChatGPT and OpenAI API applications for developers and enterprises. We act as a trusted advisor and thought partner for our customers, ensuring developers and enterprises maximize value from our models and products. The Ecosystem team builds and scales third-party integrations around ChatGPT and Codex. We work across product, engineering, partnerships, safety, legal, policy, and go-to-market to create integrations that are useful, trustworthy, and technically sound. About the role We’re looking for an Applied Deployment Engineer to help build and deepen ChatGPT integrations with third-party messaging platforms. The initial focus will be on partner work as well as future opportunities with other messaging apps around the world. This is a hands-on, partner-facing engineering role. You’ll work closely with external product and engineering teams to improve existing
    integrations, expand capabilities such as image generation, increase retention, and translate partner needs back into OpenAI’s product and engineering roadmap. You should be comfortable writing code daily, making changes across platform or monorepo surfaces when needed, and moving fluidly between technical discovery, product tradeoffs, prototyping, debugging, and executive-level communication. This role is best suited for a strong product-minded engineer with excellent communication skills, sound technical judgment, and the ability to work across cultures, time zones, and organizations. This role is based in our SF office. We use a hybrid work model of 3 days in the office per week and offer relocation assistance to new employees. In this role, you will: - Partner with messenger app product and engineering teams to design ChatGPT-powered experiences that fit naturally into chat, group, contact, and app-tab surfaces. - Deepen existing partner integrations, with an initial focus on improving
    user experience, retention, reliability, and feature set. - Build prototypes, integration guides, reference flows, and launch checklists that help partners move from concept to production. - Debug API, latency, authentication, quota, quality, and user-experience issues across partner and OpenAI systems. - Translate privacy, trust, login, and data-handling requirements into clear technical constraints and implementation plans. - Work with product, engineering, design, partnerships, legal, policy, and support teams to make partner launches reliable, scalable, and maintainable. - Capture repeatable patterns from messenger integrations and turn them into reusable playbooks for future ecosystem partners. - Travel periodically to meet with international partners during key integration, launch, and post-launch milestones. You’ll thrive in this role if you: - Have a strong software engineering background and still enjoy writing code daily. - Have built or deployed API integrations with external
    partners and can reason across client, backend, auth, privacy, reliability, and UX constraints. - Bring strong product sense and design judgment, especially for consumer-facing experiences. - Can make ambiguous product ideas concrete without over-specifying partner-specific internals. - Communicate clearly with engineers, product leaders, executives, and business stakeholders. - Are comfortable debugging distributed systems and narrowing broad performance or reliability issues into actionable hypotheses. - Care deeply about user trust, privacy, and product quality, especially in communication surfaces where context is sensitive. - Can balance urgency with judgment and keep launches moving without skipping the details that matter. Preferred qualifications: - Experience working on B2C consumer, social, or messaging products. - Experience working with international partners or in cross-cultural product and engineering environments. - Familiarity with OAuth/login flows, API rate limits,
    webviews, mobile release cycles, and partner launch operations. - Experience with AI product launches, developer platforms, or API-first products. - Prior customer-facing or partner-facing engineering experience, especially in a startup or smaller-company environment. - Ability to collaborate across APAC time zones and travel internationally roughly quarterly, sometimes for up to two weeks around major launch milestones. About OpenAI OpenAI is an AI research and deployment company dedicated to ensuring that general-purpose artificial intelligence benefits all of humanity. We push the boundaries of the capabilities of AI systems and seek to safely deploy them to the world through our products. AI is an extremely powerful tool that must be created with safety and human needs at its core, and to achieve our mission, we must encompass and value the many different perspectives, voices, and experiences that form the full spectrum of humanity. We are an equal opportunity employer, and we do
    not discriminate on the basis of race, religion, color, national origin, sex, sexual orientation, age, veteran status, disability, genetic information, or other applicable legally protected characteristic. For additional information, please see OpenAI’s Affirmative Action and Equal Employment Opportunity Policy Statement https://cdn.openai.com/policies/eeo-policy-statement.pdf. Background checks for applicants will be administered in accordance with applicable law, and qualified applicants with arrest or conviction records will be considered for employment consistent with those laws, including the San Francisco Fair Chance Ordinance, the Los Angeles County Fair Chance Ordinance for Employers, and the California Fair Chance Act, for US-based candidates. For unincorporated Los Angeles County workers: we reasonably believe that criminal history may have a direct, adverse and negative relationship with the following job duties, potentially resulting in the withdrawal of a conditional offer
    of employment: protect computer hardware entrusted to you from theft, loss or damage; return all computer hardware in your possession (including the data contained therein) upon termination of employment or end of assignment; and maintain the confidentiality of proprietary, confidential, and non-public information. In addition, job duties require access to secure and protected information technology systems and related data security obligations. To notify OpenAI that you believe this job posting is non-compliant, please submit a report through this form https://form.asana.com/?d=57018692298241&k=5MqR40fZd7jlxVUh5J-UeA. No response will be provided to inquiries unrelated to job posting compliance. We are committed to providing reasonable accommodations to applicants with disabilities, and requests can be made via this link https://form.asana.com/?k=bQ7w9h3iexRlicUdWRiwvg&d=57018692298241. OpenAI Global Applicant Privacy Policy https://cdn.openai.com/policies/global-employee-and-contractor-privacy-policy.pdf
    At OpenAI, we believe artificial intelligence has the potential to help people solve immense global challenges, and we want the upside of AI to be widely shared. Join us in shaping the future of technology.'
