  description_text: 'Every day, tens of millions of people come to Roblox to explore, create, play, learn, and connect with friends in 3D immersive digital experiences– all created by our global community of developers and creators.&nbsp; At Roblox, we’re building the tools and platform that empower our community to bring any experience that they can imagine to life. Our vision is to reimagine the way people come together, from anywhere in the world, and on any device. We’re on a mission to connect a billion people with optimism and civility, and looking for amazing talent to help us get there.&nbsp; A career at Roblox means you’ll be working to shape the future of human interaction, solving unique technical challenges at scale, and helping to create safer, more civil shared experiences for everyone. As a Senior Software Engineer on the Connections team, you will build systems and applications across the stack and enable players to connect and play together.&nbsp; Your work will power the
    Roblox social graph, helping people recognize and connect with friends so they can have a richer experience on the platform. You will own critical features used by millions of users daily as well as develop new zero-to-one features. You will drive company-level objectives for user engagement and retention through friending, which is a critical part of our user journey. If you are an experienced developer who loves to write code and ship user-facing features, you’ll be right at home with our product-focused team. This role is based at Roblox HQ in San Mateo, CA (no remote option). &nbsp; You Will: Ship features and work across the stack with an end-to-end understanding of our features. This role will be frontend leaning.&nbsp; Collaborate with other engineering, product, and design teams to define and build features used by tens of millions of users&nbsp; Drive individual projects from end to end, ensuring they are well-planned, executed efficiently, run experiments, and deliver meaningful
    impact. &nbsp; You Have: 5+ years of experience building full-stack systems, including backend, APIs, and frontend applications. Bachelor''s degree or higher in Computer Science or a related field. Familiar with A/B testing (Bonus) &nbsp; You Are: Proactive: You operate with a sense of urgency, initiating conversations and workflow that pushes team projects and people forward Scrappy: You are willing to dive into any tech stack to solve problems, and can easily adapt to any situation when the need arises and come up with the right solution. A product owner: You champion for changes that align with the needs of our users For roles that are based at our headquarters in San Mateo, CA: The starting base pay for this position is as shown below. The actual base pay is dependent upon a variety of job-related factors such as professional background, training, work experience, location, business needs and market demand. Therefore, in some circumstances, the actual salary could fall outside of
    this expected range. This pay range is subject to change and may be modified in the future. All full-time employees are also eligible for equity compensation and for benefits as described on this page . Annual Salary Range $196,750 &mdash; $243,290 USD Roles that are based in an office are onsite Tuesday, Wednesday, and Thursday, with optional presence on Monday and Friday (unless otherwise noted). Roblox provides equal employment opportunities to all employees and applicants for employment and prohibits discrimination and harassment of any type without regard to race, color, religion, age, sex, national origin, disability status, genetics, protected veteran status, sexual orientation, gender identity or expression, or any other characteristic protected by federal, state or local laws. Roblox also provides reasonable accommodations to candidates with qualifying disabilities or religious beliefs during the recruiting process. For US based roles only, please note the Company may not be
