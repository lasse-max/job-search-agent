  description_text: 'ABOUT AIRWALLEX Airwallex is the only unified payments and financial platform for global businesses. Powered by our unique combination of proprietary infrastructure and software, we empower over 200,000 businesses worldwide – including Brex, Rippling, Navan, Qantas, SHEIN and many more – with fully integrated solutions to manage everything from business accounts, payments, spend management and treasury, to embedded finance at a global scale. Proudly founded in Melbourne, we have a team of over 2,200 of the brightest and most innovative people in tech across 26 offices around the globe. Valued at US$8 billion and backed by world-leading investors including T. Rowe Price, Visa, Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and Lone Pine Capital, Airwallex is leading the charge in building the global payments and financial platform of the future. If you’re ready to do the most ambitious work of your career, join us. ATTRIBUTES WE VALUE We hire
    successful builders with founder-like energy who want real impact, accelerated learning, and true ownership. You bring strong role-related expertise and sharp thinking, and you’re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles. You move fast with good judgment, dig deep with curiosity, and make decisions from first principles, balancing speed and rigor. You''re humble and collaborative; turn zero‑to‑one ideas into real products, and you “get stuff done” end-to-end. You use AI to work smarter and solve problems faster. Here, you’ll tackle complex, high‑visibility problems with exceptional teammates and grow your career as we build the future of global banking. If that sounds like you, let’s build what’s next. Responsibilities - Provide support to Airwallex’s customers (particularly the APAC and China regions) on troubleshooting their technical issues (e.g. providing technical information / explanations, sample codes, exploring payment
    logs, FAQs) - Work directly with developers and internal teams on post integration issues to provide support and best practices for using Airwallex’s product - Identify areas where Airwallex’s products and services are not functioning as expected and work with internal stakeholders to deliver improvements - Coordinate with internal stakeholders to identify causes of system failures and deliver solutions - Be available to coordinate the process to manage resolution of system failure incidents - Participating in the development of tools, systems, and processes to improve productivity and product reliability Who You Are We''re looking for people who meet or exceed the following requirements. Minimum Qualifications - 3+ years experience in people management, with success in directly managing Technical Support Engineers in APAC and China region - 5+ years experience in customer-facing technical support. - Bachelor degree or above in Computer Science or relevant majors. - Experience with REST,
    JSON, HTTP, HTTPS and SQL. Must be familiar with common HTTP errors and resolutions. - Proven experience and skills in troubleshooting and problem-solving technical issues. - Must have sufficient technical knowledge to communicate with software development teams. - Have familiarity with process to escalate system incidents and coordinate resolution. - Strong willingness to deliver exceptional customer service at scale. - Excellent written, verbal and in-person communication skills in both English and Mandarin Preferred Qualifications - Good to have technical knowledge: Python, Go. - Good to have monitoring tools knowledge: ELK, Splunk, Loki. - Experienced in e-commerce, payment, fin-tech industry is a plus. - Good command of English and Mandarin APPLICANT SAFETY POLICY: FRAUD AND THIRD-PARTY RECRUITERS To protect you from recruitment scams, please be aware that Airwallex will not ask for bank details, sensitive ID numbers (i.e. passport), or any form of payment during the application
