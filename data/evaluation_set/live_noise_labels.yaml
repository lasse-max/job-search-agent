  description_text: 'ABOUT AIRWALLEX Airwallex is the only unified payments and financial platform for global businesses. Powered by our unique combination of proprietary infrastructure and software, we empower over 200,000 businesses worldwide – including Brex, Rippling, Navan, Qantas, SHEIN and many more – with fully integrated solutions to manage everything from business accounts, payments, spend management and treasury, to embedded finance at a global scale. Proudly founded in Melbourne, we have a team of over 2,200 of the brightest and most innovative people in tech across 26 offices around the globe. Valued at US$8 billion and backed by world-leading investors including T. Rowe Price, Visa, Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and Lone Pine Capital, Airwallex is leading the charge in building the global payments and financial platform of the future. If you’re ready to do the most ambitious work of your career, join us. ATTRIBUTES WE VALUE We hire
    successful builders with founder-like energy who want real impact, accelerated learning, and true ownership. You bring strong role-related expertise and sharp thinking, and you’re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles. You move fast with good judgment, dig deep with curiosity, and make decisions from first principles, balancing speed and rigor. You''re humble and collaborative; turn zero‑to‑one ideas into real products, and you “get stuff done” end-to-end. You use AI to work smarter and solve problems faster. Here, you’ll tackle complex, high‑visibility problems with exceptional teammates and grow your career as we build the future of global banking. If that sounds like you, let’s build what’s next. ABOUT THE TEAM The SME & Growth Business team at Airwallex is a passionate group of collaborators and business champions dedicated to empowering small and medium-sized enterprises (SMEs) to thrive in the global economy. We combine
    deep financial expertise with a growth mindset, working closely with our clients to understand their unique needs and develop tailored solutions that streamline cross-border payments and unlock new revenue streams. As a team, we are driven by a desire to make a positive impact and are constantly innovating to find new ways to support the success of our SME customers. WHAT YOU’LL DO We''re not just looking for someone who can hit their targets. We''re looking for someone who embraces creativity and thinks outside the box. We''re looking for someone who is passionate about learning and constantly seeks improvement. We''re committed to providing our SDRs with the training and support they need to succeed, because we believe our SDR’s are AE’s in training. This Hybrid role is based in Toronto, Canada. RESPONSIBILITIES: - Identifying and qualifying leads through various channels, including phone, email, and social media. - Building relationships with potential customers and understanding
    their needs and pain points. - Presenting our innovative solutions and crafting compelling value propositions. - Qualifying opportunities and scheduling appointments for our Account Executives. WHO YOU ARE We''re looking for people who meet the minimum qualifications for this role. The preferred qualifications are great to have, but are not mandatory. MINIMUM QUALIFICATIONS: - Bachelor’s or equivalent work experience - 1+ years of sales experience in outbound B2B sales PREFERRED QUALIFICATIONS: - Experience or desire to be working in a fast-paced environment, articularly in 0-1 mode (e.g., helped to launch and grow a new product or region) - Strategic thinker and able to drive ''partnership'' conversations vs. ''sales'' conversations - Solution Oriented - A FIO (Figure It Out) attitude and are willing to do whatever is necessary to achieve results - Excellent written and verbal communication skills - You have strong analytical skills and an organized way of thinking/working - Proficient
    in GSuite and sales tech tools like Salesforce, Outreach, Zoominfo, Linkedin Sales Navigator and more.. APPLICANT SAFETY POLICY: FRAUD AND THIRD-PARTY RECRUITERS To protect you from recruitment scams, please be aware that Airwallex will not ask for bank details, sensitive ID numbers (i.e. passport), or any form of payment during the application or interview process. All official communication will come from an @airwallex.com http://airwallex.com email address. Please apply only through careers.airwallex.com http://careers.airwallex.com or our official LinkedIn page. Airwallex does not accept unsolicited resumes from search firms/recruiters. Airwallex will not pay any fees to search firms/recruiters if a candidate is submitted by a search firm/recruiter unless an agreement has been entered into with respect to specific open position(s). Search firms/recruiters submitting resumes to Airwallex on an unsolicited basis shall be deemed to accept this condition, regardless of any other provision
    to the contrary. EQUAL OPPORTUNITY Airwallex is proud to be an equal opportunity employer. We value diversity and anyone seeking employment at Airwallex is considered based on merit, qualifications, competence and talent. We don’t regard color, religion, race, national origin, sexual orientation, ancestry, citizenship, sex, marital or family status, disability, gender, or any other legally protected status when making our hiring decisions. If you have a disability or special need that requires accommodation, please let us know.'
