  description_text: 'Every day, tens of millions of people come to Roblox to explore, create, play, learn, and connect with friends in 3D immersive digital experiences– all created by our global community of developers and creators.&nbsp; At Roblox, we’re building the tools and platform that empower our community to bring any experience that they can imagine to life. Our vision is to reimagine the way people come together, from anywhere in the world, and on any device. We’re on a mission to connect a billion people with optimism and civility, and looking for amazing talent to help us get there.&nbsp; A career at Roblox means you’ll be working to shape the future of human interaction, solving unique technical challenges at scale, and helping to create safer, more civil shared experiences for everyone. WHY DATA SCIENCE &amp; ANALYTICS? The Data Science &amp; Analytics organization''s mission is to increase our speed, frequency, and acumen of our business decisions and to empower and scale
    product innovations. We cover a wide area of the data spectrum, including analytical data engineering, product analytics, experimentation, causal inference, statistical modeling, economics, and machine learning. Aligned and partnering with product groups, we use this vast tool belt to discover new opportunities and unmet use cases, influence and shape the product roadmap and prioritization, build data products and measure the impact / incrementality on our community of players, developers, and advertisers. WHY ADVERTISING SCIENCE? Advertising at Roblox is new, facing critical scale, effectiveness, and implementation challenges, while operating in our civility and user focused experiences. As a new strategic area, work will be innovative and impactful. Scientific rigor will be critical in success as we organize our data model, design principled measurement systems, and architect the future of incrementality measurement and actioning, to enable our communities. In this role, you will contribute
    to the new Ads Science team within the broader Economy DSA team, collaborating with engineers and product managers to innovate our advertising systems and operations. Work will include data pipeline design and ownership, modeling for ad delivery and targeting, modeling for user segmentation / experimentation, and experimental design and analysis. We are early in this multi-year journey, and seek a dedicated and passionate scientist to help design this vision and execute the innovation to achieve it. You Will: Design and lead offline model evaluation end-to-end (pipelines, frameworks, analysis). Contribute to ads ML feature and model improvements, collaborating with engineering to put these in production. Build offline evaluation and simulation models for our ads marketplace. Accelerate product development through your understanding of the underlying data and your ability to partner with product and technical leaders to provide insights. Lead experimental design and analysis for your
    ads domain. Design science roadmaps and experimentation agendas to determine success of product feature launches. You Have: Domain experience in digital ads systems, including ownership of critical analytic or production pipelines. 4+ years of industry or academic experience in data science, economics, analytics, or machine learning engineering. Expertise in data transformation and programming, and proficiency in developing data pipelines through use of Spark, Hive, and Airflow. Experience with auctions and experimentation in market settings. Graduate education in a technical field (preferred: rigorous applied training including a graduate degree in economics, statistics, bioinformatics, cognitive science, physics, or similar). You Are: Candid on relative opportunities for impact, and evidence-seeking to update beliefs. Passionate about Roblox’s mission to connect a billion people every day with optimism and civility, including through increasing earnings for our creator community. A
    strong communicator. You understand that analysis must be presented in meaningful ways and lead spirited discussions about the findings. You can explain technical concepts to non-technical audiences and discuss appropriate tradeoffs. Effective in a collaborative work environment with a track record of simplifying complex and ambiguous problems. For roles that are based at our headquarters in San Mateo, CA: The starting base pay for this position is as shown below. The actual base pay is dependent upon a variety of job-related factors such as professional background, training, work experience, location, business needs and market demand. Therefore, in some circumstances, the actual salary could fall outside of this expected range. This pay range is subject to change and may be modified in the future. All full-time employees are also eligible for equity compensation and for benefits as described on this page . Annual Salary Range $248,740 &mdash; $322,820 USD Roles that are based in an
    office are onsite Tuesday, Wednesday, and Thursday, with optional presence on Monday and Friday (unless otherwise noted). Roblox provides equal employment opportunities to all employees and applicants for employment and prohibits discrimination and harassment of any type without regard to race, color, religion, age, sex, national origin, disability status, genetics, protected veteran status, sexual orientation, gender identity or expression, or any other characteristic protected by federal, state or local laws. Roblox also provides reasonable accommodations to candidates with qualifying disabilities or religious beliefs during the recruiting process. For US based roles only, please note the Company may not be able to employ candidates for this role who have United States work authorization related to certain U.S. visa categories, or support future H-1B sponsorship at this time.'
