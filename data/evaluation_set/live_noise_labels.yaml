  description_text: 'Join Pigment: Transforming Business Planning and Performance with AI Founded in 2019, Pigment stands out as one of the fastest-growing SaaS companies globally, redefining business planning and performance with our AI-powered platform. We empower organizations across diverse industries, including Consumer Packaged Goods, Retail, and Technology, to seamlessly integrate data, people, and processes, enabling them to plan and adapt rapidly. With a vibrant team of over 500 professionals across North America and Europe, and offices in Paris, London, New York, Toronto, San Francisco and Austin, Pigment has successfully secured nearly $400 million in funding from leading global venture capitalists. Our recognition as a Visionary in the 2024 Gartner® Magic Quadrant™ for Financial Planning Software underscores our commitment to excellence, as we proudly partner with industry leaders like Unilever, Vinci, Kayak, Siemens, and Coca-Cola. At Pigment, we champion smart risks, celebrate
    bold ideas, and challenge the status quo—all as a united team. Every team member has the opportunity to make a significant impact and tackle ambitious challenges. Together, we pursue excellence with a collaborative spirit, continuously raising the bar to ensure strong performance and a proactive approach while fostering an environment of humility. If you are passionate about innovation and wish to collaborate with some of the brightest minds in the industry, we would love to hear from you! The Opportunity We’re looking for an Engineering Manager Lead (EML) to own delivery and people leadership at the community (*) level. An EML is the go-to person for a community’s delivery: ensuring teams ship the right things, at the right time, with a clear escalation path when priorities, technical constraints, or execution realities don’t converge. The EML also manages and develops Engineering Managers (EMs) and Technical Leads (TLs) and partners closely with Community Tech Leads (CTLs), Product
    Management Leads (PMLs), Product Managers (PMs), and Engineering Program Managers (EPMs). This role reflects our accountability model: delivery accountability and people leadership are held together, with a clear interface to product and technical leadership. (*) A community is a group of teams with a common functional/technical purpose. The Foresight Community Foresight is the community responsible for Pigment’s forward-looking product surface: helping customers model scenarios, understand what’s coming, and make better decisions under uncertainty. It typically spans multiple teams working on forecasting and what-if workflows, planning experiences, and the underlying capabilities needed to make those experiences fast, reliable, and explainable. What you’ll do 1) Own community delivery (accountability + operating cadence) Be accountable to engineering leadership for delivery across multiple teams in the community Ensure teams have clear priorities, sequencing, and commitments (scope/timeline/people),
    aligned with product priorities and technical constraints. Identify risks early (delivery delays, quality/production issues, team focus/inefficiencies, people performance) and drive resolution with TLs/EMs/partners. Maintain a written, legible status of the community’s key achievements, risks, and action plans. Lead key reporting moments (e.g., mid-quarter updates, community-level delivery reviews). 2) Lead people and org effectiveness through EMs and TLs Manage Engineering Managers and Technical Leads with clear expectations and regular coaching. Set standards for feedback, performance, calibration inputs, growth plans, and under-performance remediation when needed. Improve the system: structures, processes, rituals, and staffing approaches that increase execution speed and reduce friction. 3) Drive staffing and community-level arbitration Partner with CTLs and product leadership on staffing needs and constraints; drive the process to turn inputs into a committed plan. Resolve cross-team
    dependencies and trade-offs; ensure there is always a clear owner for escalation when alignment stalls. Represent the community in leadership forums; ensure decisions are translated into actionable plans. 4) Partner with Product & Technical leadership with clear interfaces Work as a trio with PML and CTL: PML: business outcomes and product priorities CTL: technical approach and quality/safety bar EML: committed plan & delivery landing, including escalation when needed Collaborate with EPMs (when staffed) to improve coordination and execution, while keeping accountability clear. What you will not be expected to do You are not expected to own a single technical domain as “the expert.” Pigment separates technical decision ownership (TL/CTL) from people and delivery accountability (EML) to keep both healthy. You are not expected to be contribute as an engineer. (You may still code opportunistically, but it should not be required for delivery.) Who you are Significant experience as an engineer
    in a progressive engineering environment: building and shipping software in production environments (you can evaluate plans and risks with credibility). Demonstrated experience leading engineering managers and/or senior IC leaders (e.g., EMs, TLs), including performance management and growth. Strong delivery leadership: you bring clarity, pace, and follow-through without creating noise or process theatre. Excellent judgment in trade-offs (scope/timing/quality/staffing), and comfort escalating when alignment can’t be reached quickly. Low-ego, high-standards leadership style; you build accountability and trust. Fluent in English (French not required). #LI-HYBRID #LI-LS1'
