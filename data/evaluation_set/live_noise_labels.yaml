  source_url: https://job-boards.greenhouse.io/celonis/jobs/7517493003?gh_jid=7517493003
  description_text: 'Celonis is the global leader in Process Intelligence and the pioneer of Process Mining technology. As one of the world’s fastest-growing enterprise SaaS companies, we are changemakers pushing the boundaries of what’s possible. We invest heavily in advanced AI capabilities—specifically our Process Intelligence Graph—to turn data insights into immediate business action. We believe there is a massive opportunity to unlock global productivity and sustainability by placing intelligence at the core of every business process. Join our mission to make processes work for people, companies, and the planet. &nbsp; The Team: Celonis Process Management is at the forefront of revolutionizing business process management with the introduction of Symbio, an innovative AI-driven software. We create Business Process Management Software that lets employees do their best work. We believe that, from the production line to the executive board, everyone in an organization essentially wants
    the same thing: Flow. Everything we do at Celonis is in the service of creating Flow and allowing for a new kind of business processes: Of the people. By the people. For the people. Flow is not an end in itself. It fosters a healthier process culture – with better transparency, lower churn, and much more engagement. It makes us proud and motivated to have the highest process adoption rate throughout the BPM space. Join us if you’re looking to grow your management skills, engineering knowledge and have a significant impact on the next generation of Celonis Process Management. The Role: As an Engineering Manager for our Celonis Process Management team, you will lead the design and delivery of cutting-edge solutions to integrate Process Management seamlessly into the Celonis Platform. This role is at the crossroads of technology, user experience, and strategic impact, driving the next wave of innovation in process management. Your team will focus on building robust, scalable APIs and microservices
    leveraging C#, Azure, and modern microservice architectures to deliver high-performing, extensible solutions. These technologies will empower users to simplify complex processes, integrate process insights into their workflows, and identify opportunities to optimize their business operations. You will foster an environment of growth and collaboration, guiding your engineers as they tackle technical challenges. By mentoring and coaching your team, you will help them excel in their careers while maintaining a high standard of quality and innovation. Your leadership will ensure the delivery of solutions that are reliable, scalable, and able to meet the demanding needs of Celonis users. Your work at Celonis will directly impact companies and people around the globe as they improve their processes to save money, reduce waste, improve automation and generally become more efficient. For example, Celonis can help a company understand their carbon footprint in order to reduce CO2 emissions and
    deliver a healthier planet for future generations. The work you’ll do: Lead a team of talented engineers in designing and delivering scalable solutions for integrating Process Management into the Celonis Platform. Use technical judgment and intuition about customer behavior to determine the best paths forward on the features we have and trade off properties like time to implement, maintainability, scalability, performance, etc. Work closely with other engineering teams, x-functional stakeholders, and leads to ensure the development and delivery of impactful product features that drive customer value and shape the overall product strategy Manage the performance and support the career development of engineers up to the Staff level Build and maintain an engineering culture of trust, ownership, and collaboration within the larger Celonis organization, including providing upward and outward visibility of the team and their work. The product you’ll work on: You’ll help build the next generation
    of Celonis Process Management! Has features that make it easier to model customers processes Allow all users in a company to use the knowledge out of our system Partner with our AI teams to suggest modeling steps that save users time describing their complex source data Build towards enabling all-of-business process insights High visibility to sales &amp; executive leadership The qualifications you need: 3+ years of experience in an Engineering Manager or technical leadership position leading projects and people 8+ years as Software Engineer (Mandatory) Strong technical knowledge (staff engineer-level knowledge of software engineering is expected) Experience working with technologies like C# and Azure (Java as nice to have) and microservices&nbsp; Strong communication skills, allowing you to collaborate smoothly with people across multiple roles &amp; countries Knowledge of day-to-day team organization methodologies like agile Ability to lead and make decisions to define the road ahead
    Ability to resolve technical conflicts when necessary, fostering a positive environment for escalations Ready to roll up your sleeves to help your team &nbsp; What Celonis can offer you: Pioneer Innovation: Work with the global leader in Process Mining and the Process Intelligence Graph to shape the future of AI-driven business operations. Ownership from Day 1: Every full-time "Celonaut" is an owner, receiving Restricted Stock Units (RSUs) and merit-based refresh grants. Unrivaled Family Support: Benefit from our inclusive parental leave policy—24 weeks of fully paid leave for primary carers and 12 weeks for supporting carers, available from your first day of employment. Work-Life Integration: Enjoy Unlimited PTO (in applicable regions) and generous PTO globally, as well as a flexible hybrid work model that balances remote focus with vibrant office collaboration. Continuous Growth: Elevate your skills through our 70-20-10 learning framework, mentorship programs, and access to a dedicated
    learning platform. Holistic Well-being: Prioritize your health with subsidized Wellhub memberships, mental health counseling, and dedicated "Wellness Weeks" that prioritize work/life balance. Drive Sustainability: Participate in annual Impact Days, where you receive paid time off to volunteer for community and environmental causes with your local office, or virtually. Global Inclusion &amp; Belonging: Find community through our Inclusion Think Tank and participate in our annual Inclusion Days, ensuring every voice is heard and valued. Value-Driven Impact: Join a mission-led organization where our core values—Live for Customer Value, The Best Team Wins, We Own It, and Earth Is Our Future—drive every decision. About Us: Celonis makes processes work — for people, companies, and the planet. Powered by process mining and AI, the Celonis Process Intelligence Platform integrates process data and business context to create a living digital twin of business operations. We enable thousands of
    companies worldwide to understand how their business actually runs and, together with their partners, build intelligent solutions that transform and continuously improve the way they operate — unlocking billions in value. Celonis is headquartered in Munich, Germany, and New York City, USA, with more than 20 offices worldwide. Get familiar with the Celonis Process Intelligence Platform by watching this video . Celonis Inclusion Statement: At Celonis, we believe our people make us who we are and that “The Best Team Wins”. We know that the best teams are made up of people who bring different perspectives to the table. And when everyone feels included, able to speak up and knows their voice is heard - that''s when creativity and innovation happen. Your Privacy: Any information you submit to Celonis as part of your application will be processed in accordance with Celonis’ Accessibility and Candidate Notices By submitting this application, you confirm that you agree to the storing and processing
    of your personal data by Celonis as described in our Privacy Notice for the Application and Hiring Process . Please be aware of common job offer scams, impersonators and frauds. Learn more here .'
