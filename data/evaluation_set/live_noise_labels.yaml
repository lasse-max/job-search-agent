  description_text: 'About Anthropic Anthropic’s mission is to create reliable, interpretable, and steerable AI systems. We want AI to be safe and beneficial for our users and for society as a whole. Our team is a quickly growing group of committed researchers, engineers, policy experts, and business leaders working together to build beneficial AI systems. About the role Anthropic seeks a highly skilled communicator to lead Anthropic’s communications in India. As our first communications hire in India, you will develop and drive effective communications campaigns that advance Anthropic''s position. The role will report to our Corporate Communications lead&nbsp; in the US. The ideal candidate should be a highly strategic thinker with a proven track record of delivering exceptional results, have strong market knowledge and excellent media relations. They should be skilled at working with a wide-range of local and global stakeholders to help navigate fast-paced, complex environments. Responsibilities:&nbsp;
    Develop and execute communications strategies to elevate Anthropic''s brand and effectively communicate our story and our momentum in India. Craft messaging and talking points for major company announcements and milestones. Build strong relationships with journalists and relevant influencers. Partner cross-functionally with a wide range of teams including sales, marketing, legal, research, and policy. Provide communications counsel to a wide range of stakeholders across the company including leadership. Effectively plan for and manage communications risks. Oversee executive interviews and speaking engagements.&nbsp; Manage local agency relationships.&nbsp; You may be a good fit if you:&nbsp; 15+ years of experience working in communications, ideally at a high growth technology company in a senior in-house position. Have a strong record of driving communications in India and are equally comfortable driving proactive communications and handling reactive issues. Are excellent at media relations,
    and issues management and have a deep understanding of the political and regulatory landscape in India. Are a clear and superb written and verbal communicator. Have a strong track record of translating complex technical language into compelling messaging. Enjoy working cross-functionally with a range of technical and non-technical teams. Are excited to translate insights about AI for broader audiences, ranging from the tech press to the general public. Are results-oriented, with a bias towards flexibility and impact. Care about ensuring that transformative AI systems are developed safely. Logistics Minimum education: Bachelor’s degree or an equivalent combination of education, training, and/or experience Required field of study:&nbsp; A field relevant to the role as demonstrated through coursework, training, or professional experience Minimum years of experience: Years of experience required will correlate with the internal job level requirements for the position Location-based hybrid
    policy: Currently, we expect all staff to be in one of our offices at least 25% of the time. However, some roles may require more time in our offices. Visa sponsorship: &nbsp;We do sponsor visas! However, we aren''t able to successfully sponsor visas for every role and every candidate. But if we make you an offer, we will make every reasonable effort to get you a visa, and we retain an immigration lawyer to help with this. We encourage you to apply even if you do not believe you meet every single qualification. Not all strong candidates will meet every single qualification as listed.&nbsp; Research shows that people who identify as being from underrepresented groups are more prone to experiencing imposter syndrome and doubting the strength of their candidacy, so we urge you not to exclude yourself prematurely and to submit an application if you''re interested in this work. We think AI systems like the ones we''re building have enormous social and ethical implications. We think this makes
    representation even more important, and we strive to include a range of diverse perspectives on our team. Your safety matters to us. To protect yourself from potential scams, remember that Anthropic recruiters only contact you from&nbsp;@anthropic.com&nbsp;email addresses. In some cases, we may partner with vetted recruiting agencies who will identify themselves as working on behalf of Anthropic. Be cautious of emails from other domains. Legitimate Anthropic recruiters will never ask for money, fees, or banking information before your first day. If you''re ever unsure about a communication, don''t click any links—visit&nbsp; anthropic.com/careers &nbsp;directly for confirmed position openings. How we''re different We believe that the highest-impact AI research will be big science. At Anthropic we work as a single cohesive team on just a few large-scale research efforts. And we value impact — advancing our long-term goals of steerable, trustworthy AI — rather than work on smaller and
    more specific puzzles. We view AI research as an empirical science, which has as much in common with physics and biology as with traditional efforts in computer science. We''re an extremely collaborative group, and we host frequent research discussions to ensure that we are pursuing the highest-impact work at any given time. As such, we greatly value communication skills. The easiest way to understand our research directions is to read our recent research. This research continues many of the directions our team worked on prior to Anthropic, including: GPT-3, Circuit-Based Interpretability, Multimodal Neurons, Scaling Laws, AI &amp; Compute, Concrete Problems in AI Safety, and Learning from Human Preferences. Come work with us! Anthropic is a public benefit corporation headquartered in San Francisco. We offer competitive compensation and benefits, optional equity donation matching, generous vacation and parental leave, flexible working hours, and a lovely office space in which to collaborate
    with colleagues. Guidance on Candidates'' AI Usage: &nbsp;Learn about&nbsp; our policy for using AI in our application process.'
