  description_text: 'ABOUT AIRWALLEX Airwallex is the only unified payments and financial platform for global businesses. Powered by our unique combination of proprietary infrastructure and software, we empower over 200,000 businesses worldwide – including Brex, Rippling, Navan, Qantas, SHEIN and many more – with fully integrated solutions to manage everything from business accounts, payments, spend management and treasury, to embedded finance at a global scale. Proudly founded in Melbourne, we have a team of over 2,200 of the brightest and most innovative people in tech across 26 offices around the globe. Valued at US$8 billion and backed by world-leading investors including T. Rowe Price, Visa, Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and Lone Pine Capital, Airwallex is leading the charge in building the global payments and financial platform of the future. If you’re ready to do the most ambitious work of your career, join us. ATTRIBUTES WE VALUE We hire
    successful builders with founder-like energy who want real impact, accelerated learning, and true ownership. You bring strong role-related expertise and sharp thinking, and you’re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles. You move fast with good judgment, dig deep with curiosity, and make decisions from first principles, balancing speed and rigor. You''re humble and collaborative; turn zero‑to‑one ideas into real products, and you “get stuff done” end-to-end. You use AI to work smarter and solve problems faster. Here, you’ll tackle complex, high‑visibility problems with exceptional teammates and grow your career as we build the future of global banking. If that sounds like you, let’s build what’s next. ABOUT THE TEAM Our Mobile Team is responsible for the end-to-end development of both our iOS and Android apps, leveraging the latest technologies to build a seamless user experience. On iOS, we work with SwiftUI, Combine, and Async/Await,
    while on Android we use AndroidX, Coroutines, Hilt, and a suite of Jetpack libraries. You’ll be joining Airwallex at a pivotal moment as we expand the capabilities of our modern, fully native mobile apps. These apps empower customers to manage global B2B payments, submit and approve expenses, and control both virtual and physical Airwallex cards—including seamless Apple Pay and Google Pay integration for card transactions. WHAT YOU’LL DO As a Mobile Engineer, you’ll focus on building high-quality, user-friendly native mobile applications using modern frameworks and best practices. You’ll work closely with product managers, designers, and other engineers to deliver features that are reliable, intuitive, and performant. This role is based in Melbourne and relocation support will be provided. Responsibilities - Take ownership of the design, implementation, and delivery of key features across our iOS and Android apps, ensuring they are intuitive, performant, and reliable. - Collaborate closely
    with fellow engineers to define architecture, share best practices, and drive high-quality standards across platforms. - Influence how we scale and evolve our mobile apps—built less than three years ago—by shaping core architecture and contributing to long-term technical direction. - Go beyond feature development: contribute to team processes, product decisions, and broader engineering strategy as we scale globally. - Be a hands-on technical leader who takes pride in clean, testable code and actively supports continuous improvement across the mobile stack. WHO YOU ARE We’re looking for people who meet the minimum qualifications for this role. The preferred qualifications are great to have, but are not mandatory. Minimum Qualifications: - 6+ years of experience developing native mobile applications on iOS or Android, using modern frameworks and development practices - Bachelor’s degree or higher in Computer Science, Engineering, or a related field - Proven experience shipping one or more
    production apps, ideally available in the App Store or Google Play - Strong focus on code quality—writes testable code with high test coverage - Experience maintaining CI/CD pipelines (e.g. GitHub Actions, Bitrise) Preferred Qualifications: - Experience with modern Android or iOS development tools and libraries, such as AndroidX, Jetpack, SwiftUI, Combine, Hilt, or Coroutines APPLICANT SAFETY POLICY: FRAUD AND THIRD-PARTY RECRUITERS To protect you from recruitment scams, please be aware that Airwallex will not ask for bank details, sensitive ID numbers (i.e. passport), or any form of payment during the application or interview process. All official communication will come from an @airwallex.com http://airwallex.com email address. Please apply only through careers.airwallex.com http://careers.airwallex.com or our official LinkedIn page. Airwallex does not accept unsolicited resumes from search firms/recruiters. Airwallex will not pay any fees to search firms/recruiters if a candidate
    is submitted by a search firm/recruiter unless an agreement has been entered into with respect to specific open position(s). Search firms/recruiters submitting resumes to Airwallex on an unsolicited basis shall be deemed to accept this condition, regardless of any other provision to the contrary. EQUAL OPPORTUNITY Airwallex is proud to be an equal opportunity employer. We value diversity and anyone seeking employment at Airwallex is considered based on merit, qualifications, competence and talent. We don’t regard color, religion, race, national origin, sexual orientation, ancestry, citizenship, sex, marital or family status, disability, gender, or any other legally protected status when making our hiring decisions. If you have a disability or special need that requires accommodation, please let us know.'
