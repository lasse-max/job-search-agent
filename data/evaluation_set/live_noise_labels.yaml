  description_text: 'Since we opened our doors in 2009, the world of commerce has evolved immensely, and so has Square. After enabling anyone to take payments and never miss a sale, we saw sellers stymied by disparate, outmoded products and tools that wouldn’t work together. So we expanded into software and started building integrated, omnichannel solutions – to help sellers sell online, manage inventory, offer buy now, pay later functionality, book appointments, engage loyal buyers, and hire and pay staff. Across it all, we’ve embedded financial services tools at the point of sale, so merchants can access a business loan and manage their cash flow in one place. Afterpay furthers our goal to provide omnichannel tools that unlock meaningful value and growth, enabling sellers to capture the next generation shopper, increase order sizes, and compete at a larger scale. Today, we are a partner to sellers of all sizes – large, enterprise-scale businesses with complex operations, sellers just starting,
    as well as merchants who began selling with Square and have grown larger over time. As our sellers grow, so do our solutions. There is a massive opportunity in front of us. We’re building a significant, meaningful, and lasting business, and we are helping sellers worldwide do the same. The Role Square is building a best-in-class, high-impact field sales organization, and we are looking for an exceptional&nbsp; Territory Account Executive — someone who consistently exceeds expectations, takes full ownership of their territory, and brings Square’s mission of economic empowerment directly to the businesses that need it most.&nbsp; This is a field-driven, execution-focused role designed for individuals who thrive in dynamic, demanding environments. You will spend most of your week out in the market — meeting businesses, conducting live demos, and closing deals with confidence. The pace is fast, the expectations are high, and your ability to operate strategically and decisively will determine
    your success. You will serve as Square’s presence and competitive advantage in one of our highest-opportunity markets — responsible for building pipeline from the ground up, elevating Square’s visibility in your community, establishing high-value partnerships, and helping local businesses grow through our ecosystem of industry-leading software and hardware. If you are motivated by impactful work, driven to outperform, and eager to join a high-performance team with high standards, this role is built for you. The territory for this role can be located in Riverside, Corona, or San Bernardino. You will: Lead your market with disciplined, in-person execution Spend ~80% of your week in the field — walking your territory, engaging local businesses, and driving 50–60 targeted business visits each week. Run a full-cycle, self-sourced sales motion: generate leads, identify needs, deliver compelling demos, and close deals across Square’s full product suite. Establish yourself as the go-to Square
    expert in your city Build strong, trust-based relationships with local sellers by being present, reliable, and value-driven. Partner cross-functionally to ensure a seamless onboarding experience and fast time-to-value for new sellers. Implement a disciplined referral strategy to turn every new customer into future opportunities. Build a high-velocity pipeline from the ground up Develop a repeatable top-of-funnel engine through door-to-door outreach, community engagement, events, networking, and targeted partnerships. Work with channel partners to generate a consistent, high-quality referral stream that grows over time. Master your verticals and sell with precision Build deep expertise in key verticals — including restaurants, retail, and services — to diagnose challenges and position the right Square solutions. Sell consultatively and competitively, staying proactive and strategic throughout the sales cycle. Achieve exceptional results in a high-accountability environment Maintain strong
    operational rigor in Salesforce: track activity, manage pipeline, and forecast accurately. Measure performance frequently and improve continuously. Consistently exceed quota within a culture where high standards are the norm. You have: 3+ years of sales experience in a full cycle closing role with field sales experience Experience exceeding sales targets, selling a diverse ecosystem of products, and closing complex deals Ability to drive deals independently in a fast-paced, dynamic environment&nbsp; Business development experience (e.g. hunting and cold calling) Since this is a field position, you must have reliable transportation and live in the market you are serving A collaborative and team player mentality Prior Salesforce experience or equivalent Even better: 2+ years of payment processing OR related technology (i.e. payroll, loyalty, time management) 1+ years of relevant audience experience (experience working in/selling to restaurants, retailers or services based businesses) We''re
    working to build a more inclusive economy where our customers have equal access to opportunity, and we strive to live by these same values in building our workplace. Block is an equal opportunity employer evaluating all employees and job applicants without regard to identity or any legally protected class. We will consider qualified applicants with arrest or conviction records for employment in accordance with state and local laws and “fair chance” ordinances. We believe in being fair, and are committed to an inclusive interview experience, including providing reasonable accommodations to disabled applicants throughout the recruitment process. We encourage applicants to share any needed accommodations with their recruiter, who will treat these requests as confidentially as possible.&nbsp; Want to learn more about what we''re doing to build a workplace that is fair and square? Check out our &nbsp; I+D page . Block takes a market-based approach to pay, and pay may vary depending on your
    location. U.S. locations are categorized into one of four zones based on a cost of labor index for that geographic area. The successful candidate''s starting pay will be determined based on job-related skills, experience, qualifications, work location, and market conditions. These ranges may be modified in the future. To find a location''s zone designation, please refer to this&nbsp; resource . If a location of interest is not listed, please speak with a recruiter for additional information. Zone A: ($148,700 - $223,100) Zone B: ($138,300 - $207,500) Zone C: ($130,900 - $196,300) Zone D: ($123,400 - $185,200) Amounts listed above include target variable compensation. Application Guidelines Candidates may submit up to 9 active applications within a 60-day period. Reapplications to the same role are accepted 90 days after a previous application has been reviewed. Use of AI in Our Hiring Process We may use automated AI tools to evaluate job applications for efficiency and consistency. These
    tools comply with local regulations, including bias audits, and we handle all personal data in accordance with state and local privacy laws.&nbsp; Contact us&nbsp; here &nbsp;with hiring practice or data usage questions. Every benefit we offer is designed with one goal: empowering you to do the best work of your career while building the life you want. Remote work, medical insurance, flexible time off, retirement savings plans, and modern family planning are just some of our offering.&nbsp; Check out our other benefits at Block. Block, Inc. (NYSE: XYZ) builds technology to increase access to the global economy. Each of our brands unlocks different aspects of the economy for more people.&nbsp; Square &nbsp;makes commerce and financial services accessible to sellers.&nbsp; Cash App &nbsp;is the easy way to spend, send, and store money.&nbsp; Afterpay &nbsp;is transforming the way customers manage their spending over time.&nbsp; TIDAL &nbsp;is a music platform that empowers artists to thrive
    as entrepreneurs.&nbsp; Bitkey &nbsp;is a simple self-custody wallet built for bitcoin.&nbsp; Proto &nbsp;is a suite of bitcoin mining products and services. Together, we’re helping build a financial system that is open to everyone. Privacy Policy &nbsp; Block takes a market-based approach to pay, and pay may vary depending on your location. U.S. locations are categorized into one of four zones based on a cost of labor index for that geographic area. The successful candidate’s starting pay will be determined based on job-related skills, experience, qualifications, work location, and market conditions. These ranges may be modified in the future. To find a location’s zone designation, please refer to this&nbsp; resource . If a location of interest is not listed, please speak with a recruiter for additional information.&nbsp; &nbsp; Zone A: $42.89 &mdash; $64.35 USD Zone B: $39.89 &mdash; $59.85 USD Zone C: $37.76 &mdash; $56.62 USD Zone D: $35.60 &mdash; $53.42 USD Application Guidelines
