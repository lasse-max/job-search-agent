  description_text: 'Celonis is the global leader in Process Intelligence and the pioneer of Process Mining technology. As one of the world’s fastest-growing enterprise SaaS companies, we are changemakers pushing the boundaries of what’s possible. We invest heavily in advanced AI capabilities—specifically our Process Intelligence Graph—to turn data insights into immediate business action. We believe there is a massive opportunity to unlock global productivity and sustainability by placing intelligence at the core of every business process. Join our mission to make processes work for people, companies, and the planet. The Team: The UK Value Engineering team is responsible for our largest Fortune500 customers and owns their transformation journey by working on the very frontier of what’s possible with Data and AI. Partnering closely with the Sales team, Value Engineering is responsible for ensuring that the Celonis data &amp; AI platform is deployed to tackle the most strategic business challenges,
    fits into the right place in our customers’ technology stack and most importantly generates strong ROI through deep and broad deployments.&nbsp; &nbsp; The Role: As a Senior Value Engineer you are spearheading our mission of data-driven business transformation with our customers by owning their end-to-end value journey. You are their trusted technology &amp; business advisor, helping organisations achieve their strategic goals and realize significant value using the Celonis Process Intelligence Platform. A Value Engineer has full responsibility for the end-to-end value journey of our customers – landing, expanding, adopting and renewing. Responsibilities include translating customers’ objectives into value assessments or proof-of-value projects, helping organisations understand where Celonis fits into their IT landscape and AI strategy, building specific Celonis business cases and demos, running value workshops, and engaging with multiple senior stakeholders to deliver value driven results
    and secure long term partnership agreements. Your skillset combines a strong understanding of technology at both strategic and practical levels with consulting skills around strategic thinking and program management.&nbsp; The work you’ll do: Identify &amp; Frame Value Discover and translate customers’ strategic priorities into high-impact Celonis use cases Advise organisations on how Celonis’ platform fits into their existing IT landscape and AI strategy Build demos and business cases, leveraging industry benchmarks and best practices in order to win new customers&nbsp; Use hands-on tech skills (SQL/Python) to build out (AI) prototypes to bring the Celonis platform to life for new audiences Communicate the value opportunity and strategic roadmap to C-Level executives. Realize Value Facilitate business value workshops and use Celonis to identify and qualify opportunities for process enhancement Derive improvement measures in core business functions and initiate improvement actions and
    enterprise-wide change initiatives Present results and realized value to senior management and C-level executives Scale Value Responsible for the end-to-end customer value journey, landing, expanding, adoption and renewing Build a strategic expansion roadmap for customers embedding Celonis Process Intelligence as a strategic business transformation platform in their organization and therefore drive adoption and expansion Provide feedback to our product development teams to enhance the Celonis platform and Apps based on new use cases &nbsp; The qualifications you need: Data, Analytics, Applications &amp; IT: Good knowledge of Business Software / SaaS applications (e.g. SAP), Hands-on SQL and/or Python skills,, experience in collaborating with IT teams, experience developing dashboards and automations in tools like PowerBI or RPA, knowledge of and experience with AI-powered solutions. Live for Customer Value: Experience in an analytical role with the objective to demonstrate or secure
    value through business data analysis, business process improvement and respective Software deployment. Ideally in a customer-facing role in Solution Consulting, Sales Engineering or IT/Management Consulting with a Business Software / SaaS Provider or a Consultancy. Alternatively in an Inhouse role (e.g. Center of Excellence for Data Mining / Analytics / Intelligence) within an Enterprise. Process Improvement &amp; Value Realization: Experience in identifying use cases for business process improvement and deploying improvement measures,&nbsp; being a change agent and training users/process owners to realize value Project Management: Experience in planning and managing project scopes, expectations and timelines. You will manage multiple projects across your aligned accounts that will be at different parts of the value journey. Also, you will leverage partners from the Celonis Ecosystem wherever possible. Executive Stakeholder Management: Experience in preparing and communicating (value)
    roadmaps and results to stakeholders and management, both internally and externally. Excellent communication and presentation skills in English and sovereign appearance. Business Domain Expertise: Understanding of the Finance and/or Supply Chain domain as well as strategic transformation initiatives (e.g. Shared Services Transformation or System Transformation) Industry Expertise: Ideally expertise in one or more industries (e.g. Manufacturing, Automotive, Consumer, Retail, Pharmaceuticals, Chemicals) and the ability to develop a deep understanding of industry trends and strategic opportunities&nbsp; &nbsp; Degree: Engineering, Computer Science, Mathematics, Business Analytics or a comparable technical degree What Celonis can offer you: Pioneer Innovation: Work with the global leader in Process Mining and the Process Intelligence Graph to shape the future of AI-driven business operations. Ownership from Day 1: Every full-time "Celonaut" is an owner, receiving Restricted Stock Units (RSUs)
    and merit-based refresh grants. Unrivaled Family Support: Benefit from our inclusive parental leave policy—24 weeks of fully paid leave for primary carers and 12 weeks for supporting carers, available from your first day of employment. Work-Life Integration: Enjoy Unlimited PTO (in applicable regions) and generous PTO globally, as well as a flexible hybrid work model that balances remote focus with vibrant office collaboration. Continuous Growth: Elevate your skills through our 70-20-10 learning framework, mentorship programs, and access to a dedicated learning platform. Holistic Well-being: Prioritize your health with subsidized Wellhub memberships, mental health counseling, and dedicated "Wellness Weeks" that prioritize work/life balance. Drive Sustainability: Participate in annual Impact Days, where you receive paid time off to volunteer for community and environmental causes with your local office, or virtually. Global Inclusion &amp; Belonging: Find community through our Inclusion
