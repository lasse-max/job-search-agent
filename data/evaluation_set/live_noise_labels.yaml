  description_text: 'ABOUT AIRWALLEX Airwallex is the only unified payments and financial platform for global businesses. Powered by our unique combination of proprietary infrastructure and software, we empower over 200,000 businesses worldwide – including Brex, Rippling, Navan, Qantas, SHEIN and many more – with fully integrated solutions to manage everything from business accounts, payments, spend management and treasury, to embedded finance at a global scale. Proudly founded in Melbourne, we have a team of over 2,200 of the brightest and most innovative people in tech across 26 offices around the globe. Valued at US$8 billion and backed by world-leading investors including T. Rowe Price, Visa, Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and Lone Pine Capital, Airwallex is leading the charge in building the global payments and financial platform of the future. If you’re ready to do the most ambitious work of your career, join us. ATTRIBUTES WE VALUE We hire
    successful builders with founder-like energy who want real impact, accelerated learning, and true ownership. You bring strong role-related expertise and sharp thinking, and you’re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles. You move fast with good judgment, dig deep with curiosity, and make decisions from first principles, balancing speed and rigor. You''re humble and collaborative; turn zero‑to‑one ideas into real products, and you “get stuff done” end-to-end. You use AI to work smarter and solve problems faster. Here, you’ll tackle complex, high‑visibility problems with exceptional teammates and grow your career as we build the future of global banking. If that sounds like you, let’s build what’s next. About the team The Operations team at Airwallex ensures the smooth and efficient functioning of our services and processes. We focus on optimizing workflows, improving operational efficiency, and delivering exceptional customer
    support. By streamlining operations and implementing best practices, we help drive the company''s growth and maintain high service standards. Our team is dedicated to providing a seamless experience for our customers and supporting Airwallex’s mission to empower businesses globally. What you’ll do As part of our Operations Strategy team, you’ll be tackling complex problems across many different domains, with the overarching aim to improve customer experience in EMEA. You are a self-starter and independent thinker with exceptional analytical and communication skills, capable of owning work streams that will drive the evolution of our business. This role is based in London. Responsibilities: - Identify and drive strategic projects to improve our customer experience - Lead important initiatives to uplift the day-to-day work of our operational functions - Take a data driven approach to problem solving - Work across functions to ensure stakeholder alignment and deliver desired outcomes -
    Prepare and update materials covering project progress, highlighting progress towards goals, key risks and dependencies - Handle special projects and ad-hoc incoming requests, including deep-dives on issues identified by leadership or functional teams Who you are We''re looking for people who meet the minimum qualifications for this role. The preferred qualifications are great to have, but are not mandatory. Minimum qualifications: - 7+ years of experience, preferably with a fast-growing tech startup or top-tier strategy/management consulting or equivalent - Strong analytical skills, with proficiency in SQL/R/Python; any BI tools will be an advantage. - Strong analytical and problem solving skills essential - Exceptional stakeholder management and influencing skills APPLICANT SAFETY POLICY: FRAUD AND THIRD-PARTY RECRUITERS To protect you from recruitment scams, please be aware that Airwallex will not ask for bank details, sensitive ID numbers (i.e. passport), or any form of payment during
    the application or interview process. All official communication will come from an @airwallex.com http://airwallex.com email address. Please apply only through careers.airwallex.com http://careers.airwallex.com or our official LinkedIn page. Airwallex does not accept unsolicited resumes from search firms/recruiters. Airwallex will not pay any fees to search firms/recruiters if a candidate is submitted by a search firm/recruiter unless an agreement has been entered into with respect to specific open position(s). Search firms/recruiters submitting resumes to Airwallex on an unsolicited basis shall be deemed to accept this condition, regardless of any other provision to the contrary. EQUAL OPPORTUNITY Airwallex is proud to be an equal opportunity employer. We value diversity and anyone seeking employment at Airwallex is considered based on merit, qualifications, competence and talent. We don’t regard color, religion, race, national origin, sexual orientation, ancestry, citizenship, sex,
    marital or family status, disability, gender, or any other legally protected status when making our hiring decisions. If you have a disability or special need that requires accommodation, please let us know.'
