  description_text: Company Description We’re http://checkout.comCheckout.com http://Checkout.com. You might not know our name, but companies like eBay, Spotify, Klarna, Uber, and Sony do, because we’re behind many of the digital experiences you use every day. We are where the world checks out, enabling over 10 billion transactions daily for more than one billion global shoppers. Whether you want to book a holiday, order food, renew a subscription, or check out online, there’s a good chance our tech powers the payments behind the scenes. Our platform helps the most ambitious businesses deliver effortless digital experiences, at scale. If you want to do career-defining work, you’ve come to the right place. We move fast, think globally, and believe great teams are built by hiring exceptional people with conviction, curiosity, and the desire to make an impact. With 20 offices across six continents and London as our HQ, we’re shaping the future of fintech – and we’re just getting started. As
    we continue to improve the pace and breadth of our reporting, we are looking for a detail-oriented accounting professional to join our team as we build the Finance function of the future. Reporting to the Technical Accounting Lead, you will be responsible for supporting the delivery of accounting advice under IFRS globally. You will assist in drafting internal accounting policy guidance, support the preparation of financial statements, and help communicate accounting outcomes to stakeholders across the business. This role provides critical support in the calculation of share-based payment expenses reported globally. The ideal candidate thrives in a fast-paced environment, possesses strong foundational technical skills, and demonstrates the meticulous attention to detail required to produce high-quality financial information. How you will make an impact - Draft initial accounting advice and research memos on a range of IFRS topics, including revenue recognition, financial instruments,
    software capitalisation, and leases. - Support the Technical Accounting team in the calculation and documentation of complex global accounting topics such as share-based payment expenses and leases. - Assist in the determination of group accounting policies and the development of internal guidance manuals, including researching accounting treatments for new products and geographic expansion. - Support the assessment and implementation of new and amended accounting standards, such as IFRS 18. - Prepare IFRS financial statement disclosures and assist in responding to audit queries. - Provide practical GAAP advice and assistance to local financial controllers regarding disclosure requirements and completeness. Qualifications - Qualified accountant (CA, ACA, ACCA, or equivalent). - 2 to 4 years of post-qualification experience (PQE) within a technical accounting, audit, or financial reporting environment. - Strong foundational knowledge of international accounting standards, with a particular
    interest in IFRS 15, IFRS 16, IFRS 9, and IFRS 2. - Experience in the preparation, review or audit of financial statements prepared under IFRS. - Excellent written and verbal communication skills, with the ability to help simplify complex technical accounting concepts into more intuitive and understandable guidance for non-accountant stakeholders. - Advanced Excel or G-Sheet skills and experience in the preparation or audit of complex financial statement disclosure notes. - Experience within an international environment or the financial services industry is desirable. Additional Information Bring all of you to work We create the conditions for high performers to thrive, through real ownership, fewer blockers, and work that makes a difference from day one. Here, you’ll move fast, take on meaningful challenges, and be recognized for the impact you deliver. It’s a place where ambition gets met with opportunity, and where your growth is in your hands. We work as one team, and we back each
