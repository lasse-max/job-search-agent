  description_text: 'ABOUT AIRWALLEX Airwallex is the only unified payments and financial platform for global businesses. Powered by our unique combination of proprietary infrastructure and software, we empower over 200,000 businesses worldwide – including Brex, Rippling, Navan, Qantas, SHEIN and many more – with fully integrated solutions to manage everything from business accounts, payments, spend management and treasury, to embedded finance at a global scale. Proudly founded in Melbourne, we have a team of over 2,200 of the brightest and most innovative people in tech across 26 offices around the globe. Valued at US$8 billion and backed by world-leading investors including T. Rowe Price, Visa, Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and Lone Pine Capital, Airwallex is leading the charge in building the global payments and financial platform of the future. If you’re ready to do the most ambitious work of your career, join us. ATTRIBUTES WE VALUE We hire
    successful builders with founder-like energy who want real impact, accelerated learning, and true ownership. You bring strong role-related expertise and sharp thinking, and you’re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles. You move fast with good judgment, dig deep with curiosity, and make decisions from first principles, balancing speed and rigor. You''re humble and collaborative; turn zero‑to‑one ideas into real products, and you “get stuff done” end-to-end. You use AI to work smarter and solve problems faster. Here, you’ll tackle complex, high‑visibility problems with exceptional teammates and grow your career as we build the future of global banking. If that sounds like you, let’s build what’s next. ABOUT THE TEAM The Marketing team at Airwallex drives brand awareness and customer engagement through innovative and strategic campaigns. We work to communicate the value of our financial solutions, attract new customers, and strengthen
    relationships with existing ones. By leveraging data-driven insights and creative strategies, we ensure Airwallex stands out in a competitive market. Our team is passionate about telling the Airwallex story and supporting the company''s growth and success. WHAT YOU’LL DO We’re looking for a Technical SEO Manager to scale and optimize our global SEO efforts, drive high-intent organic traffic, and improve revenue growth. This is a unique opportunity to join the Global Growth Marketing Team and shape the technical foundation of our SEO approach. In this role, you’ll support the Director of SEO in developing a best-in-class technical SEO strategy, ensuring our site architecture, performance, and discoverability set us apart. You will be a "hybrid" contributor—someone who can identify problems, write Jira tickets for the engineering team, and, when necessary, get your hands dirty in the codebase to implement fixes. You’ll work cross-functionally with Growth Marketing, Content Marketing, Product,
    RevOps, Data, and Engineering teams to deliver impactful technical solutions. This role is based in San Francisco. RESPONSIBILITIES: - Roadmap Support: Support the technical SEO roadmap, managing site architecture, crawl budgets, and complex URL structures to ensure indexation is optimized at scale. - Engineering Partnership: Partner with Engineering to scope and execute technical changes, including structured data (JSON-LD), internal linking, and international SEO (hreflang, localization). - Technical Execution: Proactively identify technical issues and optimization opportunities; write clean, semantic HTML, CSS, and JavaScript to directly implement recommendations within our front-end stack (e.g., React, Next.js). - Site Audits: Lead comprehensive site audits (crawl errors, redirects, canonicalization, duplicate content) and deep-dive into rendering issues (SSR vs. SSG). - Performance Optimization: Relentlessly optimize Core Web Vitals (LCP, INP, CLS) and overall page speed across
    global markets and devices. - Authority Growth: Support off-site backlink strategies by ensuring technical health and site integrity support authority growth. - CRO & Testing: Support conversion rate optimization (CRO) initiatives and design/measure SEO A/B tests to validate the organic impact of template changes. - Monitoring & Analytics: Establish monitoring and reporting processes using server log analysis and custom dashboards (GSC API, GA4) to measure technical SEO performance. WHO YOU ARE We''re looking for people who meet the minimum requirements for this role. The preferred qualifications are great to have, but are not mandatory. MINIMUM QUALIFICATIONS: - 4+ years of SEO experience, with at least 2+ years specifically in a technical SEO role (preferably in-house for B2B, SaaS, or Fintech). - Strong understanding of HTML, CSS, and vanilla JavaScript as they relate to the critical rendering path and how search bots parse code. - Familiarity with modern web architectures, including
    Headless CMS, SPAs, and React/Next.js frameworks. - Proven track record with international SEO and multi-language/multi-domain strategies at scale. - Strong analytical skills with the ability to turn raw data into technical insights and business actions. - Deep knowledge of Google Search Console, GA4, Screaming Frog, Sitebulb, and web performance tools (Lighthouse, WebPageTest). - Excellent communication skills to explain complex technical concepts to non-technical stakeholders. APPLICANT SAFETY POLICY: FRAUD AND THIRD-PARTY RECRUITERS To protect you from recruitment scams, please be aware that Airwallex will not ask for bank details, sensitive ID numbers (i.e. passport), or any form of payment during the application or interview process. All official communication will come from an @airwallex.com http://airwallex.com email address. Please apply only through careers.airwallex.com http://careers.airwallex.com or our official LinkedIn page. Airwallex does not accept unsolicited resumes
    from search firms/recruiters. Airwallex will not pay any fees to search firms/recruiters if a candidate is submitted by a search firm/recruiter unless an agreement has been entered into with respect to specific open position(s). Search firms/recruiters submitting resumes to Airwallex on an unsolicited basis shall be deemed to accept this condition, regardless of any other provision to the contrary. EQUAL OPPORTUNITY Airwallex is proud to be an equal opportunity employer. We value diversity and anyone seeking employment at Airwallex is considered based on merit, qualifications, competence and talent. We don’t regard color, religion, race, national origin, sexual orientation, ancestry, citizenship, sex, marital or family status, disability, gender, or any other legally protected status when making our hiring decisions. If you have a disability or special need that requires accommodation, please let us know.'
