  description_text: 'Since we opened our doors in 2009, the world of commerce has evolved immensely, and so has Square. After enabling anyone to take payments and never miss a sale, we saw sellers stymied by disparate, outmoded products and tools that wouldn’t work together. So we expanded into software and started building integrated, omnichannel solutions – to help sellers sell online, manage inventory, offer buy now, pay later functionality, book appointments, engage loyal buyers, and hire and pay staff. Across it all, we’ve embedded financial services tools at the point of sale, so merchants can access a business loan and manage their cash flow in one place. Afterpay furthers our goal to provide omnichannel tools that unlock meaningful value and growth, enabling sellers to capture the next generation shopper, increase order sizes, and compete at a larger scale. Today, we are a partner to sellers of all sizes – large, enterprise-scale businesses with complex operations, sellers just starting,
    as well as merchants who began selling with Square and have grown larger over time. As our sellers grow, so do our solutions. There is a massive opportunity in front of us. We’re building a significant, meaningful, and lasting business, and we are helping sellers worldwide do the same. Square''s Strategic Account Management organization is seeking an experienced sales professional to drive growth and retention of Mid-Market accounts within our Services vertical. This team partners with some of Square''s most dynamic services-vertical sellers — diverse businesses spanning sports &amp; entertainment, health &amp; beauty, home services, and professional services. In this role, you''ll serve as a trusted advisor to services business owners and operators, helping them evaluate their tech stack and scale using Square''s ecosystem. You Will Own and maintain relationships across a portfolio of ~175 mid-market services sellers, driving account expansion, retention, and satisfaction Consult with
    business owners and operators to uncover opportunities across payments, business management, and banking tools Retain and grow portfolio through use-case expansion, cross-sell opportunities, and customized seller onboarding experiences Identify opportunities for technical Square solutions to address existing customer needs; project manage execution in collaboration with cross-functional teams Act as the voice of the customer, advocating for mid-market services seller needs with Product, Engineering, and Operations teams Negotiate contracts for use-case expansion and retention of your sellers Deliver white-glove client service, ensuring resolution of seller issues Inform operations and program design for this segment at scale You Have 5+ years of experience in account management or sales, ideally within SaaS, payments, or business management software Proven success growing and retaining a book of business Consistent over-performance on key metrics and revenue targets Strong discovery
    and consultative selling skills Experience in the services industry (sports &amp; entertainment, health &amp; beauty, home services, and professional services) preferred, but not required Technical solutioning skills, including requirements gathering and translating customer needs into scalable solutions Demonstrated success retaining and expanding strategic accounts Experience negotiating contracts and pricing with senior stakeholders Exceptional written and verbal communication skills Creative, strategic problem-solver who thrives in ambiguous environments Growth mindset, empathetic collaborator, and positive team player Pay Transparency: Block takes a market-based approach to pay, and pay may vary depending on your location. U.S. locations are categorized into one of four zones based on a cost of labor index for that geographic area. The successful candidate''s starting pay will be determined based on job-related skills, experience, qualifications, work location, and market conditions.
    These ranges may be modified in the future. To find a location''s zone designation, please refer to this resource . If a location of interest is not listed, please speak with a recruiter for additional information. Zone A: ($135,200 - $202,800) Zone B: ($125,800 - $188,600) Zone C: ($119,000 - $178,400) Zone D: ($108,200 - $162,200) Application Guidelines Candidates may submit up to 9 active applications within a 60-day period. Reapplications to the same role are accepted 90 days after a previous application has been reviewed. Use of AI in Our Hiring Process We may use automated AI tools to evaluate job applications for efficiency and consistency. These tools comply with local regulations, including bias audits, and we handle all personal data in accordance with state and local privacy laws.&nbsp; Contact us here &nbsp;with hiring practice or data usage questions. Every benefit we offer is designed with one goal: empowering you to do the best work of your career while building the life
    you want. Remote work, medical insurance, flexible time off, retirement savings plans, and modern family planning are just some of our offering.&nbsp; Check out our other benefits at Block. Block, Inc. (NYSE: XYZ) builds technology to increase access to the global economy. Each of our brands unlocks different aspects of the economy for more people.&nbsp; Square &nbsp;makes commerce and financial services accessible to sellers.&nbsp; Cash App &nbsp;is the easy way to spend, send, and store money.&nbsp; Afterpay &nbsp;is transforming the way customers manage their spending over time.&nbsp; TIDAL &nbsp;is a music platform that empowers artists to thrive as entrepreneurs.&nbsp; Bitkey &nbsp;is a simple self-custody wallet built for bitcoin.&nbsp; Proto &nbsp;is a suite of bitcoin mining products and services. Together, we’re helping build a financial system that is open to everyone. Privacy Policy'
