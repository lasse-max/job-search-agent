  description_text: 'A World-Changing Company Palantir builds the world’s leading software for data-driven decisions and operations. By bringing the right data to the people who need it, our platforms empower our partners to develop lifesaving drugs, forecast supply chain disruptions, locate missing children, and more. The Role Palantir''s defense product vertical builds mission-critical products for the modern warfighter. We provide a complete ecosystem where customers can securely integrate and visualize their data, and build sophisticated, full-fledged programs such as common operating pictures, alert-triaging inboxes, and resource allocation planning tools driven by rich-ML models. Our customers use our defense offering to perform rich analyses that drive core operations within their organizations - these programs are relied upon for daily operations in the command centers and battlefronts of militaries across the world. This is a frontend engineering role focused on application development
    for our defense product offering, where you will be responsible for crafting the applications that organizations use every day to keep their countries safe. You will be architecting and developing interfaces to make sophisticated, data-intensive workflows both powerful and approachable, including to non-technical users. You may spend one day talking to users to better understand their needs and identifying product gaps to improve. The next day, you might find yourself putting that customer context to use and brainstorming how to handle intricate UX needs with your teammates. You’ll regularly face sophisticated technical problems, requiring you to scope out the solution design and finding an incremental path to shipping the new features. As part of this, you will own APIs and schemas that power your frontend code, and work with backend engineers in developing them together. You’ll be constantly exploring new horizons and building new skills in service of real world needs: between type
    theory, operational transforms, 2D and 3D mapping, UI design systems, high-scale graphics rendering, evidence-based performance optimization, and the never-ending need to decompose user asks into rich, sophisticated, and maintainable software, there is always a new challenge to be faced. Core Responsibilities As a frontend engineer working on our defense product offering, you will be involved throughout the product lifecycle - from idea generation, design, and prototyping to execution and shipping.'
