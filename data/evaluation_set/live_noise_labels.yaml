  description_text: 'At Snowflake, we are powering the era of the agentic enterprise. To usher in this new era, we seek AI-native thinkers across every function who are energized by the opportunity to reinvent how they work. You don’t just use tools; you possess an innate curiosity, treating AI as a high-trust collaborator that is core to how you solve problems and accelerate your impact. We look for low-ego individuals who thrive in dynamic and fast-moving environments and move with an experimental mindset — who rapidly test emerging capabilities to discover simpler, more powerful ways to deliver results. At Snowflake, your role isn''t just to execute a function, but to help redefine the future of how work gets done. The Snowflake Postgres team https://www.snowflake.com/en/product/features/postgres/ is building a fully managed, cloud-native Postgres service that delivers the reliability, performance, and scale developers expect that is paired with a data experience that seamlessly ties
    into Snowflake. As a Senior Engineer Manager, you''ll help define the architecture, push the boundaries of Postgres in the cloud, and shape one of Snowflake''s most strategic new products AS A SENIOR ENGINEERING MANAGER AT SNOWFLAKE YOU WILL: - Provide strong technical leadership across both the Postgres data-plane and the orchestration/control plane required to deliver a managed service (HA, upgrades, backups, scaling, automation, and operational safety). - Break problems down and build consensus across multiple parties to reach solutions that are scalable, tractable, and timely. - Function as both a problem solver and a problem finder by building the roadmap while delivering it. - Leverage your experience to balance long-term thinking with more immediate business needs. - Understand trade-offs between consistency, performance, scaling limits, and costs to build solutions which can meet the demands of rapidly growing services. - Ensure operational readiness of the services and meet
    the commitments to our customers regarding durability, availability, performance, and security. - Solve real business needs at large scale by applying your software engineering and analytical problem solving skills. OUR IDEAL SENIOR ENGINEERING MANAGER WILL HAVE: - 10+ years of experience building and operating large-scale systems (distributed systems, databases, or cloud services). - 5+ years of experience building, managing, and leading high-performing engineering teams (and experience leading managers is a strong plus). - Strong track record of delivering large-scale, resilient systems and services in production. - Significant experience in cloud environments (AWS, Azure, and/or GCP) and building services with high availability and operational rigor. - Strong communication and collaboration skills, with the ability to drive cross-functional alignment and influence across org boundaries. - Strong hands-on technical ability; comfortable navigating complex codebases and diving deep into
    system design and implementation. - BS/MS in Computer Science or related majors, or equivalent experience. - Postgres depth: experience with Postgres as an end user, operator, or administrator; strong understanding of database fundamentals and tradeoffs (consistency, performance, scaling limits, cost). OR - Love of Postgres. You have worked with Postgres as an end user or administrator. You have a solid understanding of database fundamentals. WHY JOIN THE ENGINEERING TEAM AT SNOWFLAKE? - Build an industry-leading Cloud Data and AI Platform. - Solve challenging technical problems related to security, parallel and distributed systems, programming, resource management, large-scale system maintenance, and more! - Work closely with our customers & partners, understand their use cases & needs, think strategically to seek the right problem to solve at the right time, and innovate with rigor. - Join a world-class team of both industry veterans and rising stars. Every Snowflake employee is expected
    to follow the company’s confidentiality and security standards for handling sensitive data. Snowflake employees must abide by the company’s data security plan as an essential part of their duties. It is every employee''s duty to keep customer information secure and confidential. Snowflake is growing fast, and we’re scaling our team to help enable and accelerate our growth. We are looking for people who share our values, challenge ordinary thinking, and push the pace of innovation while building a future for themselves and Snowflake. How do you want to make your impact? For jobs located in the United States, please visit the job posting on the Snowflake Careers Site for salary and benefits information: careers.snowflake.com http://careers.snowflake.com'
