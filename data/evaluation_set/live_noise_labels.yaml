  description_text: 'P-1124 Summary At Databricks, we are obsessed with enabling data teams to solve the world''s toughest problems, from security threat detection to cancer drug development. We do this by building and running the world''s best data and AI infrastructure platform, so our customers can focus on the high-value challenges that are central to their missions. Our engineering teams build highly technical products that fulfill real, important needs in the world. We constantly push the boundaries of data and AI technology, while simultaneously operating with the resilience, security, and scale that is critical to making customers successful on our platform. Customers trust Databricks with their most valuable data and Trust &amp; Safety has the mission to build the most trusted data analytics and ML platform in the world. Security Engineering is an integral part of Trust &amp; Safety and has&nbsp; a critical role to play in keeping customer data from bad actors. We are looking for
    senior leaders such as yourselves to create the vision and define the strategy for this space.&nbsp; The impact you will have: Make Databricks safer for our customers by identifying and plugging key gaps in our infrastructure and services Attract top talent from across the industry. Represent the security engineering discipline throughout the organization, having a powerful voice to make us more data-driven Represent Databricks at academic and industry conferences &amp; events What we look for: 9+ years of experience in Data Security or related areas&nbsp; and expertise in two or more of the following--Cryptography, Kubernetes Security, Web Security, Governance, Privacy, Trust, Safety, Authentication, Identity Management, Access Control, Key Management, Inter-Service Authentication, Secure Application Frameworks, Detection &amp; Response. Experience building systems at large scale internet companies is a huge plus. 15+ years of experience building large scale distributed systems with
    high availability Leadership skills and experience to lead across functional and organizational lines Strong communication skills to explain and evangelize Data Security to senior leaders across the company Bias to action and passion for delivering high-quality solutions MS or Ph.D. in Computer Science or related fields &nbsp; Pay Range Transparency Databricks is committed to fair and equitable compensation practices. The pay range(s) for this role is listed below and represents the expected salary range for non-commissionable roles or on-target earnings for commissionable roles.&nbsp; Actual compensation packages are based on several factors that are unique to each candidate, including but not limited to job-related skills, depth of experience, relevant certifications and training, and specific work location. Based on the factors above, Databricks anticipates utilizing the full width of the range. The total compensation package for this position may also include eligibility for annual
    performance bonus, equity, and the benefits listed above. For more information regarding which range your location is in visit our page here . &nbsp; Local Pay Range $217,200 &mdash; $288,400 USD About Databricks Databricks is the data and AI company. More than 10,000 organizations worldwide — including Comcast, Condé Nast, Grammarly, and over 50% of the Fortune 500 — rely on the Databricks Data Intelligence Platform to unify and democratize data, analytics and AI. Databricks is headquartered in San Francisco, with offices around the globe and was founded by the original creators of Lakehouse, Apache Spark™, Delta Lake and MLflow. To learn more, follow Databricks on&nbsp; Twitter ,&nbsp; LinkedIn &nbsp; and &nbsp; Facebook . Benefits At Databricks, we strive to provide comprehensive benefits and perks that meet the needs of all of our employees. For specific details on the benefits offered in your region click here . Our Commitment to Diversity and Inclusion At Databricks, we are committed
    to fostering a diverse and inclusive culture where everyone can excel. We take great care to ensure that our hiring practices are inclusive and meet equal employment opportunity standards. Individuals looking for employment at Databricks are considered without regard to age, color, disability, ethnicity, family or marital status, gender identity or expression, language, national origin, physical and mental ability, political affiliation, race, religion, sexual orientation, socio-economic status, veteran status, and other protected characteristics. Compliance If access to export-controlled technology or source code is required for performance of job duties, it is within Employer''s discretion whether to apply for a U.S. government license for such positions, and Employer may decline to proceed with an applicant on this basis alone.'
