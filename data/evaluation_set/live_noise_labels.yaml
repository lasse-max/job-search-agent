  description_text: 'Company Description We’re http://checkout.comCheckout.com http://Checkout.com. You might not know our name, but companies like eBay, Spotify, Klarna, Uber, and Sony do, because we’re behind many of the digital experiences you use every day. We are where the world checks out, enabling over 10 billion transactions daily for more than one billion global shoppers. Whether you want to book a holiday, order food, renew a subscription, or check out online, there’s a good chance our tech powers the payments behind the scenes. Our platform helps the most ambitious businesses deliver effortless digital experiences, at scale. If you want to do career-defining work, you’ve come to the right place. We move fast, think globally, and believe great teams are built by hiring exceptional people with conviction, curiosity, and the desire to make an impact. With 20 offices across six continents and London as our HQ, we’re shaping the future of fintech – and we’re just getting started. As
    a Transaction Monitoring Analyst II, you will be at the front line of defending the ecosystem against financial crime. You will perform deep-dive investigations into merchant and consumer payment patterns to detect potential Money Laundering (ML), Terrorist Financing (TF), and Fraud. Unlike an entry-level role, an Analyst II handles escalated or complex alerts, identifies emerging typologies, and assists in the refinement of our monitoring rules. You will be responsible for ensuring that suspicious activity is identified, documented, and reported to the relevant authorities (via SARs/STRs) in strict accordance with internal policies and Mauritius/global regulatory requirements. WHAT YOUR RESPONSIBILITIES WILL BE: - Investigative Analysis: Perform end-to-end investigations on complex transaction monitoring alerts, utilizing internal data and external OSINT tools to identify suspicious patterns. - Case Management: Manage a queue of high-priority cases, ensuring thorough documentation of
    rationales and timely clearance or escalation. - Reporting: Draft high-quality Suspicious Activity Reports (SARs) or Suspicious Transaction Reports (STRs) for review by the Money Laundering Reporting Officer (MLRO). - Pattern Recognition: Identify and escalate new financial crime typologies and "red flags" observed during daily monitoring to improve automated detection rules. - Risk Mitigation: Conduct enhanced due diligence (EDD) on high-risk accounts or merchants triggered by transaction monitoring alerts. - Collaboration: Work closely with the Quality Control (QC), Financial Intelligence Unit (FIU) and Product Engineering team to provide feedback on alert quality and system effectiveness. - Mentorship: Serve as a point of escalation and subject matter expert (SME) for Junior Analysts, providing guidance on complex investigative techniques. - Compliance Adherence: Ensure all reviews are completed within strict regulatory timelines and internal Service Level Agreements (SLAs). WHAT
    YOU WILL NEED TO BE SUCCESSFUL: - Education: Bachelor’s degree in Banking, Finance, Law, Criminology, or a related field. - Experience: Minimum 3+ years of hands-on experience specifically in AML Transaction Monitoring or Financial Crime Investigations within Fintech or Banking. - Technical Savvy: Proficiency in using Transaction Monitoring systems (e.g., Napier, Featurespace, or proprietary tools) and data visualization tools. - Analytical Rigor: Strong ability to "connect the dots" across disparate data points to uncover complex money laundering schemes. - Communication: Exceptional written communication skills, with a proven ability to write clear, concise, and defensible investigative narratives. - Regulatory Knowledge: Solid understanding of the Financial Intelligence and Anti-Money Laundering Act (FIAMLA) and global AML/CFT standards (FATF). - Certification: ACAMS or ICA certification is highly preferred. - Mindset: A proactive, "investigator" mindset with high attention to detail
    and the ability to work under pressure. Additional Information Bring all of you to work We create the conditions for high performers to thrive, through real ownership, fewer blockers, and work that makes a difference from day one. Here, you’ll move fast, take on meaningful challenges, and be recognized for the impact you deliver. It’s a place where ambition gets met with opportunity, and where your growth is in your hands. We work as one team, and we back each other to succeed. So whatever your background or identity, if you’re ready to grow and make a difference, you’ll be right at home here. It’s important we set you up for success and make our process as accessible as possible. So let us know in your application, or tell your recruiter directly, if you need anything to make your experience or working environment more comfortable. Life at Checkout.com http://Checkout.com We understand that work is just one part of your life. Our hybrid working model offers flexibility, with three days
    per week in the office to support collaboration and connection. Curious about what it’s like to be part of our team? Visit our Careers Page https://www.checkout.com/careers to learn more about our culture, open roles, and what drives us. For a closer look at daily life at Checkout.com http://Checkout.com, follow us on LinkedIn https://www.linkedin.com/company/checkout/life/ and Instagram https://www.instagram.com/checkout_com/'
