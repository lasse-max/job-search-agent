  description_text: 'Airbnb was born in 2007 when two hosts welcomed three guests to their San Francisco home, and has since grown to over 5 million hosts who have welcomed over 2 billion guest arrivals in almost every country across the globe. Every day, hosts offer unique stays and experiences that make it possible for guests to connect with communities in a more authentic way. The Community You Will Join:&nbsp; The Airbnb Finance team is looking for a highly qualified Senior Treasury Analyst to join the Treasury operations team. Reporting to the Treasury Operations Manager,&nbsp; the ideal candidate will have well rounded global corporate treasury experience and enjoy working in a challenging, fast–paced and high-growth environment. The Difference You Will Make: This senior analyst role will be responsible for several key processes that have numerous weekly and monthly deliverables. Most importantly, you’ll be responsible for the weekly Foreign exchange netting and settlement process
    across 10 trading banks and 20+ currencies. Along with FX tasks, you’ll create and distribute weekly reporting to finance management, be a key contributor in managing corporate liquidity and account opening, own detailed interest rate tracking across a global account platform, and manage letter of credit issuances and fees. A Typical Day:&nbsp; Support foreign currency hedging programs – monitor, net, settle, and report on open hedge positions Continually look to optimize processes, controls, and reporting within the Treasury Management System (Kyriba)&nbsp;&nbsp; Support corporate debt activities and related compliance&nbsp; Manage Airbnb’s Letter of Credit program and track/process related fees and expenses Respond to inquiries and partner regularly with accounting, tax, legal, and AP teams; investigate and resolve exceptions in a timely manner Urgently action new entity and account opening opening processes Handle ad-hoc Treasury projects and presentations to broader team or management
    Maintain operating audit compliance and contribute to effective control environment Recommend and lead AI integration regarding automation and process improvement efforts Work closely with banking partners to track interest rates and interest income Your Expertise: 8+ years experience in global corporate treasury&nbsp; Bachelor''s degree in Business, Finance or Accounting Experience in a high-growth start-up or large multinational corporation Strong communication skills, ability to multitask with high attention to detail Experience with TMS systems is required and ERP application experience a plus A strong understanding of relevant financial SOX controls Well versed in Foreign Exchange hedging and settlement processes Team Player, high level of dependability and strong work ethic Enthusiastic about automation and AI integration&nbsp; Advanced GSuite application skills (or equivalent MS Office)&nbsp; Can independently identify gaps and take initiative to improve processes CTP a plus Your
