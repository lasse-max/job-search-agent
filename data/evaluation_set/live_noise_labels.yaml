  source_url: https://job-boards.greenhouse.io/celonis/jobs/7635342003?gh_jid=7635342003
  description_text: 'Celonis is the global leader in Process Intelligence and the pioneer of Process Mining technology. As one of the world’s fastest-growing enterprise SaaS companies, we are changemakers pushing the boundaries of what’s possible. We invest heavily in advanced AI capabilities—specifically our Process Intelligence Graph—to turn data insights into immediate business action. We believe there is a massive opportunity to unlock global productivity and sustainability by placing intelligence at the core of every business process. Join our mission to make processes work for people, companies, and the planet. The Role: We are looking for a Lead Value Engineer, Consumer Packaged Goods (CPG)—an industry expert who can bridge the gap between technical process mining and strategic business outcomes. You will act as an architect for critical work-streams within a major CPG account, translating complex operational data into clear value drivers. As a Lead Value Engineer, you are a "go-to"
    execution expert within our CPG go-to-market organization. You will move beyond standard process optimization to link Celonis capabilities to key outcomes specific to fast-moving consumer goods operations. You will work in partnership with the Celonis Sales Teams and have full responsibility for the end-to-end value journey of our customers. You are our customers'' trusted advisor, helping them achieve their strategic goals and realize significant value using the Celonis Process Intelligence Platform. In collaboration with our partners and Celonis Services, you will drive measurable business impact across various processes and accelerate the adoption of our platform. You will blend deep process and industry expertise with a proven consulting skill set and strong analytical skills at the forefront of one of the fastest-growing tech companies worldwide. The work you’ll do: Identify &amp; Frame Value Translate Strategy to Operations: &nbsp;Analyze the client’s strategic priorities (e.g.,
    Omnichannel Growth, Margin Protection, Supply Chain Agility, and Sustainability) and map them to high-impact Celonis use cases. Target High-Impact Areas: &nbsp;Architect solutions that connect data across the value chain—moving beyond simple task automation to optimizing complex ecosystems like Demand Planning, Trade Promotions Management (TPM), Logistics, and Direct-to-Consumer (D2C) fulfillment. Build the Business Case: &nbsp;Construct robust, data-backed business cases that articulate the financial and operational impact of Process Intelligence (e.g., reducing Cost of Goods Sold, optimizing working capital, or improving On-Time In-Full [OTIF] delivery) to senior management. Win Expansion: &nbsp;Build demos and business cases, leveraging industry benchmarks and best practices in order to win new expansion opportunities. Assess Value: &nbsp;Undertake Value Assessments or Proof-of-Value Projects and communicate the value opportunity and strategic roadmap to C-Level executives. Realize
    Value Drive Engagement Success: &nbsp;Lead the value workstream for pilots and implementations, ensuring the "digital twin" strategy effectively monitors process health in fast-paced, high-volume retail and consumer environments. Orchestrate Improvement: &nbsp;Guide customers on how to use Celonis to provide context to their AI agents, coordinating hand-offs between systems and teams in Order-to-Cash, Source-to-Pay, and Plan-to-Produce. Solve Systemic Challenges: &nbsp;Work cross-functionally to tackle difficult implementation hurdles, helping customers define standards for Retailer Compliance, master data governance, or supply network visibility. Facilitate Workshops: &nbsp;Run business value workshops and use Celonis to identify and qualify opportunities for process enhancement. Initiate Change: &nbsp;Derive improvement measures in core business functions and initiate improvement actions and enterprise-wide change initiatives. Present Results: &nbsp;Present results and realized value
    to senior management and C-level executives. Scale Value Codify Best Practices: &nbsp;Turn our solutions into reusable assets and use cases for the broader Value Engineering team. Mentor &amp; Enable: &nbsp;Act as a senior resource for the team, helping junior engineers understand CPG terminology, seasonality nuances, and retail stakeholder management. Product Feedback: &nbsp;Serve as a bridge between the customer and our Product teams, providing specific feedback on how to enhance our platform for the CPG vertical (e.g., specific requirements for Trade Spend visibility or SKU Rationalization). Manage the Journey: &nbsp;Responsible for the end-to-end customer value journey, landing, expanding, adoption, and renewing. Build Roadmaps: &nbsp;Build a strategic expansion roadmap for customers embedding the Celonis Process Intelligence Platform as a strategic business transformation platform in their organization. Drive Innovation: &nbsp;Provide feedback to our product development teams to
    enhance the Celonis platform and Apps based on new use cases. The qualifications you need: Deep Industry Experience: &nbsp;8+ years of relevant experience in Finance, Supply Chain, or Operations, ideally combining time at a CPG/FMCG company with Management Consulting or Sales Engineering. Domain Expertise: &nbsp;You possess granular knowledge of the CPG value chain, specifically in areas such as Demand &amp; Supply Planning, Logistics, Trade Promotions, or Consumer/Retail Operations. Growth Mindset: &nbsp;Proven track record of managing the full customer lifecycle, with a demonstrated ability to land new accounts, expand footprint through strategic upselling, and drive long-term value to ensure high retention and organic advocacy. Value Realization Skills: &nbsp;You have a track record of identifying operational inefficiencies and driving them to resolution. You understand how to impact the P&amp;L through process improvement and technology deployment. Technical Fluency: &nbsp;Good knowledge
    of Business Software/SaaS applications (e.g., SAP S/4HANA, Salesforce Consumer Goods Cloud, SAP IBP), and experience with data visualization, SQL, or Python is a strong plus. Stakeholder Management: &nbsp;Experience presenting to and working with senior stakeholders. You can navigate complex internal structures and clearly communicate value to non-technical audiences. Builder Mentality: &nbsp;You are comfortable working with ambiguity and setting your own direction within an account team to achieve the best results. Degree: &nbsp;Degree in Industrial/Business Engineering, Supply Chain Management, Informatics, Mathematics, or similar. &nbsp; &nbsp; What Celonis can offer you: Pioneer Innovation: Work with the global leader in Process Mining and the Process Intelligence Graph to shape the future of AI-driven business operations. Ownership from Day 1: Every full-time "Celonaut" is an owner, receiving Restricted Stock Units (RSUs) and merit-based refresh grants. Unrivaled Family Support:
    Benefit from our inclusive parental leave policy—24 weeks of fully paid leave for primary carers and 12 weeks for supporting carers, available from your first day of employment. Work-Life Integration: Enjoy Unlimited PTO (in applicable regions) and generous PTO globally, as well as a flexible hybrid work model that balances remote focus with vibrant office collaboration. Continuous Growth: Elevate your skills through our 70-20-10 learning framework, mentorship programs, and access to a dedicated learning platform. Holistic Well-being: Prioritize your health with subsidized Wellhub memberships, mental health counseling, and dedicated "Wellness Weeks" that prioritize work/life balance. Drive Sustainability: Participate in annual Impact Days, where you receive paid time off to volunteer for community and environmental causes with your local office, or virtually. Global Inclusion &amp; Belonging: Find community through our Inclusion Think Tank and participate in our annual Inclusion Days,
    ensuring every voice is heard and valued. Value-Driven Impact: Join a mission-led organization where our core values—Live for Customer Value, The Best Team Wins, We Own It, and Earth Is Our Future—drive every decision. About Us: Celonis makes processes work — for people, companies, and the planet. Powered by process mining and AI, the Celonis Process Intelligence Platform integrates process data and business context to create a living digital twin of business operations. We enable thousands of companies worldwide to understand how their business actually runs and, together with their partners, build intelligent solutions that transform and continuously improve the way they operate — unlocking billions in value. Celonis is headquartered in Munich, Germany, and New York City, USA, with more than 20 offices worldwide. Get familiar with the Celonis Process Intelligence Platform by watching this video . Celonis Inclusion Statement: At Celonis, we believe our people make us who we are and
    that “The Best Team Wins”. We know that the best teams are made up of people who bring different perspectives to the table. And when everyone feels included, able to speak up and knows their voice is heard - that''s when creativity and innovation happen. Your Privacy: Any information you submit to Celonis as part of your application will be processed in accordance with Celonis’ Accessibility and Candidate Notices By submitting this application, you confirm that you agree to the storing and processing of your personal data by Celonis as described in our Privacy Notice for the Application and Hiring Process . Please be aware of common job offer scams, impersonators and frauds. Learn more here .'
