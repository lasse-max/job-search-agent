  description_text: 'P-1533 At Databricks, we are passionate about enabling data teams to solve the world''s toughest problems — from making the next mode of transportation a reality to accelerating the development of medical breakthroughs. We do this by building and running the world''s best data and AI infrastructure platform so our customers can use deep data insights to improve their business.&nbsp; Networking Infrastructure is a core part of the platform that powers all our data and AI products. The platform also powers key enterprise security features used by customers across all our products to build connectivity solutions to cloud resources and prevent data exfiltration. We are seeking an experienced Sr. Staff Software Engineer with deep networking expertise to help shape the future of Databricks’ Networking Infrastructure . As one of the early members of the rapidly growing Bangalore site, you will play a critical role in defining the technical vision and architecture for next-generation
    network connectivity &amp; observability services that will power &amp; manage millions of VMs across multiple clouds .&nbsp; In this role, you will own and drive the design of large-scale connectivity platforms that form the backbone between Databricks’ control plane and compute plane . These platforms are foundational to improving the scalability, reliability, and efficiency of our compute infrastructure, while enabling more intelligent and cost-effective use of cloud resources. You will operate at an org-wide level , setting technical direction, leading complex cross-team initiatives, and mentoring senior engineers. You’ll work closely with product management, operations, and partner engineering teams to translate long-term business goals into durable, extensible networking systems . This role requires both hands-on technical leadership and the ability to influence architecture and execution across teams. This is a unique opportunity for a senior technical leader who enjoys working
    in ambiguous problem spaces and is motivated by solving novel, multi-cloud distributed systems challenges at massive scale . What we look for: 15+ years of production level experience in one of: Rust, Java, Scala, C++, or similar language 10+ years of experience developing large-scale distributed systems from scratch Experience working on a SaaS platform or with Service-Oriented Architectures. Experience with cloud networking, kubernetes, infrastructure automation languages like terraform, cloudformation, etc. About Databricks Databricks is the data and AI company. More than 10,000 organizations worldwide — including Comcast, Condé Nast, Grammarly, and over 50% of the Fortune 500 — rely on the Databricks Data Intelligence Platform to unify and democratize data, analytics and AI. Databricks is headquartered in San Francisco, with offices around the globe and was founded by the original creators of Lakehouse, Apache Spark™, Delta Lake and MLflow. To learn more, follow Databricks on&nbsp;
