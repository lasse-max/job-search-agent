  description_text: 'About Mistral At Mistral AI, we believe in the power of AI to simplify tasks, save time, and enhance learning and creativity. Our technology is designed to integrate seamlessly into daily working life. We democratize AI through high-performance, optimized, open-source and cutting-edge models, products and solutions. Our comprehensive AI platform is designed to meet enterprise needs, whether on-premises or in cloud environments. Our offerings include le Chat, the AI assistant for life and work. We are a dynamic, collaborative team passionate about AI and its potential to transform society. Our diverse workforce thrives in competitive environments and is committed to driving innovation. Our teams are distributed between France, USA, UK, Germany and Singapore. We are creative, low-ego and team-spirited. Join us to be part of a pioneering company shaping the future of AI. Together, we can make a meaningful impact. See more about our culture on https://mistral.ai/careers.
    Role Summary : AI Deployment Strategist As an AI Deployment Strategist, you will drive the adoption and deployment of Mistral’s AI solutions, working closely with customers from strategic vision to production implementation. This role sits at the intersection of business strategy, AI innovation, and hands-on deployment, ensuring our customers achieve transformative outcomes. You will partner with senior executives to design AI roadmaps, collaborate with the Applied AI team to deliver solutions in production, and ensure seamless transitions from presales to postsales. Your work will directly contribute to customer success, bridging the gap between strategy and execution. This role is ideal for those who thrive in a fast-paced environment, enjoy solving complex business challenges, and are passionate about turning AI potential into real-world impact. What you will do Strategic Discovery & Vision Setting • Lead executive-level workshops with CISOs and security teams to identify cybersecurity
    challenges and opportunities where Mistral''s AI can drive step-change improvements (e.g., threat intelligence, SOC automation, vulnerability management, incident response).• Co-create AI-powered cybersecurity adoption roadmaps with customers, articulating the "art of the possible" and a clear path to value in securing their digital assets. AI Solution Design & Deployment for Cyber • Architect end-to-end AI solutions tailored to cybersecurity use cases, integrating Mistral''s models and platform into customer security workflows, SOC environments, and technical infrastructure.• Partner with the Applied AI team to design, prototype, and deploy AI-driven cybersecurity solutions in production (e.g., automated threat detection, intelligent alert triage, security log analysis, phishing detection, compliance automation).• Own the execution of pilot projects and proofs-of-value within cybersecurity contexts, demonstrating the potential of our technology and paving the way for full-scale deployment.•
    Ensure deployed solutions meet security, privacy, and regulatory standards (e.g., NIS2, DORA, ISO 27001, SecNumCloud). Value Realization & Customer Success • Serve as a trusted advisor to cybersecurity customers, guiding their AI strategy for security operations and ensuring they maximize the value of their investment in Mistral.• Monitor key performance indicators (KPIs) tied to security outcomes (e.g., mean time to detect, mean time to respond, false positive reduction, analyst productivity).• Proactively identify expansion opportunities within accounts, building on initial cybersecurity successes to drive long-term partnerships across broader security and defense use cases. Cross-Functional Collaboration • Act as the bridge between cybersecurity customers and Mistral''s internal teams, synthesizing domain-specific feedback to influence product and research roadmaps for security-oriented features.• Develop reusable assets, best practices, and playbooks specific to cybersecurity deployments
    to scale go-to-market efforts and ensure consistent delivery excellence.• Stay current on the evolving threat landscape, emerging cyber regulations, and AI-for-security trends to maintain credibility and thought leadership.• Travel (~30-60%) to foster deep client relationships and support on-site deployment, primarily within France and Europe. About you • 6+ years in a client-facing strategic and technical role within the cybersecurity or defense sector (e.g., cybersecurity consulting, security engineering, SOC operations, or technical sales in cyber).• You hold a degree in a relevant scientific field (e.g., Computer Science, Cybersecurity, Data Science, Engineering, etc.).• Strong cybersecurity domain expertise : solid understanding of security operations (SOC, SIEM, SOAR), threat intelligence, incident response, vulnerability management, and/or compliance frameworks.• Foundational knowledge of AI/ML/Data Science, with the credibility to advise both security-focused and non-technical
    audiences on AI-driven security solutions.• Hands-on experience building and deploying AI or data-driven applications (Python) to demonstrate value in security contexts.• Familiarity with French and European cybersecurity regulations and frameworks (e.g., ANSSI guidelines, NIS2, DORA, SecNumCloud, ISO 27001).• Strong business acumen and problem-solving skills, with the ability to structure ambiguous security challenges into actionable solutions.• Executive presence and communication skills to influence senior security stakeholders (CISO, VP Security, C-level).• Resilient, results-driven, and comfortable leading through influence in a collaborative environment.• Fluent in English.• Experience with sales qualification frameworks (e.g., MEDDPICC) and value-based selling is a plus.• Prior experience with defense or sovereign cloud environments is a plus. Why This Role Matters You will play a pivotal role in shaping how enterprises adopt and deploy AI, ensuring Mistral’s solutions deliver
    measurable impact. By partnering with the Applied AI team, you’ll help turn strategic visions into production-ready solutions, making Mistral an indispensable partner for our customers. Hiring Process • Talent Acquisition screening call • 30min Hiring Manager Interview • 45min Business Acumen Interview • 60min Technical Deep Dive on LLMs • Panel (Home Prep & Restitution) • 30min Value Talk • Reference check What we offer : 💰 Competitive cash salary and equity 🥕 Daily lunch vouchers : Swile meal vouchers with 10,83€ per worked day, incl 60% offered by company 🥎 Sport : Enjoy discounted access to gyms and fitness studios through our Wellpass partnership 🚴 Transportation : Monthly contribution to a mobility pass via Betterway 🧑‍⚕️ Health : Full health insurance for you and your family 🍼 Parental : Generous parental leave policy 🌎 Visa sponsorship 🤝 Coaching: we offer BetterUp coaching on a voluntary basis'
