  description_text: 'Since we opened our doors in 2009, the world of commerce has evolved immensely, and so has Square. After enabling anyone to take payments and never miss a sale, we saw sellers stymied by disparate, outmoded products and tools that wouldn’t work together. So we expanded into software and started building integrated, omnichannel solutions – to help sellers sell online, manage inventory, offer buy now, pay later functionality, book appointments, engage loyal buyers, and hire and pay staff. Across it all, we’ve embedded financial services tools at the point of sale, so merchants can access a business loan and manage their cash flow in one place. Afterpay furthers our goal to provide omnichannel tools that unlock meaningful value and growth, enabling sellers to capture the next generation shopper, increase order sizes, and compete at a larger scale. Today, we are a partner to sellers of all sizes – large, enterprise-scale businesses with complex operations, sellers just starting,
    as well as merchants who began selling with Square and have grown larger over time. As our sellers grow, so do our solutions. There is a massive opportunity in front of us. We’re building a significant, meaningful, and lasting business, and we are helping sellers worldwide do the same. The Role &nbsp; Square''s Strategic Account Management organization is seeking an experienced sales professional to drive growth and retention of Mid-Market accounts within our Retail vertical. This team partners with some of Square''s most dynamic retail sellers — diverse businesses spanning specialty retail, home goods, health &amp; beauty retail, and food &amp; beverage retail. In this role, you''ll serve as a trusted advisor to retail business owners and operators, helping them evaluate their tech stack and scale using Square''s ecosystem. &nbsp; You Will Own and maintain relationships across a portfolio of ~175 mid-market retail sellers, driving account expansion, retention, and satisfaction Consult
    with business owners and operators to uncover opportunities across payments, business management, and banking tools Retain and grow portfolio through use-case expansion, cross-sell opportunities, and customized seller onboarding experiences Identify opportunities for technical Square solutions to address existing customer needs; project manage execution in collaboration with cross-functional teams Act as the voice of the customer, advocating for mid-market seller needs with Product, Engineering, and Operations teams Negotiate contracts for use-case expansion and retention of your sellers Deliver white-glove client service, ensuring resolution of seller issues Inform operations and program design for this segment at scale &nbsp; You Have 5+ years of experience in account management or sales, ideally within SaaS, payments, or POS technology Proven success growing and retaining a book of business Consistent over-performance on key metrics and revenue targets Strong discovery and consultative
    selling skills Experience in the retail industry preferred, but not required Technical solutioning skills, including requirements gathering and translating customer needs into scalable solutions Demonstrated success retaining and expanding strategic accounts Experience negotiating contracts and pricing with senior stakeholders Exceptional written and verbal communication skills Creative, strategic problem-solver who thrives in ambiguous environments Growth mindset, empathetic collaborator, and positive team player We''re working to build a more inclusive economy where our customers have equal access to opportunity, and we strive to live by these same values in building our workplace. Block is an equal opportunity employer evaluating all employees and job applicants without regard to identity or any legally protected class. We will consider qualified applicants with arrest or conviction records for employment in accordance with state and local laws and “fair chance” ordinances. We believe
    in being fair, and are committed to an inclusive interview experience, including providing reasonable accommodations to disabled applicants throughout the recruitment process. We encourage applicants to share any needed accommodations with their recruiter, who will treat these requests as confidentially as possible. Want to learn more about what we''re doing to build a workplace that is fair and square? Check out our I+D page . While there is no specific deadline to apply for this role, U.S. roles are typically open for an average of 55 days before being filled by a successful candidate. Please refer to the date listed at the top of this job page for when this role was first posted. &nbsp; Block takes a market-based approach to pay, and pay may vary depending on your location. U.S. locations are categorized into one of four zones based on a cost of labor index for that geographic area. The successful candidate’s starting pay will be determined based on job-related skills, experience,
    qualifications, work location, and market conditions. These ranges may be modified in the future. To find a location’s zone designation, please refer to this&nbsp; resource . If a location of interest is not listed, please speak with a recruiter for additional information.&nbsp; &nbsp; Zone A: $52 &mdash; $78 USD Zone B: $48.38 &mdash; $72.54 USD Zone C: $45.77 &mdash; $68.62 USD Zone D: $41.62 &mdash; $62.38 USD Application Guidelines Candidates may submit up to 9 active applications within a 60-day period. Reapplications to the same role are accepted 90 days after a previous application has been reviewed. Use of AI in Our Hiring Process We may use automated AI tools to evaluate job applications for efficiency and consistency. These tools comply with local regulations, including bias audits, and we handle all personal data in accordance with state and local privacy laws.&nbsp; Contact us here &nbsp;with hiring practice or data usage questions. Every benefit we offer is designed with
    one goal: empowering you to do the best work of your career while building the life you want. Remote work, medical insurance, flexible time off, retirement savings plans, and modern family planning are just some of our offering.&nbsp; Check out our other benefits at Block. Block, Inc. (NYSE: XYZ) builds technology to increase access to the global economy. Each of our brands unlocks different aspects of the economy for more people.&nbsp; Square &nbsp;makes commerce and financial services accessible to sellers.&nbsp; Cash App &nbsp;is the easy way to spend, send, and store money.&nbsp; Afterpay &nbsp;is transforming the way customers manage their spending over time.&nbsp; TIDAL &nbsp;is a music platform that empowers artists to thrive as entrepreneurs.&nbsp; Bitkey &nbsp;is a simple self-custody wallet built for bitcoin.&nbsp; Proto &nbsp;is a suite of bitcoin mining products and services. Together, we’re helping build a financial system that is open to everyone. Privacy Policy'
