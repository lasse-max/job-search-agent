  description_text: 'Deine Rolle Als Production Shift Supervisor &nbsp;(all genders) bist Du das Herzstück unserer Produktions- und Lagerabläufe. Du führst ein Team von Bereichsleitern, koordinierst die Produktionspläne und sorgst dafür, dass Qualitäts- und Sicherheitsstandards jederzeit eingehalten werden. Dabei hast Du stets die Effizienz und Produktivität im Blick und treibst Verbesserungen aktiv voran. Du arbeitest eng mit anderen Schichtleitern und funktionsübergreifenden Teams zusammen, um Prozesse zu optimieren, die Produktionsziele zu erreichen und unseren Betrieb reibungslos am Laufen zu halten. Mit Deinen ausgeprägten Führungsqualitäten, Deinem Blick fürs Detail und Deinem Engagement für kontinuierliche Verbesserungen trägst Du maßgeblich zum Erfolg unseres Unternehmens bei. Dein Verantwortungsbereich Gemeinsam mit Deinem Schicht-Team aus Bereichsleitern und Supervisoren sorgst Du dafür, dass unsere Produktionsziele in Sicherheit, Qualität und Effizienz erreicht werden. Du motivierst
    Dein Team, schaffst eine positive Arbeitsatmosphäre und ermutigst alle, Feedback zu geben und aktiv Verbesserungen mitzugestalten. Als zentrale Ansprechperson koordinierst Du Kommunikation, Eskalationen und Reporting – intern wie mit der Produktionsleitung. Du planst Ressourcen wie Personal, Zutaten und Energie clever und nachhaltig, damit alles reibungslos läuft. Produktionsprobleme gehst Du aktiv auf den Grund, leitest Maßnahmen ein und setzt Verbesserungen erfolgreich um. Zusammen mit Deinem Team stellst Du sicher, dass Hygiene-, Gesundheits- und Umweltvorgaben jederzeit eingehalten werden. Dein Profil&nbsp; Abgeschlossene Berufsausbildung, Meistertitel oder Studium in Lebensmitteltechnik, Produktionstechnik, Maschinenbau, Logistik oder vergleichbarem Bereich. Mehrjährige Erfahrung in Produktion und/oder Logistik, idealerweise in der Lebensmittel-, Getränke- oder Konsumgüterbranche. Erfahrung in Führung und Motivation von Teams, z. B. Teamleiter, Supervisor oder Schichtleiter. Fundierte
    Kenntnisse in Qualitätsstandards, Arbeitssicherheit, Hygienevorschriften. Erfahrung in Schichtplanung, Ressourceneinsatz und Prozessoptimierung. Ausgeprägte Kommunikationsfähigkeiten, Durchsetzungsvermögen und Konfliktmanagement. Strukturierte, selbstständige und lösungsorientierte Arbeitsweise. Belastbarkeit und Flexibilität, insbesondere Schicht- und Wochenendarbeit. Begeisterung für kontinuierliche Verbesserungen und effiziente Produktionsabläufe. Das bieten wir Dir Ein moderner Arbeitsplatz in angenehmer Atmosphäre mit einem engagierten Team in Barleben bei Magdeburg. Attraktive Rabatte auf unsere HelloFresh Kochboxen. Vielfältige Weiterentwicklungsmöglichkeiten durch interne Trainings und Schulungen. Ein strukturiertes und umfassendes Onboarding für einen optimalen Start. Ein wettbewerbsfähiges Gehalt sowie zusätzliche Schichtzulagen je nach Einsatz. 30 Tage Urlaub für eine ausgewogene Work-Life-Balance. Regelmäßige Teamevents, die den Zusammenhalt stärken und für Spaß sorgen. Vergünstigte
    Fitnessangebote. Betriebliche Altersvorsorge zur langfristigen Absicherung. Ein monatlicher Zuschuss zum Deutschlandticket. Hochwertige persönliche Sicherheitsausrüstung für deinen Arbeitsalltag. Du bist auch hungrig nach mehr? Bewirb Dich jetzt mit Deinen vollständigen Bewerbungsunterlagen, gerne auch ohne Lichtbild und ohne Angabe von spezifischen Merkmalen wie Nationalität oder Geschlecht. Sprachzertifikate und Unterlagen zur Aufenthalts- und Arbeitserlaubnis können gerne mit eingereicht werden. Wir freuen uns auf Dich! &nbsp; &nbsp; &nbsp; #JD1001 #barnproduction'
