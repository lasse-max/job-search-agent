    discussions. Team Management Recruit, mentor, and develop a team of technical writers. Prioritize documentation projects based on business impact and user feedback. Cross-Functional Collaboration Work closely with Product, Engineering, and Support to ensure documentation supports product development, onboarding, and customer success. Partner with Engineering to adopt a "docs-as-code" approach, embedding documentation early in the development lifecycle. Participate in technical reviews to maintain accuracy and relevance. Standardization & Innovation Create and enforce guidelines for tone, structure, and accessibility across all documentation (APIs, SDKs, tutorials, release notes, FAQs, etc.). Streamline content creation, updates, and localization using modern tools (Markdown, Git, headless CMS, generative AI). Identify documentation gaps and propose innovative solutions, such as interactive guides or chatbot integration. Quality & Impact Deliver clear, precise, and adaptable content for
    technical and non-technical audiences. Track and analyze documentation effectiveness through metrics, user feedback, and support ticket resolution rates. Promote best practices and provide training across the organization. Continuous Improvement Stay updated on trends in technical documentation, including AI, localization, and UX writing. Benchmark against industry standards and implement improvements, such as dynamic content personalization. About you Experience 7+ years in technical writing /developer education, with 4+ years leading teams or defining documentation strategies (AI, SaaS, or complex software preferred). Proven ability to develop and implement scalable documentation strategies. Experience with AI/ML concepts is a strong plus. Technical Skills Proficiency in Markdown, Git, and technical CMS (e.g., Docusaurus, Sphinx). Familiarity with collaboration tools (Notion, Confluence) and analytics platforms (Google Analytics, Hotjar). Fluent English (primary working language);
    French is a bonus. Soft Skills Strong leadership to inspire teams and align stakeholders. Ability to simplify complex concepts for diverse audiences. Self-motivated, detail-oriented, and thrives in fast-paced environments. Collaborative mindset, comfortable working with both technical and non-technical teams. Preferred Qualifications Experience in a scale-up or open-source environment. Knowledge of GDPR and European doc'
