  description_text: 'About the Team OpenAI’s People Experience & Technology (PXT) team owns the core people platform that powers worker, recruiting, contingent, approvals, and lifecycle workflows across the company. PXT is responsible for operating Workday, Ashby, and related people systems as governed, reliable sources of truth, while building the controls, monitoring, documentation, and auditability required to support scale. About the Role We’re hiring an Enterprise Systems Manager, Recruiting Systems to help own and harden OpenAI’s recruiting platform, with a focus on Ashby and its connected workflows. This is a hands-on systems role for someone who can translate recruiting process problems into governed, durable fixes through configuration, workflow design, access controls, documentation, reporting guardrails, and integration partnership. You will work at the boundary of Recruiting, HR Operations, Legal, Compensation, Analytics, IT, and PXT to improve the reliability and control health
    of recruiting workflows. The right person is comfortable going deep in system design while also driving rollout, adoption, and operational clarity. In this role you will: - Own specific recruiting workflow domains in Ashby and adjacent tools, including stages, fields, permissions, approvals, templates, and configuration standards. - Partner on high-priority remediation work across start dates, offers, approvals, integrations, auditability, data integrity, and workflow controls. - Design and implement governed workflow changes that balance recruiter usability with reporting trust, downstream integration reliability, and control requirements. - Establish and maintain guardrails such as required and conditional fields, stage definitions, role-based permissions, approval logic, validation patterns, and change standards. - Drive durable fixes for recurring operational issues by identifying root causes and resolving them through configuration, automation, documentation, or process redesign.
    - Partner with PXT, IT, vendors, and People Analytics on integrations, monitoring, incident response, and failure-mode reduction across the recruiting ecosystem. - Strengthen data quality by improving capture design, standard definitions, audit mechanisms, exception handling, and ongoing workflow governance. - Support controlled releases by coordinating testing, UAT, rollout planning, stakeholder communications, enablement, and post-launch monitoring. - Create and maintain SOPs, change records, training materials, and reference documentation that make recruiting systems easier to operate and less dependent on tribal knowledge. - Help define the longer-term operating boundary between platform ownership in PXT and day-to-day service support in RecOps. You might thrive in this role if you have: - Deep, hands-on expertise with Ashby. You have configured Ashby in production, know where the platform functions well and where it needs additional support, and have opinions on how to configure
    it effectively. - Strong working knowledge of recruiting workflows, offer processes, approvals, candidate and requisition data, and downstream system impacts. - Hands-on experience configuring workflows, fields, permissions, templates, approval logic, reports, or integrations in a production environment within Ashby and an HRIS; Workday experience is strongly preferred. - Demonstrated ability to lead scoped systems programs end to end, not only respond to break-fix queues or intake requests. - Sound judgment around change control, access governance, and workflows. - Experience with Workday or other HRIS / downstream people systems. - Experience with integration monitoring, analytics tooling, or workflow automation. - Experience in compliance-sensitive, audit-sensitive, or public-company-readiness environments. - Experience supporting global or multi-entity recruiting workflows. About OpenAI OpenAI is an AI research and deployment company dedicated to ensuring that general-purpose artificial
    intelligence benefits all of humanity. We push the boundaries of the capabilities of AI systems and seek to safely deploy them to the world through our products. AI is an extremely powerful tool that must be created with safety and human needs at its core, and to achieve our mission, we must encompass and value the many different perspectives, voices, and experiences that form the full spectrum of humanity. We are an equal opportunity employer, and we do not discriminate on the basis of race, religion, color, national origin, sex, sexual orientation, age, veteran status, disability, genetic information, or other applicable legally protected characteristic. For additional information, please see OpenAI’s Affirmative Action and Equal Employment Opportunity Policy Statement https://cdn.openai.com/policies/eeo-policy-statement.pdf. Background checks for applicants will be administered in accordance with applicable law, and qualified applicants with arrest or conviction records will be considered
    for employment consistent with those laws, including the San Francisco Fair Chance Ordinance, the Los Angeles County Fair Chance Ordinance for Employers, and the California Fair Chance Act, for US-based candidates. For unincorporated Los Angeles County workers: we reasonably believe that criminal history may have a direct, adverse and negative relationship with the following job duties, potentially resulting in the withdrawal of a conditional offer of employment: protect computer hardware entrusted to you from theft, loss or damage; return all computer hardware in your possession (including the data contained therein) upon termination of employment or end of assignment; and maintain the confidentiality of proprietary, confidential, and non-public information. In addition, job duties require access to secure and protected information technology systems and related data security obligations. To notify OpenAI that you believe this job posting is non-compliant, please submit a report through
    this form https://form.asana.com/?d=57018692298241&k=5MqR40fZd7jlxVUh5J-UeA. No response will be provided to inquiries unrelated to job posting compliance. We are committed to providing reasonable accommodations to applicants with disabilities, and requests can be made via this link https://form.asana.com/?k=bQ7w9h3iexRlicUdWRiwvg&d=57018692298241. OpenAI Global Applicant Privacy Policy https://cdn.openai.com/policies/global-employee-and-contractor-privacy-policy.pdf At OpenAI, we believe artificial intelligence has the potential to help people solve immense global challenges, and we want the upside of AI to be widely shared. Join us in shaping the future of technology.'
