    - Proven experience in business development, partnerships, or a similar role within the AI/ML or cloud technology sector, with a focus on startups. - Deep understanding of the AI startup ecosystem, venture funding trends, and key product trends. - Strong network within the startup and venture capital communities. - Excellent communication, presentation, and interpersonal skills. - Ability to work strategically and tactically in a fast-paced, evolving environment. - Demonstrated ability to drive measurable results and influence cross-functional teams. Every Snowflake employee is expected to follow the company’s confidentiality and security standards for handling sensitive data. Snowflake employees must abide by the company’s data security plan as an essential part of their duties. It is every employee''s duty to keep customer information secure and confidential. Snowflake is growing fast, and we’re scaling our team to help enable and accelerate our growth. We are looking for people who
    share our values, challenge ordinary thinking, and push the pace of innovation while building a future for themselves and Snowflake. How do you want to make your impact? For jobs located in the United States, please visit the job posting on the Snowflake Careers Site for salary and benefits information: careers.snowflake.com http://careers.snowflake.com'
