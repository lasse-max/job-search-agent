  description_text: 'Since we opened our doors in 2009, the world of commerce has evolved immensely, and so has Square. After enabling anyone to take payments and never miss a sale, we saw sellers stymied by disparate, outmoded products and tools that wouldn''t work together. So we expanded into software and started building integrated, omnichannel solutions – to help sellers sell online, manage inventory, offer buy now, pay later functionality, book appointments, engage loyal buyers, and hire and pay staff. Across it all, we''ve embedded financial services tools at the point of sale, so merchants can access a business loan and manage their cash flow in one place. Afterpay furthers our goal to provide omnichannel tools that unlock meaningful value and growth, enabling sellers to capture the next generation shopper, increase order sizes, and compete at a larger scale. Today, we are a partner to sellers of all sizes – large, enterprise-scale businesses with complex operations, sellers just
    starting, as well as merchants who began selling with Square and have grown larger over time. As our sellers grow, so do our solutions. There is a massive opportunity in front of us. We''re building a significant, meaningful, and lasting business, and we are helping sellers worldwide do the same. The Role Square is looking for a team-oriented Account Executive that''s excited to grow with us and make an impact on our UK business. This role provides the opportunity for you to refine your sales acumen, collaborate with your direct team and cross-functional teams, and work closely with hundreds of inspiring entrepreneurs and business owners. Through your extraordinary communication skills, you will connect with customers to sell the value of Square to their business - quickly establishing trust and successfully building upon your relationships throughout the sales process. You''re a great fit for this role if you''ve got an entrepreneurial spirit, a growth-oriented mindset and an innate
    knack for collaborative problem-solving. You Will Evaluate and introduce the value of Square to SMB merchants within the UK Oversee the sales cycle from prospecting to close Partner closely with cross-functional teams to ensure successful onboarding for your customers Build a keen understanding of your pipeline and the necessary sales activities in order to achieve and exceed sales targets Demonstrate strong customer intuition and take a consultative approach to every conversation Partner with Product and Marketing teams to ensure Square is meeting the unique needs of the UK market Collaborate with your team to both replicate successes across the team and to identify opportunities for improvement that drive impact Utilize your prior sales experience to get off the ground running with a creative pipeline strategy You Have 1-4 years of experience in a qualifying or prospecting role A BA/BS degree or relevant experience Experience or an interest in helping SMB sellers An understanding of
    the importance of value-selling A track record of exceeding sales targets A structured thought process with the ability to assess business opportunities and read prospective buyers The ability to gather support from internal experts and external partners to position Square against our competitors Genuine curiosity about people, business, and can inspire this passion in others Interest in seeking out and implementing feedback, and dedication to the improvement of your craft Tenacity and an ability to adapt to new situations quickly and think on your feet Excellent collaboration and communication skills that help you connect with customers by email and phone to establish trust and credibility The ability to drive deals independently in a fast-paced, dynamic environment Business development experience (e.g. hunting and cold calling) A collaborative and team player mentality Prior Salesforce experience or equivalent &nbsp; We''re working to build a more inclusive economy where our customers
    have equal access to opportunity, and we strive to live by these same values in building our workplace. Block is a proud equal opportunity employer. We work hard to evaluate all employees and job applicants consistently, based solely on the core competencies required of the role at hand, and without regard to any legally protected class. We believe in being fair, and are committed to an inclusive interview experience, including providing reasonable accommodations to disabled applicants throughout the recruitment process. We encourage applicants to share any needed accommodations with their recruiter, who will treat these requests as confidentially as possible. Want to learn more about what we''re doing to build an inclusive workplace? Check out our Inclusion &amp; Diversity page Application Guidelines Candidates may submit up to 9 active applications within a 60-day period. Reapplications to the same role are accepted 90 days after a previous application has been reviewed. Use of AI
    in Our Hiring Process We may use automated AI tools to evaluate job applications for efficiency and consistency. These tools comply with local regulations, including bias audits, and we handle all personal data in accordance with state and local privacy laws.&nbsp; Contact us here &nbsp;with hiring practice or data usage questions. Every benefit we offer is designed with one goal: empowering you to do the best work of your career while building the life you want. Remote work, medical insurance, flexible time off, retirement savings plans, and modern family planning are just some of our offering.&nbsp; Check out our other benefits at Block. Block, Inc. (NYSE: XYZ) builds technology to increase access to the global economy. Each of our brands unlocks different aspects of the economy for more people.&nbsp; Square &nbsp;makes commerce and financial services accessible to sellers.&nbsp; Cash App &nbsp;is the easy way to spend, send, and store money.&nbsp; Afterpay &nbsp;is transforming the
    way customers manage their spending over time.&nbsp; TIDAL &nbsp;is a music platform that empowers artists to thrive as entrepreneurs.&nbsp; Bitkey &nbsp;is a simple self-custody wallet built for bitcoin.&nbsp; Proto &nbsp;is a suite of bitcoin mining products and services. Together, we’re helping build a financial system that is open to everyone. Privacy Policy'
