  description_text: 'Bei Flix erwartet dich ein dynamisches Arbeitsumfeld mit fairer Bezahlung, tollen Entwicklungsmöglichkeiten und dem Ziel, Reisen nachhaltiger und zugänglicher zu machen. Als Zugführer:in bei FlixTrain kannst du einen Unterschied machen, indem du unsere Fahrgäste sicher, zuverlässig und mit exzellentem Service an ihr Ziel bringst – von der Betriebsüberwachung bis zur persönlichen Betreuung an Bord. Werde Teil unseres engagierten Teams und unterstütze uns dabei, ein erstklassiges Reiseerlebnis auf der Schiene zu schaffen. Wir arbeiten mit Leidenschaft daran, unseren Gästen den besten Service zu bieten – mit Fachkompetenz, guter Organisation und starkem Teamgeist. Achtung: Wir bieten keinen Quereinstieg und keine Ausbildung für diese Position an, sondern suchen nach vorqualifizierten und ausgebildeten Zugchef:innen/ Zugführer:innen&nbsp;für den Fernverkehr. Über die Rolle:&nbsp; Überwache die sichere Beförderung unserer Reisenden auf der gesamten Strecke Sei Ansprechpartner:in
    für Fahrgäste und biete erstklassigen Service an Bord Kontrolliere Fahrkarten und unterstütze beim Ticketverkauf im Zug Begleite das Rangieren sowie das Auf- und Abstellen des Wagenparks Führe eigenständig technische Kontrollen durch, wie wagentechnische Untersuchungen und Bremstests Gestalte aktiv ein positives Reiseerlebnis für unsere Gäste Trage zur stetigen Verbesserung unserer Service- und Betriebsprozesse bei Über dich:&nbsp; Du hast eine abgeschlossene Qualifizierung als Zugpersonal (z. B. Zugführer:in/ Zugchef:in) Idealerweise hast du bereits die Qualifikation für Bremsproben und Waggonprüfungen (Auffrischungen möglich), auch der Umgang mit PC ist dir nicht fremd Sehr gute Deutschkenntnisse bringst du mit, erste Englischkenntnisse sind von Vorteil Übernachtungsbereitschaft: Die Arbeit im Fernverkehr, das deutschlandweite Reisen und die Außer-Haus-Übernachtungen begeistern dich -&nbsp; Flix kümmert sich um Anfahrt, Kost &amp; Logis Reisebereitschaft: Du bekommst die Möglichkeit,
    für berufliche und private Zwecke deutschlandweit kostenlos zu reisen Schichtarbeit: Individuelle Schichten, beispielweise nachts, an Wochenenden oder an Feiertagen, sind für dich kein Problem Als serviceorientierte und kommunikationsstarke Persönlichkeit trittst du stets gepflegt auf,&nbsp;auch in stressigen Momenten bewahrst du Ruhe und den Überblick Wir wissen, dass jede:r einzigartige Erfahrungen mitbringt. Auch wenn du nicht alle Anforderungen erfüllst, möchten wir dich ermutigen, dich trotzdem zu bewerben. Wir freuen uns darauf, von dir zu hören! Was wir bieten: Vergütung:&nbsp; Ein faires monatliches Fix-Gehalt von 3.500,00€ , marktübliche Zulagen kommen oben drauf! Reisevorteile: 12 kostenlose Flix-Reisegutscheine + 12 Rabattgutscheine für Freunde &amp; Familie Arbeitsmodelle mit Flexibilität: Fester monatlicher Schichtplan für eine langfristige Planung und eine gute Work-Life-Balance Gesundheit &amp; Wohlbefinden: Kostenlose Coachings &amp; Therapiesitzungen über OpenUp Lernen
