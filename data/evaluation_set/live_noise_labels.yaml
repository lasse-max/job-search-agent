  description_text: 'About Anthropic Anthropic’s mission is to create reliable, interpretable, and steerable AI systems. We want AI to be safe and beneficial for our users and for society as a whole. Our team is a quickly growing group of committed researchers, engineers, policy experts, and business leaders working together to build beneficial AI systems. About the Role:&nbsp; As the manager of the Applied AI Architect, Enterprise Tech (Cyber) team at Anthropic, you will drive the adoption of frontier AI across the cybersecurity industry — enabling leading security companies to build Claude into their detection, response, and security operations products via Anthropic''s API, Claude Code, and Claude for Enterprise. You''ll leverage your technical skills and consultative sales experience to help security vendors ship AI-powered capabilities that meet the industry''s exacting standards for reliability, accuracy, and safety. You''ll be responsible for leading &amp; growing the Applied AI Architect,
    Enterprise Tech (Cyber) team, establish processes and best practices for your segment''s pre-sales engagements based on your years of experience, help each team member achieve success, high productivity, and career growth, and represent Anthropic as a technical lead on some of its most important partnerships. In collaboration with the Sales, Product, and Engineering teams, you''ll help enterprise tech partners incorporate leading-edge AI systems into their cutting-edge products and platforms. You will employ your excellent communication skills to explain and demonstrate complex solutions persuasively to technical and non-technical audiences alike. You will play a critical role in identifying opportunities to innovate and differentiate our AI systems, while maintaining our best-in-class safety standards. Responsibilities:&nbsp; Manage and mentor a team of Applied AI Architects, Enterprise Tech (Cyber) providing both technical guidance and career development Set goals and reviews for your
    team, promoting growth and output Work with a handful of highest-value Enterprise Tech customers on their overall AI adoption strategies, focusing on pre-sales technical excellence including use case scoping, technical champion building, and POC execution Partner closely with your aligned GTM leadership to understand customer requirements &amp; co-build GTM strategies to drive adoption for Enterprise Tech (Cyber) customers Own the technical portions of pre-sales engagements, ensuring your team provides compelling demos and validates enterprise customer ROI from Anthropic products Drive collaboration from cross-functional teams to influence and unify stakeholders at all levels of the organization to drive business outcomes Travel occasionally to customer sites for executive-level sessions, technical workshops, and building relationships Establish a shared vision for creating solutions that enable beneficial and safe AI in technology products Lead the vision, strategy, and execution of
    innovative solutions that leverage our latest models'' capabilities for tech-forward use cases Contribute to thought leadership through conference presentations, webinars, and technical content creation Stay current with emerging AI/ML trends and competitive landscape in the enterprise tech sector You may be a good fit if you: 7+ years of experience as a Solutions Architect, Sales Engineer, or similar pre-sales technical role 3+ years of technical go-to-market management experience, specifically managing pre-sales teams Have experience working with and selling to Digital Native focused customers (Vertical Enterprise SaaS, Horizontal Enterprise SaaS, Consumer Technology Companies, PaaS, etc.) Experience with the unique technical requirements and technical procurement process of enterprise tech companies Deep technical proficiency with enterprise AI deployments, API integrations, and production LLM use cases Have an organizational mindset and enjoy building foundational teams in a relatively
    unstructured environment Have excellent communication, collaboration, and coaching abilities Are comfortable dealing with highly uncertain, ambiguous, and fast-moving environments typical of the tech industry Strong executive presence and ability to foster deep relationships with technical leaders and engineering teams Have at least a high level familiarity with the architecture and operation of large language models and/or ML in general Experience with prompt engineering, LLM evaluation, and architecting AI-powered systems Make ambiguous problems clear and identify core principles that can translate across scenarios Have a passion for making powerful technology safe and societally beneficial Think creatively about the risks and benefits of new technologies, and think beyond past checklists and playbooks Stay up-to-date and informed by taking an active interest in emerging research and industry trends Understanding of developer tooling, SDKs, and technical integration patterns common
    in enterprise tech companies Strong candidates may have: Enterprise SA Leadership at Scale : 5+ years leading solution architect teams through hypergrowth (ideally 10→50+ people), with direct experience managing both senior SAs and developing junior talent in complex enterprise software environments AI/ML Technical Depth + Executive Engagement : Hands-on experience with AI/ML platforms and enterprise integration patterns, combined with proven track record engaging C-level stakeholders in $10M+ technical evaluations and enterprise sales cycles Multi-Segment GTM Experience : Demonstrated success adapting technical approaches across customer segments (startup to Fortune 500), with experience spanning the full deal spectrum from $2M employee empowerment through $100M+ core business transformation initiatives Deadline to apply:&nbsp; None. Applications will be reviewed on a rolling basis.&nbsp; The annual compensation range for this role is listed below.&nbsp; For sales roles, the range provided
