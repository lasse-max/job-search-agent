  description_text: 'At Snowflake, we are powering the era of the agentic enterprise. To usher in this new era, we seek AI-native thinkers across every function who are energized by the opportunity to reinvent how they work. You don’t just use tools; you possess an innate curiosity, treating AI as a high-trust collaborator that is core to how you solve problems and accelerate your impact. We look for low-ego individuals who thrive in dynamic and fast-moving environments and move with an experimental mindset — who rapidly test emerging capabilities to discover simpler, more powerful ways to deliver results. At Snowflake, your role isn''t just to execute a function, but to help redefine the future of how work gets done. Our Public Sector team is expanding and we are seeking a qualified Account Executive with expertise in the Treasury space. In this role you will use your creative prospecting skills to strategically pursue net new business and deliver mission outcomes for current customers.
    Your role will encompass prospecting, developing, and closing business within a timely manner while focusing on the clients’ requirements. This role is a unique opportunity to contribute in a meaningful way to high-visibility, high impact projects. You will be successful in this role if you are able to act with autonomy, take accountability and be open to new perspectives and ideas. Our team carries a deep curiosity to learn and are always looking for innovative ways to meet and exceed our customers needs. AS AN ACCOUNT EXECUTIVE AT SNOWFLAKE, YOU WILL: - Become an expert on Snowflake’s product and conduct discovery calls, customized demos, and presentations to prospective customers - Be the trusted advisor to the customer by understanding their existing and future mission needs to drive the Snowflake solution within the marketplace - Prospect qualification and the development of new sales opportunities and ongoing revenue streams - Land, adopt, expand, and deepen sales opportunities
    with accounts in your region - Achieve sales quotas for allocated accounts and/or territory on a quarterly and annual basis by developing a sales strategy in the allocated territory with a target prospect list, and a regional sales plan. - Work closely with cross functional teams including sales engineering, professional services, marketing, legal and finance. ON DAY ONE, WE WILL EXPECT YOU TO HAVE: - 8 to 10 years field sales experience with consistent success meeting or exceeding sales objectives selling technical solutions and software products into the enterprise market. - Experience selling within the DoD space - Demonstrable experience executing enterprise complex sales strategies and tactics within one of the following spaces Data Warehousing, Business Intelligence, Data Science and/or AI/ML - A familiarity with solution-based approach to selling, have experience managing a complex sales process and possess excellent presentation and listening skills, organization and contact
    management capabilities. - The ability to build our product and company like it’s your own, specifically defining and executing sales plans to meet strategic & financial targets, leveraging industry, partner & Go-to-Market knowledge - This ability to provide open, honest and respectful feedback creating an inclusive work environment - A reputation for Making Each Other Better: Resulting in long standing relationships with internal cross functional partners and the ability to create an inclusive work environment - Proven ability to independently manage, develop, and close new client relationships. - Experience in hitting multi-million dollar revenue targets on an annual basis. Every Snowflake employee is expected to follow the company’s confidentiality and security standards for handling sensitive data. Snowflake employees must abide by the company’s data security plan as an essential part of their duties. It is every employee''s duty to keep customer information secure and confidential.
    Snowflake is growing fast, and we’re scaling our team to help enable and accelerate our growth. We are looking for people who share our values, challenge ordinary thinking, and push the pace of innovation while building a future for themselves and Snowflake. How do you want to make your impact? For jobs located in the United States, please visit the job posting on the Snowflake Careers Site for salary and benefits information: careers.snowflake.com http://careers.snowflake.com'
