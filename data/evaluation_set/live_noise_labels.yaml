  description_text: 'Celonis is the global leader in Process Intelligence and the pioneer of Process Mining technology. As one of the world’s fastest-growing enterprise SaaS companies, we are changemakers pushing the boundaries of what’s possible. We invest heavily in advanced AI capabilities—specifically our Process Intelligence Graph—to turn data insights into immediate business action. We believe there is a massive opportunity to unlock global productivity and sustainability by placing intelligence at the core of every business process. Join our mission to make processes work for people, companies, and the planet. &nbsp; The Team: You’ll join the Value Engineering team , a highly technical, strategic, customer-facing group that sits at the intersection of pre-sales, analytics, and transformation consulting. Value Engineers at Celonis are hands-on practitioners. They combine strong technical capability with consulting and stakeholder skills to guide customers through the full value journey
    — from first demo to long-term adoption and expansion. The Role: As an Applied AI Engineer (Pre-Sales) you are pushing the envelope in solving business-critical problems for our customers. You will be working with our most strategic customers, understanding their objectives and key challenges, and building Celonis solutions using the world’s leading Process Intelligence (PI) platform in combination with the largest AI and ML technology partners, such as Microsoft, OpenAI and Databricks. With Celonis’ Process Intelligence (PI) platform we feed operational context to AI so it understands our customers’ business and enables them to industrialize AI unlocking real ROI on AI deployments and at scale. There is no AI without PI. You will prototype these solutions, demonstrate their value to Executives and ensure successful implementation, adoption and value realization in order to increase the footprint of Celonis at those customers. The work you’ll do: AI Discovery &amp; Solutioning: Understand
    customers AI strategy and business critical challenges. As Celonis product &amp; domain expert, find the best problem-solution fit and translate customer requirements into innovative solutions that move the needle Hackathons &amp; Prototyping: Think out of the box, have a „can-do“ attitude and don’t shy away from complex problems. Leverage cutting edge AI technologies to rapidly build creative prototypes in customer hackathons solving business critical problems Agentic Process Transformation: Support our customers in achieving real ROI out of AI deployments at scale enabling a fundamental shift in business operations from traditional, rule-based automation to the use of autonomous AI agents empowered by our Celonis Process Intelligence Platform Proof projects: End-to-end execution of business-critical Proof-of-Value projects, incl. architecture and deliver secure, scalable LLM/agent systems with RAG, tools, and guardrails; integrating with enterprise data, identity, and compliance frameworks.
    Ensure Successful Project Outcome: Applied AI Engineers stay involved with projects until agreed value &amp; adoption thresholds are reached Specialize in Domains or Industries: To scale knowledge across the organization Applied AI Engineers specialize in domains (e.g. supply chain) and industries The qualifications you need: &nbsp;3+ years of experience leading technical pre-sales, including defining AI roadmaps, building compelling ROI/TCO business cases and prototyping of machine learning and generative AI solutions. Understanding of generative AI techniques like RAG, few shot learning, prompt engineering, multi-agent orchestration, multimodal understanding, or fine-tuning that are used to build high-impact use cases like intelligent chatbots and automated text processors. Understanding of business processes across sectors (such as Supply Chain or Finance) with the ability to translate high-level business needs into specific AI use cases. Good knowledge of Python and common ML libraries
    (such as LangChain, pandas, pydantic, sklearn, PyTorch) as well as data engineering tools and technologies. Strong presentation skills to both internal and external stakeholders (including executives), whether whiteboarding sessions or formal readouts and demos. Bachelor’s Degree required, Masters Degree in computer science, physics, engineering, mathematics or related fields, or equivalent work experience preferred. Hybrid working environment - 3 days per week at our central Milan offices.&nbsp;&nbsp; Nice to have (big plus): Hands-on experience building agentic systems using LLM orchestration, RAG, function calling, and prompt engineering, while ensuring safety through rigorous evaluations and guardrails. Working knowledge of tools in the LLM ecosystem such as LangChain, LlamaIndex, or other OSS packages. Experience in deploying and monitoring models at scale across major cloud platforms (AWS Bedrock, Azure AI, GCP Vertex) &nbsp; What Celonis can offer you: Pioneer Innovation: Work
    with the global leader in Process Mining and the Process Intelligence Graph to shape the future of AI-driven business operations. Ownership from Day 1: Every full-time "Celonaut" is an owner, receiving Restricted Stock Units (RSUs) and merit-based refresh grants. Unrivaled Family Support: Benefit from our inclusive parental leave policy—24 weeks of fully paid leave for primary carers and 12 weeks for supporting carers, available from your first day of employment. Work-Life Integration: Enjoy Unlimited PTO (in applicable regions) and generous PTO globally, as well as a flexible hybrid work model that balances remote focus with vibrant office collaboration. Continuous Growth: Elevate your skills through our 70-20-10 learning framework, mentorship programs, and access to a dedicated learning platform. Holistic Well-being: Prioritize your health with subsidized Wellhub memberships, mental health counseling, and dedicated "Wellness Weeks" that prioritize work/life balance. Drive Sustainability:
