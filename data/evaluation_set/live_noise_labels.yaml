  description_text: 'Deine Rolle Als Schichtleiter Haustechnik &nbsp;(all genders) übernimmst Du eine Schlüsselrolle beim Aufbau und Betrieb unseres neuen Factor-Produktionsstandorts in Verden an der Aller. Du verantwortest die technische Instandhaltung des Standorts und führst ein Team von Technikern im Zwei-Schichtbetrieb. Dein Ziel ist es, die Verfügbarkeit und Leistungsfähigkeit unserer Produktionsanlagen, Großküchengeräte und technischen Systeme sicherzustellen. Dabei setzt Du auf eine strukturierte, präventive Instandhaltungsstrategie, koordinierst technische Abläufe und treibst kontinuierliche Verbesserungen voran. Dein Verantwortungsbereich Du führst und koordinierst das Instandhaltungsteam im Zwei-Schichtbetrieb und sorgst für eine effiziente Einsatzplanung. Du organisierst und moderierst tägliche Start-of-Shift-Meetings zur Priorisierung von Aufgaben und Tageszielen. Du planst, steuerst und überwachst präventive Wartungsmaßnahmen mit dem Ziel, den Großteil aller Instandhaltungsaktivitäten
    vorausschauend zu organisieren. Du stellst die technische Verfügbarkeit von Produktionsanlagen, Großküchengeräten sowie gebäudetechnischen Anlagen sicher. Du koordinierst Störungsbehebungen, Reparaturen und technische Optimierungsmaßnahmen. Du arbeitest eng mit den Bereichen Produktion, Qualität, Operations sowie externen Dienstleistern zusammen. Du analysierst und überwachst relevante KPIs zur Anlagenverfügbarkeit und Instandhaltungsperformance. Du identifizierst Verbesserungspotenziale und setzt nachhaltige Maßnahmen zur Effizienzsteigerung um. Du unterstützt aktiv den weiteren Ausbau und die technische Entwicklung unseres Standorts. Du stellst die Einhaltung aller relevanten Arbeitssicherheits-, Umwelt- und Qualitätsstandards sicher. Dein Profil Abgeschlossene technische Ausbildung, beispielsweise in den Bereichen Mechatronik, Elektrotechnik, Kältetechnik oder Versorgungstechnik. Idealerweise Weiterbildung zum Meister, Techniker oder eine vergleichbare Qualifikation. Mehrjährige Berufserfahrung
    in der Instandhaltung eines Produktions-, Lebensmittel- oder Industrieunternehmens. Erste oder mehrjährige Erfahrung in der fachlichen oder disziplinarischen Führung von Technikteams. Kenntnisse in der Kälte- und Klimatechnik sowie im Umgang mit Großküchentechnik sind von Vorteil. Erfahrung in der präventiven Instandhaltung sowie im Umgang mit technischen Kennzahlen und Wartungsprozessen. Strukturierte und lösungsorientierte Arbeitsweise gepaart mit einer ausgeprägten Hands-on-Mentalität. Kommunikationsstärke, Verantwortungsbewusstsein und Freude daran, Teams zu entwickeln und Prozesse zu gestalten. Bereitschaft zur Arbeit im Zwei-Schichtsystem sowie gelegentlichen Wochenenddiensten. Das bieten wir Dir 30 Tage Urlaub Wettbewerbsfähige Vergütung inklusive Schichtzulagen Umfassendes Onboarding für einen erfolgreichen Start Individuelle Entwicklungs- und Weiterbildungsmöglichkeiten durch interne Trainings und ein jährliches Learning &amp; Development Budget Rabatt auf unsere Factor Meals
    Betriebliche Altersvorsorge Vergünstigte Fitnessangebote Moderne persönliche Schutzausrüstung Die Möglichkeit, einen neuen Produktionsstandort aktiv mitzugestalten und nachhaltige Strukturen aufzubauen Du bist hungrig nach mehr? Dann bewirb Dich jetzt mit Deinen vollständigen Bewerbungsunterlagen. Gerne ohne Lichtbild und ohne Angaben zu Nationalität, Geschlecht oder anderen persönlichen Merkmalen. Wir freuen uns darauf, Dich kennenzulernen! #JD1001 #factor #basecampwarehouse'
