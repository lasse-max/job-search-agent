  description_text: 'Every day, tens of millions of people come to Roblox to explore, create, play, learn, and connect with friends in 3D immersive digital experiences– all created by our global community of developers and creators.&nbsp; At Roblox, we’re building the tools and platform that empower our community to bring any experience that they can imagine to life. Our vision is to reimagine the way people come together, from anywhere in the world, and on any device. We’re on a mission to connect a billion people with optimism and civility, and looking for amazing talent to help us get there.&nbsp; A career at Roblox means you’ll be working to shape the future of human interaction, solving unique technical challenges at scale, and helping to create safer, more civil shared experiences for everyone. At Roblox, we’re building the tools and platform that empower our community to bring any experience that they can imagine to life. Our vision is to reimagine the way people come together, from
    anywhere in the world, and on any device. We’re on a mission to connect a billion people with optimism and civility, and looking for amazing talent to help us get there.&nbsp; A career at Roblox means you’ll be working to shape the future of human interaction, solving unique technical challenges at scale, and helping to create safer, more civil shared experiences for everyone. We are hiring a Senior Product Policy Manager with expertise in regional compliance and localized policy contextualization for Europe. You will join a growing team that works across the Americas, Europe, Middle East, Africa, LatAm, Oceania, India and Asia-Pacific, and is responsible for aligning Roblox''s product with global and regional norms by adapting our policies to evolving international and regional regulations and expectations.&nbsp; A member of the Product Policy team, you will have a global impact on our policy and safety strategy. You will collaborate internally with our product, engineering, business,
