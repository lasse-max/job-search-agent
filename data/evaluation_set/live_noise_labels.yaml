  description_text: 'Are you passionate about building food safety standards and driving product quality? We are looking for someone with technical experience to drive food safety and quality compliance. At HelloFresh, we’re transforming the way people cook and eat. Through our meal-kit boxes, we help thousands of customers cook delicious, balanced meals at home while reducing food waste and simplifying everyday life. Operating in 15+ countries, HelloFresh is one of the world’s leading foodtech companies. Behind our growth is a simple formula: technology, data, and a team of ambitious people working together to reinvent food at home. If you want to work at the intersection of data, strategy, and growth, and have a tangible impact on a fast-scaling business, this role is for you. The Role We are looking for an experienced and highly driven FSQA Manager - Processed (Condiments, Sauces, and Pastes) to join our international Food Safety &amp; Quality Assurance team. The role is open to be based
    in either of the EU offices with a preference for individuals based in Amsterdam. In this role, you will take full ownership of the Condiments, Sauces, and Pastes category, working with processing suppliers across Europe. This is an international category requiring close collaboration with global partners and cross-functional teams including Procurement, Sourcing, Supply Chain, and Distribution Centres across multiple markets. You will drive food safety and quality compliance, implement best practices, lead supplier performance improvements, and ensure we consistently deliver safe, high-quality products to our customers. What You’ll Be Doing Category Ownership: Lead food safety and quality management for the Processed category (Condiments, Sauces, and Pastes) across international suppliers. Supplier Audits: Conduct on-site supplier audits and approval visits across Europe to ensure compliance with EU food safety legislation and HelloFresh standards. Onboarding &amp; Compliance: Lead
    the onboarding of new suppliers and products, ensuring full compliance with food safety, legal, shelf-life, traceability, and quality standards. Continuous Improvement: Drive strategic quality improvement initiatives to reduce customer complaints and improve satisfaction. Performance Tracking: Own supplier performance metrics including complaints, out-of-spec deliveries, compliance KPIs, and corrective action follow-up. Incident Management: Investigate and manage quality incidents using structured root cause analysis and ensure robust corrective and preventive actions (CAPA). Who You Are Education: A science-based degree (e.g., Food Science, Food Technology, Biology, Microbiology, Chemistry, or equivalent) is required. Experience: 3+ years of experience in Food Safety / Quality Management within the food industry. Experience dealing with processed foods, thermal processing (pasteurization/sterilization), or high-care packaging is highly preferred. Auditing: Proven experience auditing
    food manufacturers against GFSI standards (such as BRCGS, IFS, FSSC 22000). Regulatory Knowledge: Solid understanding of EU food safety legislation, allergen management, and international supply chains. Languages: Excellent professional English skills (written and spoken). Additional European languages are a plus. Mobility: Willingness to travel within Europe; approximately 20% travel expected. Soft Skills: Strong communication with the ability to influence suppliers across different cultures. You are pragmatic, solutions-oriented, and confident in decision-making under pressure. Environment: Comfortable working in a fast-paced, international environment with multiple stakeholders across multi-market organizations. Tech Savvy: Intermediate to advanced Google Suite / MS Office skills (Excel/Sheets, PowerPoint/Slides). What we offer: The Toppings Compensation &amp; Financial Wellbeing Enjoy a 70% employee discount on HelloFresh or Green Chef boxes, plus a 25% alumni discount after your
    time with us. Access the Gogeta Nursery Scheme to save up to 40% on nursery fees through salary sacrifice. Contribute to the Royal London Company Pension with a 9% default (5% employer / 4% employee) via salary sacrifice. You’ll also have access to benefits like the Electric Vehicle Scheme through Octopus. Health &amp; Wellbeing Receive Private Medical Insurance (history disregarded) with a digital GP, optional dental/dependent add-ons, Life Assurance (4x base salary), and an Eye Care Scheme. Choose from four gym membership options based on location. Get free premium Headspace membership and support through our Employee Assistance Programme and trained Mental Health First Aiders. Flexibility &amp; Work-Life Participate in the Cycle to Work Scheme through Cyclescheme. Career &amp; Development Benefit from unlimited access to professional coaching via MoreHappi, reflecting our "Learning Never Stops" value. About HelloFresh HelloFresh is on a mission to change the way people eat, forever!
    Since our 2011 founding in Europe’s vibrant tech hub, Berlin, we’ve become the world''s leading meal kit provider, delivering to over 4.2 million households worldwide in 16 countries across 3 continents.&nbsp; Are you up for the challenge? Please submit your complete application below including your salary expectations and earliest starting date. After submitting an application our team will review this and get back to you within 5 business days.&nbsp; &nbsp;'
