  description_text: Who we are About Stripe Stripe is a financial infrastructure platform for businesses. Millions of companies—from the world's largest enterprises to the most ambitious startups—use Stripe to accept payments, grow their revenue, and accelerate new business opportunities. Our mission is to increase the GDP of the internet, and we have a staggering amount of work ahead. That means you have an unprecedented opportunity to put the global economy within everyone's reach while doing the most important work of your career. About the team The Network Partnerships team sits within the Partnerships organization and is a key component of Stripe's success. Our team is responsible for developing and managing relationships with critical partners, such as Visa, Mastercard, and American Express, which are fundamental to the success of Stripe's product strategy and delivering new capabilities to Stripe users. What you'll do We're looking for a US or Canada-based candidate to join our team
    to lead one of Stripe's critical network partnerships. The candidate will manage overall partner health, build internal strategy and business cases, drive deal negotiation and execution, and coordinate priorities with internal teams and external partners. The role requires close coordination with leadership, product and engineering teams, as well as cross-functional stakeholders including Legal, Finance, Risk, etc., and with external partners' leaders and senior executives. This is a high-impact individual contributor role that requires the ability to rally cross-functional teams and flex "general manager" skills to shepherd a meaningful portion of Stripe's P&amp;L. Responsibilities Manage one of Stripe's most critical U.S. Network partnerships, with a focus on driving the execution of joint initiatives and launching new offerings to benefit Stripe users Leverage industry knowledge to craft thoughtful long-term partnership and product strategies, and execute deals and initiatives that
