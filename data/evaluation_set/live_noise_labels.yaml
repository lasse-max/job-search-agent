  description_text: 'ABOUT AIRWALLEX Airwallex is the only unified payments and financial platform for global businesses. Powered by our unique combination of proprietary infrastructure and software, we empower over 200,000 businesses worldwide – including Brex, Rippling, Navan, Qantas, SHEIN and many more – with fully integrated solutions to manage everything from business accounts, payments, spend management and treasury, to embedded finance at a global scale. Proudly founded in Melbourne, we have a team of over 2,200 of the brightest and most innovative people in tech across 26 offices around the globe. Valued at US$8 billion and backed by world-leading investors including T. Rowe Price, Visa, Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and Lone Pine Capital, Airwallex is leading the charge in building the global payments and financial platform of the future. If you’re ready to do the most ambitious work of your career, join us. ATTRIBUTES WE VALUE We hire
    successful builders with founder-like energy who want real impact, accelerated learning, and true ownership. You bring strong role-related expertise and sharp thinking, and you’re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles. You move fast with good judgment, dig deep with curiosity, and make decisions from first principles, balancing speed and rigor. You''re humble and collaborative; turn zero‑to‑one ideas into real products, and you “get stuff done” end-to-end. You use AI to work smarter and solve problems faster. Here, you’ll tackle complex, high‑visibility problems with exceptional teammates and grow your career as we build the future of global banking. If that sounds like you, let’s build what’s next. 工作职责： 1.批量承接由商务拓展、直销等销售团队获取的行业客户 2.根据公司战略及业务发展目标，制定所负责客户类型的维护、续约和额外销售计划 3.指导团队有效分解执行步骤，设定工作计划时间线，管理团队达到预期目标，帮助客户群持续稳定交易，并发掘客户需求，拓展服务种类，为客户创造长期价值，并提升空中云汇平台上的支付交易量和收入，支撑公司整体的业务发展规划 4.深入理解进出口电商、Digital（数字媒体、游戏、在线教育）、B2B外贸、国际物流等行业企业在跨境收支、汇兑与外汇风险管理等领域的痛点，在准确搜集行业产品需求后，与公司内部产品团队负责人、工作团队进行有效沟通，完善行业综合解决方案，提升客户体验，增强客户粘性
    5.保持对行业相关领域内各类信息的敏感和追踪，及时反馈并建议，推动业务可持续发展 任职要求： 1.大学本科及以上学历； 2.3年以上相关工作经验，有销售、客户运营团队管理经验；银行/跨境支付/外汇/跨境电商背景优先； 3.有极强的自我驱动力，以结果为导向，对结果负责； 4.有优秀的领导力和团队协作能力，以人为本，培育长期合作，促进团队成长； 5.具备优秀的策划与客户沟通能力，能够基于数据分析客户行为，总结共性问题，在客户群中建立影响力和长期合作关系； 6.优秀的学习能力和沟通能力，思维敏捷、有良好的应变能力和承压能力； 7. 具有敏锐的市场洞察力和准确的分析能力，能够捕捉、引领市场变化 APPLICANT SAFETY POLICY: FRAUD AND THIRD-PARTY RECRUITERS To protect you from recruitment scams, please be aware that Airwallex will not ask for bank details, sensitive ID numbers (i.e. passport), or any form of payment during the application or interview process. All official communication will come from an @airwallex.com http://airwallex.com email address. Please apply only through careers.airwallex.com http://careers.airwallex.com or our official LinkedIn page. Airwallex does not accept unsolicited resumes from search firms/recruiters. Airwallex will not pay any fees to search firms/recruiters if a candidate is submitted by a search firm/recruiter unless an agreement has been entered into
    with respect to specific open position(s). Search firms/recruiters submitting resumes to Airwallex on an unsolicited basis shall be deemed to accept this condition, regardless of any other provision to the contrary. EQUAL OPPORTUNITY Airwallex is proud to be an equal opportunity employer. We value diversity and anyone seeking employment at Airwallex is considered based on merit, qualifications, competence and talent. We don’t regard color, religion, race, national origin, sexual orientation, ancestry, citizenship, sex, marital or family status, disability, gender, or any other legally protected status when making our hiring decisions. If you have a disability or special need that requires accommodation, please let us know.'
