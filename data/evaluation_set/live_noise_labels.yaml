  description_text: 'Celonis is the global leader in Process Intelligence and the pioneer of Process Mining technology. As one of the world’s fastest-growing enterprise SaaS companies, we are changemakers pushing the boundaries of what’s possible. We invest heavily in advanced AI capabilities—specifically our Process Intelligence Graph—to turn data insights into immediate business action. We believe there is a massive opportunity to unlock global productivity and sustainability by placing intelligence at the core of every business process. Join our mission to make processes work for people, companies, and the planet. Overview You will join the Sailfin Accounts Receivable (AR) Team , a product engineering team in the Finance and Accounting domain. We build, deploy, and maintain an enterprise AR product used by global customers. The team is primarily based in India, including this role in Remote, India , and uses modern engineering standards, automation, and AI/ML-enabled components to build
    high-quality financial solutions. Job Summary We are looking for a Salesforce Software Engineer with 5+ years of strong experience on the Salesforce Force.com platform . You must be hands-on with Apex, Lightning Web Components (LWC) , integration patterns, and end-to-end application development. Basic knowledge of Python and AI/LLM concepts is a plus, as you will collaborate with our AI engineering team to integrate intelligent features into the AR product. Key Responsibilities Design, develop, and optimize Salesforce solutions using Apex, LWC, and Lightning Framework . Work with cross-functional teams to translate business needs into scalable Salesforce solutions. Own full development lifecycle: design → build → test → deploy → support. Implement best practices in Salesforce configuration, security, and performance tuning. Build and support integrations using REST/SOAP APIs , middleware, and external services. Ensure code quality through unit testing, code reviews, and development standards.
    Collaborate in DevOps workflows (Git, CI/CD tools). Stay updated with Salesforce releases and emerging features. Partner with the AI team to integrate Python-based services, LLM workflows, or automation enhancements. Required Skills &amp; Qualifications 6+ years of hands-on Salesforce development experience. Strong proficiency in LWC, Apex, SOQL, Lightning Framework , and platform fundamentals. Deep understanding of Salesforce architecture, governor limits, security model, and best practices. Experience with Salesforce integrations (REST, SOAP, middleware, APIs). Good understanding of web fundamentals (HTTP, JSON, auth flows) . Basic experience with Python for automation or service integration. Basic understanding of AI/LLMs , with willingness to integrate LLM-powered features. Experience using AI-assisted coding tools (Copilot, CodeWhisperer, vibe coding tools, or similar) to accelerate development speed and improve code quality. Ability to work independently, solve problems, and collaborate
    with cross-functional teams. Salesforce certifications (PD1, App Builder) are preferred. Nice to Have Experience working in Agile/Scrum setups. Hands-on experience with DevOps tools (Git, Jenkins, Copado, Gearset). Experience with Einstein AI or integrating external AI/ML services into Salesforce. Knowledge of event-driven architecture or platform events. What Celonis can offer you: Pioneer Innovation: Work with the global leader in Process Mining and the Process Intelligence Graph to shape the future of AI-driven business operations. Ownership from Day 1: Every full-time "Celonaut" is an owner, receiving Restricted Stock Units (RSUs) and merit-based refresh grants. Unrivaled Family Support: Benefit from our inclusive parental leave policy—24 weeks of fully paid leave for primary carers and 12 weeks for supporting carers, available from your first day of employment. Work-Life Integration: Enjoy Unlimited PTO (in applicable regions) and generous PTO globally, as well as a flexible hybrid
    work model that balances remote focus with vibrant office collaboration. Continuous Growth: Elevate your skills through our 70-20-10 learning framework, mentorship programs, and access to a dedicated learning platform. Holistic Well-being: Prioritize your health with subsidized Wellhub memberships, mental health counseling, and dedicated "Wellness Weeks" that prioritize work/life balance. Drive Sustainability: Participate in annual Impact Days, where you receive paid time off to volunteer for community and environmental causes with your local office, or virtually. Global Inclusion &amp; Belonging: Find community through our Inclusion Think Tank and participate in our annual Inclusion Days, ensuring every voice is heard and valued. Value-Driven Impact: Join a mission-led organization where our core values—Live for Customer Value, The Best Team Wins, We Own It, and Earth Is Our Future—drive every decision. About Us: Celonis makes processes work — for people, companies, and the planet.
    Powered by process mining and AI, the Celonis Process Intelligence Platform integrates process data and business context to create a living digital twin of business operations. We enable thousands of companies worldwide to understand how their business actually runs and, together with their partners, build intelligent solutions that transform and continuously improve the way they operate — unlocking billions in value. Celonis is headquartered in Munich, Germany, and New York City, USA, with more than 20 offices worldwide. Get familiar with the Celonis Process Intelligence Platform by watching this video . Celonis Inclusion Statement: At Celonis, we believe our people make us who we are and that “The Best Team Wins”. We know that the best teams are made up of people who bring different perspectives to the table. And when everyone feels included, able to speak up and knows their voice is heard - that''s when creativity and innovation happen. Your Privacy: Any information you submit to
    Celonis as part of your application will be processed in accordance with Celonis’ Accessibility and Candidate Notices By submitting this application, you confirm that you agree to the storing and processing of your personal data by Celonis as described in our Privacy Notice for the Application and Hiring Process . Please be aware of common job offer scams, impersonators and frauds. Learn more here .'
