  description_text: Engineering Manager, HADR Who we are About Stripe Stripe is a financial infrastructure platform for businesses. Millions of companies—from the world's largest enterprises to the most ambitious startups—use Stripe to accept payments, grow their revenue, and accelerate new business opportunities. Our mission is to increase the GDP of the internet, and we have a staggering amount of work ahead. That means you have an unprecedented opportunity to put the global economy within everyone's reach while doing the most important work of your career. About the team The group is responsible for offering data-serving infrastructure spanning across data warehouse analytics, streaming analytics, and search capabilities. The stack is supported by a collection of internally developed large-scale distributed services and several popular open-source technologies like Trino and Presto, Apache Pinot, Hive Metastore, Elasticsearch, etc. The systems we own support all of the data-serving needs
    of high-scale services and thousands of individual Stripes across the company. We process hundreds of thousands of search and analytics-shaped queries on petabytes of data ingested through real-time streaming and large-batch ingestion pipelines. We are the data-serving layer for one of the largest financial data lakes in the world. We're looking for a manager who is excited about Data Serving architecture and leading a team to solve challenging distributed systems problems, as well as developing empathetic partnerships with other Stripe teams to understand their use cases and unlock new capabilities. What you'll do Responsibilities • Work on a high-visibility team and be part of shaping the long-term Data Serving strategy at Stripe • Work with engineers and other leaders at Stripe to understand opportunities to better leverage Apache Pinot at scale • Support the engineering team in achieving a high level of technical quality, reliability, and ease of use • Lead and manage processes to
    help the team do its best work and engage effectively with the rest of Stripe • Recruit great engineers, in collaboration with Stripe's recruiting team • Develop engineers on the team, helping them advance in their careers • Contribute to engineering-wide initiatives as a member of Stripe's engineering management team Who you are We're looking for someone who meets the minimum requirements to be considered for the role. If you meet these requirements, you are encouraged to apply. The preferred qualifications are a bonus, not a requirement. Minimum requirements • At least 3 years of experience managing teams that shipped and operated critical distributed system infrastructure. • Successfully recruited and built great teams. • Works effectively cross-functionally and is able to think rigorously, communicate effectively, and make or coordinate hard decisions and trade-offs. • Thrives with a high degree of autonomy and responsibility in an ambiguous environment. • Technical acumen to drive
