    team of Engineers, Product Designers, and other Deployment Strategists to deploy software against the most challenging problems our world faces. Your mission is to synthesise disconnected streams of thought into a cohesive understanding of what the most important problem is, what the data means, what the product needs, what users are motivated by, and where the impact could be. Deployment Strategists are do-ers who immerse themselves in our customers' most intricate workflows, partner with customer teams and explore the data, and dive into the product landscape to enable us to scale. A select number of Deployments Strategists may also be deployed to Palantir internal teams and problems. In this role, the problems you'll tackle will require a curious and analytical mindset, a sharp intuition for product, and a strong degree of user empathy to ultimately empower our customers to make better decisions.
