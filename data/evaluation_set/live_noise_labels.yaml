    strategy and holding yourself and others accountable to the long-term company vision. Data and feedback driven, your decisions are inspired by the product usage, the users’ qualitative insights, and your expertise . Communication focused with excellent verbal and written skills. Self-Directed with the ability to establish your work and processes. Fluent in Arabic&nbsp;and English. Based in UAE or willing to relocate. &nbsp; You Will: Proactively set team goals, monitor progress and conversation trends with key partners. Partner with data scientists, product, engineering and leaders across the company. Become the voice of your partners, identifying and quantifying the critical action items that will impact our product growth in the region. Communicate risk factors of the region and make difficult decisions. Actively share reports to reflect the impact of your work with the company. Roles that are based in an office are onsite Tuesday, Wednesday, and Thursday, with optional presence on
    Monday and Friday (unless otherwise noted). Roblox provides equal employment opportunities to all employees and applicants for employment and prohibits discrimination and harassment of any type without regard to race, color, religion, age, sex, national origin, disability status, genetics, protected veteran status, sexual orientation, gender identity or expression, or any other characteristic protected by federal, state or local laws. Roblox also provides reasonable accommodations to candidates with qualifying disabilities or religious beliefs during the recruiting process. For US based roles only, please note the Company may not be able to employ candidates for this role who have United States work authorization related to certain U.S. visa categories, or support future H-1B sponsorship at this time.'
