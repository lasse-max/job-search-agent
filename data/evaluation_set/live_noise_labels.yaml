  description_text: 'At Snowflake, we are powering the era of the agentic enterprise. To usher in this new era, we seek AI-native thinkers across every function who are energized by the opportunity to reinvent how they work. You don’t just use tools; you possess an innate curiosity, treating AI as a high-trust collaborator that is core to how you solve problems and accelerate your impact. We look for low-ego individuals who thrive in dynamic and fast-moving environments and move with an experimental mindset — who rapidly test emerging capabilities to discover simpler, more powerful ways to deliver results. At Snowflake, your role isn''t just to execute a function, but to help redefine the future of how work gets done. We are looking for a Senior PS Sales Solutions Architect to be part of our Professional Services team. In this role there will be equal focus on both the process of selling Snowflake Professional Services engagements as well as the delivery of sold/billable engagements. This
    person must be a hands-on, self-starter who loves solving innovative problems in a fast-paced, agile environment. The ideal candidate will have the insight to connect a specific business problem and Snowflake’s solution, confidently communicating that connection and vision to technical and executive audiences. The person we’re looking for shares our passion for reinventing the data platform and thrives in a dynamic environment. That means having the flexibility and willingness to jump in and get it done to make Snowflake and our customers successful. It means keeping up to date on the ever-evolving data and analytics technologies and working collaboratively with a broad range of people inside and outside the company to be an authoritative resource for Snowflake and its customers. Location: Los Angeles, San Francisco, Seattle OR New York, New Jersey or Atlanta AS A PROFESSIONAL SERVICES SOLUTIONS ARCHITECT, AT SNOWFLAKE, YOU WILL : - Present Snowflake technology and vision to executives
    and technical contributors to customers. - Position yourself as a Trusted Advisor to key customer stakeholders with a focus on achieving their desired Business Outcomes. - Partner with Professional Services Practice Directors and Practice Managers to identify, iterate and scope proposals and Statements of Work, both for packaged services as well as custom Time and Materials projects - Collaborate with Snowflake sales executives and account teams on opportunity development and overall account strategy - Build trust and confidence in Snowflake Professional Services through the delivery of on-site technical/use-case workshops, leadership of video conference meetings, assistance with deep-dive technical issues or questions and public-facing evangelism (LinkedIn, Medium, etc.) of Snowflake - Collect and communicate common themes and questions from customer meetings to inform delivery teams on the evolving services landscape, identifying opportunities to build new and/or evolve existing packaged
    service offerings - Drive project teams towards common goals of accelerating the adoption of Snowflake solutions. - Demonstrate and communicate the value of Snowflake technology throughout paid engagements, from demo to proof of concept to running workshops, design sessions and implementation with customers and stakeholders. - Create repeatable processes and documentation as a result of customer engagement. - Create and collaborate on Industry based solutions that are relevant to other customers in order to drive more value out of Snowflake. - Follow best practices, including ensuring knowledge transfer so that customers are correctly enabled and can extend the capabilities of Snowflake on their own. - Maintain a deep understanding of competitive and complementary technologies and vendors and how to position Snowflake in relation to them. OUR IDEAL SOLUTIONS ARCHITECT, SALES WILL HAVE: - University degree in computer science, engineering, mathematics or related fields, or equivalent
    experience - Minimum 5 years of experience as a solutions architect, data architect, database administrator, or data engineer. - Minimum 2 years of practical Snowflake experience, leading or participating in services engagements - Minimum 2 years of practical experience with at least one of the three major cloud providers (AWS, Azure or GCP) - Understanding of complete data analytics stack and workflow, from ETL to data platform design to BI and analytics tools - Hands-on experience in a technical role (SQL, data warehousing, cloud data, analytics, or ML/AI) - Either extensive knowledge of and experience with large-scale database technology (e.g. Snowflake, Netezza, Exadata, Teradata, Greenplum, etc.) along with data science/AI/ML use cases and workloads, OR; - Experience with AI/ML model development and relevant tools like Sagemaker, DBx, or Azure ML. Additionally candidate must have familiarity with common ML supporting libraries (sklearn, xgboost, pytorch, pandas, etc.) - Software
    development experience with Python, Java , Spark and other Scripting languages - Proficiency in implementing data security measures, access controls, and design within the Snowflake platform. - Internal and/or external consulting experience. - Impeccable communication skills - written, visual and oral. Capable of comfortably engaging audiences from hands-on technologists through C-suite executives. BONUS POINTS FOR THE FOLLOWING : - Big 5 Consulting experience - Experience selling or supporting the sales process of technical services at the enterprise level - Experience with non-relational platforms and tools for large-scale data processing (e.g. Hadoop, HBase) - Familiarity and experience with common BI and data exploration tools (e.g. Microstrategy, Looker, Tableau) - OLAP Data modeling and data architecture experience - Expertise in a core vertical such as Financial Services, Retail, Media & Entertainment, Healthcare, Life-Sciences etc. - Current certifications in any of the following
    areas: cloud provider (AWS, Azure, GCP) technologies, cloud data technologies (Redshift, BigQuery, Synapse, Fabric, Snowflake, Databricks, etc.), cloud networking and security, data governance, ELT tools and BI/presentation layer tools Every Snowflake employee is expected to follow the company’s confidentiality and security standards for handling sensitive data. Snowflake employees must abide by the company’s data security plan as an essential part of their duties. It is every employee''s duty to keep customer information secure and confidential. Snowflake is growing fast, and we’re scaling our team to help enable and accelerate our growth. We are looking for people who share our values, challenge ordinary thinking, and push the pace of innovation while building a future for themselves and Snowflake. How do you want to make your impact? For jobs located in the United States, please visit the job posting on the Snowflake Careers Site for salary and benefits information: careers.snowflake.com
    http://careers.snowflake.com'
