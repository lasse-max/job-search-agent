  description_text: 'At Snowflake, we are powering the era of the agentic enterprise. To usher in this new era, we seek AI-native thinkers across every function who are energized by the opportunity to reinvent how they work. You don’t just use tools; you possess an innate curiosity, treating AI as a high-trust collaborator that is core to how you solve problems and accelerate your impact. We look for low-ego individuals who thrive in dynamic and fast-moving environments and move with an experimental mindset — who rapidly test emerging capabilities to discover simpler, more powerful ways to deliver results. At Snowflake, your role isn''t just to execute a function, but to help redefine the future of how work gets done. Observe by Snowflake is a high-growth SaaS observability platform built on the Snowflake AI Data Cloud, enabling businesses to troubleshoot modern distributed applications 10x faster. Now, as a core part of Snowflake, we’ve reached a major milestone in the evolution of the
    Snowflake platform. By bringing AI-powered observability directly into the Snowflake ecosystem, we’ve created the first truly unified platform for telemetry and business data. As a Sr. Sales Operations Analyst with Observe, you will play a critical role in the health and scalability of our revenue engine. Sitting at the intersection of Sales, Finance, and Customer Success, you will ensure our data is accurate, our processes are efficient, and our leadership has the insights needed to make strategic decisions. This role is ideal for a systems thinker who thrives in ambiguity, loves untangling complex data challenges, and is passionate about building scalable solutions that connect contracts to recognized revenue. WHAT YOU’LL DO: - Own and improve revenue-related data integrity across billing, subscriptions, and order management workflows - Partner with Finance, Sales, and Customer Success to streamline cross-functional processes and close operational gaps - Analyze consumption and usage
    data to surface trends and support reporting needs - Support territory design, account alignment, and annual planning initiatives - Establish and enforce data quality standards across the GTM tech stack - Translate complex datasets into clear, actionable insights for senior leadership - Drive root cause analysis on recurring data or process issues and lead resolution initiatives ON DAY ONE WE WILL EXPECT YOU TO HAVE: - 4+ years in Revenue Operations, Sales Operations, or Financial Operations (SaaS preferred) - Strong analytical skills; proficiency in SQL and Excel/Google Sheets - Experience with CRM systems (e.g., Salesforce) and billing platforms - Excellent communication skills with the ability to present complex topics to non-technical audiences - High attention to detail and a proactive approach to problem-solving Preferred Qualifications - Experience with BI/data visualization tools - Familiarity with data warehousing concepts - Background in high-growth environments scaling from
    manual to automated processes Every Snowflake employee is expected to follow the company’s confidentiality and security standards for handling sensitive data. Snowflake employees must abide by the company’s data security plan as an essential part of their duties. It is every employee''s duty to keep customer information secure and confidential. Snowflake is growing fast, and we’re scaling our team to help enable and accelerate our growth. We are looking for people who share our values, challenge ordinary thinking, and push the pace of innovation while building a future for themselves and Snowflake. How do you want to make your impact? For jobs located in the United States, please visit the job posting on the Snowflake Careers Site for salary and benefits information: careers.snowflake.com http://careers.snowflake.com'
