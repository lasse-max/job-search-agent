  description_text: 'ABOUT US At Sierra, we’re creating a platform to help businesses build better, more human customer experiences with AI. We are primarily an in-person company based in San Francisco, with growing offices in Atlanta, New York, London, Paris, Madrid, Munich, Singapore, Tokyo, and Sydney. We are guided by a set of values that are at the core of our actions and define our culture: Trust, Customer Obsession, Craftsmanship, Intensity, and Family. These values are the foundation of our work, and we are committed to upholding them in everything we do. Our co-founders are Bret Taylor https://www.linkedin.com/in/brettaylor/ and Clay Bavor https://www.linkedin.com/in/claybavor/. Bret currently serves as Board Chair of OpenAI. Previously, he was co-CEO of Salesforce (which had acquired the company he founded, Quip) and CTO of Facebook. Bret was also one of Google''s earliest product managers and co-creator of Google Maps. Before founding Sierra, Clay spent 18 years at Google, where
    he most recently led Google Labs. Earlier, he started and led Google’s AR/VR effort, Project Starline, and Google Lens. Before that, Clay led the product and design teams for Google Workspace. WHAT YOU''LL DO - GTM technical expert: Design and demo Sierra’s incredible Agent product, offering technical solutions to solve for our customer’s needs, and answering technical questions about our solutions. - Cross-functional work: You will work directly with our Sales, Product and Agent Engineering teams to both drive our GTM function, as well as continuously improve our Agents through our customer-driven product development philosophy. - Lead & support our customers: As a GTM and technical leader in the earliest conversations with our future customers, you will both understand and anticipate their needs to continue our industry-leading AI solution. WHAT YOU''LL BRING - 5-7+ years experience in Sales Engineering, Solutions Engineering or customer-facing technical sales. - Exceptional verbal
    and written communication abilities. Professional fluency in both German and English. - Past experience in demo building, and presenting, and working with customers or clients in the GTM function. - Experience in relationship-building with potential customers, including executives and technical leaders. - Experience in leading the sales process with Enterprise customers. - Ability to connect a prospect’s specific business problems and Sierra’s solutions and explain them to both a technical and non-technical audience - Bachelor''s Degree or above; bonus if in Computer Science or related field, or equivalent professional experience. EVEN BETTER... - AI-related experience (or experience in a similarly modern and highly technical industry). - Experience translating code, technical logic and user requirements to product and engineering requirements. OUR VALUES - Trust: We build trust with our customers with our accountability, empathy, quality, and responsiveness. We build trust in AI by
    making it more accessible, safe, and useful. We build trust with each other by showing up for each other professionally and personally, creating an environment that enables all of us to do our best work. - Customer Obsession: We deeply understand our customers’ business goals and relentlessly focus on driving outcomes, not just technical milestones. Everyone at the company knows and spends time with our customers. When our customer is having an issue, we drop everything and fix it. - Craftsmanship: We get the details right, from the words on the page to the system architecture. We have good taste. When we notice something isn’t right, we take the time to fix it. We are proud of the products we produce. We continuously self-reflect to continuously self-improve. - Intensity: We know we don’t have the luxury of patience. We play to win. We care about our product being the best, and when it isn’t, we fix it. When we fail, we talk about it openly and without blame so we succeed the next time.
    - Family: We know that balance and intensity are compatible, and we model it in our actions and processes. We are the best technology company for parents. We support and respect each other and celebrate each other’s personal and professional achievements. WHAT WE OFFER We want our benefits to reflect our values and offer the following to full-time employees: - Flexible (unlimited) paid time off - Medical, dental, and vision benefits for you and your family - Life insurance and disability benefits - Retirement plan dependent on country of employment - Parental leave - Fertility and family building benefits through Carrot - Lunch, as well as delicious snacks and coffee to keep you energized - Discretionary benefit stipend giving people the ability to spend where it matters most - Free alphorn lessons These benefits are further detailed in Sierra''s policies, may vary by region, and are subject to change at any time, consistent with the terms of any applicable compensation or benefits plans.
    Eligible full-time employees can participate in Sierra''s equity plans subject to the terms of the applicable plans and policies. BE YOU, WITH US We''re working to bring the transformative power of AI to every organization in the world. To do so, it is important to us that the diversity of our employees represents the diversity of our customers. We believe that our work and culture are better when we encourage, support, and respect different skills and experiences represented within our team. We encourage you to apply even if your experience doesn''t precisely match the job description. We strive to evaluate all applicants consistently without regard to race, color, religion, gender, national origin, age, disability, veteran status, pregnancy, gender expression or identity, sexual orientation, citizenship, or any other legally protected class.'
