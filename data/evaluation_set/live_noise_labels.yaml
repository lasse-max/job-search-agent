  description_text: 'WHY HARVEY At Harvey, we’re transforming how legal and professional services operate. By combining frontier agentic AI, an enterprise-grade platform, and deep domain expertise, we’re reshaping how critical knowledge work gets done for decades to come. This is a rare chance to help build a generational company at a true inflection point. With 1500+ customers in 60+ countries, strong product-market fit, and world-class investor support, we’re scaling fast and defining a new category in real time. The work is ambitious, the bar is high, and the opportunity for growth — personal, professional, and financial — is unmatched. Our team moves fast, takes ownership, and is deeply committed to the mission — operating with intensity, staying close to our customers, and pushing each other for excellence. We live by three values: Decisiveness, Simplicity, and Job''s Not Finished. We act quickly on clear judgment over perfect information, we believe simplicity is what scales, and we''re
    never satisfied with where we are. If you want to do the best work of your career alongside people who share that drive, we''d love to build with you. At Harvey, the future of professional services is being written today — and we’re just getting started. ROLE OVERVIEW We’re looking for an experienced, hands-on Field Marketing Manager to own and execute our EMEA field marketing strategy. This role blends best-in-class tactical execution with strategic planning and operational rigour. You’ll lead the planning and delivery of first-party and third-party events, regional activations, and integrated campaigns designed to drive pipeline, lead generation, and revenue impact across the EMEA market. This is an individual contributor role suited to someone who thrives in execution, partners closely with GTM, and is equally comfortable running events on the ground and building the playbooks, processes, and agency relationships that allow field marketing to scale. WHAT YOU''LL DO - Own the planning
    and execution of EMEA field marketing programmes, including first-party events (executive dinners, roundtables, workshops, community building events) and third-party events (conferences, sponsorships, partner activations). - Design and deliver field marketing initiatives that drive measurable pipeline and lead generation, aligned to regional targets, priority accounts, and GTM objectives. - Partner closely with the EMEA GTM team to develop territory-based and account-focused event strategies, including pre- and post-event engagement and follow-up. - Manage end-to-end event delivery, including budgets, logistics, vendors, agencies, on-site execution, and post-event reporting. - Lead the development of scalable field marketing playbooks, processes, and best practices to support growth and consistency globally. - Own and manage relationships with external agencies, event partners, and third-party organisers, ensuring high-quality delivery and strong ROI. - Track, analyse, and report on
    the performance of field marketing activities, using data and insights to continuously improve impact and efficiency. WHAT YOU HAVE - 4–7 years of experience in field marketing, event marketing, or demand generation within B2B SaaS or professional services. - Proven ability to deliver high-impact field events and activations that drive measurable pipeline and lead generation. - Strong experience partnering with Sales on territory-based or account-focused marketing initiatives. - Excellent communication, organisation, and stakeholder management skills, with a high bar for execution and detail. - Familiarity with tools such as Salesforce, Marketo (or similar), and event platforms is highly desirable. - Experience marketing to legal, financial services, consulting, or other high-touch professional audiences is a plus. DEPENDING ON YOUR LOCATION, AN APPLICANT PRIVACY NOTICE MAY APPLY TO YOU. YOU CAN FIND ALL OF OUR APPLICANT PRIVACY NOTICES [HERE https://www.notion.so/harveyai/Harvey-Candidate-Privacy-Policies-319ac3fcdd7a803bb807d5094f249922].
