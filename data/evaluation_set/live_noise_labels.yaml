  description_text: 'Deputy is a global SaaS workforce management company with hubs in Sydney, Melbourne, San Francisco and London, plus team members working remotely across the United States. Our platform serves over 1.5 million workers and 375,000 workplaces across 100+ countries. We are backed by top global investors and recently achieved Unicorn status. At Deputy, we’re improving the world of work, one shift at a time, for 80% of the world’s workforce: hourly workers. These are the dedicated employees who keep our world running – from baristas to nurses, cleaners to delivery drivers, florists to factory workers. Despite their vital role in society, most workplace technology has focused on those workers who sit behind a desk, but at Deputy, we transform the frontline. When businesses use Deputy, their workplaces thrive – the business is more profitable, compliant, and productive, while the workers are more engaged and happier at work. We''re becoming an AI-native company, a commitment
    that means you''ll be empowered (and expected) to use AI tools and thinking in your day-to-day work. You''ll have the training, support, and freedom to use AI responsibly and creatively to spark ideas, solve problems faster, and unlock new ways of working. If you’re passionate about creating solutions that put people first and helping businesses and their teams thrive, join us at Deputy and make an impact where it matters most! The Role As part of the Technical Support team, you will work closely with Product, Engineering, Customer Success, and Sales teams to provide advanced technical support across the Deputy ecosystem and related integrations. As a Technical Support Engineer, you will act as the final escalation point for complex customer issues, providing deep technical investigation and troubleshooting for highly customised customer environments. You will be responsible for analysing platform behaviour, identifying product defects, supporting integrations, and collaborating cross-functionally
    to drive customer outcomes. This role requires strong technical problem-solving skills, the ability to manage high-priority escalations, and a customer-first mindset. You will also contribute to operational improvement initiatives, technical enablement, process optimisation, and knowledge sharing across the support organisation.'
