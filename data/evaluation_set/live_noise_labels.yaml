  description_text: 'Celonis is the global leader in Process Intelligence and the pioneer of Process Mining technology. As one of the world’s fastest-growing enterprise SaaS companies, we are changemakers pushing the boundaries of what’s possible. We invest heavily in advanced AI capabilities—specifically our Process Intelligence Graph—to turn data insights into immediate business action. We believe there is a massive opportunity to unlock global productivity and sustainability by placing intelligence at the core of every business process. Join our mission to make processes work for people, companies, and the planet. The position of the Principal Digital Transformation &amp; Process Optimisation Consultant (Internal Title: Principal Value Engineer) is a trusted advisor helping customers achieve their strategic goals and realise significant value using the Celonis Process Intelligence Platform. A Value Engineer has full responsibility for the end-to-end value journey of our customers – landing,
    expanding, adopting and renewing. Responsibilities include translating customers’ objectives into value assessments or proof-of-value projects, building specific Celonis business cases and demos, running value workshops, and engaging with multiple senior stakeholders to deliver value driven results and secure long term partnership agreements. The Role: You are spearheading our mission of data-driven business transformation with our customers. You will work in partnership with the Celonis Sales Teams and have full responsibility for the end-to-end value journey of our customers. You are our customers'' trusted advisor and help them achieve their strategic goals and realize significant value using Celonis Process Intelligence Platform. In collaboration with our partners and Celonis Services, you will drive measurable business impact across various processes and industries and accelerate the adoption of our platform. You will blend deep process and industry expertise with a proven consulting
    skill set with strong analytical skills at the forefront of one of the fastest-growing tech companies worldwide. Native-level German proficiency is required for this role. Candidates must be able to lead customer workshops, conduct executive presentations, and manage stakeholder interactions in German. &nbsp; The work you’ll do: Identify &amp; Frame Value Discover and translate customers’ strategic priorities into high-impact Celonis use cases Build demos and business cases, leveraging industry benchmarks and best practices in order to win new customers&nbsp; Undertake Value Assessments or Proof-of-Value Projects and communicate the value opportunity and strategic roadmap to C-Level executive Realize Value Facilitate business value workshops and use Celonis to identify and qualify opportunities for process enhancement Derive improvement measures in core business functions and initiate improvement actions and enterprise-wide change initiatives Present results and realized value to senior
    management and C-level executives Scale Value Responsible for the end-to-end customer value journey, landing, expanding, adoption and renewing Build a strategic expansion roadmap for customers embedding Celonis Process Intelligence as a strategic business transformation platform in their organization and therefore drive adoption and expansion Provide feedback to our product development teams to enhance the Celonis platform and Apps based on new use cases &nbsp; The qualifications you need: Live for Customer Value: Experience in an analytical role with the objective to demonstrate or secure value through business data analysis, business process improvement and respective Software deployment. Ideally in a customer-facing role in Solution Consulting, Sales Engineering or IT/Management Consulting with a Business Software / SaaS Provider or a Consultancy. Alternatively in an Inhouse role (e.g. Center of Excellence for Data Mining / Analytics / Intelligence) within an Enterprise. Data, Analytics,
    Applications &amp; IT: Good knowledge of Business Software / SaaS applications (e.g. SAP),&nbsp; experience with implementing RPA and/or BI Tools and/or building Dashboards, Apps and Action Flows. Knowledge of Python and/or SQL. Experience in collaborating with IT teams. Process Improvement &amp; Value Realization: Experience in identifying use cases for business process improvement and deploying improvement measures,&nbsp; being a change agent and training users/process owners to realize value Project Management: Experience in planning and managing project scopes, expectations and timelines. You will manage multiple projects across your aligned accounts that will be at different parts of the value journey. Also, you will leverage partners from the Celonis Ecosystem wherever possible. Executive Stakeholder Management: Experience in preparing and communicating (value) roadmaps and results to stakeholders and management, both internally and externally. Excellent communication and presentation
    skills. Business Domain Expertise: Understanding of the Finance and/or Supply Chain domain as well as strategic transformation initiatives (e.g. Shared Services Transformation or System Transformation) Industry Expertise: Ideally expertise in one or more industries (e.g. Manufacturing, Automotive, Consumer, Retail, Pharmaceuticals, Chemicals) and the ability to develop a deep understanding of industry trends and strategic opportunities&nbsp; &nbsp; Degree: In Technology &amp; Management, Industrial/Business Engineering, Business Informatics, Computer Science, Mathematics, Economics or a comparable degree program Native-level or near-native German language skills (written and spoken), with the ability to confidently engage German-speaking customers, facilitate workshops, and present to executive stakeholders. What Celonis can offer you: Pioneer Innovation: Work with the global leader in Process Mining and the Process Intelligence Graph to shape the future of AI-driven business operations.
    Ownership from Day 1: Every full-time "Celonaut" is an owner, receiving Restricted Stock Units (RSUs) and merit-based refresh grants. Unrivaled Family Support: Benefit from our inclusive parental leave policy—24 weeks of fully paid leave for primary carers and 12 weeks for supporting carers, available from your first day of employment. Work-Life Integration: Enjoy Unlimited PTO (in applicable regions) and generous PTO globally, as well as a flexible hybrid work model that balances remote focus with vibrant office collaboration. Continuous Growth: Elevate your skills through our 70-20-10 learning framework, mentorship programs, and access to a dedicated learning platform. Holistic Well-being: Prioritize your health with subsidized Wellhub memberships, mental health counseling, and dedicated "Wellness Weeks" that prioritize work/life balance. Drive Sustainability: Participate in annual Impact Days, where you receive paid time off to volunteer for community and environmental causes with
    your local office, or virtually. Global Inclusion &amp; Belonging: Find community through our Inclusion Think Tank and participate in our annual Inclusion Days, ensuring every voice is heard and valued. Value-Driven Impact: Join a mission-led organization where our core values—Live for Customer Value, The Best Team Wins, We Own It, and Earth Is Our Future—drive every decision. About Us: Celonis makes processes work — for people, companies, and the planet. Powered by process mining and AI, the Celonis Process Intelligence Platform integrates process data and business context to create a living digital twin of business operations. We enable thousands of companies worldwide to understand how their business actually runs and, together with their partners, build intelligent solutions that transform and continuously improve the way they operate — unlocking billions in value. Celonis is headquartered in Munich, Germany, and New York City, USA, with more than 20 offices worldwide. Get familiar
    with the Celonis Process Intelligence Platform by watching this video . Celonis Inclusion Statement: At Celonis, we believe our people make us who we are and that “The Best Team Wins”. We know that the best teams are made up of people who bring different perspectives to the table. And when everyone feels included, able to speak up and knows their voice is heard - that''s when creativity and innovation happen. Your Privacy: Any information you submit to Celonis as part of your application will be processed in accordance with Celonis’ Accessibility and Candidate Notices By submitting this application, you confirm that you agree to the storing and processing of your personal data by Celonis as described in our Privacy Notice for the Application and Hiring Process . Please be aware of common job offer scams, impersonators and frauds. Learn more here .'
