  description_text: 'About Anthropic Anthropic’s mission is to create reliable, interpretable, and steerable AI systems. We want AI to be safe and beneficial for our users and for society as a whole. Our team is a quickly growing group of committed researchers, engineers, policy experts, and business leaders working together to build beneficial AI systems. About the role Anthropic is seeking a seasoned Revenue Accounting professional to join our growing Accounting Team. In this position, you will drive revenue accounting operations, accounts receivable accounting, and financial reporting processes. You will play a critical role in ensuring accurate revenue recognition, managing complex AR processes including CECL compliance, and enhancing our month-end close operations. The ideal candidate brings deep technical accounting expertise, leadership capabilities, and thrives in our fast-paced, innovative environment. Responsibilities Manage daily revenue accounting operations, including high-volume
    transaction processing, and ensure accurate revenue recognition in compliance with ASC 606 Own the month-end revenue close process by reviewing and approving revenue-related account reconciliations and journal entries for revenue, deferred revenue, and unbilled receivables Manage comprehensive accounts receivable accounting functions, including AR reconciliations, aging analysis, and accurate recording of customer receivables Lead quarterly CECL aging analysis to ensure consistent application of ASC 326 and work with AR &amp; Collections Lead to develop key AR metrics for management reporting Perform regular month-end close flux analysis, identifying and explaining significant variances in revenue and accounts receivable balances to ensure financial integrity and provide insights for management decision-making Collaborate cross-functionally with Finance Operations, Finance Strategy, Billing Support, and business partners on strategic processes and programs Support revenue accounting
    system initiatives, including design, implementation, testing, and optimization Serve as subject matter expert for revenue and AR accounting questions across the organization Lead audit coordination and serve as primary contact for external auditors during year-end audit Maintain comprehensive documentation for all revenue and AR processes You may be a good fit if you have Bachelor''s degree in accounting or finance (or equivalent experience)&nbsp; 10+ years of accounting experience, with at least 3 years in public accounting Strong knowledge of ASC 606 Revenue from Contracts with Customers &amp; ASC 326 Credit Impairment Experience with accounts receivable accounting and financial reporting Experience in collaborating across departments to influence change Attention to detail, excellent communication skills, and strong sense of teamwork Ability to work independently and prioritize in a fast-paced environment Strong sense of ownership and independence, with proven ability to identify
    issues, propose solutions, and drive initiatives to completion with minimal supervision Proven experience in managing and mentoring accounting professionals, with the potential to lead team members (both contractors and FTEs) as our team continues to grow Strong candidates may also have Experience in a growing SaaS technology business, preferably in startup or high-growth environments Experience with third-party platform revenue models and related accounting complexities Passion for data integrity, comfort with large datasets, and enjoyment of solving complex problems Proficiency with mainstream ERP systems and revenue engines such as NetSuite ARM, Oracle, SAP, Workday Financials and comparable systems. NetSuite ARM experience strongly preferred Experience with Metronome, Stripe, Anrok, or similar software is a plus Database &amp; SQL experience is a plus Exceptional business acumen with ability to translate complex financial concepts into actionable insights for non-finance stakeholders
    The annual compensation range for this role is listed below.&nbsp; For sales roles, the range provided is the role’s On Target Earnings ("OTE") range, meaning that the range includes both the sales commissions/sales bonuses target and annual base salary for the role. Annual Salary: $230,000 &mdash; $300,000 USD Logistics Minimum education: Bachelor’s degree or an equivalent combination of education, training, and/or experience Required field of study:&nbsp; A field relevant to the role as demonstrated through coursework, training, or professional experience Minimum years of experience: Years of experience required will correlate with the internal job level requirements for the position Location-based hybrid policy: Currently, we expect all staff to be in one of our offices at least 25% of the time. However, some roles may require more time in our offices. Visa sponsorship: &nbsp;We do sponsor visas! However, we aren''t able to successfully sponsor visas for every role and every candidate.
    But if we make you an offer, we will make every reasonable effort to get you a visa, and we retain an immigration lawyer to help with this. We encourage you to apply even if you do not believe you meet every single qualification. Not all strong candidates will meet every single qualification as listed.&nbsp; Research shows that people who identify as being from underrepresented groups are more prone to experiencing imposter syndrome and doubting the strength of their candidacy, so we urge you not to exclude yourself prematurely and to submit an application if you''re interested in this work. We think AI systems like the ones we''re building have enormous social and ethical implications. We think this makes representation even more important, and we strive to include a range of diverse perspectives on our team. Your safety matters to us. To protect yourself from potential scams, remember that Anthropic recruiters only contact you from&nbsp;@anthropic.com&nbsp;email addresses. In some
    cases, we may partner with vetted recruiting agencies who will identify themselves as working on behalf of Anthropic. Be cautious of emails from other domains. Legitimate Anthropic recruiters will never ask for money, fees, or banking information before your first day. If you''re ever unsure about a communication, don''t click any links—visit&nbsp; anthropic.com/careers &nbsp;directly for confirmed position openings. How we''re different We believe that the highest-impact AI research will be big science. At Anthropic we work as a single cohesive team on just a few large-scale research efforts. And we value impact — advancing our long-term goals of steerable, trustworthy AI — rather than work on smaller and more specific puzzles. We view AI research as an empirical science, which has as much in common with physics and biology as with traditional efforts in computer science. We''re an extremely collaborative group, and we host frequent research discussions to ensure that we are pursuing
    the highest-impact work at any given time. As such, we greatly value communication skills. The easiest way to understand our research directions is to read our recent research. This research continues many of the directions our team worked on prior to Anthropic, including: GPT-3, Circuit-Based Interpretability, Multimodal Neurons, Scaling Laws, AI &amp; Compute, Concrete Problems in AI Safety, and Learning from Human Preferences. Come work with us! Anthropic is a public benefit corporation headquartered in San Francisco. We offer competitive compensation and benefits, optional equity donation matching, generous vacation and parental leave, flexible working hours, and a lovely office space in which to collaborate with colleagues. Guidance on Candidates'' AI Usage: &nbsp;Learn about&nbsp; our policy for using AI in our application process.'
