  description_text: 'Every day, tens of millions of people come to Roblox to explore, create, play, learn, and connect with friends in 3D immersive digital experiences– all created by our global community of developers and creators.&nbsp; At Roblox, we’re building the tools and platform that empower our community to bring any experience that they can imagine to life. Our vision is to reimagine the way people come together, from anywhere in the world, and on any device. We’re on a mission to connect a billion people with optimism and civility, and looking for amazing talent to help us get there.&nbsp; A career at Roblox means you’ll be working to shape the future of human interaction, solving unique technical challenges at scale, and helping to create safer, more civil shared experiences for everyone. We are seeking a versatile marketing leader to manage our marketing engagement across Europe. As our first local marketing person in the region, you will design and execute a comprehensive GTM
    strategy that accounts for the diverse cultural, economic, and linguistic landscape of Europe. You will be responsible for identifying high-growth clusters, navigating complex regulatory environments, and building a unified brand voice that resonates across multiple borders. Your work will span social, influencers, partner, and event marketing. You will be the fulcrum of all the region''s outbound activity. Location: Netherlands (plus a few weeks at HQ for an extended orientation) You Will: Holistic Regional Strategy: Design a scalable marketing framework that can be adapted for Tier 1 European markets (high volume/established) and Tier 2/3 markets (high growth). Localized Content Ecosystem: Oversee the "transcreation" and localization of all marketing assets. While English is our core working language, you will ensure our brand voice translates with native-level nuance across key European regions, leveraging your German or French skills where applicable. Agile GTM Execution: Lead product
    launches across Europe, prioritizing markets based on data, barriers to entry, and localized product-market fit. Cross-Border Community &amp; Influencer Growth: Leverage regional social media and platform trends to build a loyal community through targeted influencer partnerships and localized channels (Instagram, TikTok, LinkedIn, etc.). Policy &amp; Comms Collaboration: Work closely with legal and policy teams to navigate the varied regulatory landscapes of Europe, ensuring absolute compliance with GDPR and local data privacy standards. Event &amp; Ecosystem Strategy: Develop locally relevant events and community initiatives across key priority European markets, while also participating in existing industry events that support relationship building, market understanding and ecosystem growth. Strategic Market Partnerships: Build and develop trusted partnerships with brands, NGOs, across key European markets to strengthen local credibility, relevance and long-term growth, while deepening
    engagement with creators, industry stakeholders and broader market ecosystems. You Have: 8+ years of marketing experience with a deep, pan-regional focus across Europe. Independent Drive: Proven ability to operate autonomously within a strategic framework, driving clear outcomes with minimal day-to-day oversight. Language Proficiency: Absolute professional fluency in English. The ability to understand, speak, or review content in German and/or French is a plus. Broad Market Knowledge: Experience managing marketing efforts in highly fragmented environments—from varying audience demographics and cultural perceptions to distinct European economic climates. 5+ years in Consumer Tech: Deep understanding of the European consumer journey, specifically privacy-first user behaviors, mobile trends, and local trust barriers. Strategic Influence: Proven ability to advocate effectively for regional European needs (budget, product localized features, compliance requirements) to a global/US-based HQ.
    Data-Driven test and learn mentality: Ability to drive growth and iterate quickly by being resourceful, analytical, and hands-on. &nbsp; Roles that are based in an office are onsite Tuesday, Wednesday, and Thursday, with optional presence on Monday and Friday (unless otherwise noted). Roblox provides equal employment opportunities to all employees and applicants for employment and prohibits discrimination and harassment of any type without regard to race, color, religion, age, sex, national origin, disability status, genetics, protected veteran status, sexual orientation, gender identity or expression, or any other characteristic protected by federal, state or local laws. Roblox also provides reasonable accommodations to candidates with qualifying disabilities or religious beliefs during the recruiting process. For US based roles only, please note the Company may not be able to employ candidates for this role who have United States work authorization related to certain U.S. visa categories,
    or support future H-1B sponsorship at this time.'
