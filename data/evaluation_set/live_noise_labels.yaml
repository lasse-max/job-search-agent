  description_text: 'Waymo is an autonomous driving technology company with the mission to be the world''s most trusted driver. Since its start as the Google Self-Driving Car Project in 2009, Waymo has focused on building the Waymo Driver—The World''s Most Experienced Driver™—to improve access to mobility while saving thousands of lives now lost to traffic crashes. The Waymo Driver powers Waymo’s fully autonomous ride-hail service and can also be applied to a range of vehicle platforms and product use cases. The Waymo Driver has provided over ten million rider-only trips, enabled by its experience autonomously driving over 100 million miles on public roads and tens of billions in simulation across 15+ U.S. states. Waymo Operations exists to deliver the Waymo Driver to the world. We are a global team building and scaling the world''s first and leading autonomous fleet and operations platform. From component sourcing to end customer management, we enable and create value for Waymo through
    scaled and orchestrated deployment of the Waymo Driver. At Waymo, we are dedicated to building a culture that promotes collaboration and celebration. We value our team members'' unique backgrounds, perspectives, and experiences and support and encourage all team members to share their ideas to help Waymo better serve the communities in which we operate. This role follows a hybrid work schedule and reports to the Head of Global Operations Planning. &nbsp; &nbsp; You will: Design Scalable Processes: Build and own the global framework for Global Operations Center capacity planning, acting as the primary program manager for resource scaling. Navigate Operational Ambiguity: Apply strong business judgment to ensure resource strategies accurately reflect commercial targets (cars, trips, revenue) and real-world operational constraints. Drive Vendor Accountability: Oversee execution across large, cross-organization vendor partnerships, prioritizing structural efficiency models and strict SLA
    compliance. Shape Executive Narratives: Provide critical input to decision-makers by translating complex capacity models into decisive narratives with clear P&amp;L implications. Mitigate Operational Risk: Identify risks and advocate for structural fixes and "principled spending" rather than relying on temporary resource additions. Validate Technical Models: Periodically perform technical deep-dives to ensure mathematical and capacity models remain transparent, verifiable, and free of "black box" assumptions. Architect Advanced Models: Partner with Product, Engineering, and Data Science to deploy models within centralized planning ecosystems (like Anaplan) to meet evolving requirements. You have: Educational Foundation: Bachelor''s degree in Business, Economics, Supply Chain, Operations Management, Finance, or equivalent practical experience. Planning Expertise: 5+ years of experience driving outcomes in capacity planning, commercial operations, S&amp;OP, or strategic program management.
    Cross-Organizational Leadership: Proven ability to drive collaborations with strategic partnership teams and proactively manage dependencies during high-growth phases. Mastery of Communication: Exemplary presentation skills with the confidence to establish the "source of truth" and influence senior decision-makers. Tooling Fluency: Direct expertise building and maintaining capacity models and roadmaps within scaled enterprise platforms like Anaplan. Technical Literacy: Proficiency with data querying (SQL) and foundational quantitative modeling to effectively guide technical partners and validate data. We prefer: Advanced Education: MBA or Master''s degree in Business Administration, Operations, or a related field. Economic Impact: Proven success managing P&amp;L impacts and unit economics within a high-growth environment. AV Industry Experience: Experience scaling "human-in-the-loop" oversight operations for autonomous vehicles while managing complex dependencies. Vendor Management:
    Exposure to BPO (Business Process Outsourcing) practices and aligning external execution with internal capacity plans. Resilience Planning: Experience modeling resource requirements for business continuity and large-scale disruption contingency planning. Platform Migration: Success in migrating complex legacy models out of standard spreadsheets and into integrated enterprise platforms. In accordance with Washington state law, we are highlighting our comprehensive benefits package, which is available to all eligible US based employees. Benefits for this role include: Health, dental, vision, life, disability insurance Retirement Benefits: 401(k) with company match Paid Time Off: 20 days of vacation per year, accruing at a rate of 6.15 hours per pay period for the first five years of employment Sick Time: 40 hours/year (statutory, where applicable); 5 days/event (discretionary) Maternity Leave (Short-Term Disability + Baby Bonding): 28-30 weeks Baby Bonding Leave: 18 weeks Holidays: 13
    paid days per year &nbsp; Please note that Waymo may not be able to employ remotely in all locations. Please speak with your recruiter about your preferred location for remote work when you begin the interview process.&nbsp; &nbsp; The expected base salary range for this full-time position across US locations is listed below. Actual starting pay will be based on job-related factors, including exact work location, experience, relevant training and education, and skill level. Your recruiter can share more about the specific salary range for the role location or, if the role can be performed remote, the specific salary range for your preferred location, during the hiring process.&nbsp; Waymo employees are also eligible to participate in Waymo’s discretionary annual bonus program, equity incentive plan, and generous Company benefits program, subject to eligibility requirements.&nbsp; Salary Range $159,000 &mdash; $196,000 USD'
