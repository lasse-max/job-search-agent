  description_text: 'Every day, tens of millions of people come to Roblox to explore, create, play, learn, and connect with friends in 3D immersive digital experiences– all created by our global community of developers and creators.&nbsp; At Roblox, we’re building the tools and platform that empower our community to bring any experience that they can imagine to life. Our vision is to reimagine the way people come together, from anywhere in the world, and on any device. We’re on a mission to connect a billion people with optimism and civility, and looking for amazing talent to help us get there.&nbsp; A career at Roblox means you’ll be working to shape the future of human interaction, solving unique technical challenges at scale, and helping to create safer, more civil shared experiences for everyone. Why Data Science &amp; Analytics? The Data Science &amp; Analytics organization’s mission is to increase our speed, frequency, and acumen of making decisions at scale by instilling a data-influenced
    approach to building products. We cover a wide area of the data spectrum including analytical data engineering, product analytics, experimentation, causal inference, statistical modeling, and machine learning. Aligned and partnering with product verticals, we use this extensive tool belt to discover new opportunities and unmet use cases, influence and shape the product roadmap and prioritization, build data products, and measure impact on our community of players and developers. Why Social at Roblox? Roblox is a highly social platform hosting billions of user connections, and we are actively building a diverse suite of social products to nurture engaging experiences. In this role, you will partner with our Social Connections team to identify opportunities for growing user connections, facilitating co-experiences, and enhancing social content discovery. You will leverage your technical expertise and analytical skills to design experiments, formulate product strategies, and conduct research
    to gain deeper insights into the Roblox social network, utilizing the latest AI capabilities. Additionally, you will contribute to communications, social sharing, and community features while collaborating with cross-functional verticals such as Discovery, Safety, and Creator. This role reports directly to Senior Data Science leadership and involves close collaboration with our Director of Product and Senior Engineering/Design leadership. You Will: Design, execute, and analyze A/B tests to measure the impact of new features and inform product decisions. Architect and build robust data pipelines to support analytics, reporting, and modeling needs. Conduct deep-dive analyses to understand user behavior, identify opportunities for growth, and solve ambiguous business problems. Contribute to the team''s science roadmap by identifying key areas for analysis and experimentation. You Have: Possess or pursuing a PhD or equivalent in Data Science, Biostatistics, Mathematics or a related field,
    OR a Master’s degree with 2+ years of experience Expertise in SQL and experience using scripting languages for data analysis (e.g., Python, R). Proficiency in developing data pipelines and working with big data technologies (e.g., Spark, Hive, Airflow). Strong experience in experimental design (A/B testing), casual inference and other statistical techniques. A proven track record of translating complex data into actionable insights and communicating them to stakeholders. Experience in working with LLM / Agentic flows is a plus. Apply now to be considered for anticipated positions. You may redact age, date of birth, and dates of attendance/graduation from your resume if you prefer. For roles that are based at our headquarters in San Mateo, CA: The starting base pay for this position is as shown below. The actual base pay is dependent upon a variety of job-related factors such as professional background, training, work experience, location, business needs and market demand. Therefore,
    in some circumstances, the actual salary could fall outside of this expected range. This pay range is subject to change and may be modified in the future. All full-time employees are also eligible for equity compensation and for benefits as described on this page . Annual Salary Range $185,860 &mdash; $221,380 USD Roles that are based in an office are onsite Tuesday, Wednesday, and Thursday, with optional presence on Monday and Friday (unless otherwise noted). Roblox provides equal employment opportunities to all employees and applicants for employment and prohibits discrimination and harassment of any type without regard to race, color, religion, age, sex, national origin, disability status, genetics, protected veteran status, sexual orientation, gender identity or expression, or any other characteristic protected by federal, state or local laws. Roblox also provides reasonable accommodations to candidates with qualifying disabilities or religious beliefs during the recruiting process.
    For US based roles only, please note the Company may not be able to employ candidates for this role who have United States work authorization related to certain U.S. visa categories, or support future H-1B sponsorship at this time.'
