  description_text: 'Company Description We’re http://checkout.comCheckout.com http://Checkout.com. You might not know our name, but companies like eBay, Spotify, Klarna, Uber, and Sony do, because we’re behind many of the digital experiences you use every day. We are where the world checks out, enabling over 10 billion transactions daily for more than one billion global shoppers. Whether you want to book a holiday, order food, renew a subscription, or check out online, there’s a good chance our tech powers the payments behind the scenes. Our platform helps the most ambitious businesses deliver effortless digital experiences, at scale. If you want to do career-defining work, you’ve come to the right place. We move fast, think globally, and believe great teams are built by hiring exceptional people with conviction, curiosity, and the desire to make an impact. With 20 offices across six continents and London as our HQ, we’re shaping the future of fintech – and we’re just getting started. MANAGER,
    IMPLEMENTATION ENGINEER - PROCESSOUT ProcessOut is a pioneer in the payment orchestration space. We are on a mission to help merchants build, scale and optimize their payment infrastructure. We work to bring simplicity, flexibility & performance to payments. Millions of transactions are routed via ProcessOut everyday for merchants all over the world. We are proud to partner with amazing merchants like Glovo, Bolt, Sainsbury’s, Dott, Rakuten and many more! We were acquired by Checkout.com http://Checkout.com in 2020 with the goal of growing our global reach. If you are looking to join a very fast-moving company with passionate, hard-working & fun teams, ProcessOut is for you! At ProcessOut, we are looking for people who are convinced they can play a central part in the Company''s success! We are looking for people who are passionate, who are looking to achieve their full potential & who will actively contribute to strengthen the links between our teams. We value people that fully own
    their work and are passionate about building the next generation of online payments with us. THE ROLE At ProcessOut, our Implementation Engineering Managers are the bridge between technical excellence and business success. We are looking for a strategic, technical leader to manage a Merchant Success Squad. In this role, you will lead a cross-functional team composed of an Implementation Engineer, Account Manager, and Technical Support specialist. You will be responsible for a dedicated portfolio of customers (online merchants), ensuring they integrate seamlessly and grow on our platform: by being deeply connected with their business ambition (understanding their product/business, internal KPIs and challenges). You will own the "Squad-level" objectives, balancing technical topics with revenue growth and portfolio health. What you will be doing - Team Leadership: Lead, mentor, and manage a squad with an Implementation Engineer, Account Manager, and Technical Support specialist. - Portfolio
    Management: Oversee a diverse portfolio of online merchants, ensuring revenue growth, customer value recognition, retention, successful product adoption. - Strategic Delivery: Accountable for delivering company objectives at the squad level, ensuring objectives are delivered on time and technical barriers to revenue are removed. - Operational Excellence: Refine the onboarding and support journey, creating scalable processes that reduce time to go live for complex merchant integrations. - Escalation & ownership: Act as the authority for your squad, stepping in to solve complex challenges or manage critical incidents with customers. - Feedback Loop: Collaborate with Product/Engineering to represent the "voice of the merchant," influencing the roadmap based on portfolio trends and friction points. What we’re looking for - Proven Leadership: Experience managing technical teams (Implementation, Support, or Solutions Engineering) in a fast-paced SaaS environment. - Personal expertise: Being
    eager and motivated to continuously develop a payment expertise - Commercial appetite: A strong understanding of how technical success translates into business value and revenue growth. - Deep Technical Expertise: Robust understanding of APIs, web/mobile applications, and IT infrastructure. You should be able to "talk shop" with developers and "talk business" with C-level stakeholders. - Multidisciplinary View: Ability to manage different functions (Support vs. Account Management) and align their varied KPIs toward a common goal. - Project management: Expert-level project management skills, particularly in complex B2B customer onboarding, involving tradeoffs. - Communication: Fluent level of French and English communication skills with the ability to have conversations with internal and external stakeholders. Bonus points for - Direct experience in the Online Payments industry (highly preferred). - Experience managing a team where technical and commercial roles coexist. - Data analytics
