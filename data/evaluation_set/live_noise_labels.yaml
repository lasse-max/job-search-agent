  description_text: 'A World-Changing Company Palantir builds the world’s leading software for data-driven decisions and operations. By bringing the right data to the people who need it, our platforms empower our partners to develop lifesaving drugs, forecast supply chain disruptions, locate missing children, and more. The Role Forward Deployed Software Engineers (FDSEs) work directly with customers to quickly understand their greatest problems and design and implement solutions to use data against them. Our customers rely on Palantir’s platforms for some of their most critical operations, and projects often start with an open ended question like "How do we evaluate wildfire risk and optimize a power grid as a result" or "How do we quickly assess our food supply chain and modify it to deliver life saving assistance on time?" As an FDSE, you’ll apply your problem solving ability, creativity, and technical skills to help organizations use their data to drive a real impact in the world. You’ll
    have the opportunity to gain rare insight into and contribute to some of the world’s most important industries and institutions. Core Responsibilities As an FDSE Intern, your responsibilities look similar to those at a small startup, with the resources, stability and mentorship of an established tech company: You’ll work in small teams with minimal supervision and own end-to-end execution of high stakes projects. Your day might span discussing architecture with fellow engineers, wrangling massive-scale data, coding a custom web app, speaking with customer executives, or establishing strategy for your team. FDSE Interns are treated just like full time engineers, with significant freedom and ownership over their work. Interns take responsibility for real world projects and outcomes that our customers rely on.'
