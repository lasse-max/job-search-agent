  description_text: 'WHY HARVEY At Harvey, we’re transforming how legal and professional services operate. By combining frontier agentic AI, an enterprise-grade platform, and deep domain expertise, we’re reshaping how critical knowledge work gets done for decades to come. This is a rare chance to help build a generational company at a true inflection point. With 1500+ customers in 60+ countries, strong product-market fit, and world-class investor support, we’re scaling fast and defining a new category in real time. The work is ambitious, the bar is high, and the opportunity for growth — personal, professional, and financial — is unmatched. Our team moves fast, takes ownership, and is deeply committed to the mission — operating with intensity, staying close to our customers, and pushing each other for excellence. We live by three values: Decisiveness, Simplicity, and Job''s Not Finished. We act quickly on clear judgment over perfect information, we believe simplicity is what scales, and we''re
    never satisfied with where we are. If you want to do the best work of your career alongside people who share that drive, we''d love to build with you. At Harvey, the future of professional services is being written today — and we’re just getting started. ROLE OVERVIEW As an Enterprise Account Executive at Harvey, you will drive the growth and success of our AI solutions within the legal and professional services markets. You will be responsible for establishing and growing relationships with law firms and other large enterprise clients, understanding their unique challenges, and presenting AI solutions that streamline their processes and boost productivity. Your ability to articulate the value of Harvey''s products, coupled with your passion for groundbreaking AI technologies, will help us shape the future of knowledge work. WHAT YOU''LL DO - Develop and manage a named account list and be responsible for the full sales cycle from prospecting to contracting to onboarding, launching, and
    growing new users. - Achieve and exceed revenue targets and other key sales metrics. - Effectively work cross-functionally across the organization to shape Harvey’s solutions to meet customer needs. Collaborate closely with the engineering and product teams to stay updated on the latest AI advancements and tailor solutions to meet client goals. - Build strong, long-term relationships with key decision-makers and stakeholders, understanding their pain points and aligning Harvey''s solutions with their needs. - Conduct product demonstrations and presentations, showcasing the power of Harvey''s AI systems to prospects and clients. - Develop our sales playbook to enable scaling, documenting learnings that can be applied across accounts. WHAT YOU HAVE - Proven track record of selling complex software solutions to enterprise clients, with the ability to successfully execute on a consultative, solutions-oriented, value-based selling methodology. - Ability to lead a complex, multi-threaded sale
    with stakeholders ranging from executives across various functions to day-to-day product users – especially the ability to convey technical concepts to non-technical audiences. - Demonstrated passion for Harvey’s mission and strong understanding of AI and its potential applications in knowledge work and interest in the legal profession and helping lawyers do their jobs better and more efficiently. - Excited about prospecting, and capable of independently leading a sales cycle from start to finish. - Team player who can collaborate effectively across internal functions (product, legal, etc.) to achieve common goals. - Energized by contributing to the development of our sales processes and team-driven sales culture, refining the value proposition of our solutions and creating sales resources to drive our success. DEPENDING ON YOUR LOCATION, AN APPLICANT PRIVACY NOTICE MAY APPLY TO YOU. YOU CAN FIND ALL OF OUR APPLICANT PRIVACY NOTICES [HERE https://www.notion.so/harveyai/Harvey-Candidate-Privacy-Policies-319ac3fcdd7a803bb807d5094f249922].
    #LI-JM1 Harvey is an equal opportunity employer and does not discriminate on the basis of race, gender, sexual orientation, gender identity/expression, national origin, disability, age, genetic information, veteran status, marital status, pregnancy or related condition, or any other basis protected by law. We are committed to providing reasonable accommodations to applicants with disabilities, and requests can be made by emailing accommodations@harvey.ai'
