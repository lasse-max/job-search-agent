  description_text: 'Block is one company built from many blocks, all united by the same purpose of economic empowerment. The blocks that form our foundational teams — People, Finance, Counsel, Hardware, Information Security, Platform Infrastructure Engineering, and more — provide support and guidance at the corporate level. They work across business groups and around the globe, spanning time zones and disciplines to develop inclusive People policies, forecast finances, give legal counsel, safeguard systems, nurture new initiatives, and more. Every challenge creates possibilities, and we need different perspectives to see them all. Bring yours to Block. The Role The Staff Data Analyst will join the Block Compliance Analytics team chartered to put data at the center of the Compliance organization. You have a proven track record in the Financial Crimes and AML space, and in this role you will develop strategies and lead key workstreams to deliver actionable analytics to leaders throughout
    the Block business and tell the story of our Compliance program to regulators and external parties. Focused on quantifying compliance risks and driving effectiveness, you will enable Block to redefine the world''s relationship with money. You Will Lead data strategy for our regulatory engagements - from ETL development to source data validation to analysis Connect the dots between regulatory expectations, commitments, and the Compliance and Product roadmaps in order to influence strategy Harness raw data to educate internal and external partners on the impact of new regulation, policies, or environmental changes to our compliance program and the Block platforms. Collaborate with partners from legal to engineering to inform strategic builds of essential compliance program elements Establish yourself as a leader in the organization, by connecting insights to action through expert communication and cross-functional alignment Leverage your subject matter expertise to educate, coach and influence
    in and out of the organization with a focus on contributing to the overall, long-term success of Block Lead multiple high-impact workstreams, through ability to seamlessly navigate levels of abstraction in written and verbal communications. You Have 8+ years of related experience with a Bachelor’s degree; or 6+ years and a Master’s degree; or equivalent work experience. 5+ years of Compliance/AML experience Expert level abilities in SQL and data analysis/visualization tools (i.e. Tableau, Looker) Expert in ETL development Proven track record solving large and complex problems without clear answers, using deep and broad technical expertise Vision to define problems and manage projects in a fast-paced, evolving organization Experience bringing data to life for any audience through written and verbal communication and data visualization. Impeccable attention to detail and polish Even Better (but not required): CAMS or other AML certification Experience in the FinTech or consulting industry
    or with financial crimes compliance systems, technologies and processes. Experience with automation using Python, R or Prefect &nbsp; Block takes a market-based approach to pay, and pay may vary depending on your location. U.S. locations are categorized into one of four zones based on a cost of labor index for that geographic area. The successful candidate’s starting pay will be determined based on job-related skills, experience, qualifications, work location, and market conditions. These ranges may be modified in the future. To find a location’s zone designation, please refer to this&nbsp; resource . If a location of interest is not listed, please speak with a recruiter for additional information.&nbsp; &nbsp; Zone A: $171,800 &mdash; $257,600 USD Zone B: $159,800 &mdash; $239,600 USD Zone C: $151,200 &mdash; $226,800 USD Zone D: $142,600 &mdash; $213,800 USD Application Guidelines Candidates may submit up to 9 active applications within a 60-day period. Reapplications to the same role
    are accepted 90 days after a previous application has been reviewed. Use of AI in Our Hiring Process We may use automated AI tools to evaluate job applications for efficiency and consistency. These tools comply with local regulations, including bias audits, and we handle all personal data in accordance with state and local privacy laws.&nbsp; Contact us here &nbsp;with hiring practice or data usage questions. Every benefit we offer is designed with one goal: empowering you to do the best work of your career while building the life you want. Remote work, medical insurance, flexible time off, retirement savings plans, and modern family planning are just some of our offering.&nbsp; Check out our other benefits at Block. Block, Inc. (NYSE: XYZ) builds technology to increase access to the global economy. Each of our brands unlocks different aspects of the economy for more people.&nbsp; Square &nbsp;makes commerce and financial services accessible to sellers.&nbsp; Cash App &nbsp;is the easy
    way to spend, send, and store money.&nbsp; Afterpay &nbsp;is transforming the way customers manage their spending over time.&nbsp; TIDAL &nbsp;is a music platform that empowers artists to thrive as entrepreneurs.&nbsp; Bitkey &nbsp;is a simple self-custody wallet built for bitcoin.&nbsp; Proto &nbsp;is a suite of bitcoin mining products and services. Together, we’re helping build a financial system that is open to everyone. Privacy Policy'
