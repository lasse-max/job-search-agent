  description_text: 'About Mistral At Mistral AI, we believe in the power of AI to simplify tasks, save time, and enhance learning and creativity. Our technology is designed to integrate seamlessly into daily working life. We democratize AI through high-performance, optimized, open-source and cutting-edge models, products and solutions. Our comprehensive AI platform is designed to meet enterprise needs, whether on-premises or in cloud environments. Our offerings include le Chat, the AI assistant for life and work. We are a dynamic, collaborative team passionate about AI and its potential to transform society. Our diverse workforce thrives in competitive environments and is committed to driving innovation. Our teams are distributed between France, USA, UK, Germany and Singapore. We are creative, low-ego and team-spirited. Join us to be part of a pioneering company shaping the future of AI. Together, we can make a meaningful impact. See more about our culture on https://mistral.ai/careers.
    Role Summary As an early member of our Partner Team, you will work closely with our Partner and GTM teams to drive the adoption of our state-of-the-art enterprise AI platform and models. What you will do Your scope will be as follows: Pre-Sale & Sales Activities: • Execute on effective technical discovery with partners to understand potential clients'' needs, challenges, and desired outcomes in collaboration with Account Executives • Help onboard AI Platform and model updates to strategic partner platforms • Drive enablement at scale across strategic partner technical and sales teams • Create and update assets for partner enablement portal: technical decks and docs, enablement videos, reference architectures, etc. • Support partners in identifying, qualifying, and disqualifying opportunities where Mistral solutions can unlock the most value for the customer. • Collaborate with the partner and Mistral sales teams to progress deals and penetrate accounts, providing technical expertise
    and insights where necessary. • Create a strategic vision for the customer based on a deep understanding of their strategy, desired positive business outcomes, and required capabilities. Product Implementation & Integration: • Be the “user zero” to crash-test and experiment on newly-deployed models, features and tools in order to proactively document them, suggest fixes and improvements and escalate more in-depth feedback to the engineering teams. • Help build relevant tooling for quality control of our model deployments on each ☁️ (SDK, availability, scalability) • Guide and support partners and customers in deploying our text completion API into their infrastructure. • Work closely with customers and partners to fine-tune models according to their specific requirements. • Regularly liaise with the product and technical teams to relay feedback and suggest improvements. Customer & Partner Success & Support: • Collaborate with Account Executives to ensure that the customer is maximizing
    the product''s potential. • Provide post-deployment support, addressing any issues or challenges that arise promptly. • Offer recommendations for product optimizations or new features based on customer feedback. • Develop custom features for customers as needed. About you • Previous experience in a technical partner pre-sales or consulting role with a heavy emphasis on partner and customer-facing interactions (i.e. Implementation Consultant, Solutions Architect, Sales Engineer). • Experience partnering with large technology cloud or platform providers, sales and technical teams driving technical account strategy, proof-of-concept scoping, and execution. • Hands-on experience in deployment AI solutions and leveraging technical skills throughout implementations • Ability to successfully drive complex interactions with tech teams and to connect with technical stakeholders • Strong Python development skills with proven ability to integrate data from multiple sources. Working knowledge of
    cloud architecture and deployment patterns for AI/ML solutions • Experience building enablement assets and driving enablement or evangelism at scale • Track record of managing complex implementation projects from discovery to delivery • Experience running solution design workshops and translating business requirements into technical specifications • Strong stakeholder management skills, including experience working with C-level executives • Outstanding presentation and communication skills, with ability to adapt messaging for technical and business audiences • Bachelor''s or Master''s in computer science, engineering, mathematics, or related fields (or equivalent experience) • Nice to have: track record in managing partnerships and customer-facing interactions, creating strong relationships that align with business objectives and bring customer satisfaction • Nice to have: Familiarity with deal qualification using MEDDPICC and/or value-based sales methodologies like Command of the Message.
    • Experience working in a constantly changing environment with multiple internal stakeholders • Demonstrated ability to collaborate with cross-functional teams • Strong written and verbal communication skills in English (fluent) and, ideally, other European languages Benefits FRANCE VERSION 🇫🇷 💰 Competitive cash salary and equity 🥕 Daily lunch vouchers : Swile meal vouchers with 10,83€ per worked day, incl 60% offered by company 🥎 Sport : Enjoy discounted access to gyms and fitness studios through our Wellpass partnership 🚴 Transportation : Monthly contribution to a mobility pass via Betterway 🧑‍⚕️ Health : Full health insurance for you and your family 🍼 Parental : Generous parental leave policy 🌎 Visa sponsorship 🤝 Coaching: we offer BetterUp coaching on a voluntary basis UK VERSION 🇬🇧 💰 Competitive cash salary and equity 🚑 Health Insurance 🚴 Transportation: Reimburse office parking charges, or 90GBP/month for public transport 🥎 Sport: 90GBP/month allowance for gym membership 🥕 Food
    : £200 monthly allowance (solution might evolve as we grow bigger) 👴🏻 Pension plan: SmartPension (percentages are 5% Employee & 3% Employer) 🍼 Parental : Generous parental leave policy 🌎 Visa sponsorship By applying, you agree to our Applicant Privacy Policy.'
