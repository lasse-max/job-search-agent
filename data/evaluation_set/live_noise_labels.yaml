  description_text: 'Airbnb was born in 2007 when two hosts welcomed three guests to their San Francisco home, and has since grown to over 5 million hosts who have welcomed over 2 billion guest arrivals in almost every country across the globe. Every day, hosts offer unique stays and experiences that make it possible for guests to connect with communities in a more authentic way. The Community You Will Join: The Supply team is a unique, multidisciplinary team responsible for partnering with our Hosts to conceptualise and develop high-quality, repeatable and commercially viable experiences that are in alignment with our brand values. In partnership with our cross-company peers, we invent novel ways to foster human connection and belonging in our shared physical world. The Difference You Will Make: As a Market Lead, you will be responsible for the supply health, quality and growth of your book of business by managing professional host accounts. Focusing on these responsibilities, you will
    build Airbnb’s strong market presence in your assigned region by collaborating with other teams as the local in-market expert. As someone who knows the Airbnb mission and values inside out, you will drive all phases of market success, including maintaining the experience quality, and nurturing strategic relationships with hosts. A Typical Day: Account Management Build and manage partner relationships within assigned territory consisting of several hundred Professional Host accounts Directly manage top-tier accounts to meet and exceed quarterly/annual sales goals Create and deploy scaled strategies to effectively manage &amp; optimize the long tail of thousands of Professional Hosts in your region Maintain a baseline understanding of the technical integration of various software partners to provide the appropriate support to your accounts Educate clients on all significant product changes and cascade feedback on product and policy to the relevant internal stakeholders Hold regular optimization
    calls and business reviews with your partners Develop strong and long-lasting partnerships Respond to and deliver exceptional service to your accounts in a timely and efficient manner, occasionally traveling to your market to provide in-person support and guidance Partner cross functionally to address optimization bottlenecks Leverage AI extensively to achieve maximum speed and high quality in delivery Quality Proven ability to handle operational complexity and ability to maximize the impact of resources Support host community programs in your region Analyze data and utilize data-driven recommendations to identify and action on strategic opportunities in your region to increase sales Audit supply quality in the field, addressing areas for improvement. Develop deep knowledge of your assigned geographic markets and become the go-to source for all information relating to local trends and market dynamics for internal and external partners&nbsp; Work cross-functionally with product, communications,
    public policy, and customer support teams to ensure our long-term market success Collaborate with local office to advocate for Experiences&nbsp; Demand Represent Airbnb in external meetings with Professional Hosts and at industry conferences in your market&nbsp; Your Expertise: 8+ years of experience in new sales, account management, and partner support 2+ years of hospitality/travel industry experience is a plus Strong time management and prioritization skills Proven track record of being able to effectively work a leads pipeline or book of business Proven skillsets at delivering sales growth. Excellent communication and presentation skills and ability to communicate effectively with clients via phone, email, and in-person Proficient quantitative skills and proven ability to interpret and apply data throughout your day-to-day work Highly proficient in using CRM software, specifically in working with leads, opportunities, and other core objects - Salesforce experience is a plus The ability
    to get things done with constantly changing priorities, projects, and deadlines Able to travel to assigned markets (when business travel resumes) Passion for Airbnb, travel, and the sharing economy - being an Airbnb host is a plus Proven experience working cross-functionally Ability to work at both strategic and tactical levels, with a proven track record to execute in ambiguous environments; Well developed priorities and time management skills. Ability to work within tight deadlines, adjust to changes in priorities, and balance short-term needs with long-term strategic initiatives; Charismatic self-starter who is resourceful and self-sufficient Fluency in English plus a second European language preferred Our Commitment To Inclusion &amp; Belonging: Airbnb is committed to working with the broadest talent pool possible. We believe diverse ideas foster innovation and engagement, and allow us to attract creatively-led people, and to develop the best products, services and solutions. All
    qualified individuals are encouraged to apply. How We''ll Take Care of You: The actual base pay is dependent upon many factors, such as: training, transferable skills, work experience, business needs and market demands. The base pay range shown below is annualized, is subject to change and may be modified in the future. This role may also be eligible for bonus, benefits, and Employee Travel Credits. United Kingdom Annual Pay Range £94,000 &mdash; £118,000 GBP'
