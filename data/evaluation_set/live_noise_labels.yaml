  description_text: 'About the opportunity We are seeking an ESG Analyst to join our Sustainability Finance team. Our team sits at the intersection of finance, technology, and compliance. We translate complex data into investor-ready insights, navigate a rapidly shifting European regulatory landscape, and partner across the business to embed sustainability into N26’s core processes. We value analytical precision, strategic thinking, and proactive collaboration, empowering you to own critical data streams from day one. This is an excellent opportunity for an ambitious professional to take their career in sustainable finance to the next level. You will play a pivotal role in scaling our ESG strategy, directly contributing to our annual sustainability reports and high-profile investor communications.&nbsp; As a core member of the team, you will take ownership of our ESG data collection, while gaining deep, practical exposure to critical frameworks like CSRD, the EU Taxonomy, and SFDR. In this
    role, you will: Own ESG data collection, validation, and benchmarking across all key metrics (environmental footprint, social KPIs, governance indicators) Prepare ESG disclosures and investor communications, including sections of the annual and sustainability reports Monitor evolving regulatory requirements (CSRD, EU Taxonomy, SFDR) and assess their implications for N26 Support the development of ESG frameworks, methodologies, and internal policies in collaboration with Legal, Compliance, and Finance Track industry trends and peer benchmarking to inform N26’s ESG positioning and target-setting Contribute to investor relations materials where ESG content is required (earnings calls, investor decks, roadshow prep) Partner with internal teams (FP&amp;A, Accounting, Product) to embed ESG thinking into business processes What you need to be successful: Background University degree in Finance, Sustainability, Environmental Science, Economics, or a related field 1-2 years of experience in ESG
    analysis, sustainable finance, or a closely related field (e.g. investment banking, transaction advisory, or consulting with ESG exposure). Experience in fintech, banking, or a regulated financial services environment would be considered a plus Exposure to ESG reporting frameworks: GRI, TCFD, SASB, and EU regulatory requirements (CSRD, EU Taxonomy) Exposure to carbon accounting or climate risk frameworks would be considered a plus Skills Strong analytical skills - comfortable working with large datasets and building clear, well-structured models in Excel or Google Sheets Fluent in English and German (written and spoken) Excellent written communication: able to draft investor-quality documents with clarity and precision Familiarity with ESG rating methodologies (MSCI, Sustainalytics, ISS) would be considered a plus CFA ESG Certificate or equivalent qualification would be considered a plus What’s in it for you: Accelerate your career growth by joining one of Europe’s most talked about
