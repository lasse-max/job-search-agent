# ============================================================================
# Labelled Evaluation Set — Automated Job Search System
# Owner: Owner  ·  Generated 23 June 2026
# Drop into: data/evaluation_set/
# ----------------------------------------------------------------------------
# Purpose: ground-truth benchmark for the role evaluator (PRD §5, §10.1).
# Each entry is the OWNER'S judgment of how the system SHOULD classify the role.
#
# How the harness should use this:
#   1. Fetch the real job description from `jd_source` (URL) or paste it.
#   2. Run the evaluator to produce role_fit_score / feasibility /
#      strategic_priority / recommendation (PRD §5.6).
#   3. Compare the model output to `expected_*` and `label` here.
#   4. Score: Apply/Consider recall, digest precision, blocker accuracy,
#      fit-band agreement. Weight false positives heavily for urgent alerts.
#
# IMPORTANT distinctions baked into the labels:
#   - `label` = the owner's strategic judgment about whether to surface/pursue
#     the role. It is NOT the real-world outcome.
#   - `actual_outcome` = what actually happened (separate field). A role can be
#     a correct "apply_now" even though it was later rejected (e.g. Google APAC).
#   - Warm path can lift a STRETCH role to apply_now (e.g. Databricks).
#   - A strong role can still be `blocked` purely on visa (e.g. Disney).
#   - A clean-fit, visa-OK role can still be `skip` on brand/trajectory
#     (e.g. AutoScout24) — this is the hardest case to calibrate.
#
# Label categories: clean_apply | consider | stretch_fds | reach |
#   cs_deprioritize | below_level | visa_blocked | technical_blocker |
#   brand_deprioritize
# ============================================================================

