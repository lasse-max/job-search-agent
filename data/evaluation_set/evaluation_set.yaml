# ============================================================================
# Calibration notes for the harness (PRD §10.1):
#   - Apply/Consider recall target >= 95% on EV-01..EV-15.
#   - Blocker detection must catch EV-27..EV-31 (visa + clearance + technical).
#   - The model must NOT mark EV-32 (AutoScout) as apply_now despite high fit +
#     free visa — company_priority/brand is the deciding signal.
#   - The model must distinguish same-company function (EV-22 Harvey CS = skip
#     vs Harvey Partner Ops = consider) — function over title.
#   - warm_path must lift EV-16 (Databricks) to apply_now and soften EV-29.
#   - Review and edit these labels yourself before trusting the benchmark;
#     they encode the owner's judgment and should be owner-confirmed.
# ============================================================================
