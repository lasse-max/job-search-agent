  description_text: "ABOUT AIRWALLEX Airwallex is the only unified payments and financial\
    \ platform for global businesses. Powered by our unique combination of proprietary\
    \ infrastructure and software, we empower over 200,000 businesses worldwide \u2013\
    \ including Brex, Rippling, Navan, Qantas, SHEIN and many more \u2013 with fully\
    \ integrated solutions to manage everything from business accounts, payments,\
    \ spend management and treasury, to embedded finance at a global scale. Proudly\
    \ founded in Melbourne, we have a team of over 2,200 of the brightest and most\
    \ innovative people in tech across 26 offices around the globe. Valued at US$8\
    \ billion and backed by world-leading investors including T. Rowe Price, Visa,\
    \ Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and\
    \ Lone Pine Capital, Airwallex is leading the charge in building the global payments\
    \ and financial platform of the future. If you\u2019re ready to do the most ambitious\
    \ work of your career, join us. ATTRIBUTES WE VALUE We hire successful builders\
    \ with founder-like energy who want real impact, accelerated learning, and true\
    \ ownership. You bring strong role-related expertise and sharp thinking, and you\u2019\
    re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles.\
    \ You move fast with good judgment, dig deep with curiosity, and make decisions\
    \ from first principles, balancing speed and rigor. You're humble and collaborative;\
    \ turn zero\u2011to\u2011one ideas into real products, and you \u201Cget stuff\
    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. ABOUT THE TEAM The\
    \ Product team at Airwallex is a group of passionate builders and problem-solvers\
    \ who are obsessed with crafting customer-centric solutions that empower businesses\
    \ to operate anywhere, anytime. We combine technical expertise with a deep understanding\
    \ of our customers' needs to design and build unified, intuitive, and scalable\
    \ products. As a team, we thrive in a collaborative and fast-paced environment,\
    \ constantly iterating and pushing boundaries to deliver exceptional product experiences.\
    \ WHAT YOU\u2019LL DO This strategic leadership role gives you full ownership\
    \ of Airwallex\u2019s financial markets and financial platform product strategy\
    \ and roadmap. The Financial Markets team owns our FX platform, Liquidity Platform\
    \ and Stablecoin platform. The Financial Platform team owns our ledger, wallet\
    \ experience, reporting and reconciliation. As Product Director, you\u2019ll collaborate\
    \ deeply with financial partnerships, engineering, commercial, and operations\
    \ teams to solve complex challenges and support ongoing product innovation. You\u2019\
    ll manage and mentor a high-performing team of Product Managers, act as the subject\
    \ matter expert for money movement and FX within Airwallex, and champion fast\
    \ iteration on product launches and feature enhancements. This role can be based\
    \ in SF, Singapore, Melbourne or Sydney RESPONSIBILITIES - Define and own Airwallex\u2019\
    s financial market\u2019s product strategy, solution design, roadmap, and delivery\
    \ plans. - Lead, mentor and develop a team of high performing product managers.\
    \ - Partner closely with engineering and design teams to build high\u2011quality,\
    \ scalable features and user experiences across web and mobile, driving clarity\
    \ on requirements, trade\u2011offs and timelines. - Collaborate closely with commercial,\
    \ marketing, legal and finance teams to navigate regulatory and operational complexity\
    \ while delivering simple, easy\u2011to\u2011use products for our clients. Deeply\
    \ understand user needs, target markets, and the competitive landscape; leverage\
    \ customer and partner feedback to inform strategy and prioritization. - Manage\
    \ difficult tradeoffs between long-term product vision and near-term growth, adapting\
    \ quickly within a highly data-driven, fast-paced environment. - Lead the extension\
    \ of financial markets into new verticals and use cases, validating opportunities\
    \ and taking new propositions from concept to launch. - Monitor product performance,\
    \ drive continuous operational improvement, and remain ahead of industry trends\
    \ in finance, payments, and technology. WHO YOU ARE - 8 + years of overall professional\
    \ experience within Product Management, Engineering or a related technical field\
    \ - Bachelor's degree or higher in a related field - A understanding of e-trading,\
    \ efx, trading technology - Excellent communication skills with the ability to\
    \ convey product strategy to both technical and non-technical audiences - Close\
    \ attention to detail, ability to structure complex problems and inform decisions\
    \ with data and first-principle insights - Drive, grit, and persistence to take\
    \ ownership and move ideas to reality in short periods of time - Ability to thrive\
    \ in cross-cultural and cross-functional teams - Experience considering both user\
    \ requirements and commercial strategy in order to drive meaningful product growth\
    \ APPLICANT SAFETY POLICY: FRAUD AND THIRD-PARTY RECRUITERS To protect you from\
    \ recruitment scams, please be aware that Airwallex will not ask for bank details,\
    \ sensitive ID numbers (i.e. passport), or any form of payment during the application\
    \ or interview process. All official communication will come from an @airwallex.com\
    \ http://airwallex.com email address. Please apply only through careers.airwallex.com\
    \ http://careers.airwallex.com or our official LinkedIn page. Airwallex does not\
    \ accept unsolicited resumes from search firms/recruiters. Airwallex will not\
    \ pay any fees to search firms/recruiters if a candidate is submitted by a search\
    \ firm/recruiter unless an agreement has been entered into with respect to specific\
    \ open position(s). Search firms/recruiters submitting resumes to Airwallex on\
    \ an unsolicited basis shall be deemed to accept this condition, regardless of\
    \ any other provision to the contrary. EQUAL OPPORTUNITY Airwallex is proud to\
    \ be an equal opportunity employer. We value diversity and anyone seeking employment\
    \ at Airwallex is considered based on merit, qualifications, competence and talent.\
    \ We don\u2019t regard color, religion, race, national origin, sexual orientation,\
    \ ancestry, citizenship, sex, marital or family status, disability, gender, or\
    \ any other legally protected status when making our hiring decisions. If you\
    \ have a disability or special need that requires accommodation, please let us\
    \ know."
