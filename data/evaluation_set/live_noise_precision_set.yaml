  description_text: "OUR PURPOSE Scheduling isn\u2019t simply filling shifts. It\u2019\
    s finding the sweet spot that enables businesses to grow and team members to enjoy\
    \ the perfect work/life balance. At Planday from Xero, we aim to use Agentic AI\
    \ to build a future where managers seamlessly can free up invaluable time for\
    \ their business and teams. We\u2019re not just building software; we\u2019re\
    \ on a mission to make shift work more human, to change work/life balance from\
    \ a luxury to a reality for all shift workers. We\u2019re using advanced technology\
    \ to help humans reach their full potential. At work and in life. Founded in 2004,\
    \ Planday is headquartered in Copenhagen, Denmark and helps create perfect schedules\
    \ for hundreds of thousands of users across the world. Planday was acquired by\
    \ Xero in 2021. HOW YOU'LL MAKE AN IMPACT As a CX Billing Specialist you will\
    \ be responsible for ensuring accurate and timely billing, handling customer inquiries\
    \ related to billing, and providing exceptional customer service. You'll play\
    \ a central role in maintaining billing continuity and operational integrity across\
    \ the Planday platform - acting as a trusted point of contact for both customers\
    \ and internal teams. The ideal candidate has strong analytical skills, excellent\
    \ written communication, and a passion for delivering a high-quality customer\
    \ experience. You'll bring a meticulous eye for detail and the confidence to work\
    \ across multiple systems to get things right. Core responsibilities: - Ensuring\
    \ Planday's subscription services are invoiced and collected in a timely manner\
    \ - Ensuring all billing transactions are recorded correctly and comply with company\
    \ policies - Reviewing and verifying billing data for accuracy, completeness,\
