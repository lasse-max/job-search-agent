  source_url: http://block.xyz/careers/jobs/5038746008?gh_jid=5038746008
  description_text: "Join a movement in which everyone can win. We started a movement\
    \ in which everyone can win \u2013 shoppers, retailers, society and every person\
    \ on our team. To play fair, trust people and reward them for doing the right\
    \ thing. We see and feel the impact of our work as more and more people gain financial\
    \ freedom and retailers grow across the globe. Founded in 2014, in Sydney, Australia,\
    \ Afterpay has over 11 million active customers globally and more than 64,000\
    \ of the world's best retailers around the world including Anthropologie, Revolve,\
    \ DSW, GOAT, Finish Line, Levi's, Mac Cosmetics, Ray-Ban and many others. Afterpay\
    \ is on a mission to power an economy in which everyone wins. Afterpay is completely\
    \ free for customers who pay on time \u2013 helping people spend responsibly without\
    \ incurring interest, fees or extended debt. Afterpay empowers customers to access\
    \ the things they want and need, while still allowing them to maintain financial\
    \ wellness and control, by splitting payments in four, for both online and in-store\
    \ purchases. Afterpay is deeply committed to delivering positive outcomes for\
    \ customers. We are focused on supporting our community of shoppers. We trust\
    \ in the next generation and share a vision of a more accessible and sustainable\
    \ world in which people are rewarded for doing the right thing. The Role Block\
    \ is building the next generation of commerce experiences for merchants and PSPs\
    \ through Afterpay. As part of Block's Solutions Engineering team, you will be\
    \ a senior technical leader driving complex partner and merchant integrations.\
    \ You'll work directly with Sales, Partnerships, and Product teams to deeply understand\
    \ customer needs, showcase our APIs and services, and solve challenging technical\
    \ problems that accelerate adoption. We are looking for an engineer with sales\
    \ acumen, a thoughtful product intuition and an entrepreneurial spirit. This is\
    \ a senior individual contributor role - ideal for someone who thrives at the\
    \ intersection of technology and commerce, has hands-on software engineering experience,and\
    \ can represent Afterpay's technical vision to global enterprise merchants and\
    \ partners while influencing product direction internally. You Will Partner with\
    \ Sales, Relationship Management, Partnerships to support developers integrating\
    \ with our platform Design and deliver technical solutions, including building\
    \ proof-of-concepts, custom reports, sample integrations, and troubleshooting\
    \ complex issues. Act as a trusted technical advisor - translating business requirements\
    \ into scalable integration approaches and advocating for best practices. Collaborate\
    \ closely with product and engineering teams to surface customer feedback and\
    \ influence the roadmap. Create and deliver compelling demos, presentations, and\
    \ technical deep dives for both executive and engineering stakeholders. Communicate\
    \ product features, updates, and technical guidance clearly across internal teams\
    \ and external customers. You Have 8+ years of experience in technical customer-facing\
    \ roles (partner engineering, solutions architecture, sales engineering), working\
    \ with enterprise merchants or global partners. Deep hands-on technical expertise\
    \ \u2013 comfortable building with APIs, debugging integrations, and guiding developers\
    \ through complex implementations. Prior professional experience with full-stack\
    \ development and proficiency in at least one programming language, with the ability\
    \ to rapidly learn new tools and technologies. Strong communication skills, with\
    \ the ability to bridge technical and non-technical audiences and influence senior\
    \ stakeholders. Proven success leading technical projects or initiatives end-to-end\
    \ in globally distributed, multicultural teams. A strong understanding of payments,\
    \ fintech, or commerce platforms. Experience presenting to technical and executive\
    \ audiences in both structured and impromptu settings. A willingness to travel\
    \ for onsite client meetings (10-20%) Additional languages (ie Mandarin) is a\
    \ plus &nbsp; We're working to build a more inclusive economy where our customers\
    \ have equal access to opportunity, and we strive to live by these same values\
    \ in building our workplace. Block is a proud equal opportunity employer. We work\
    \ hard to evaluate all employees and job applicants consistently, without regard\
    \ to identity or other legally protected class. We believe in being fair, and\
    \ are committed to an inclusive interview experience, including providing reasonable\
