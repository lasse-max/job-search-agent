  description_text: "Waymo is an autonomous driving technology company with the mission\
    \ to be the world's most trusted driver. Since its start as the Google Self-Driving\
    \ Car Project in 2009, Waymo has focused on building the Waymo Driver\u2014The\
    \ World's Most Experienced Driver\u2122\u2014to improve access to mobility while\
    \ saving thousands of lives now lost to traffic crashes. The Waymo Driver powers\
    \ Waymo\u2019s fully autonomous ride-hail service and can also be applied to a\
    \ range of vehicle platforms and product use cases. The Waymo Driver has provided\
    \ over ten million rider-only trips, enabled by its experience autonomously driving\
    \ over 100 million miles on public roads and tens of billions in simulation across\
    \ 15+ U.S. states. The Simulation ML Infrastructure team builds scalable AI/ML\
    \ infrastructure to accelerate the Simulator team in sustainably innovating and\
    \ building state of the art simulations of realistic environments for the testing\
    \ and training of the Waymo Driver. To increase the fidelity and steerability\
    \ of the simulations, we employ large foundation models trained on massive datasets\
    \ to model the real world, including but not limited to, realistic agents (vehicles,\
    \ pedestrians, cyclists, motorcyclists etc.), roads, traffic control systems,\
    \ and weather etc. We seek an experienced Senior Machine Learning Infrastructure\
    \ Engineer to lead the development of advanced AI/ML infrastructure for multi-billion\
    \ parameter foundation models in ML accelerator-friendly simulations. Your expertise\
    \ in massive model scaling, ML accelerators, and distributed training will be\
    \ required for designing and scaling our systems. This role reports to an Engineering\
    \ Manager. You will: Be part of a world-class, high-performing research engineering\
    \ team to advance the state of the art of ultra realistic multi-agent simulations\
    \ using foundation models. Collaborate closely with the core Google DeepMind and\
    \ Waymo Realism Modeling teams in London, and Waymo Oxford to use the large models\
    \ to improve sim realism. Provide deep technical leadership on large-scale ML\
    \ model architectures, especially for autonomous vehicle models. Work at the intersection\
    \ of data engineering, model development, and deployment, and provide guidance\
    \ on architectural decisions and technical directions. Own large, complex systems,\
    \ driving architectures that meet technical and business objectives. Design and\
    \ scale large distributed systems covering the ML lifecycle, supporting planet-scale\
    \ dataset generation and model training. Collaborate cross-functionally to derive\
    \ performance and system-level requirements for large ML systems. Translate product/business\
    \ goals into measurable technical deliverables, ensuring system component alignment.\
    \ Mentor junior engineers, growing their expertise and fostering a collaborative\
    \ culture. You have: BS in Computer Science, Robotics, similar technical field\
    \ of study, or equivalent practical experience 5+ years of professional software\
    \ engineering experience, with at least 3 years in machine learning infrastructure\
    \ such as developing, scaling, training, deploying, and optimizing large-scale\
    \ machine learning systems from data to model. We prefer: 10+ years of professional\
    \ software engineering experience, with at least 5 years in machine learning infrastructure\
    \ such as developing, designing, scaling, training, deploying, and optimizing\
    \ large-scale machine learning systems from data to model. Solid experience in\
    \ the development and optimization of machine learning infrastructure tools like\
    \ DeepSpeed, PyTorch, TensorFlow, or similar frameworks. Strong expertise in distributed\
    \ training techniques, including gradient sharding and optimization strategies\
    \ for scaling large models across ML accelerator profiling tools to uncover performance\
    \ bottlenecks. Deep understanding of state-of-the-art machine learning models\
    \ such as auto-regressive transformers and familiarity with custom-kernels for\
    \ diverse h/w compute based efficiency. Excellent communication skills, both verbal\
    \ and written, with the ability to translate complex technical concepts for a\
    \ broad audience. Practical familiarity in Autonomous Driving, Simulations, and\
    \ ML accelerators is a plus. The expected base salary range for this full-time\
    \ position across US locations is listed below. Actual starting pay will be based\
    \ on job-related factors, including exact work location, experience, relevant\
    \ training and education, and skill level. Your recruiter can share more about\
    \ the specific salary range for the role location or, if the role can be performed\
    \ remote, the specific salary range for your preferred location, during the hiring\
    \ process.&nbsp; Waymo employees are also eligible to participate in Waymo\u2019\
    s discretionary annual bonus program, equity incentive plan, and generous Company\
    \ benefits program, subject to eligibility requirements.&nbsp; Salary Range $213,000\
    \ &mdash; $263,000 USD"
