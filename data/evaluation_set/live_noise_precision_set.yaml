  description_text: "About Mistral At Mistral AI, we believe in the power of AI to\
    \ simplify tasks, save time, and enhance learning and creativity. Our technology\
    \ is designed to integrate seamlessly into daily working life. We democratize\
    \ AI through high-performance, optimized, open-source and cutting-edge models,\
    \ products and solutions. Our comprehensive AI platform is designed to meet enterprise\
    \ needs, whether on-premises or in cloud environments. Our offerings include le\
    \ Chat, the AI assistant for life and work. We are a dynamic, collaborative team\
    \ passionate about AI and its potential to transform society. Our diverse workforce\
    \ thrives in competitive environments and is committed to driving innovation.\
    \ Our teams are distributed between France, USA, UK, Germany and Singapore. We\
    \ are creative, low-ego and team-spirited. Join us to be part of a pioneering\
    \ company shaping the future of AI. Together, we can make a meaningful impact.\
    \ See more about our culture on https://mistral.ai/careers. Role Summary Mistral\
    \ AI is looking for a senior Incident Response and Digital Forensics specialist\
    \ to lead our incident response capability across a complex, rapidly evolving\
    \ AI ecosystem. Reporting to the SOC Lead, you will take end-to-end ownership\
    \ of major security incidents, from initial investigation and containment through\
    \ remediation and post-incident improvement. During critical events, you will\
    \ act as the incident commander, bringing structure, sound judgment, and calm\
    \ leadership to high-pressure situations. This is a hands-on, player-coach position\
    \ combining deep technical investigations with capability building. You will help\
    \ define our incident response methodology, forensic tooling, runbooks, exercises,\
    \ and post-mortem practices. As the organization grows, the role may also offer\
    \ opportunities to build and lead a dedicated incident response team. What You\
    \ Will Do Own the incident response lifecycle for high-severity security events,\
    \ including triage, investigation, containment, remediation, recovery, and post-incident\
    \ review. Act as incident commander, coordinating technical teams and key stakeholders\
    \ during complex security incidents. Build, maintain, and test incident response\
    \ runbooks covering Mistral\u2019s most important risk scenarios. Develop and\
    \ operate forensic capabilities across cloud, containerized, on-premises, and\
    \ endpoint environments. Preserve, collect, and analyze digital evidence using\
