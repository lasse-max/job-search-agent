  description_text: "About Mistral At Mistral AI, we believe in the power of AI to\
    \ simplify tasks, save time, and enhance learning and creativity. Our technology\
    \ is designed to integrate seamlessly into daily working life. We democratize\
    \ AI through high-performance, optimized, open-source and cutting-edge models,\
    \ products, and solutions. Our comprehensive AI platform is designed to meet enterprise\
    \ needs, whether on-premises or in cloud environments. Our offerings include le\
    \ Chat, the AI assistant for life and work. We are a dynamic, collaborative team\
    \ passionate about AI and its potential to transform society. Our diverse workforce\
    \ thrives in competitive environments and is committed to driving innovation.\
    \ Our teams are distributed between France, USA, UK, Germany, and Singapore. We\
    \ are creative, low-ego, and team-spirited. Join us to be part of a pioneering\
    \ company shaping the future of AI. Together, we can make a meaningful impact.\
    \ See more about our culture on mistral.ai/careers. About The Job: Mistral AI\
    \ is seeking a Technical Lead, Applied AI to drive the technical strategy, execution,\
    \ and delivery of complex AI solutions for our enterprise customers. In this role,\
    \ you will lead a project teams of Applied AI Engineers, ensuring the successful\
    \ deployment of Mistral AI products and the development of high-impact, scalable\
    \ AI use cases. You will act as the primary technical point of contact for our\
    \ most strategic customers, guiding them through the entire lifecycle\u2014from\
    \ pre-sales to post-implementation\u2014while collaborating closely with research,\
    \ product, and engineering teams to shape the future of our offerings. As a Technical\
    \ Lead, you will bridge the gap between cutting-edge AI research and real-world\
    \ enterprise applications, ensuring our solutions are robust, scalable, and aligned\
    \ with both customer needs and Mistral\u2019s technological vision. What you will\
    \ do - Deliver as an IC the critical lines of codes of our complex projects, you\u2019\
    ll be hands-on and de-risk the critical parts of our complex projects. You\u2019\
    ll stay deeply involved in coding, reviewing, and optimizing AI solutions. - Lead\
    \ technical teams of Applied AI Engineers, providing mentorship, technical guidance,\
    \ and best practices for deploying state-of-the-art GenAI applications across\
    \ industries. - Lead technical discussions during pre-sales, translating customer\
    \ requirements into actionable solutions and communicating Mistral\u2019s technological\
    \ advantages to diverse stakeholders. - Design and oversee the implementation\
    \ of complex AI systems, including fine-tuning, RAG, agentic workflows, and custom\
    \ LLM applications, ensuring alignment with Mistral\u2019s product roadmap and\
    \ open-source initiatives. - Drive innovation by identifying emerging trends in\
    \ AI, evaluating new tools and methodologies, and championing best practices for\
    \ fine-tuning, inference, and deployment. - Work closely with product managers,\
    \ researchers, and engineers to ensure seamless integration of customer feedback\
    \ into Mistral\u2019s product development cycle. How We Work in Applied AI - We\
    \ care about people and outputs. - What matters is what you ship, not the time\
    \ you spend on it - Bureaucracy is where urgency goes to vanish. You talk to whoever\
    \ you need to talk to. The best idea wins, whether it comes from a principal engineer\
    \ or someone in their first week. - Always ask why. The best solutions come from\
    \ deep understanding, not from copying what worked before - We say what we mean.\
    \ Feedback is direct, timely, and given because we care. - No politics. Low ego,\
    \ high standards. - We embrace an unstructured environment and find joy in it.\
    \ About you - You are fluent in English. - You hold a PhD or Master\u2019s degree\
    \ in AI, Machine Learning, Computer Science, or a related field. - You have 7/8+\
    \ years of experience in AI/ML, with at least 2+ years in a technical leadership\
    \ role (e.g., Tech Lead, Engineering Manager, or Solutions Architect) focused\
    \ on AI products or enterprise solutions. - You have a proven track record of\
    \ leading teams to deliver complex AI projects, from prototyping to production,\
    \ in industries such as tech, finance, healthcare, or industrial automation. -\
    \ You possess deep expertise in fine-tuning LLMs, advanced RAG, agentic systems,\
    \ and deploying NLP applications at scale. - You are proficient in Python, PyTorch,\
    \ and modern AI frameworks (e.g., LangChain, Hugging Face). Experience with cloud\
    \ platforms (AWS, GCP, Azure) and MLOps tools is a plus. - You have strong software\
    \ engineering skills, including API design, backend/full-stack development, and\
    \ system architecture. - You excel in technical communication, with the ability\
    \ to articulate complex concepts to both technical and non-technical audiences,\
    \ including executives and engineers. - You thrive in fast-paced, collaborative\
    \ environments and are passionate about mentoring and growing technical talent.\
    \ Ideally, you have: - Contributed to open-source projects, particularly in the\
    \ LLM or AI space. - Experience in customer-facing roles (e.g., Solutions Architect,\
    \ Customer Engineer, or Technical Product Manager) with a focus on enterprise\
    \ AI adoption. - A track record of driving technical strategy and influencing\
    \ product direction based on customer needs and market opportunities. Why join\
    \ us? You\u2019ll have the opportunity to shape the future of AI adoption in enterprises,\
    \ work with a world-class team, and contribute to open-source projects that impact\
    \ millions. If you\u2019re excited about leading technical innovation and solving\
    \ real-world challenges with AI, we\u2019d love to hear from you!"
