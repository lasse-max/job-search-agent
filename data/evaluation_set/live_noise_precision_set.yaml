    \ criticality. Education: A Bachelor\u2019s degree (or equivalent). Framework\
    \ Architecture: Proven ability to build systems, frameworks, and standardized\
    \ processes from scratch. Communication: Exceptional presence and communication\
    \ skills, with the ability to distill complex data into clear, actionable documentation.\
    \ Manual Writing: Experience in operations manual development and a high degree\
    \ of comfort with technical documentation. We prefer: Experience designing process\
    \ in highly regulated spaces (Aviation, nuclear, oil &amp; gas, etc.). Experience\
    \ with road safety, design, or transportation planning. Travel requirements: Travel\
    \ to support growing Europe market landscape. Occasional travel to USA for onboarding\
    \ and engagement. The expected base salary range for this full-time position is\
