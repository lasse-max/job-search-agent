  description_text: "Who we are About Stripe Stripe is a financial infrastructure\
    \ platform for businesses. Millions of companies\u2014from the world\u2019s largest\
    \ enterprises to the most ambitious startups\u2014use Stripe to accept payments,\
    \ grow their revenue, and accelerate new business opportunities. Our mission is\
    \ to increase the GDP of the internet, and we have a staggering amount of work\
    \ ahead. That means you have an unprecedented opportunity to put the global economy\
    \ within everyone\u2019s reach while doing the most important work of your career.\
    \ About the team The Solutions Architecture Team partners with our users to realize\
    \ their full potential through the adoption of prescriptive solutions that drive\
    \ their growth and success. We influence revenue growth across Stripe\u2019s product\
    \ portfolio, and collaborate with sales, support, product management, and Stripe\u2019\
    s executive team to provide the best experience to our most valued customers.\
    \ What you\u2019ll do As a member of the team, the Solutions Architect will build\
    \ highly consultative, trusted relationships with C-level executives and technical\
    \ decision-makers in the customer\u2019s organization to provide business and\
    \ technical thought leadership, and become a trusted advisor in solving mission-critical\
    \ business challenges. You will architect business models with them so they can\
    \ drive new monetization opportunities and growth for both the user and Stripe.&nbsp;\
    \ Responsibilities Be a key member of the Platform account team with deep involvement\
    \ in defining the customer strategy; identify and close new complex opportunities,\
    \ and accelerate solution adoption.&nbsp; Understand and align with the customer\u2019\
    s product and business roadmap and uncover opportunities for Stripe to accelerate\
    \ their progress on that roadmap.&nbsp; Drive thought leadership and be a trusted\
    \ advisor for key business and technical stakeholders including CIO, CTO, COO,\
    \ CRO, CDO, Head of Product Engineering and Head of Payments.&nbsp; Work to deeply\
    \ understand the customer\u2019s business objectives, and then design and apply\
    \ Stripe\u2019s solutions to their challenges. Conduct business analysis and background\
    \ research on customers, industries, and competitors with a view to support growth\
    \ for the user's business.&nbsp; Expand Stripe\u2019s footprint within existing\
    \ accounts to new global markets and business units by introducing new capabilities\
    \ and local payment methods. Approximately 25% travel is anticipated to help you\
    \ connect in-person in a meaningful way with users and collaborate internally.&nbsp;\
