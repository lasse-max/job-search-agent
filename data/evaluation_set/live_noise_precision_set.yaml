  description_text: "ABOUT AIRWALLEX Airwallex is the only unified payments and financial\
    \ platform for global businesses. Powered by our unique combination of proprietary\
    \ infrastructure and software, we empower over 200,000 businesses worldwide \u2013\
    \ including Brex, Rippling, Navan, Qantas, SHEIN and many more \u2013 with fully\
    \ integrated solutions to manage everything from business accounts, payments,\
    \ spend management and treasury, to embedded finance at a global scale. Proudly\
    \ founded in Melbourne, we have a team of over 2,200 of the brightest and most\
    \ innovative people in tech across 26 offices around the globe. Valued at US$8\
    \ billion and backed by world-leading investors including T. Rowe Price, Visa,\
    \ Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and\
    \ Lone Pine Capital, Airwallex is leading the charge in building the global payments\
    \ and financial platform of the future. If you\u2019re ready to do the most ambitious\
    \ work of your career, join us. ATTRIBUTES WE VALUE We hire successful builders\
    \ with founder-like energy who want real impact, accelerated learning, and true\
    \ ownership. You bring strong role-related expertise and sharp thinking, and you\u2019\
    re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles.\
    \ You move fast with good judgment, dig deep with curiosity, and make decisions\
    \ from first principles, balancing speed and rigor. You're humble and collaborative;\
    \ turn zero\u2011to\u2011one ideas into real products, and you \u201Cget stuff\
    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. THE TEAM Airwallex\
    \ is seeking a visionary and strategic leader to become our Director, Solutions\
    \ Engineering. This is a critical leadership role responsible for leading our\
    \ world-class solution engineering organisation across EMEA. This includes executive\
    \ level pre-sales technical solution design, E2E solution implementation as well\
    \ as proper post go-live commercial performance ramp-up for selective clients.\
    \ You will be the driving force behind our technical go-to-market (GTM) strategy,\
    \ scaling a high-performing team of Solutions Engineers and Solutions Architects\
    \ who are instrumental in driving our global revenue growth. By partnering with\
    \ Sales, Product, and Engineering leadership, you will shape the customer experience,\
    \ influence our product roadmap, and solidify Airwallex's position as the leading\
    \ financial infrastructure for modern businesses. WHAT YOU'LL DO - Lead, mentor,\
    \ and scale our high-performing EMEA Solutions Engineering teams, fostering a\
    \ culture of technical excellence, customer obsession, and collaboration. - Develop\
    \ and execute the global vision and strategy for the Solutions Engineering function,\
    \ ensuring tight alignment with the company's overall sales and growth objectives.\
    \ - Own the technical sales strategy, empowering your team to deliver compelling\
    \ product demonstrations, proofs-of-concept (POCs), and sophisticated solution\
    \ designs that solve our customers' most complex challenges. - Serve as a key\
    \ executive partner to the Sales and Product organisations, acting as the voice\
    \ of the customer and the field to influence the product roadmap and GTM strategy.\
    \ - Implement scalable processes, playbooks, and best practices for the entire\
    \ pre-sales and implementation lifecycle, from technical discovery and solutioning\
    \ to RFP responses and guiding successful implementations. - Represent Airwallex\
    \ as a senior technical leader in key customer meetings, industry events, and\
    \ executive briefings, building trust and credibility with C-level stakeholders.\
    \ WHO YOU ARE - You have a significant track record of leading and scaling global\
    \ or multi-regional Presales, Sales Engineering, or Solutions Architecture teams\
    \ within EMEA, with 3+ years in a senior leadership capacity. - You bring 10+\
    \ years of experience in technical, client-facing roles. You have a background\
    \ in engineering, software development, or product, and have been hands-on designing\
    \ and delivering complex software solutions. - You are a strategic thinker with\
    \ a deep understanding of enterprise sales cycles, go-to-market motions, and how\
    \ to position a technical solution to solve core business problems. - You excel\
    \ at working with enterprise clients, understanding their business goals, and\
    \ translating their needs into tangible, creative solutions built upon a sophisticated\
    \ API-driven platform. - You possess outstanding executive communication and presentation\
    \ skills, capable of commanding a room and articulating complex technical concepts\
    \ to both commercial and engineering audiences. - Strong knowledge of the payments\
    \ ecosystem, financial services, or Fintech is highly advantageous. - Bachelor's\
    \ degree in a STEM discipline preferred (Computer Science, Engineering, etc.)\
    \ This role is based in London APPLICANT SAFETY POLICY: FRAUD AND THIRD-PARTY\
    \ RECRUITERS To protect you from recruitment scams, please be aware that Airwallex\
    \ will not ask for bank details, sensitive ID numbers (i.e. passport), or any\
    \ form of payment during the application or interview process. All official communication\
    \ will come from an @airwallex.com http://airwallex.com email address. Please\
