  description_text: "ABOUT AIRWALLEX Airwallex is the only unified payments and financial\
    \ platform for global businesses. Powered by our unique combination of proprietary\
    \ infrastructure and software, we empower over 200,000 businesses worldwide \u2013\
    \ including Brex, Rippling, Navan, Qantas, SHEIN and many more \u2013 with fully\
    \ integrated solutions to manage everything from business accounts, payments,\
    \ spend management and treasury, to embedded finance at a global scale. Proudly\
    \ founded in Melbourne, we have a team of over 2,200 of the brightest and most\
    \ innovative people in tech across 26 offices around the globe. Valued at US$8\
    \ billion and backed by world-leading investors including T. Rowe Price, Visa,\
    \ Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and\
    \ Lone Pine Capital, Airwallex is leading the charge in building the global payments\
    \ and financial platform of the future. If you\u2019re ready to do the most ambitious\
    \ work of your career, join us. ATTRIBUTES WE VALUE We hire successful builders\
    \ with founder-like energy who want real impact, accelerated learning, and true\
    \ ownership. You bring strong role-related expertise and sharp thinking, and you\u2019\
    re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles.\
    \ You move fast with good judgment, dig deep with curiosity, and make decisions\
    \ from first principles, balancing speed and rigor. You're humble and collaborative;\
    \ turn zero\u2011to\u2011one ideas into real products, and you \u201Cget stuff\
    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. The Opportunity An\
    \ exciting opportunity has come up to join Airwallex as a Manager in our Treasury\
    \ team. This role will focus on building robust payment reconciliation frameworks\
    \ and safeguarding processes across our global payment flows, ensuring customer\
    \ funds are protected and financial operations run seamlessly end to end. You\
    \ will create transparency on cash positions, safeguarding compliance, and reconciliation\
    \ performance, providing senior management with the insights they need to manage\
    \ risk and support scalable growth. This role will specifically focus on the requirements\
    \ in the UK. The Manager will also work closely with Product & Engineering, Operations,\
    \ and Legal & Compliance to design and enhance reconciliation tooling, safeguarding\
    \ controls, and financial operations workflows, playing an integral role in product\
    \ development and continuous process improvement as Airwallex builds the global\
    \ financial infrastructure that empowers businesses to operate anywhere, anytime.\
    \ Responsibilities - Deep expertise in UK safeguarding requirements under the\
    \ EMRs 2011 and PSRs 2017, including FCA guidance (e.g. Chapter 10 safeguarding\
    \ expectations, notification/approval for changes in safeguarding method). - Proven\
    \ experience designing, documenting, and operating safeguarding frameworks for\
    \ EMIs / PSPs, including policies, operating procedures, fund-flow diagrams, and\
    \ calculation logic for relevant funds (e\u2011money and, ideally, intragroup\
    \ payment services). - Strong hands-on background with daily safeguarding operations:\
    \ segregation of client funds, safeguarding calculations, reconciliation of required\
    \ vs actual balance, incident classification and reporting, and interaction with\
    \ safeguarding banks and custodians. - Demonstrated ability to partner cross\u2011\
    functionally (Regulatory Compliance, Legal, Treasury, Product, Engineering, Financial\
    \ Operations) to translate regulatory obligations into scalable system requirements,\
    \ dashboards, and automated workflows. - Experience preparing for and responding\
    \ to external safeguarding audits and regulatory reviews, including evidence gathering,\
    \ remediation plans, and ongoing governance/MI to Boards and senior management.\
    \ - Strong analytical and data skills with the ability to work with complex transactional\
    \ and ledger data, assess safeguarding breaks and root causes, and drive process\
    \ and control enhancements across payment flows, reconciliations, and client money\
    \ management. Qualifications - Professional experience in safeguarding, client\
    \ money, or prudential/conduct regulation within an EMI, PSP, bank, or fintech\
    \ environment; - Strong working knowledge of UK regulatory frameworks, and related\
    \ expectations around governance, MI, and incident reporting; - Background in\
    \ Finance, Treasury, Risk, Compliance, or Financial Operations, ideally with a\
    \ degree in Finance, Economics, Law, Accounting or a related discipline; - Demonstrable\
    \ experience designing and operating controls: daily safeguarding calculations,\
    \ reconciliations, incident management, documentation (policies/SOPs), and interaction\
    \ with safeguarding banks/custodians; - Proven ability to work with complex data\
    \ sets and financial systems (SQL/Excel/BI tools), analyse safeguarding and reconciliation\
    \ outputs, and translate findings into clear actions and recommendations; - Excellent\
    \ stakeholder management and communication skills, with a track record of partnering\
    \ across Regulatory Compliance, Legal, Product, Engineering, Treasury and Operations\
    \ and engaging confidently with senior management, auditors, and regulators. APPLICANT\
