    \ of democratic nations by managing the end-to-end licensing process and overseeing\
    \ our internal control programs. This role requires a professional who takes full\
    \ ownership of permit management and thrives in a mission-critical environment\
    \ where precision and impact are paramount. You will report to the Director Export\
    \ Control and you will also have interfaces to Export Control colleagues within\
    \ Helsing. The day-to-day Expert Advisory: Act as the primary point of contact\
    \ for project managers and technical teams, providing clinical advice on export\
    \ controls within both national and international frameworks Licensing &amp; Application\
    \ Management: Execute the end-to-end application process for German export and\
    \ transfer licenses, including the preparation and administrative management of\
    \ submissions to the Federal Office of Economics and Export Control (BAFA) Regulatory\
    \ Compliance: Perform rigorous foreign trade law reviews to determine licensing\
    \ requirements for technology transfers, goods exports, and services, ensuring\
    \ total alignment with applicable laws Permit Oversight: Assume full responsibility\
    \ for the management of German, EU and U.S. authorizations within your defined\
    \ area, including the tracking and condition monitoring of all active licenses\
    \ and responsibility of all subequent administrational processes Operations :\
    \ Export Control business partner for assigned projects and being responsible\
