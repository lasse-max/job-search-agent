    \ of fintech \u2013 and we\u2019re just getting started. Company Description Checkout.com\
    \ http://Checkout.com is one of the most exciting fintechs in the world. Our mission\
    \ is to enable businesses and their communities to thrive in the digital economy.\
    \ We\u2019re the strategic payments partner for some of the best known fast-moving\
