    \ open societies can continue to make sovereign decisions and control their ethical\
    \ standards. &nbsp; As democracies, we believe we have a special responsibility\
    \ to be thoughtful about the development and deployment of powerful technologies\
    \ like AI. We take this responsibility seriously. &nbsp; We are an ambitious and\
    \ committed team of engineers, AI specialists and customer-facing programme managers.\
    \ &nbsp;We are looking for mission-driven people to join our European teams \u2013\
    \ and apply their skills to solve the most complex and impactful problems. We\
    \ embrace an open and transparent culture that welcomes healthy debates on the\
    \ use of technology in defence, its benefits, and its ethical implications. &nbsp;\
    \ The role You will collaborate with a team developing the world\u2019s first\
    \ AI-enabled electronic warfare capability for a 4+ generation fighter jet\u2014\
    from concept to maiden flight. As an integral member of our chief engineering\
    \ team, you will guide system engineering activities, spanning from aligning on\
    \ and validating requirements with the customer to final system qualification\
    \ and certification with aviation authorities. Your core focus will be to partner\
    \ with our AI software specialists to ensure the developed EW software (airborne\
    \ and ground) seamlessly meets customer needs and delivers exceptional operational\
    \ impact. The day-to-day Collaborate on system requirements with our customer\
    \ to derive and validate high-level software requirements, ensuring our electronic\
    \ warfare capabilities perfectly align with operational needs Maintain comprehensive\
    \ traceability from system requirements through to all software development artefacts,\
    \ establishing clear technical product baselines alongside configuration management\
    \ to guarantee certification readiness Facilitate regular technical risk board\
    \ meetings with software engineers to co-create risk mitigation strategies, effectively\
    \ safeguarding project timelines and delivery quality Ensure the meticulous planning\
    \ of all technical deliverables in collaboration with project management, monitoring\
    \ implementation progress to guide the team towards a successful first flight\
    \ Oversee the preparation of all technical documents to guarantee they meet rigorous\
    \ compliance and certification standards, authorising them prior to customer delivery\
    \ Manage the final software product qualification and certification activities\
    \ in partnership with both the customer and relevant aviation authorities, ensuring\
    \ seamless deployment to active service Partner with our quality assurance team\
    \ to guarantee that all technical deliverables uphold established quality standards,\
    \ promptly resolving any findings to preserve project integrity Deliver clear\
    \ and actionable updates on project status and technical changes to Chief Engineering\
    \ and Programme Management, empowering stakeholders to make informed, timely decisions\
    \ You should apply if you Have overseen system engineering for electronic warfare\
    \ system development from conceptual design through to successful first flight\
    \ Have delivered software-intensive avionics or electronic warfare systems that\
    \ are currently operating in active service Demonstrate extensive expertise in\
    \ developing embedded software for avionics systems in accordance with DO-178C\
    \ and ARP4754B, covering the full lifecycle from initial requirements to software\
    \ verification Have cultivated trusted relationships with civil or military aviation\
    \ authorities, including active participation in formal panel meetings or Stages\
    \ of Involvement (SOI) Communicate complex technical concepts clearly and accessibly,\
    \ ensuring seamless alignment between internal engineering teams and external\
    \ stakeholders Nice to Have Hold a degree in aerospace engineering, electrical\
    \ engineering, physics, computer science, or a related discipline equipping you\
    \ with a thorough technical understanding of complex systems Familiarity with\
    \ the integration of modern AI or machine learning models into highly regulated\
    \ aerospace environments Join Helsing and work with world-leading experts in their\
    \ fields &nbsp; Helsing\u2019s work is important. You\u2019ll be directly contributing\
    \ to the protection of democratic countries while balancing both ethical and geopolitical\
    \ concerns The work is unique. We operate in a domain that has highly unusual\
    \ technical requirements and constraints, and where robustness, safety, and ethical\
    \ considerations are vital. You will face unique Engineering and AI challenges\
    \ that make a meaningful impact in the world Our work frequently takes us right\
    \ up to the state of the art in technical innovation, be it reinforcement learning,\
    \ distributed systems, generative AI, or deployment infrastructure. The defence\
    \ industry is entering the most exciting phase of the technological development\
    \ curve. Advances in our field of world are not incremental: Helsing is part of,\
    \ and often leading, historic leaps forward In our domain, success is a matter\
    \ of order-of-magnitude improvements and novel capabilities. This means we take\
    \ bets, aim high, and focus on big opportunities. Despite being a relatively young\
    \ company, Helsing has already been selected for multiple significant government\
