    \ to -end EMI/EMC&nbsp; engineering &nbsp; lifecycle &nbsp; for &nbsp; our &nbsp;\
    \ airborne &nbsp; platforms ,&nbsp; translating &nbsp; complex &nbsp; electromagnetic\
    \ &nbsp; requirements &nbsp; into &nbsp; measurable &nbsp; subsystem &nbsp; specifications\
    \ &nbsp;and&nbsp; defining &nbsp; the &nbsp; comprehensive EMC Control Plan. You\
    \ &nbsp;will&nbsp; lead &nbsp; advanced &nbsp; electromagnetic &nbsp; modeling\
    \ &nbsp; to &nbsp; optimize &nbsp; antenna &nbsp; placement &nbsp;and&nbsp; mitigate\
    \ &nbsp; interference ,&nbsp; working &nbsp; closely &nbsp; with &nbsp; cross\
    \ functional &nbsp; teams &nbsp;and&nbsp; suppliers &nbsp; to &nbsp;manage&nbsp;\
    \ complex &nbsp; architectures &nbsp; for &nbsp; grounding ,&nbsp; shielding ,\
    \ and&nbsp; cable &nbsp; segregation .&nbsp; Ultimately ,&nbsp; your &nbsp; technical\
    \ &nbsp; leadership &nbsp;will&nbsp; ensure &nbsp; our &nbsp; mission-critical\
    \ &nbsp; defense &nbsp; platforms &nbsp; operate &nbsp; flawlessly &nbsp;in&nbsp;\
    \ the &nbsp; most &nbsp; demanding &nbsp;and&nbsp; contested &nbsp; electromagnetic\
    \ &nbsp; environments . &nbsp; &nbsp; The day-to-day Own the end-to-end EMI/EMC\
    \ engineering for an airborne platform, including the control plan, compliance\
    \ roadmap, and integration strategy across all subsystems. &nbsp; Translate platform-level\
    \ electromagnetic environment requirements (intra/inter-system, external RF, lightning,\
    \ HIRF, ESD, EMP) into measurable subsystem-level EMI/EMC requirements and KPIs.\
    \ &nbsp; Define and&nbsp;maintain&nbsp;the EMC Control Plan: grounding, bonding,\
    \ shielding, filtering, and cable segregation philosophies. &nbsp; Perform electromagnetic\
    \ interference analysis across the platform: emissions/susceptibility, antenna-to-antenna\
    \ coupling, co-site interference, and intermodulation between RF subsystems. &nbsp;\
    \ Lead EM modeling and simulation: antenna placement, cable coupling, shielding\
    \ effectiveness, lightning indirect effects, and HIRF using tools such as CST,\
    \ FEKO, HFSS, or equivalent. &nbsp; Define zoning, bonding, and grounding architecture,\
    \ including lightning protection and current return network for metallic and composite\
    \ structures. &nbsp; Support antenna integration and&nbsp;placement&nbsp;trade\
    \ studies, including pattern degradation and isolation budgets. &nbsp; Establish&nbsp;the\
    \ EMI/EMC qualification and verification strategy against applicable standards\
    \ (MIL-STD-461, MIL-STD-464, DO-160, STANAG, or equivalent). &nbsp; Own the EMI/EMC\
    \ test campaign: plans, procedures, chamber and on-platform testing, and corrective\
    \ actions. &nbsp; Coordinate cross-functional design decisions with&nbsp;airframe,\
    \ avionics, EW, comms, propulsion, power, and mission computing; manage EM trade-offs.\
    \ &nbsp; Own EMI/EMC-related interfaces and ICDs (grounding, shielding, filtering,\
    \ connector specifications). &nbsp; Manage supplier technical governance for EMI/EMC\
    \ compliance and non-conformance closure. &nbsp; You should apply if you Hold\
    \ a relevant degree in Electrical&nbsp;Engineering, &nbsp;Aerospace&nbsp;Engineering,\
    \ or&nbsp;a related&nbsp;field. &nbsp; Have proven experience in EMI/EMC engineering\
    \ for airborne platforms with end-to-end ownership from requirements to certification.\
    \ &nbsp; Have a strong understanding of electromagnetic theory: transmission lines,\
    \ antennas, wave propagation, shielding, grounding, and coupling mechanisms. &nbsp;\
    \ Can convert platform-level requirements into subsystem-level EMI/EMC specifications\
    \ and verification criteria. &nbsp; Are familiar with applicable standards and\
    \ relevant NATO/STANAG or national military airworthiness frameworks. &nbsp; Have\
    \ hands-on experience with EM simulation tools for antenna placement, coupling,\
    \ shielding effectiveness, HIRF, and lightning indirect effects analysis. &nbsp;\
    \ Have experience designing grounding, bonding, shielding, filtering, and cable\
    \ segregation schemes for complex platforms, including composite structures. &nbsp;\
    \ Have defined and executed EMI/EMC test campaigns: chamber testing, on-platform\
    \ ground tests, and flight test EMC verification, including instrumentation and\
    \ data analysis. &nbsp; Are comfortable leading cross-functional and supplier\
    \ governance: reviewing EMC control plans, qualification evidence, ICDs, and driving\
    \ issue closure with objective evidence. &nbsp; Note: We operate in an industry\
