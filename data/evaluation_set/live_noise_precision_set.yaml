  description_text: "Are you a CPA or experienced accounting professional looking\
    \ to leverage your expertise in a dynamic new way? At Xero, we believe your deep\
    \ understanding of accounting practices isn't just valuable \u2013 it's the key\
    \ to our success in helping businesses thrive. We're seeking talented individuals\
    \ with backgrounds in accounting, who understand the workings of accounting practices\
    \ who are ready to transition their careers from traditional roles to become strategic\
    \ advisors and relationship builders in the exciting world of cloud accounting\
    \ technology. This isn't a typical \"sales\" role in the traditional sense. Instead,\
    \ it's about empowering accounting firms, guiding them through digital transformation,\
    \ and collaborating to shape the future of their practices. If you're driven by\
    \ impact, eager to share your knowledge, and looking for a career where your accounting\
    \ acumen opens doors to new opportunities, we want to hear from you. Why Xero?\
    \ Why now? The accounting landscape is rapidly evolving, and Xero is at the forefront\
    \ of this digital revolution. We're passionate about making business life better\
    \ for small businesses and their advisors as well as rewarding you in the process.\
    \ We understand that your journey as an accountant has equipped you with unique\
    \ insights into: - The daily operations and challenges of accounting practices.\
    \ - The importance of accurate data and efficient processes. - The trusted relationships\
    \ built with clients. - The potential for technology to transform workflows and\
    \ client services. - We see these skills as foundational for a highly successful\
    \ career with us. We're not looking for traditional sales experience; we're looking\
    \ for your accounting expertise and your desire to make a difference. What this\
    \ unique career path offers you: - Impactful Advisory: You'll be a true partner,\
    \ consulting with accounting firms to help them embrace cutting-edge digital strategies\
    \ with the Xero platform. - Leverage Your Expertise: Apply your accounting knowledge\
    \ and industry experience to solve real-world problems for accounting practices,\
    \ guiding them towards greater efficiency and growth. - Relationship-Driven Role:\
    \ Build deep, lasting relationships with key decision-makers in accounting firms,\
    \ becoming their trusted advisor on digital strategy. - Autonomy & Growth: Work\
    \ autonomously within your allocated territory, with significant scope for professional\
    \ development and career progression within a rapidly growing global tech company.\
    \ - Meaningful Contribution: Be at the forefront of a movement that is modernising\
    \ the accounting industry and truly making a difference for millions of businesses.\
    \ - Strong Earning Potential: We offer a highly competitive remuneration package,\
    \ designed to reward your expertise, the value you bring, and your success in\
    \ driving partner outcomes. Who we're looking for: - You're an Accounting Professional:\
    \ Ideally CPA-qualified, or with significant experience in an accounting practice,\
    \ and a strong understanding of its operations. - You're a Natural Relationship\
    \ Builder: You enjoy connecting with people and are skilled at building rapport\
    \ and trust. - You're Solutions-Oriented: You're a problem-solver who can identify\
    \ needs and offer practical solutions. - You're Curious about Tech: You have an\
    \ interest in the emerging online accounting market and the potential of Fintech.\
    \ - You're Ready for a New Challenge: You're looking for a change that leverages\
    \ your existing skills in a new, exciting environment. Is this the career change\
    \ you've been looking for? If you're an accountant ready to translate your financial\
    \ acumen into a dynamic advisory role at the intersection of accounting and technology,\
    \ we encourage you to apply."
