  description_text: "Celonis is the global leader in Process Intelligence and the\
    \ pioneer of Process Mining technology. As one of the world\u2019s fastest-growing\
    \ enterprise SaaS companies, we are changemakers pushing the boundaries of what\u2019\
    s possible. We invest heavily in advanced AI capabilities\u2014specifically our\
    \ Process Intelligence Graph\u2014to turn data insights into immediate business\
    \ action. We believe there is a massive opportunity to unlock global productivity\
    \ and sustainability by placing intelligence at the core of every business process.\
    \ Join our mission to make processes work for people, companies, and the planet.\
    \ &nbsp; The Principal Client Value Partner is the strategic and technical \"\
    North Star\" for one of our largest enterprise accounts. You are a unique hybrid:\
    \ a technical heavyweight who understands near real-time data pipelines, GenAI\
    \ architecture and the enterprise systems stack (SAP, DataBricks, etc.), as well\
    \ as a strategic advisor who can translate those concepts into measurable business\
    \ value for the C-suite. As the Single Threaded Lead for this account, you will\
    \ orchestrate internal teams, guide the customer's technical strategy, and ensure\
    \ the Celonis platform serves as the secure, intelligent core of their business\
    \ transformation. Key Responsibilities Executive Advisory: Act as the trusted\
    \ advisor to CIOs and CFOs. You translate complex technical designs into strategic\
    \ business outcomes and ROI. Data Architecture Strategy: Advise on high-performance,\
    \ near real-time data ingestion strategies (e.g., streaming APIs, Kafka, micro-batching)\
    \ to ensure the Celonis platform has the right data at the right time. Enterprise\
    \ AI &amp; Governance: Architect secure, enterprise-grade AI solutions. You will\
    \ champion the use of the Celonis Process Knowledge Graph to ground AI (via RAG)\
    \ and ensure strict data governance, sanitization, and security. Engagement Leadership:\
    \ Mobilize and direct a multidisciplinary team of Applied AI engineers and Data\
    \ Scientists. You act as the bridge between the customer and Celonis Product/Engineering\
    \ to clear complex technical blockers. What You Bring Experience: Principal-level\
    \ experience in a client-facing, technically-conversant role (e.g., Solutions\
    \ Architecture, Field CTO, Technical Account Management or technically-savvy Engagement\
    \ or Client Success roles). Data Integration: Strong conceptual and architectural\
    \ understanding of modern data pipelines. AI Architecture: Solid grasp of how\
    \ to securely deploy Generative AI in the enterprise. You understand concepts\
    \ like Retrieval-Augmented Generation (RAG), private model hosting (Azure OpenAI,\
    \ AWS Bedrock), and data masking. Enterprise Architecture: Conceptual understanding\
    \ of the modern enterprise stack (some&nbsp;previous hands-on experience with\
    \ SAP could come handy) Executive Presence: Exceptional ability to untangle complex\
    \ technical challenges and present clear, actionable roadmaps to non-technical\
    \ executives. Language: Strong proficiency in German is required. Preferred: Deep\
    \ domain expertise in the Retail industry. &nbsp; MaxSuccess Exclusive Benefits\
    \ &amp; Impact Strategic Sponsorship: Partnership with a Celonis Executive Sponsor\
    \ to drive enterprise-wide adoption. Premier Engineering Access: Direct line to\
    \ Celonis \"Feature Teams\" for early access to new releases (Alpha/Beta programs).\
    \ Enterprise Scaling: Accountability for the long-term success of some of the\
    \ world\u2019s largest business transformation projects. What Celonis can offer\
    \ you: Pioneer Innovation: Work with the global leader in Process Mining and the\
    \ Process Intelligence Graph to shape the future of AI-driven business operations.\
    \ Ownership from Day 1: Every full-time \"Celonaut\" is an owner, receiving Restricted\
    \ Stock Units (RSUs) and merit-based refresh grants. Unrivaled Family Support:\
    \ Benefit from our inclusive parental leave policy\u201424 weeks of fully paid\
    \ leave for primary carers and 12 weeks for supporting carers, available from\
    \ your first day of employment. Work-Life Integration: Enjoy Unlimited PTO (in\
    \ applicable regions) and generous PTO globally, as well as a flexible hybrid\
    \ work model that balances remote focus with vibrant office collaboration. Continuous\
    \ Growth: Elevate your skills through our 70-20-10 learning framework, mentorship\
    \ programs, and access to a dedicated learning platform. Holistic Well-being:\
    \ Prioritize your health with subsidized Wellhub memberships, mental health counseling,\
    \ and dedicated \"Wellness Weeks\" that prioritize work/life balance. Drive Sustainability:\
    \ Participate in annual Impact Days, where you receive paid time off to volunteer\
    \ for community and environmental causes with your local office, or virtually.\
    \ Global Inclusion &amp; Belonging: Find community through our Inclusion Think\
    \ Tank and participate in our annual Inclusion Days, ensuring every voice is heard\
    \ and valued. Value-Driven Impact: Join a mission-led organization where our core\
    \ values\u2014Live for Customer Value, The Best Team Wins, We Own It, and Earth\
    \ Is Our Future\u2014drive every decision. About Us: Celonis makes processes work\
    \ \u2014 for people, companies, and the planet. Powered by process mining and\
    \ AI, the Celonis Process Intelligence Platform integrates process data and business\
    \ context to create a living digital twin of business operations. We enable thousands\
    \ of companies worldwide to understand how their business actually runs and, together\
    \ with their partners, build intelligent solutions that transform and continuously\
    \ improve the way they operate \u2014 unlocking billions in value. Celonis is\
    \ headquartered in Munich, Germany, and New York City, USA, with more than 20\
    \ offices worldwide. Get familiar with the Celonis Process Intelligence Platform\
    \ by watching this video . Celonis Inclusion Statement: At Celonis, we believe\
    \ our people make us who we are and that \u201CThe Best Team Wins\u201D. We know\
    \ that the best teams are made up of people who bring different perspectives to\
    \ the table. And when everyone feels included, able to speak up and knows their\
    \ voice is heard - that's when creativity and innovation happen. Your Privacy:\
    \ Any information you submit to Celonis as part of your application will be processed\
    \ in accordance with Celonis\u2019 Accessibility and Candidate Notices By submitting\
    \ this application, you confirm that you agree to the storing and processing of\
    \ your personal data by Celonis as described in our Privacy Notice for the Application\
    \ and Hiring Process . Please be aware of common job offer scams, impersonators\
    \ and frauds. Learn more here ."
