  description_text: "About Mistral At Mistral AI, we believe in the power of AI to\
    \ simplify tasks, save time, and enhance learning and creativity. Our technology\
    \ is designed to integrate seamlessly into daily working life. We democratize\
    \ AI through high-performance, optimized, open-source and cutting-edge models,\
    \ products and solutions. Our comprehensive AI platform is designed to meet enterprise\
    \ needs, whether on-premises or in cloud environments. We are a dynamic, collaborative\
    \ team passionate about AI and its potential to transform society. Our diverse\
    \ workforce thrives in competitive environments and is committed to driving innovation.\
    \ Our teams are distributed between France, USA, UK, Germany and Singapore. We\
    \ are creative, low-ego and team-spirited. Join us to be part of a pioneering\
    \ company shaping the future of AI. Together, we can make a meaningful impact.\
    \ See more about our culture on https://mistral.ai/careers. Role Summary We are\
    \ looking for a highly organized, proactive, and fast-moving Executive Assistant\
    \ to support our Chief Revenue Officer (CRO). This role requires exceptional communication\
    \ skills, strong prioritization, and the ability to navigate a global, fast-paced\
    \ environment with professionalism and discretion. The CRO is based in the US\
    \ and travels frequently to Paris and other Mistral offices, requiring tight coordination\
    \ across multiple time zones. What You Will Do Executive Support \u2022 Manage\
    \ complex and dynamic calendars across multiple time zones, scheduling meetings,\
    \ travel, and internal/external engagements. \u2022 Prepare briefing materials,\
    \ presentations, agendas, and follow-up notes for leadership meetings. \u2022\
    \ Handle all incoming and outgoing communications (email, Slack, calls) with clarity,\
    \ confidentiality, and strong judgment. \u2022 Track deadlines, priorities, and\
    \ key deliverables to ensure leaders stay ahead of commitments. Operations & Coordination\
    \ \u2022 Coordinate international and domestic travel (flights, accommodations,\
    \ itineraries) for the CRO. \u2022 Support organization of internal and external\
    \ events, client meetings, offsites, and GTM team gatherings. \u2022 Liaise with\
    \ employees, clients, partners, and vendors as a primary point of contact for\
    \ the CRO\u2019s office. \u2022 Maintain documentation, filing systems, dashboards,\
    \ and shared folders to keep GTM operations structured and up to date. Cross-functional\
    \ Support \u2022 Collaborate closely with the Office Manager and People & Operations\
    \ teams on initiatives (e.g., revenue team events, onboarding support, quarterly\
    \ reporting). \u2022 Assist with special projects, process improvements, and operational\
    \ initiatives driven by the CRO. Confidentiality & Professionalism \u2022 Handle\
    \ sensitive information with discretion and sound judgment. \u2022 Represent the\
    \ CRO\u2019s office with professionalism, rigor, and a solutions-oriented mindset.\
    \ Who You Are \u2022 Proven experience as an Executive Assistant supporting C-level\
    \ leaders (CRO/CSO/COO preferred), ideally in fast-growing tech or consulting\
    \ environments OR deep experience in complex coordination and scheduling roles\
    \ (such as Recruitment Coordination) \u2022 Exceptional communication skills in\
    \ English (mandatory) and strong proficiency in French is a plus. \u2022 Comfortable\
    \ managing shifting priorities and multiple time zones in a fast-paced, high-ambiguity\
    \ environment. \u2022 Highly organized, detail-oriented, and able to anticipate\
    \ needs before they arise. \u2022 Strong mastery of Google Suite and/or Microsoft\
    \ Office; experience with productivity tools (Notion, Slack, CRM systems) is a\
    \ plus. \u2022 Proactive problem solver with a positive, can-do attitude and strong\
    \ ownership mindset. \u2022 Thrives in a startup environment where no job is too\
    \ small and impact is immediate. What we offer \U0001F4B0 Competitive cash salary\
    \ and equity \U0001F955 Food : Daily lunch vouchers \U0001F94E Sport : Monthly\
    \ contribution to a Gym pass subscription \U0001F6B4 Transportation : Monthly\
    \ contribution to a mobility pass \U0001F9D1\u200D\u2695 Health : Full health\
    \ insurance for you and your family \U0001F37C Parental : Generous parental leave\
    \ policy"
