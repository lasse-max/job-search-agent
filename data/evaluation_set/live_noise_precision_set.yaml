  description_text: "ABOUT AIRWALLEX Airwallex is the only unified payments and financial\
    \ platform for global businesses. Powered by our unique combination of proprietary\
    \ infrastructure and software, we empower over 200,000 businesses worldwide \u2013\
    \ including Brex, Rippling, Navan, Qantas, SHEIN and many more \u2013 with fully\
    \ integrated solutions to manage everything from business accounts, payments,\
    \ spend management and treasury, to embedded finance at a global scale. Proudly\
    \ founded in Melbourne, we have a team of over 2,200 of the brightest and most\
    \ innovative people in tech across 26 offices around the globe. Valued at US$8\
    \ billion and backed by world-leading investors including T. Rowe Price, Visa,\
    \ Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and\
    \ Lone Pine Capital, Airwallex is leading the charge in building the global payments\
    \ and financial platform of the future. If you\u2019re ready to do the most ambitious\
    \ work of your career, join us. ATTRIBUTES WE VALUE We hire successful builders\
    \ with founder-like energy who want real impact, accelerated learning, and true\
    \ ownership. You bring strong role-related expertise and sharp thinking, and you\u2019\
    re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles.\
    \ You move fast with good judgment, dig deep with curiosity, and make decisions\
    \ from first principles, balancing speed and rigor. You're humble and collaborative;\
    \ turn zero\u2011to\u2011one ideas into real products, and you \u201Cget stuff\
    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. ABOUT THE TEAM The\
    \ Product team at Airwallex is a group of passionate builders and problem-solvers\
    \ who are obsessed with crafting customer-centric solutions that empower businesses\
    \ to operate anywhere, anytime. We combine deep technical expertise with a strong\
    \ understanding of regulatory and operational requirements to design and build\
    \ unified, scalable, and compliant financial products. As a team, we thrive in\
    \ a fast-paced, collaborative environment, constantly iterating and raising the\
    \ bar to deliver best-in-class product experiences. WHAT YOU\u2019LL DO We are\
    \ looking for an experienced Senior Product Manager, Transaction Risk to lead\
    \ the development and optimisation of our transaction monitoring capabilities\
    \ across payments and financial operations. This role sits at the intersection\
    \ of risk, compliance, data, and product, ensuring that our monitoring systems\
    \ effectively detect suspicious activity while maintaining an excellent customer\
    \ experience. You will own the end-to-end product strategy for real-time and post-transaction\
    \ monitoring, including rule design, alert optimisation, workflow automation,\
    \ and client-specific risk controls. You will work closely with Risk, Compliance,\
    \ Operations, Data, and Engineering teams to build scalable and intelligent monitoring\
    \ systems that reduce fraud and financial crime while minimizing operational overhead.\
    \ RESPONSIBILITIES - Own the payment fraud product, including real-time rules,\
    \ alerting frameworks, and detection logic across our payments platform. - Optimise\
    \ monitoring rules and thresholds to improve detection quality and significantly\
    \ reduce false positives. - Build scalable post-transaction monitoring and manual\
    \ review workflows, including delay modes and investigator tooling. - Design client-specific\
    \ risk controls for large and complex merchants, tailoring monitoring rules, limits,\
    \ and safeguards to their transaction patterns and risk profiles. - Expand monitoring\
    \ coverage as business scales globally. Drive decisions across risk and compliance\
    \ workflows, including automation and data driven decisioning. - Partner closely\
    \ with Risk Operations to optimise alert triage, case management, and investigator\
    \ productivity. - Work with Data and Engineering to ensure reliable monitoring\
    \ data pipelines, high-quality signals, and scalable detection infrastructure.\
    \ - Identify opportunities to leverage AI and advanced analytics to improve detection\
    \ accuracy and reduce manual operational effort. - Ensure monitoring capabilities\
    \ align with AML, fraud, and regulatory requirements while maintaining a seamless\
    \ customer experience. WHO YOU ARE We\u2019re looking for candidates who meet\
    \ the minimum qualifications below. Preferred qualifications are a plus but not\
    \ mandatory. MINIMUM QUALIFICATIONS - 6+ years of Product Management experience,\
    \ ideally in payments, fintech, or financial crime prevention. - Experience building\
    \ or owning transaction monitoring, fraud detection, or AML systems. - Strong\
    \ data-driven mindset with the ability to analyse transaction data, alerts, and\
    \ rule performance. - Comfortable working with SQL and data tools to investigate\
    \ signals, optimise rules, and evaluate monitoring performance. - Experience defining\
    \ risk detection logic, monitoring rules, and thresholds. - Proven ability to\
    \ work cross-functionally with Risk, Compliance, Operations, Data, and Engineering\
    \ teams. - Strong stakeholder management skills and the ability to translate regulatory\
    \ and risk requirements into scalable product solutions. - Experience building\
    \ scalable, automated systems in regulated environments while balancing risk,\
    \ operational efficiency, and customer experience. PREFERRED QUALIFICATIONS -\
    \ Experience with AML monitoring or fraud detection platforms. - Familiarity with\
    \ case management and investigation tooling. - Exposure to machine learning or\
    \ AI-driven risk systems. APPLICANT SAFETY POLICY: FRAUD AND THIRD-PARTY RECRUITERS\
    \ To protect you from recruitment scams, please be aware that Airwallex will not\
    \ ask for bank details, sensitive ID numbers (i.e. passport), or any form of payment\
    \ during the application or interview process. All official communication will\
    \ come from an @airwallex.com http://airwallex.com email address. Please apply\
    \ only through careers.airwallex.com http://careers.airwallex.com or our official\
    \ LinkedIn page. Airwallex does not accept unsolicited resumes from search firms/recruiters.\
    \ Airwallex will not pay any fees to search firms/recruiters if a candidate is\
    \ submitted by a search firm/recruiter unless an agreement has been entered into\
    \ with respect to specific open position(s). Search firms/recruiters submitting\
    \ resumes to Airwallex on an unsolicited basis shall be deemed to accept this\
    \ condition, regardless of any other provision to the contrary. EQUAL OPPORTUNITY\
    \ Airwallex is proud to be an equal opportunity employer. We value diversity and\
    \ anyone seeking employment at Airwallex is considered based on merit, qualifications,\
    \ competence and talent. We don\u2019t regard color, religion, race, national\
    \ origin, sexual orientation, ancestry, citizenship, sex, marital or family status,\
    \ disability, gender, or any other legally protected status when making our hiring\
    \ decisions. If you have a disability or special need that requires accommodation,\
    \ please let us know."
