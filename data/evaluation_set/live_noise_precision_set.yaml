  source_url: https://jobs.ashbyhq.com/snowflake/fddd1178-43c9-46d0-941f-42a0fe2d363a
  description_text: "At Snowflake, we are powering the era of the agentic enterprise.\
    \ To usher in this new era, we seek AI-native thinkers across every function who\
    \ are energized by the opportunity to reinvent how they work. You don\u2019t just\
    \ use tools; you possess an innate curiosity, treating AI as a high-trust collaborator\
    \ that is core to how you solve problems and accelerate your impact. We look for\
    \ low-ego individuals who thrive in dynamic and fast-moving environments and move\
    \ with an experimental mindset \u2014 who rapidly test emerging capabilities to\
    \ discover simpler, more powerful ways to deliver results. At Snowflake, your\
    \ role isn't just to execute a function, but to help redefine the future of how\
    \ work gets done. Snowflake\u2019s Solution Engineering team is seeking a Regional\
    \ VP, Partner Solution Engineering (APJ) to lead an elite organization of technical\
    \ experts dedicated to empowering our diverse partner ecosystem. This leader will\
    \ drive the technical strategy and go-to-market execution across all partner tiers,\
    \ ensuring that the Snowflake Data Cloud remains the foundation for global digital\
    \ transformation. You will lead a team that supports: - Global & Regional Systems\
    \ Integrators (GSIs & RSIs): Guiding massive multinational firms and specialized\
    \ regional experts as they architect and implement cutting-edge data workloads\
    \ for the world\u2019s largest enterprises. - Cloud Service Providers (CSPs):\
    \ Deepening technical alignment with our infrastructure partners\u2014AWS, Azure\u2014\
    to optimize co-selling and cross-cloud performance. - Data Cloud Partners (DCPs):\
    \ Enabling Technology and Content partners to build, distribute, and monetize\
    \ innovative applications and data sets directly on the Snowflake Marketplace.\
    \ - Strategic Alliances: Managing high-impact technical integrations with key\
    \ partners like SAP, ensuring seamless data gravity and interoperability for complex\
    \ ERP and enterprise environments. Through these partnerships, you will enable\
    \ the APJ ecosystem to help customers eliminate data silos, optimize operations,\
    \ and transform their products by putting the full power of the Snowflake Data\
    \ Cloud into the hands of every user. In this role, you will lead a team of Partner\
    \ Solution Engineers as well as work directly with Snowflake's Partner Management,\
    \ Sales, Pre-Sales, Marketing, and Services teams and partners to develop initiatives\
    \ and programs to establish new and strengthen existing Snowflake practices, build\
    \ relationships between Snowflake and our partners' technical sales resources,\
    \ and develop and evangelize service offerings and joint solutions to address\
    \ customer needs and market opportunities. Reporting to the VP of APJ Solution\
    \ Engineering, you will play a hands-on role in building a team of Partner Solution\
    \ Engineers and owning the P&L responsibilities for the group. IN THIS ROLE YOU\
    \ WILL GET TO: - Drive strategic customer and partner engagements in partnership\
    \ with Sales, Solution Engineering and GTM teams. - Build repeatable reference\
    \ architectures, frameworks to drive accelerated well architected deployments\
    \ - Thought leadership in overall AI Data Cloud across both internal and external\
    \ forums. - Act as escalation point for customers, sales teams, and product leadership\
    \ - Drive product gaps and roadmap processes as the Voice of the Field with product\
    \ and engineering - Drive overall operational excellence with KPIs, comp plans\
    \ etc. - Collaborate with EMEA and US to counterparts on best practices and approaches\
    \ - Build and lead a team of Partner Solution Engineers who serve as the technical\
    \ sales leaders and trusted advisors for our partners - Team with the Partner\
    \ Management, Sales, Pre-Sales, Marketing, and Services teams and partners to\
    \ develop initiatives and programs to strengthen our partner\u2019s Snowflake\
    \ practices and develop service offerings and joint solutions to address customer\
    \ needs and market opportunities - Provide guidance to the larger Snowflake team\
    \ on best practices for engaging with and leveraging Snowflake\u2019s Partner\
    \ Network - Interpret complex problems, create simple solutions, and collaborate\
    \ closely with the larger Snowflake team and our partners to deliver winning solutions\
    \ - Collaborate and maintain a close working relationship with the Partner Management,\
    \ Sales, Pre-Sales, Marketing, and Services teams - Play an active role in sourcing\
    \ and screening potential candidates and managing the interview process - Act\
    \ as a player/coach working with your team on and delivering compelling presentations\
    \ and strategic support to our Snowflake Partner Network ON DAY ONE WE WILL EXPECT\
    \ YOU TO HAVE: - 15+ years of industry experience in a pre-sales/customer facing\
    \ capacity with 4+ years of direct line management experience (hiring, training\
    \ and retaining top talent) - Broad range of experience with large-scale database\
    \ or data warehouse technologies and/or business intelligence technology - Understanding\
    \ of cloud architectures and services involving SaaS solutions with any of the\
    \ popular cloud providers (Amazon Web Services, Google Cloud, Microsoft Azure)\
    \ - Outstanding presenting skills to both technical and executive audiences, whether\
    \ impromptu on a whiteboard or using presentations and demos - Ability to connect\
    \ a customer\u2019s specific business problems and Snowflake\u2019s solutions\
    \ - Experience architecting solutions with vendor technologies such as Tableau,\
    \ Informatica, Thoughtspot, Qlik, Fivetran, AWS Sagemaker, Dataiku, Collibra,\
    \ Immuta, etc. - Hands-on expertise with SQL and SQL analytics - University degree\
    \ in computer science, engineering, mathematics or related fields, or equivalent\
    \ experience preferred Snowflake is growing fast, and we\u2019re scaling our team\
    \ to help enable and accelerate our growth. We are looking for people who share\
    \ our values, challenge ordinary thinking, and push the pace of innovation while\
    \ building a future for themselves and Snowflake. How do you want to make your\
    \ impact? For jobs located in the United States, please visit the job posting\
    \ on the Snowflake Careers Site for salary and benefits information: careers.snowflake.com\
    \ http://careers.snowflake.com"
