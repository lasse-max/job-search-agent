    capabilities into frontline workflows. - Partnering with sales, marketing, and
    customer support business units to outline and deliver immediate reporting enhancements.
    Where and how you can work This position is ideally based in Melbourne to maintain
    close proximity to the core engineering team, though applicants located anywhere
    along the East Coast of Australia are welcome. We support a hybrid working model
    that blends remote flexibility with collaborative in-office connection. You can
    expect designated boost days to join colleagues in our dedicated office spaces
    for collaborative sessions, team activities, and workshops. Here are some of the
    things we are looking for: - Deep technical familiarity with complex, large-scale
    big data systems and real-time data products. - A proven ability to communicate
    sophisticated data concepts clearly to senior leadership and non-technical stakeholders.
    - Experience operating autonomously in ambiguous environments, making confident
    decisions without a clear-cut path forward. - Skill in managing conflicting priorities
    from demanding business units such as marketing and sales. - A strong commercial
    mindset with a background in handling marketing or sales data portfolios. - Comfort
    partnering closely with cross-functional engineering and data science panels to
    assess technical feasibility. Apply even if your experience isn''t a perfect match!
    At Xero, we hire based on your skills, passion, and the unique perspective you
    can bring to enhance our culture and team.'
