  description_text: "FEQ327R202 Location: Canberra At Databricks, our core principles\
    \ are at the heart of everything we do; creating a culture of proactiveness and\
    \ a customer-centric mindset guides us to create a unified platform that makes\
    \ data science and analytics accessible to everyone. We aim to inspire our customers\
    \ to make informed decisions that push their business forward. We provide a user-friendly\
    \ and intuitive platform that makes it easy to turn insights into action and fosters\
    \ a culture of creativity, experimentation, and continuous improvement. You will\
    \ be an essential part of this mission, using your technical expertise to demonstrate\
    \ how our Data Intelligence Platform can help customers solve their complex data\
    \ challenges. You'll work with a collaborative, customer-focused team that values\
    \ innovation and creativity, using your skills to create customized solutions\
    \ to help our customers achieve their goals and guide their businesses forward.\
    \ Join us in our quest to change how people work with data and make a better world!\
    \ The impact you will have:&nbsp; Form successful relationships with clients throughout\
    \ your assigned territory, providing technical and business value to Databricks\
    \ customers in collaboration with Account Executives. Operate as an expert in\
    \ big data analytics to excite customers about Databricks. You will develop into\
    \ a \u2018champion\u2019 and trusted advisor on multiple issues of architecture,\
    \ design, and implementation to lead to the successful adoption of the Databricks\
    \ Data Intelligence Platform. Scale best practices in your field and support customers\
    \ by authoring reference architectures, how-tos, and demo applications, and help\
    \ build the Databricks community in your region by leading workshops, seminars,\
    \ and meet-ups. Grow your knowledge and expertise to the level of a technical\
    \ and/or industry specialist. What we look for: Engage customers in technical\
    \ sales, challenge their questions, guide clear outcomes, and communicate technical\
    \ and value propositions. Experience in developing customer relationships with\
    \ Federal/Defence accounts, and building internal partnerships with account executives\
    \ and teams. Prior experience with coding in a core programming language (i.e.,\
