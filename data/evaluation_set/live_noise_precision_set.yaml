  description_text: "About Mistral At Mistral AI, we believe in the power of AI to\
    \ simplify tasks, save time, and enhance learning and creativity. Our technology\
    \ is designed to integrate seamlessly into daily working life. We democratize\
    \ AI through high-performance, optimized, open-source and cutting-edge models,\
    \ products and solutions. Our comprehensive AI platform is designed to meet enterprise\
    \ needs, whether on-premises or in cloud environments. Our offerings include le\
    \ Chat, the AI assistant for life and work. We are a dynamic, collaborative team\
    \ passionate about AI and its potential to transform society. Our diverse workforce\
    \ thrives in competitive environments and is committed to driving innovation.\
    \ Our teams are distributed between France, USA, UK, Germany and Singapore. We\
    \ are creative, low-ego and team-spirited. Join us to be part of a pioneering\
    \ company shaping the future of AI. Together, we can make a meaningful impact.\
    \ See more about our culture on https://mistral.ai/careers. Role Summary : AI\
    \ Deployment Strategist As an AI Deployment Strategist, you will drive the adoption\
    \ and deployment of Mistral\u2019s AI solutions, working closely with customers\
    \ from strategic vision to production implementation. This role sits at the intersection\
    \ of business strategy, AI innovation, and hands-on deployment, ensuring our customers\
    \ achieve transformative outcomes. You will partner with senior executives to\
    \ design AI roadmaps, collaborate with the Applied AI team to deliver solutions\
    \ in production, and ensure seamless transitions from presales to postsales. Your\
    \ work will directly contribute to customer success, bridging the gap between\
    \ strategy and execution. This role is ideal for those who thrive in a fast-paced\
    \ environment, enjoy solving complex business challenges, and are passionate about\
    \ turning AI potential into real-world impact. What you will do Strategic Discovery\
    \ & Vision Setting \u2022 Lead executive-level workshops to identify business\
    \ challenges and opportunities where Mistral\u2019s AI can drive step-change improvements.\
    \ \u2022 Co-create AI adoption roadmaps with customers, articulating the \u201C\
    art of the possible\u201D and a clear path to value. \u2022 Collaborate with Account\
    \ Executives to develop business cases, quantify ROI, and align solutions with\
    \ customer objectives. AI Solution Design & Deployment \u2022 Architect end-to-end\
    \ AI solutions, integrating Mistral\u2019s models and platform into customer workflows\
    \ and technical infrastructure. \u2022 Partner with the Applied AI team to design,\
    \ prototype, and deploy AI solutions in production, ensuring scalability and impact.\
    \ \u2022 Own the execution of pilot projects and proofs-of-value, demonstrating\
    \ the potential of our technology and paving the way for full-scale deployment.\
    \ Value Realization & Customer Success \u2022 Serve as a trusted advisor to customers,\
    \ guiding their AI strategy and ensuring they maximize the value of their investment\
    \ in Mistral. \u2022 Monitor key performance indicators (KPIs) tied to business\
    \ outcomes, and communicate progress to executive sponsors. \u2022 Proactively\
    \ identify expansion opportunities within accounts, building on initial successes\
    \ to drive long-term partnerships. Cross-Functional Collaboration \u2022 Act as\
    \ the bridge between customers and Mistral\u2019s internal teams, synthesizing\
    \ feedback to influence product and research roadmaps. \u2022 Develop reusable\
    \ assets, best practices, and playbooks to scale go-to-market efforts and ensure\
    \ consistent delivery excellence. \u2022 Travel (~30-60%) to foster deep client\
    \ relationships and support on-site deployment. About you \u2022 2+ years in a\
    \ client-facing strategic and technical role (e.g., data science consulting, value\
    \ engineering, or technical sales). \u2022 You hold a degree in a relevant scientific\
    \ field (e.g., Computer Science, Data Science, Engineering, etc.) \u2022 Foundational\
    \ knowledge of AI/ML/Data Science, with the credibility to advise both technical\
    \ and non-technical audiences. \u2022 Hands-on experience building and deploying\
    \ AI applications (Python, JavaScript, or similar) to demonstrate value. \u2022\
    \ Strong business acumen and problem-solving skills, with the ability to structure\
    \ ambiguous challenges into actionable solutions. \u2022 Executive presence and\
    \ communication skills to influence senior stakeholders (VP, C-level). \u2022\
    \ Hands on experience building and deploying AI applications (Python) \u2022 Resilient,\
    \ results-driven, and comfortable leading through influence in a collaborative\
    \ environment. \u2022 Experience with sales qualification frameworks (e.g., MEDDPICC)\
    \ and value-based selling is a plus. Why This Role Matters You will play a pivotal\
    \ role in shaping how enterprises adopt and deploy AI, ensuring Mistral\u2019\
    s solutions deliver measurable impact. By partnering with the Applied AI team,\
    \ you\u2019ll help turn strategic visions into production-ready solutions, making\
    \ Mistral an indispensable partner for our customers. Hiring Process \u2022 Talent\
    \ Acquisition screening call \u2022 30min Hiring Manager Interview \u2022 45min\
    \ Business Acumen Interview \u2022 60min Technical Deep Dive on LLMs \u2022 Panel\
    \ (Home Prep & Restitution) \u2022 30min Value Talk \u2022 Reference check Benefits\
    \ France \U0001F4B0 Competitive cash salary and equity \U0001F955 Daily lunch\
    \ vouchers : Swile meal vouchers with 10,83\u20AC per worked day, incl 60% offered\
    \ by company \U0001F94E Sport : Enjoy discounted access to gyms and fitness studios\
    \ through our Wellpass partnership \U0001F6B4 Transportation : Monthly contribution\
    \ to a mobility pass via Betterway \U0001F9D1\u200D\u2695\uFE0F Health : Full\
    \ health insurance for you and your family \U0001F37C Parental : Generous parental\
    \ leave policy \U0001F30E Visa sponsorship \U0001F91D Coaching: we offer BetterUp\
    \ coaching on a voluntary basis By applying, you agree to our Applicant Privacy\
    \ Policy."
