    \ As a GTM and technical leader in the earliest conversations with our future\
    \ customers, you will both understand and anticipate their needs to continue our\
    \ industry-leading AI solution. WHAT YOU'LL BRING - 5-7+ years experience in Sales\
    \ Engineering, Solutions Engineering or customer-facing technical sales. - Past\
    \ experience in demo building, and presenting, and working with customers or clients\
    \ in the GTM function. - Experience in relationship-building with potential customers,\
    \ including executives and technical leaders. - Experience in leading the sales\
    \ process with Enterprise customers. - Ability to connect a prospect\u2019s specific\
    \ business problems and Sierra\u2019s solutions and explain them to both a technical\
    \ and non-technical audience - Bachelor's Degree or above; bonus if in Computer\
    \ Science or related field, or equivalent professional experience. EVEN BETTER...\
    \ - AI-related experience (or experience in a similarly modern and highly technical\
    \ industry). - Experience translating code, technical logic and user requirements\
    \ to product and engineering requirements. OUR VALUES - Trust: We build trust\
    \ with our customers with our accountability, empathy, quality, and responsiveness.\
    \ We build trust in AI by making it more accessible, safe, and useful. We build\
    \ trust with each other by showing up for each other professionally and personally,\
    \ creating an environment that enables all of us to do our best work. - Customer\
    \ Obsession: We deeply understand our customers\u2019 business goals and relentlessly\
    \ focus on driving outcomes, not just technical milestones. Everyone at the company\
    \ knows and spends time with our customers. When our customer is having an issue,\
    \ we drop everything and fix it. - Craftsmanship: We get the details right, from\
    \ the words on the page to the system architecture. We have good taste. When we\
    \ notice something isn\u2019t right, we take the time to fix it. We are proud\
