  description_text: "Celonis is the global leader in Process Intelligence and the\
    \ pioneer of Process Mining technology. As one of the world\u2019s fastest-growing\
    \ enterprise SaaS companies, we are changemakers pushing the boundaries of what\u2019\
    s possible. We invest heavily in advanced AI capabilities\u2014specifically our\
    \ Process Intelligence Graph\u2014to turn data insights into immediate business\
    \ action. We believe there is a massive opportunity to unlock global productivity\
    \ and sustainability by placing intelligence at the core of every business process.\
    \ Join our mission to make processes work for people, companies, and the planet.\
    \ The Opportunity Are you a business outcome-driven transformation leader with\
    \ 15+ years of experience designing and operationalizing large-scale cloud, edge,\
    \ and AI platforms? We are looking for a Client Value Partner to bridge the gap\
    \ between business and technology for top-tier retail, CPG, and logistics enterprise\
    \ accounts. You will act as a senior technical advisor to C-suite executives,\
    \ guiding teams from prototype to production at a global scale. By combining Process\
    \ Intelligence software (Celonis) with cutting-edge Edge AI and cloud technologies,\
    \ you will map strategic goals to a long-term vision, deploy Process Mining Centers\
    \ of Excellence, and architect large-scale transformational programs at Fortune\
    \ 500 clients. The Work: Identify &amp; Frame Value Translate Strategy to Operations:\
    \ &nbsp;Analyze the client's strategic goals and map them to a long-term vision\
    \ utilizing Process Intelligence software. Target High-Impact Areas: &nbsp;Architect\
    \ the C-suite agenda by optimizing entire value chains, specifically targeting\
    \ areas like procurement operations and inventory management. Integrate store-level\
    \ anti-shrink detection, robotics, and automation enabling new retail concepts.\
    \ Build the Business Case: &nbsp;Develop robust Business Cases and AI roadmaps\
    \ in support of organizations. Identify opportunities for general automation,\
    \ Edge compute, and AI/ML pipelines across hybrid infrastructures. Undertake Value\
    \ Assessments: &nbsp;Leverage deep product knowledge as a certified Celonis Value\
    \ Assessment Expert to communicate value opportunities and strategic roadmaps.\
    \ Realize &amp; Orchestrate Value Drive Engagement Success: &nbsp;Head several\
    \ Process Improvement workstreams for transformational programs at Fortune 500\
    \ clients. Orchestrate the Ecosystem: &nbsp;Deploy Process Mining Centers of Excellence\
    \ to support the deployment and operationalization of Celonis. Coordinate technical\
    \ teams to deliver architecture reviews, executive workshops, demos, and technical\
    \ execution. Solve Systemic Challenges: &nbsp;Develop custom data models, data\
    \ dashboards, and automations to identify and correct errors, and execute requirements\
    \ gathering to prevent mismatches of invoices, goods receipts, and purchase orders.\
    \ Facilitate Workshops: &nbsp;Facilitate process mapping workshops to identify\
    \ and qualify opportunities for process enhancement in Supply Chain and Finance\
    \ functions. Accelerate Proof of Concepts to drive business and technology decisions.\
    \ Deliver Measurable Impact: &nbsp;Drive significant P&amp;L and Working Capital\
    \ savings while automating workflows to save thousands of hours of manual effort\
    \ for clients. Target shaping technical strategy with an estimated&nbsp; $100M+\
    \ &nbsp;in customer ROI. Manage Architectural Risk: &nbsp;Perform architectural\
    \ risk reviews to validate system direction early and minimize vulnerability exposure.\
    \ Partner with infosec and legal teams to define strict guardrails for AI data\
    \ collection, training, privacy, and Responsible AI. Scale &amp; Innovate Codify\
    \ Best Practices: &nbsp;Develop standards to analyze, automate, and improve business\
    \ processes in a product-agnostic manner. Streamline deployments utilizing CI/CD\
    \ and infrastructure automation concepts. Build Strategic Partnerships: &nbsp;Develop\
    \ meaningful partnerships with various process-oriented firms to support clients\
    \ across data preparation, system migration, data warehousing, and process mining\
    \ use case needs. Innovate &amp; Enable: &nbsp;Publish internally developed applications\
    \ to enable customers to identify appropriate levels of inventory and take corrective\
    \ action. Drive innovation utilizing IoT, computer vision, and experimental GPUs.\
    \ Expand Global Footprint: &nbsp;Manage multi-year regional deployments supporting\
    \ multiple countries and languages for multi-national clients. The Qualifications\
    \ You Need Deep Industry Experience: 15+ years of relevant experience designing\
    \ and operationalizing large-scale platforms, ideally combining time at a global\
    \ Retail, Logistics, or Supply Chain-intensive firm with Strategy Consulting.\
    \ You possess a proven track record delivering solutions for major enterprises.\
    \ Consulting Leadership: Proven progression in consulting, with experience serving\
    \ as a Consultant, Senior Consultant, Manager, Director or Vice President. Value\
    \ Realization Skills: &nbsp;You have a track record of driving large-scale transformation\
    \ programs. You understand how to impact the P&amp;L through inventory optimization,\
    \ logistics efficiency, and cash flow improvement. Domain Expertise: &nbsp;Demonstrated\
    \ experience managing multi-year deployments for multi-national CPG clients, coupled\
    \ with a deep understanding of accounts payable and procurement operations. Technical\
    \ Fluency: &nbsp;You understand the modern supply chain stack (SAP S/4HANA, Oracle,\
    \ TMS/WMS systems) and how to translate Celonis use cases into the customer's\
    \ specific business landscape. Stakeholder Management: &nbsp;Exceptional stakeholder\
    \ management skills, with proven experience working closely with application owners,\
    \ server owners, managed service providers, and business leadership. &nbsp; What\
    \ Celonis can offer you: Pioneer Innovation: Work with the global leader in Process\
    \ Mining and the Process Intelligence Graph to shape the future of AI-driven business\
    \ operations. Ownership from Day 1: Every full-time \"Celonaut\" is an owner,\
    \ receiving Restricted Stock Units (RSUs) and merit-based refresh grants. Unrivaled\
    \ Family Support: Benefit from our inclusive parental leave policy\u201424 weeks\
    \ of fully paid leave for primary carers and 12 weeks for supporting carers, available\
    \ from your first day of employment. Work-Life Integration: Enjoy Unlimited PTO\
    \ (in applicable regions) and generous PTO globally, as well as a flexible hybrid\
    \ work model that balances remote focus with vibrant office collaboration. Continuous\
    \ Growth: Elevate your skills through our 70-20-10 learning framework, mentorship\
    \ programs, and access to a dedicated learning platform. Holistic Well-being:\
    \ Prioritize your health with subsidized Wellhub memberships, mental health counseling,\
    \ and dedicated \"Wellness Weeks\" that prioritize work/life balance. Drive Sustainability:\
    \ Participate in annual Impact Days, where you receive paid time off to volunteer\
    \ for community and environmental causes with your local office, or virtually.\
    \ Global Inclusion &amp; Belonging: Find community through our Inclusion Think\
    \ Tank and participate in our annual Inclusion Days, ensuring every voice is heard\
    \ and valued. Value-Driven Impact: Join a mission-led organization where our core\
    \ values\u2014Live for Customer Value, The Best Team Wins, We Own It, and Earth\
    \ Is Our Future\u2014drive every decision. About Us: Celonis makes processes work\
    \ \u2014 for people, companies, and the planet. Powered by process mining and\
    \ AI, the Celonis Process Intelligence Platform integrates process data and business\
    \ context to create a living digital twin of business operations. We enable thousands\
    \ of companies worldwide to understand how their business actually runs and, together\
    \ with their partners, build intelligent solutions that transform and continuously\
    \ improve the way they operate \u2014 unlocking billions in value. Celonis is\
    \ headquartered in Munich, Germany, and New York City, USA, with more than 20\
    \ offices worldwide. Get familiar with the Celonis Process Intelligence Platform\
    \ by watching this video . Celonis Inclusion Statement: At Celonis, we believe\
    \ our people make us who we are and that \u201CThe Best Team Wins\u201D. We know\
    \ that the best teams are made up of people who bring different perspectives to\
    \ the table. And when everyone feels included, able to speak up and knows their\
    \ voice is heard - that's when creativity and innovation happen. Your Privacy:\
    \ Any information you submit to Celonis as part of your application will be processed\
    \ in accordance with Celonis\u2019 Accessibility and Candidate Notices By submitting\
    \ this application, you confirm that you agree to the storing and processing of\
    \ your personal data by Celonis as described in our Privacy Notice for the Application\
    \ and Hiring Process . Please be aware of common job offer scams, impersonators\
    \ and frauds. Learn more here ."
