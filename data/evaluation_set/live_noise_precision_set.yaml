    \ Python experience - Ability to connect specific business problems and Snowflake\u2019\
    s solutions - University degree in computer science, engineering, mathematics\
    \ or related fields, or equivalent experience preferred - Fluency in English required\
    \ Snowflake is growing fast, and we\u2019re scaling our team to help enable and\
    \ accelerate our growth. We are looking for people who share our values, challenge\
    \ ordinary thinking, and push the pace of innovation while building a future for\
    \ themselves and Snowflake. How do you want to make your impact? For jobs located\
    \ in the United States, please visit the job posting on the Snowflake Careers\
    \ Site for salary and benefits information: careers.snowflake.com http://careers.snowflake.com"
