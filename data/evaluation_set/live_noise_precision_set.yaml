    \ environment, a deep understanding of and established relationships in Australia\u2019\
    s Telecommunications vertical. You will define the go-to-market strategy, influence\
    \ cross-functional teams, coach a high-performing team, and build long-term partnerships\
    \ that accelerate data-driven transformation in the telecommunications industry\
    \ in Australia. The impact you will have: Develop and execute the ANZ Telco growth\
    \ strategy, aligning with global priorities and local government regulations Build,\
    \ mentor, and scale a team of experienced Account Executives and Solution Strategists\
    \ dedicated to the Telco vertical. Create Trust-Based Relationships: Develop long-term,\
