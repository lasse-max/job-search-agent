    \ improvements. Define clear incident communication and escalation practices for\
    \ both technical and non-technical stakeholders. Contribute to the long-term development\
    \ of Mistral\u2019s incident response function, with the potential to mentor or\
    \ lead future team members. About You Significant experience leading complex incident\
    \ response and digital forensics investigations in cloud-native, technology, or\
