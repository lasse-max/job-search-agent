  description_text: "ABOUT AIRWALLEX Airwallex is the only unified payments and financial\
    \ platform for global businesses. Powered by our unique combination of proprietary\
    \ infrastructure and software, we empower over 200,000 businesses worldwide \u2013\
    \ including Brex, Rippling, Navan, Qantas, SHEIN and many more \u2013 with fully\
    \ integrated solutions to manage everything from business accounts, payments,\
    \ spend management and treasury, to embedded finance at a global scale. Proudly\
    \ founded in Melbourne, we have a team of over 2,200 of the brightest and most\
    \ innovative people in tech across 26 offices around the globe. Valued at US$8\
    \ billion and backed by world-leading investors including T. Rowe Price, Visa,\
    \ Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and\
    \ Lone Pine Capital, Airwallex is leading the charge in building the global payments\
    \ and financial platform of the future. If you\u2019re ready to do the most ambitious\
    \ work of your career, join us. ATTRIBUTES WE VALUE We hire successful builders\
    \ with founder-like energy who want real impact, accelerated learning, and true\
    \ ownership. You bring strong role-related expertise and sharp thinking, and you\u2019\
    re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles.\
    \ You move fast with good judgment, dig deep with curiosity, and make decisions\
    \ from first principles, balancing speed and rigor. You're humble and collaborative;\
    \ turn zero\u2011to\u2011one ideas into real products, and you \u201Cget stuff\
    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. ABOUT THE TEAM Airwallex\u2019\
    s SME & Growth team partners with ambitious SMB and mid\u2011market businesses\
    \ operating across borders, helping them get paid, manage FX, pay suppliers and\
    \ issue cards from a single platform. In France, we\u2019re in build mode: a lean,\
    \ high\u2011calibre commercial team in a large greenfield market. You\u2019ll\
    \ work at the intersection of Sales, Partnerships and Marketing, building an ecosystem\
    \ with VCs, accelerators and the startup community to fuel our SME & Growth franchise\
    \ in France (and selectively across EMEA). ABOUT THE ROLE Reporting to the Head\
    \ of Sales, SME & Growth France and working closely with EMEA Partnerships, you\
    \ will be Partnerships Manager \u2013 VC & Startup Ecosystem, building and scaling\
    \ a new growth vector for Airwallex in France. You will design and execute our\
    \ strategy with VCs, accelerators, incubators and startup platforms in France,\
    \ fully aligned with our EMEA vision \u2013 om end\u2011to\u2011end \u2013 from\
    \ sourcing and signing partners, to enabling their teams, to turning relationships\
    \ into qualified pipeline and revenue. You\u2019ll own partner\u2011sourced targets,\
    \ be the primary contact for priority partners, and coordinate with Sales, Marketing,\
    \ SDRs and Product. The role is based in Paris in a hybrid model (min. 3 days/week\
    \ in office). WHAT YOU\u2019LL BE DOING - Build and own the VC & startup ecosystem\
    \ strategy in France: define objectives, target partner archetypes and prioritisation,\
    \ and segment partners by fit and revenue potential. - Originate, negotiate and\
    \ sign high\u2011value partnerships with leading VCs, accelerators and startup\
    \ programmes in core Airwallex verticals; structure win\u2011win commercial and\
    \ marketing agreements and coordinate internal approvals. - Activate partners\
    \ and generate pipeline via webinars, office hours, clinics, demo days and joint\
    \ events; work with Marketing, SDRs and Sales to run repeatable motions and optimise\
    \ partner\u2011sourced funnel from reach to revenue. - Act as an ecosystem ambassador,\
    \ representing Airwallex at key events, building deep relationships with GPs,\
    \ platform teams and founders, and translating ecosystem trends into opportunities.\
    \ - Partner internally with Sales, Marketing and Product on target segments, rules\
    \ of engagement and feedback loops (product gaps, pricing, packaging, use cases).\
    \ - Own performance and reporting on partner\u2011sourced pipeline, revenue and\
    \ portfolio penetration, maintaining strong CRM hygiene and providing regular,\
    \ data\u2011driven updates to the Head of Sales. YOU ARE... - An ecosystem builder\
    \ who enjoys creating networks and scalable programmes in the VC / startup world.\
    \ - Commercial and outcome\u2011driven, comfortable negotiating and closing, and\
    \ focused on pipeline, conversion and revenue. - Strategic and structured, able\
    \ to turn broad goals into clear strategy, priorities and operating rhythm. -\
    \ Hands\u2011on, low\u2011ego and creative, happy to do the work yourself and\
    \ design compelling partner value propositions with limited playbooks. - Data\u2011\
    driven and resilient, using metrics to prioritise and iterate, and thriving in\
    \ 0\u21921, ambiguous environments. - Relationship\u2011oriented, building trust\
    \ quickly with senior stakeholders and maintaining long\u2011term, win\u2011win\
    \ relationships. MINIMUM QUALIFICATIONS - 6+ years in partnerships, business development,\
    \ strategy or ecosystem roles in high\u2011growth environments (SaaS, fintech,\
    \ payments or B2B tech), including 3+ years directly in partnerships / ecosystem.\
    \ - Proven exposure to the VC / startup ecosystem (working with or within VCs,\
    \ accelerators, incubators or programmes), with examples of programmes targeting\
    \ early\u2011 and growth\u2011stage companies. - Existing network with VCs, accelerators\
    \ and startup communities in France (ideally across SaaS, e\u2011commerce and/or\
    \ travel) and a track record of leveraging it. - Experience running partner programmes\
    \ end\u2011to\u2011end (strategy, sourcing, contracting, activation, co\u2011\
    marketing, optimisation) and delivering measurable commercial outcomes. - High\
    \ comfort with data and tools (G\u2011Suite / Excel, Salesforce CRM and ideally\
    \ BI tools like Looker). - Strong interest in fintech, international payments,\
    \ FX and multi\u2011currency products, and ability to understand startup use cases.\
    \ - Excellent written and verbal communication in French (native) and English\
    \ (professional); Spanish or Italian is a plus. - Bachelor\u2019s degree in Business,\
    \ Finance, Engineering or related field, or equivalent experience. WHY JOIN AIRWALLEX\
    \ At Airwallex, you\u2019ll have the chance to make a disproportionate impact\
    \ in a rapidly growing global fintech, with competitive salary, attractive commission\
    \ and meaningful equity. In France, we\u2019re in hard scaling mode, backed by\
    \ a committed \u20AC71m investment to build a category\u2011defining franchise.\
    \ You\u2019ll join at a pivotal moment, with high ambition and plenty still to\
    \ build \u2013 ideal for an ecosystem builder who wants to shape how Airwallex\
    \ partners with VCs, accelerators and the next generation of European scale\u2011\
    ups. APPLICANT SAFETY POLICY: FRAUD AND THIRD-PARTY RECRUITERS To protect you\
