  description_text: "About Parloa Parloa\u2019s mission is to make every customer\
    \ conversation feel effortless for both customers and the companies serving them.\
    \ As agentic AI accelerates, Parloans are shaping the foundation of a new era\
    \ in customer experience, one where customer support is no longer transactions,\
    \ but meaningful exchanges. It is not just a vision; Parloa has powered over ONE\
    \ BILLION interactions between global enterprise brands and their customers, with\
    \ companies like Booking.com, HealthEquity, Allianz, SAP, BarmeniaGothaer, and\
    \ TUI already deploying Parloa at scale. About the role: As a Senior Forward Deployed\
    \ Engineer&nbsp; at Parloa, you\u2019ll be on the front lines of enterprise AI\
    \ adoption \u2014 delivering cutting-edge technology into some of the most complex\
    \ environments in the world. This is your opportunity to lead end-to-end deployment\
    \ projects from an engineering perspective \u2014 not just implementing what exists,\
    \ but engineering what\u2019s required to make it succeed at enterprise scale.\
    \ FDEs are our in-field product engineers. You will build what doesn\u2019t yet\
    \ exist, adapt architecture to enterprise realities, and engineer integrations\
    \ across systems and APIs to make deployments successful. Your work is hands-on\
    \ and code-first \u2014 you\u2019ll be building, debugging, and engineering solutions\
    \ directly in the field. What you ship not only makes deployments succeed, it\
    \ also defines how customers experience Parloa and shapes what our product becomes.\
    \ This is not about maintenance. This is about engineering what makes it work\
    \ in production, under real-world enterprise constraints, at speed and scale.\
    \ Areas of ownership: Own deployment engineering projects: Lead the technical\
    \ execution (incl. product engineering) of Parloa\u2019s deployments inside large,\
    \ complex enterprise environments Design for scale and resilience: Architect deployment\
    \ solutions that meet enterprise-grade requirements for performance, reliability,\
    \ and security Engineer solutions where none exist: Build custom extensions, integrations,\
    \ and configurations to close product gaps and meet enterprise requirements Work\
    \ across systems &amp; stacks: Operate at the intersection of backend engineering,\
    \ DevOps, and data engineering to ensure seamless delivery Partner with enterprise\
    \ teams: Collaborate directly with customer engineering organizations to overcome\
    \ constraints and deliver measurable outcomes Guide and mentor others: Collaborate\
    \ with and provide technical guidance to more junior in-field engineers Influence\
    \ at senior levels: Engage with enterprise architects and senior technical stakeholders,\
    \ discussing solutions and architectures in depth to ensure alignment and credibility\
    \ Debug under pressure: Rapidly unblock issues in mission-critical environments\
    \ and ensure customer success. Shape the product: Act as the feedback loop between\
    \ the field and our core engineering teams \u2014 turning deployment learnings\
    \ into platform evolution Deliver long-term impact: Work closely with Deployment\
    \ Strategists to ensure scalable architectures and durable customer value Our\
    \ Tech Stack:&nbsp; Typescript, NodeJS, OpenAI, Microsoft Azure, Kubernetes, Docker,\
    \ Terraform, MongoDB, MySQL, Redis, Kafka, MCP Who you are: 7+ years of professional\
    \ experience in software engineering, systems integration, DevOps, or data engineering\
    \ roles with direct customer impact Proven track record of leading deep technical\
    \ deployments and integrations in large-scale enterprise environments Strong technical\
    \ depth across backend engineering, infrastructure-as-code, Kubernetes/cloud platforms,\
    \ APIs, and databases - with proven experience in systems design and the ability\
    \ to go hands-on in production systems Ability to operate independently in ambiguous,\
    \ high-responsibility settings, especially when deploying live to enterprise systems\
    \ A builder\u2019s mindset with bias for action, creativity under pressure, and\
    \ an obsession with making things work in the real world Degree in Computer Science,\
    \ Engineering, or related technical field Native or near-native French language\
    \ skills and professional fluency in English Strong plus: Experience building\
    \ or integrating AI/LLM-powered systems (e.g., embedding agent workflows, vector\
    \ databases, prompt orchestration) Our Recruiting Process: Talent Acquisition\
    \ \u2192 Hiring Manager \u2192 Technical Interview(s) \u2192 Bar Raiser Why Parloa?\
    \ We\u2019re at the beginning of a new era in customer experience, one where AI\
    \ doesn\u2019t just respond, but understands, reasons, and takes action. We\u2019\
    re building agentic AI that enterprises trust with their most important customer\
    \ moments: complex questions, high volumes, real stakes. When millions of people\
    \ reach out to a brand, those interactions aren\u2019t just support tickets; they\u2019\
    re defining experiences. We\u2019re here to raise the standard: making every conversation\
    \ seamless, intelligent, and genuinely helpful. If you care about shaping how\
    \ businesses and customers connect at scale and want your work to matter in real,\
    \ everyday moments, this is where you do it. At Parloa, ownership isn\u2019t a\
    \ buzzword; it means being accountable for outcomes, not just tasks. We operate\
    \ in a category that\u2019s evolving fast, where the bar is high, and the problems\
    \ are complex. We hire people who think in solutions, communicate with clarity,\
    \ and follow through. People who are comfortable making decisions, taking responsibility,\
    \ and raising the standard for themselves and those around them. We\u2019ve grown\
    \ beyond the earliest startup phase, but we\u2019ve kept the intensity: fast execution,\
    \ direct feedback, and a strong expectation to contribute meaningfully from day\
    \ one. Backed by leading global investors like General Catalyst, EQT Ventures,\
    \ and Altimeter Capital, we\u2019re scaling with a clear ambition: to become the\
    \ global category leader in enterprise-grade conversational AI. &nbsp; Parloa\
    \ is committed to upholding the highest data protection standards for our clients'\
    \ and employees' data. All our employees are instrumental in ensuring the utmost\
    \ care, GDPR, and ISO compliance, including ISO 27001, in handling sensitive information.\
    \ Parloa is an e-verify employer in the USA. Please click here to learn more .\
    \ * We provide equal opportunities to all qualified applicants regardless race,\
    \ gender, sexual orientation, age, religion, national origin, disability status,\
    \ socioeconomic background and other characteristics."
