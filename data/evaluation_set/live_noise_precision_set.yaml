  description_text: "About the Opportunity We are seeking a dynamic and motivated\
    \ KYC Operations Intern to join our DE EDD KYCO Team. In this role, you will play\
    \ a key part in ensuring compliance with Anti-Money Laundering (AML) and Counter-Terrorism\
    \ Financing (CTF) regulations for the German market. Our goal in KYC Operations\
    \ is to build a culture of compliance that our customers, authorities, and stakeholders\
    \ can fully trust. This position is an ideal launchpad for a student or recent\
    \ graduate eager to gain hands-on experience in financial crime prevention, customer\
    \ due diligence, and operational process optimization within a fast-paced Fintech\
    \ leader. In This Role, You Will: Case Investigations &amp; Verification: Participate\
    \ in day-to-day customer due diligence (KYC) and transaction monitoring reviews,\
    \ identifying potential financial crime patterns or unusual typologies. Operational\
    \ Excellence: Support core document management workflows, administrative tasks,\
    \ and verify customer profiles to ensure compliance standards are met efficiently.\
    \ Remediations: Participate in continuous improvement initiatives, helping to\
    \ optimize our internal screening systems and update operational guidelines (Working\
    \ Instructions). Stakeholder Collaboration: Assist in gathering data for regulatory\
    \ requests or internal alignment under the supervision of the KYCO Team Leads\
    \ and Managers. What You Need to Be Successful: Background &amp; Knowledge Studies:\
    \ Currently pursuing or recently completed a Bachelor\u2019s degree (ideally in\
    \ Law, Business Administration, Criminology, Finance, or a related field). Prior\
    \ intern or working student experience is a plus. AML/KYC Interest: A strong interest\
    \ in financial crime prevention, with basic academic or practical knowledge of\
    \ the Spanish regulatory framework (Law 10/2010 and Sepblac guidelines) being\
    \ highly advantageous. Languages: Professional fluency in English (written and\
    \ spoken), German and Spanish a plus. Tools: Comfortable utilizing technology,\
    \ collaboration suites and learning specialized compliance software. Skills &amp;\
    \ Traits Analytical Mindset: High attention to detail, diligence, and the ability\
    \ to handle confidential and sensitive data securely. Hands-on Attitude: A proactive,\
    \ autonomous working style with a strong bias for action and a high willingness\
    \ to learn. Thrive in Fast-Paced Environments: Ability to adapt swiftly to evolving\
    \ business needs and changing regulatory environments. What\u2019s in it for You:\
    \ Accelerate Your Growth: Start your career in one of Europe\u2019s most disruptive\
    \ digital banking environments with a steep learning curve. Real Impact: Your\
    \ daily effort directly affects the team's operations, allowing you to take on\
    \ real responsibilities early on. Flat Hierarchy: Propose changes and voice your\
    \ ideas freely without navigating multiple bureaucratic layers of traditional\
    \ banks. Premium Benefits: Access to a Premium N26 bank account subscription (plus\
    \ family and friends discounts), personal development perks, and a diverse, multicultural\
    \ work space. Who we are N26 has reimagined banking for today\u2019s digital world.\
    \ Technology and design empower everything we do and it\u2019s how we are building\
