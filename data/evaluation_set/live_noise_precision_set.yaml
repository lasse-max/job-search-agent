  description_text: "About Anthropic Anthropic\u2019s mission is to create reliable,\
    \ interpretable, and steerable AI systems. We want AI to be safe and beneficial\
    \ for our users and for society as a whole. Our team is a quickly growing group\
    \ of committed researchers, engineers, policy experts, and business leaders working\
    \ together to build beneficial AI systems. Recruiter, G&amp;A or GTM London, UK\
    \ or Dublin, Ireland | Full-time About the role Anthropic is growing quickly across\
    \ EMEA, and we need recruiters who can help us hire exceptional people into the\
    \ teams that keep the company running and bring our work to customers. We\u2019\
    re looking for a Recruiter to join our Talent team\u2014based in London or Dublin\u2014\
    to own full-cycle recruiting for either our G&amp;A functions (Finance, Legal,\
    \ People, and related areas) or our Go-To-Market organization (Sales, Marketing,\
    \ Partnerships, and Customer-facing roles), depending on business need and your\
    \ background. This is a full-cycle individual-contributor role for a strong recruiter\
    \ who can run an excellent process end to end\u2014sourcing, screening, managing\
    \ stakeholders, and closing. You\u2019ll partner with hiring managers across EMEA\
    \ to understand what great looks like, build healthy pipelines, and deliver a\
    \ candidate experience that reflects Anthropic\u2019s values. You\u2019ll work\
    \ in a fast-moving environment where priorities shift, and you\u2019ll have real\
    \ ownership over the roles you run. We\u2019re open to candidates whose strength\
