    \ low-ego individuals who thrive in dynamic and fast-moving environments and move\
    \ with an experimental mindset \u2014 who rapidly test emerging capabilities to\
    \ discover simpler, more powerful ways to deliver results. At Snowflake, your\
    \ role isn't just to execute a function, but to help redefine the future of how\
    \ work gets done. Snowflake are looking for a Solution Engineer for the UK market\
    \ who can solve our customer\u2019s most complex problems. In this role you will\
    \ work directly with the account sales team and channel partners to understand\
    \ the needs of our customers, strategize on how to best support them in their\
    \ evaluation and ultimately help our customers choose Snowflake as their solution.\
    \ As a Snowflake Solution Engineer you share our passion for solving complex data\
    \ challenges and helping organizations to get the most out of their data assets.\
    \ Our technical landscape is ever evolving and you are keen to learn new skills\
    \ and put them into practice on real world challenges. You are able to translate\
    \ features and functions into solutions that solve business problems, in conversations\
    \ with technical or business teams, with end users or executives. IN THIS ROLE\
    \ YOU WILL GET TO: - Present Snowflake\u2019s technology and vision to executives\
    \ and technical contributors at prospects and customers - Work hands-on with prospects\
    \ and customers to demonstrate and communicate the value of Snowflake technology\
    \ throughout the sales cycle, from demo to proof of concept to design and implementation\
    \ - Create and develop technical champions in your accounts to drive deals and\
    \ achieve a technical win - Be at the cutting edge of Snowflake technology and\
    \ confidently present Snowflake roadmap features and functionality to customers\
    \ and/or prospects - Immerse and enable yourself in the ever-evolving industry,\
    \ maintaining a deep understanding of competitive and complementary technologies\
    \ and vendors and how to position Snowflake in relation to them - Work closely\
    \ with other sales engineers to make each other the best and constantly learn\
    \ from wins and losses - Collaborate with Product Management, Engineering, and\
    \ Marketing to continuously improve Snowflake\u2019s products and marketing -\
    \ Represent Snowflake at industry or customer events - Work with our ecosystem\
    \ and implementation partners to build joint architectures or collaborate on account\
    \ strategies and initiatives to help our customers be successful - Proactively\
    \ contribute and help co-develop Account & territory plans and execute while engaging\
    \ with the broader internal/external ecosystem. ON DAY ONE YOU WE WILL EXPECT\
    \ YOU TO HAVE: - Solution engineering/solution architect experience in a Saas\
    \ environment or relevant industry experience (analytics, data science, data engineering\
    \ etc) - Outstanding presentation skills to both technical and executive audiences,\
