    \ do.&nbsp; We are headquartered in Berlin with offices in multiple cities across\
    \ Europe, including Vienna and Barcelona, and a 1,500-strong team of more than\
    \ 80 nationalities. Sounds good? Apply now for this position. Equal Opportunities:\
    \ We recognize that our strength lies in our people and the varied perspectives\
