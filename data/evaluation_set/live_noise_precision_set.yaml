  description_text: "Company Description We\u2019re http://checkout.comCheckout.com\
    \ http://Checkout.com. You might not know our name, but companies like eBay, Spotify,\
    \ Klarna, Uber, and Sony do, because we\u2019re behind many of the digital experiences\
    \ you use every day. We are where the world checks out, enabling over 10 billion\
    \ transactions daily for more than one billion global shoppers. Whether you want\
    \ to book a holiday, order food, renew a subscription, or check out online, there\u2019\
    s a good chance our tech powers the payments behind the scenes. Our platform helps\
    \ the most ambitious businesses deliver effortless digital experiences, at scale.\
    \ If you want to do career-defining work, you\u2019ve come to the right place.\
    \ We move fast, think globally, and believe great teams are built by hiring exceptional\
    \ people with conviction, curiosity, and the desire to make an impact. With 20\
    \ offices across six continents and London as our HQ, we\u2019re shaping the future\
    \ of fintech \u2013 and we\u2019re just getting started. About the role: Checkout.com\
    \ http://Checkout.com processes billions of payments globally. When an enterprise\
    \ merchant asks \"can we trust Checkout with our data, our compliance, and our\
    \ transactions?\", this role is responsible for answering that question. You'll\
    \ own the content and the strategy that builds merchant confidence at scale. Sitting\
    \ within our Bids Team, you\u2019ll act as both a trusted enabler and a commercial\
    \ accelerator for our global organization, supporting the enterprise sales cycle\
    \ through industry-leading assurance responses. We are maturing the team to formalize\
    \ ownership of the merchant assurance workstream, creating a unique opportunity\
    \ for a driven professional to lead on this initiative and to partner with our\
    \ global bid managers in supporting critical commercial activities. Your Mission:\
    \ You will primarily own and strengthen our merchant assurance response function\
    \ so it scales seamlessly with Checkout.com http://Checkout.com\u2019s continued\
    \ growth. You will spearhead the adoption of AI within this subdomain, building\
    \ a robust, reliable and scalable engine for intelligent content management, requirements\
    \ ingestion, and the surfacing of multi-disciplinary content (Information Security,\
    \ Data Protection, Compliance, etc.). This is a global role which will ensure\
    \ our due diligence responses are operationally sound, robust, and deliver assurance\
    \ to our merchants on demand, across all Checkout.com http://Checkout.com products,\
    \ segments, verticals and geographies. Who You Are: This is a senior specialist\
    \ role requiring strong judgment, structured thinking, the ability to navigate\
    \ competing priorities across multiple deadlines while maintaining quality, and\
    \ the confidence to challenge constructively. If you thrive in busy environments\
    \ (bids/proposals, sales cycles or equivalent.), this is an ideal opportunity\
    \ to make a meaningful, real-world impact. You will have the opportunity to define\
    \ how AI and technology can be adopted to deliver reliable, scalable outcomes,\
    \ all while developing professionally alongside some of the best minds in the\
    \ payments industry and laying the groundwork to progress into a more senior bid\
    \ management role. We\u2019re looking for a strategic thinker who can execute\
    \ autonomously to a consistent level of quality, to join our London-based team\
    \ and contribute meaningfully to an exciting and constantly evolving environment.\
    \ What you will do: - Manage and execute end-to-end merchant assurance requests,\
    \ security questionnaires, and due diligence inquiries from enterprise prospects\
    \ and existing customers, ensuring absolute accuracy and timely delivery. - Act\
    \ as the primary architect of the assurance content repository. Adapt, train,\
    \ and optimize AI-based tools to automate the ingestion of merchant requirements\
    \ and streamline response generation. - Partner closely with Subject Matter Experts\
    \ (SMEs) across Information Security, Data Protection, Legal, and Compliance to\
    \ extract highly technical data and translate it into clear, commercial-ready\
    \ responses. - Collaborate closely with our team of global Bid Managers to support\
    \ complex, high-value enterprise RFPs, taking ownership of the risk, security,\
    \ and compliance sections. - Continuously review and refine the assurance response\
    \ engine. Identify bottlenecks and design scalable workflows to handle Checkout.com\
    \ http://Checkout.com's growing commercial volume without compromising quality\
    \ or merchant trust. - Confidently navigate competing priorities and constructively\
    \ challenge stakeholders to ensure our market positioning remains operationally\
    \ sound. What you will bring: - 3+ years of experience in assurance, bid management,\
    \ proposal writing, sales operations, or similar. - Proven ability to thrive in\
    \ a high-growth startup/scale-up or a fast-paced, high-volume enterprise environment.\
    \ You are comfortable with ambiguity and rapid change. - A strong aptitude for\
    \ navigating technical and technical topics, and you must be comfortable working\
    \ alongside Information Security, Data Protection, and Compliance teams to translate\
    \ their expertise into clear, compelling, merchant-facing language. - Exceptional\
    \ organizational skills and structured thinking. You can seamlessly juggle multiple\
    \ deadlines, prioritize competing demands, and maintain impeccable attention to\
    \ detail under pressure. - The confidence and credibility to engage with global,\
    \ cross-functional teams, regardless of seniority. - Experience with AI-powered\
    \ tools and a proactive mindset toward adopting new technology. Additional Information\
    \ Bring all of you to work We create the conditions for high performers to thrive,\
    \ through real ownership, fewer blockers, and work that makes a difference from\
    \ day one. Here, you\u2019ll move fast, take on meaningful challenges, and be\
    \ recognized for the impact you deliver. It\u2019s a place where ambition gets\
    \ met with opportunity, and where your growth is in your hands. We work as one\
    \ team, and we back each other to succeed. So whatever your background or identity,\
    \ if you\u2019re ready to grow and make a difference, you\u2019ll be right at\
    \ home here. It\u2019s important we set you up for success and make our process\
    \ as accessible as possible. So let us know in your application, or tell your\
    \ recruiter directly, if you need anything to make your experience or working\
    \ environment more comfortable. Life at Checkout.com http://Checkout.com We understand\
    \ that work is just one part of your life. Our hybrid working model offers flexibility,\
    \ with three days per week in the office to support collaboration and connection.\
    \ Curious about what it\u2019s like to be part of our team? Visit our Careers\
    \ Page https://www.checkout.com/careers to learn more about our culture, open\
    \ roles, and what drives us. For a closer look at daily life at Checkout.com http://Checkout.com,\
    \ follow us on LinkedIn https://www.linkedin.com/company/checkout/life/ and Instagram\
    \ https://www.instagram.com/checkout_com/"
