    \ or partnerships typical of enterprise-scale engagements Experience requirements\
    \ gathering with enterprise customers, building business cases for feature development\
    \ with product teams, while balancing expectations for both parties Formal sales\
    \ methodology training Experience supporting go-to-market efforts for new products\
    \ Experience in the Hospitality and/or Food &amp; Beverage industry We\u2019re\
    \ working to build a more inclusive economy where our customers have equal access\
