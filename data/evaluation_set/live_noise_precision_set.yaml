  description_text: "Waymo is an autonomous driving technology company with the mission\
    \ to be the world's most trusted driver. Since its start as the Google Self-Driving\
    \ Car Project in 2009, Waymo has focused on building the Waymo Driver\u2014The\
    \ World's Most Experienced Driver\u2122\u2014to improve access to mobility while\
    \ saving thousands of lives now lost to traffic crashes. The Waymo Driver powers\
    \ Waymo\u2019s fully autonomous ride-hail service and can also be applied to a\
    \ range of vehicle platforms and product use cases. The Waymo Driver has provided\
    \ over ten million rider-only trips, enabled by its experience autonomously driving\
    \ over 100 million miles on public roads and tens of billions in simulation across\
    \ 15+ U.S. states. Waymo's Systems Engineering team works together to blend software\
    \ and hardware systems in groundbreaking new ways. We set the high performance\
    \ standards that ensure our vehicles run smoothly and keep passengers safe, then\
    \ design and perform the tests that validate that performance. We're looking for\
    \ talented teammates who\u2019ll help us maintain strong teamwork and are passionate\
    \ about driving results. This role follows a hybrid work schedule and reports\
    \ to Systems Test Engineering Manager. &nbsp; You will: Lead the end-to-end execution\
    \ of specialized testing calendars, ensuring seasonal and high-priority campaigns\
    \ are planned, resourced, and successfully completed against project milestones\
    \ &nbsp;Translate complex and unusual&nbsp; internal test data needs into actionable\
    \ test plans, defining the approach, facilities, and capabilities required to\
    \ complete the testing safely and effectively Serve as internal advisor on the\
    \ tactical feasibility and logistical requirements of weather-related and non-standard\
    \ test campaigns Identify external test facilities or develop internal testing\
    \ infrastructure, to bridge gaps in existing test capabilities Direct critical\
    \ field operations, leading test teams in the hands-on execution of test campaigns,\
    \ analyzing test results, and reporting results back to internal stakeholders\
    \ Proactively resolve logistical and resource gaps to ensure mission success during\
    \ time-sensitive seasonal windows or remote, one-off deployments &nbsp; You have:\
    \ Experience in physical testing in automotive, aerospace or robotics, including\
    \ test equipment and data acquisition Experience leading a large Engineering project\
    \ from start to finish. Coordinating with internal stakeholders while providing\
    \ clear direction to Engineers executing the testing Experience working closely\
    \ with vendors providing engineering or testing services Experience translating\
    \ program needs into actionable test procedures and reporting findings back to\
    \ internal stakeholders Proficient in Python and data analysis methods &nbsp;\
    \ We prefer: Experience with automotive testing across a diverse range of environmental\
    \ and weather conditions, including sensing and perception validation Experience\
    \ with physical hands-on testing of Autonomous Vehicles and related technologies\
    \ Experience with different types of automotive test domains such as durability,\
    \ safety, chassis, ADAS Experience maintaining high-visibility project schedules\
    \ and campaign tracking to ensure project clarity and proactive resolution of\
    \ gaps Strong knowledge of Systems Engineering principles and experience developing\
    \ verification coverage plans from system level requirements &nbsp; Travel requirements\
    \ : 25% travel to support:&nbsp; Traveling to Waymo\u2019s test facilities and\
    \ proving grounds to support test campaigns. The expected base salary range for\
    \ this full-time position across US locations is listed below. Actual starting\
