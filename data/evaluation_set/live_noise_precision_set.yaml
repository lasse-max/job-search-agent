    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. What you\u2019ll do\
    \ Reporting directly to the Head of Strategic Finance, you will shape the future\
    \ of Airwallex\u2019s finance operations. This is a high-impact role at the intersection\
    \ of strategy, technology, and execution. You will define and deliver the roadmap\
    \ that modernises how our global finance function operates \u2013 spanning procure-to-pay,\
    \ order-to-cash, month-end close, reporting, and FP&A \u2013 with automation,\
    \ AI, and next-generation systems. You will act as the architect of our finance\
    \ systems landscape: diagnosing today\u2019s gaps, designing the target state,\
    \ and sequencing the path to get there. You can see how processes, data, and platforms\
    \ fit together; you can weigh build-versus-buy choices; and you can align stakeholders\
    \ around a clear transformation journey. Beyond technology, you will drive the\
    \ human and organisational side of change. You will redesign processes, embed\
    \ controls, and work closely with finance leaders to ensure teams adopt and scale\
    \ new ways of working. You will bring the iterative mindset of a product leader\
    \ to deliver rapid, incremental value today, while building an IPO-ready foundation\
    \ capable of scaling for years to come. Responsibilities - Define and own the\
    \ end-to-end transformation roadmap for Finance, covering both systems and processes\
    \ - Architect the future finance systems landscape, mapping current vs. future\
    \ state and planning the transition between them - Redesign core finance processes\
    \ to be IPO ready (procure-to-pay, order-to-cash, record-to-report, FP&A) by increasing\
    \ efficiency, control, and scalability - Partner with Finance, Technology, and\
    \ Business teams to evaluate, select, and implement systems and automation solutions\
    \ (ERP, AI, workflow tools) - Lead change management and upskilling initiatives\
    \ to enable adoption of new tools and processes across global finance teams -\
    \ Build clear business cases for transformation investments, balancing near-term\
    \ delivery with long-term scalability - Track, measure, and communicate outcomes\
    \ of transformation initiatives, ensuring accountability and tangible results\
    \ - Serve as strategic advisor to the broader leadership team on how to elevate\
    \ Finance into a competitive advantage for Airwallex Who you are We\u2019re looking\
    \ for an individual with strong digital transformation expertise, sharp strategic\
    \ judgement, and the ability to deliver large-scale change. The minimum qualifications\
    \ are essential to succeed in this role. Preferred qualifications help you stand\
    \ out, but are not mandatory. Minimum qualifications - Bachelor\u2019s degree\
    \ from a reputable university - 6+ years of experience in digital transformation,\
    \ enterprise systems, or consulting roles focused on finance or corporate functions\
    \ - Proven ability to architect and implement systems solutions at scale, integrating\
    \ platforms across the finance value chain - Experience in process redesign and\
    \ change management, including upskilling and enabling teams through transformation\
    \ - Excellent communication and influencing skills, with the ability to engage\
    \ senior stakeholders and drive cross-functional alignment - Track record of taking\
    \ ownership and delivering end-to-end transformation programmes in ambiguous,\
    \ high-growth contexts Preferred qualifications - Experience in top-tier management\
    \ consulting, systems integration, or digital transformation leadership roles\
    \ - Hands-on experience with finance systems (e.g. SAP, Oracle, Netsuite) and\
    \ automation/AI tools (e.g. ML-based reconciliation, workflow platforms) - Exposure\
    \ to high-growth or IPO-ready environments in fintech, technology, or global enterprises\
    \ - Proven experience leading cross-border programmes, with sensitivity to regional\
    \ nuances and SOX requirements - Familiarity with data architecture, analytics,\
    \ and business intelligence to support decision-making and measure impact APPLICANT\
    \ SAFETY POLICY: FRAUD AND THIRD-PARTY RECRUITERS To protect you from recruitment\
