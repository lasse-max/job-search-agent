  description_text: "Who we are About Stripe Stripe is a financial infrastructure\
    \ platform for businesses. Millions of companies\u2014from the world\u2019s largest\
    \ enterprises to the most ambitious startups\u2014use Stripe to accept payments,\
    \ grow their revenue, and accelerate new business opportunities. Our mission is\
    \ to increase the GDP of the internet, and we have a staggering amount of work\
    \ ahead. That means you have an unprecedented opportunity to put the global economy\
    \ within everyone\u2019s reach while doing the most important work of your career.\
    \ About the team The payments landscape is changing rapidly and our team is at\
    \ the forefront of this change. Depending on where you live, you may be used to\
    \ paying with a credit card (United States), iDEAL (Netherlands) or UPI (India),\
    \ amongst hundreds of other global payment methods. It turns out how you pay is\
    \ increasingly dependent on where you are and what business you're buying from.\
    \ The Local Payment Methods team is responsible for Stripe's fastest growing payments\
    \ business. These payment methods are often the single largest conversion improvement\
    \ merchants can make to their checkout, driving double-digit increases in checkout\
    \ conversion. They represent billions of dollars in payments volume each month\
    \ and are core to Stripe's growth strategy. We build payment methods that help\
    \ businesses drastically increase their revenues and grow their business. Additionally,\
    \ we also build the platform that allows us to build and distribute payment methods\
    \ at scale. What you\u2019ll do We're looking for a Product Manager to own relationships\
    \ with some of the world's largest payment providers and drive billions in payment\
    \ volume growth. In this role, you will leverage your extensive experience turning\
    \ ambiguous problems into clear and actionable deliverables, aligning internal\
    \ and external leaders on a shared, ambitious vision. You'll work closely with\
    \ Stripe users to understand their needs to drive payments performance, and match\
    \ those to the unique capabilities of Stripe's most strategic payment method partners\u2014\
    including global leaders in Buy Now Pay Later and digital wallet solutions. This\
    \ will involve close collaboration with Stripe's and our financial partners' product\
    \ and engineering organizations to prioritize valuable investments over a multi-quarter\
    \ roadmap, considering distribution potential, performance, risk and costs. Responsibilities\
    \ Develop the long-term vision and strategy for your pillar within the Local Payment\
    \ Methods team, and create and execute on a compelling roadmap. Deeply understand\
    \ Stripe users' (merchants and partners) needs by spending time with partnership\
    \ managers, risk, legal, compliance, data science, engineering, products, and\
    \ go-to-market teams, and by observing patterns and trends across their feedback\
    \ and the industry. Drive adoption of strategic payment methods across Stripe's\
    \ merchant base, working with go-to-market teams to identify and unlock new distribution\
    \ opportunities (e.g., enabling payment methods acceptance cross-border, or for\
    \ new use cases like recurring or agentic payments). Partner closely with Risk\
    \ teams to ensure sustainable growth, implementing controls and enforcement strategies\
    \ that protect both Stripe and our financial partners while maximizing approval\
    \ rates and minimizing losses. Collaborate with product marketing and go-to-market\
    \ teams to turn your multi-quarter roadmap into compelling and actionable narratives.\
    \ Build deep user empathy with both Stripe's merchants and financial partners,\
    \ understanding global payment industry trends and competitors' offerings to influence\
    \ Stripe's roadmap effectively. Work closely with Stripe and our financial partners'\
    \ product and engineering organizations to define the most valuable investments,\
    \ factoring in aspects such as distribution potential, performance, costs, and\
    \ risks. Collaborate with partnership managers to develop joint product roadmaps\
    \ with payment partners, securing shared alignment and navigating competing priorities\
    \ between internal goals and partner objectives. Become a subject-matter expert\
    \ for a subset of Stripe's most strategic payment partners, ensuring they receive\
    \ the support and insights needed to succeed. Who you are We\u2019re looking for\
    \ someone who meets the minimum requirements to be considered for the role. If\
    \ you meet these requirements, you are encouraged to apply. The preferred qualifications\
    \ are a bonus, not a requirement. Minimum requirements 5+ years in a product management\
    \ or product-adjacent role, with a proven track record building highly impactful\
    \ products Demonstrated experience partnering closely with engineers, designers,\
    \ and external partners to build products and complex systems at scale. Ability\
    \ to effectively communicate with and influence both user-facing and partner-facing\
    \ stakeholders. Strong written and verbal communication skills, with a knack for\
    \ precise and concise articulation of user problems Strong analytical capabilities\
    \ with experience defining and tracking success metrics, running experiments (e.g.,\
    \ holdback tests), and using data to measure product impact on revenue, conversion,\
    \ and margins. Experience working on products that require aligning multiple stakeholders,\
    \ developing joint roadmaps, and navigating competing priorities between internal\
    \ goals and external partner objectives. Ability to thrive in a dynamic and fast-paced\
    \ environment with significant autonomy and responsibility. Background delivering\
    \ successfully on multi-quarter roadmaps and aligning diverse stakeholders to\
    \ achieve shared goals. Strong business acumen and comfort with complex ecosystem\
    \ and platform-level problems. Preferred qualifications Experience with online\
    \ payments, deep understanding of the conversion, costs, and risk trade-offs.\
    \ Experience optimizing revenue outcomes for an online payments business Experience\
    \ working with financial partners and users from various geographies and cultures.\
    \ Experience building platform or marketplace products where success requires\
    \ balancing multiple stakeholder interests and creating value for all participants\
    \ in the ecosystem."
