    \ growth of Airwallex generally. Our business is achieving rapid growth with an\
    \ evolving roadmap, and we want our engineers to play a part in how that happens.\
    \ Responsibilities: - Responsible for the design & implementation of enterprise\
    \ applications and libraries for iOS; - Work with internal business teams and\
    \ product management to define requirements and develop technical specifications;\
    \ - Serve as core contributor owning full-cycle product development; - Work with\
    \ Architect and re-factor code and design for optimal maintainability, extensibility\
    \ and reusability. - Integrate best practices for protecting sensitive customer\
    \ data and ensuring global regulatory compliance. Qualifications: - BS / MS degree\
    \ in Computer Science or equivalent majors; - 5+ years of professional experience\
    \ developing native apps in iOS (Swift); - Expert knowledge of iOS frameworks\
    \ and ecosystem; - Good understanding of design patterns for mobile development;\
    \ - Experience using RESTful APIs; - Promote robust and maintainable code with\
    \ high test coverage, and can maintain automation pipelines for CI/CD; - Ability\
    \ to work independently as well as with a team; - Able to communicate fluently\
    \ in English. - While this position primarily focuses on iOS development, your\
    \ expertise in Android is also highly regarded. Why Join Us - Impact and Innovation:\
    \ Join a team where innovation meets impact. With us, you will redefine the technological\
    \ landscape of the financial world. - Diversity and Collaboration: Our strength\
