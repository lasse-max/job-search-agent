    \ performance for core fleet services, ensuring we have enough usable vehicle\
    \ supply available to meet targeted user demand, and developing observability\
    \ and automation to support this goal Involvement in the whole lifecycle of services\
    \ - from inception and design, through deployment, operation and refinement Write\
