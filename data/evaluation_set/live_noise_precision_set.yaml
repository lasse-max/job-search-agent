  description_text: "Wer &nbsp; wir &nbsp; sind &nbsp; Helsing ist ein KI-Unternehmen\
    \ f\xFCr Verteidigung. Unsere Mission ist der Schutz von Demokratien. Wir streben\
    \ eine technologische F\xFChrungsrolle an, damit offene Gesellschaften weiterhin\
    \ souver\xE4ne Entscheidungen treffen und ihre ethischen Standards kontrollieren\
    \ k\xF6nnen. &nbsp; Wir glauben, dass wir als Demokratien eine besondere Verantwortung\
    \ haben, \xFCber die Entwicklung und den Einsatz von leistungsstarken Technologien\
    \ wie KI nachzudenken. Wir nehmen diese Verantwortung ernst. &nbsp; Wir sind ein\
    \ ehrgeiziges und engagiertes Team von Ingenieuren, KI-Spezialisten und Programmmanagern\
    \ mit Kundenkontakt. Wir suchen engagierte Mitarbeiter f\xFCr unsere europ\xE4\
    ischen Teams, die ihre F\xE4higkeiten einsetzen, um die komplexesten und bedeutendsten\
