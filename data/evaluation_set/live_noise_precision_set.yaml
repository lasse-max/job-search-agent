    \ and speech. By developing novel methods and research ideas you will apply these\
    \ models across a diverse set of use cases and domains. Working cross-functionally\
    \ with both external and internal science, engineering, and product teams you\
    \ will deliver high-impact AI solutions that turn the needle. This position is\
    \ open for our local offices in Paris and London. What you will do \u2022 Run\
    \ pre-training, post-training and deploy state of the art models on clusters with\
    \ thousands of GPUs. You don\u2019t panic when you see OOM errors or when NCCL\
