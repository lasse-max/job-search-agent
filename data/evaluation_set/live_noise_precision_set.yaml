  description_text: "SLSQ327R405 Overview At Databricks, we are helping data teams\
    \ solve the world\u2019s toughest problems \u2014 from making the next mode of\
    \ transportation a reality to accelerating the development of medical breakthroughs.\
    \ Databricks is the data and AI company, and more than 10,000 organizations worldwide\
    \ \u2014 including over 50% of the Fortune 500 \u2014 rely on the Databricks Data\
    \ Intelligence Platform to unify and democratize data, analytics, and AI. We are\
    \ looking for a Sales Director for one of our UK&amp;I Digital Native teams, where\
    \ you will be leading and developing a high-performing team of experienced Account\
    \ Executives. You will play a critical role in coaching talent, building a strong\
    \ team culture, and driving growth across some of the most innovative and strategically\
    \ important Digital Native customers in the UK and Ireland. This is a first-line\
    \ leadership role for someone who knows how to elevate sellers, create clarity\
    \ in a fast-moving business, and help teams win with technical, demanding, high-growth\
    \ customers. In UKI Digital Natives, Databricks partners with technical founders,\
    \ CTOs, and engineering-led organizations that move quickly and expect strategic,\
    \ high-value engagement. The impact you will have Lead, coach, and develop a team\
    \ of 7 Account Executives, helping each seller raise performance, build strong\
    \ account plans, and grow their careers. Create a high-accountability, high-support\
    \ team environment that enables consistency across a mixed-tenure, multi-level\
    \ organization. Partner closely with cross-functional leaders in Solutions Architecture,\
    \ Sales Leadership, Marketing, Product, and Partners to drive customer outcomes\
    \ and team success. Support the team in winning, expanding, and deepening relationships\
    \ across high-growth Digital Native accounts, where executive engagement, technical\
    \ credibility, and speed matter. Build a strong operating rhythm around pipeline\
    \ quality, forecast discipline, inspection, coaching, and execution. Help shape\
    \ territory strategy and resource alignment to maximize performance across a strategically\
    \ important UKI business. What you will do Team leadership and coaching Hire,\
    \ onboard, coach, and develop high-performing Account Executives Build an inclusive,\
    \ performance-driven culture where sellers are challenged, supported, and consistently\
    \ upleveled. Provide hands-on coaching across deal strategy, executive conversations,\
    \ account planning, pipeline generation, and closing. Tailor leadership style\
    \ to individual seller needs while maintaining clear expectations and accountability.\
    \ Develop future leaders and create a strong internal bench within the team. Business\
    \ and execution leadership Lead the team to meet and exceed revenue and consumption\
    \ goals across the UKI Digital Natives segment. Drive execution in a business\
    \ that requires strong hunting instincts, strategic thinking, and sharp prioritization.\
    \ Inspect deals rigorously and help the team navigate complex stakeholder environments,\
    \ competitive situations, and technical buying motions. Establish strong forecast\
    \ accuracy and operational discipline across the business. Ensure focus on the\
    \ highest-value opportunities while maintaining momentum across the wider patch.\
    \ Cross-functional and customer leadership Partner tightly with Solutions Architects\
    \ and other technical teams to help customers connect Databricks to meaningful\
    \ business outcomes. Build strong relationships with executive stakeholders both\
    \ internally and externally. Represent Databricks as a thoughtful, credible sales\
    \ leader in the Digital Natives ecosystem. Bring market insight back into the\
    \ business to help improve messaging, strategy, and execution in this fast-evolving\
    \ segment. What we look for Proven success leading and developing high-performing\
    \ SaaS or cloud sales teams in a first-line leadership role. Experience coaching\
    \ Account Executives across different levels of tenure, capability, and account\
    \ complexity. Strong sales leadership fundamentals: inspection, forecasting, pipeline\
    \ management, talent development, and performance management. A track record of\
    \ building high-trust, high-performance cultures in fast-growth environments.\
    \ Experience selling into or leading teams focused on technical customers, digital\
    \ native businesses, cloud, data, AI, infrastructure, or developer-led organizations.\
    \ Strong executive presence with the ability to engage confidently with C-level\
    \ and senior technical stakeholders. Ability to operate effectively in a highly\
    \ cross-functional environment and influence across multiple partner teams. High\
    \ learning agility, sound judgment, and a strong bias for action. Nice to have\
    \ Experience in Digital Natives, high-growth startup, or cloud-native customer\
    \ segments. Experience leading teams through a consumption-based or usage-led\
    \ commercial motion. Familiarity with data, analytics, AI, or modern cloud platform\
    \ sales. Experience balancing new business growth with expansion in strategic\
    \ existing accounts. Why join this team This is an opportunity to lead a strategically\
    \ important UKI business at the intersection of leadership, sales execution, and\
    \ some of the most innovative customers in the market. The Digital Natives segment\
    \ includes highly visible accounts, demanding customers, and significant commercial\
    \ opportunity, making this one of the most exciting first-line leadership roles\
    \ in the region. If you are a people-first sales leader who loves developing talent,\
    \ building teams, and helping sellers win in complex, high-growth environments,\
