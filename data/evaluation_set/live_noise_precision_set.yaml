  description_text: "Block is one company built from many blocks, all united by the\
    \ same purpose of economic empowerment. The blocks that form our foundational\
    \ teams \u2014 People, Finance, Counsel, Hardware, Information Security, Platform\
    \ Infrastructure Engineering, and more \u2014 provide support and guidance at\
    \ the corporate level. They work across business groups and around the globe,\
    \ spanning time zones and disciplines to develop inclusive People policies, forecast\
    \ finances, give legal counsel, safeguard systems, nurture new initiatives, and\
    \ more. Every challenge creates possibilities, and we need different perspectives\
    \ to see them all. Bring yours to Block. The Role We are seeking a Senior Manager\
    \ to join our Go-To-Market Strategic Finance team, partnering with our Head of\
    \ Channel Sales and their leadership team. This is a high-impact opportunity to\
    \ shape a fast-growing acquisition motion for Square by building the foundational\
    \ frameworks, models, and reporting needed to guide real-time decisions and long-term\
    \ investment strategy. You will create clarity from ambiguous business problems,\
    \ help scale the Channel Sales operating model, and gain direct exposure to senior\
    \ Sales and Finance leadership. You'll report to the Strategic Finance Lead for\
    \ Block Partnerships &amp; Channel Sales and work cross-functionally with Sales\
    \ leadership, Revenue Operations, Data Science, and Product. This role can be\
    \ hired remotely anywhere in the United Kingdom.&nbsp; You Will Act as the primary\
    \ Strategic Finance partner for Channel Sales, building strong relationships and\
    \ partnering on day-to-day decision-making for this business. Lead and execute\
    \ financial, strategic, and planning processes supporting Channel Sales activities,\
    \ including monthly and quarterly performance reviews, annual and long-range planning,\
    \ and quota-setting processes. Model unit economics and scenario analyses that\
    \ clarify trade-offs and inform strategies for pricing, customer acquisition incentives,\
    \ and headcount investment.&nbsp; Operate with a high degree of autonomy while\
    \ partnering cross-functionally to turn complex data into clear, actionable recommendations\
    \ for senior executives. Mentor teammates and help evolve Finance &amp; Strategy\
    \ best practices across Block. You Have 8+ years in strategic or corporate finance,\
    \ investment banking, private equity, or management consulting; GTM experience\
    \ is a plus. Experience serving as a trusted advisor to senior leaders, using\
