  description_text: "At Snowflake, we are powering the era of the agentic enterprise.\
    \ To usher in this new era, we seek AI-native thinkers across every function who\
    \ are energized by the opportunity to reinvent how they work. You don\u2019t just\
    \ use tools; you possess an innate curiosity, treating AI as a high-trust collaborator\
    \ that is core to how you solve problems and accelerate your impact. We look for\
    \ low-ego individuals who thrive in dynamic and fast-moving environments and move\
    \ with an experimental mindset \u2014 who rapidly test emerging capabilities to\
    \ discover simpler, more powerful ways to deliver results. At Snowflake, your\
    \ role isn't just to execute a function, but to help redefine the future of how\
    \ work gets done. We are hiring a Senior Director, Services Delivery for our ANZ\
    \ team. This role will lead the Services Delivery practice across Australia and\
    \ New Zealand, shaping how our customers adopt, scale, and realise value from\
    \ the Snowflake AI Data Cloud. Reporting into APJ Services Delivery leadership,\
    \ you will own the ANZ practice strategy, delivery excellence, and commercial\
    \ outcomes \u2014 building a high-performing team that drives customer success\
    \ and revenue growth in one of our fastest-growing sub-regions. AS A SENIOR DIRECTOR,\
    \ SERVICES DELIVERY ANZ AT SNOWFLAKE, YOU WILL: - Define and execute the ANZ Services\
    \ Delivery strategy, aligned with global standards, processes, and pricing, to\
    \ drive customer adoption and consumption of the Snowflake Data Cloud - Partner\
    \ with ANZ Sales and Solutions Engineering leadership to shape customer success\
    \ strategies that accelerate time-to-value and expand platform utilisation across\
    \ the region - Own the financial performance of the ANZ Services Delivery practice\
    \ \u2014 including services revenue, utilisation, and contribution to overall\
    \ Snowflake consumption targets - Build and lead a diverse team of technical consultants\
    \ and delivery leaders across Australia and New Zealand, fostering a culture of\
    \ excellence, innovation, and customer-centricity - Define and evolve ANZ-specific\
    \ service offerings, leveraging AI and emerging capabilities to scale operations\
    \ and enhance customer outcomes - Cultivate and activate delivery partners who\
    \ co-deliver at the same quality standard as our internal team, scaling capacity\
    \ across the ANZ market - Establish delivery governance, project oversight, and\
    \ repeatable methodologies that ensure consistent, high-quality customer engagements\
    \ across implementation, migration, and onboarding programs - Collaborate with\
    \ Product and Engineering teams to channel ANZ customer feedback into platform\
    \ enhancements, and define intersection points with the Forward Deployed Engineering\
    \ (FDE) model OUR IDEAL PRACTICE DIRECTOR WILL HAVE: - 12+ years in a professional\
    \ services environment with a focus on data warehousing, business intelligence,\
    \ cloud solutions, or AI \u2014 ideally with direct experience on Snowflake or\
    \ similar cloud-native platforms - 8+ years of leadership experience, including\
    \ managing and scaling services delivery teams in a high-growth environment, with\
    \ demonstrated ability to meet revenue and operational targets - Deep understanding\
    \ of the ANZ enterprise market, including customer buying behaviours, partner\
    \ ecosystems, and regional go-to-market dynamics - Proven ability to build teams\
    \ from the ground up or significantly scale existing teams, optimising for performance,\
    \ engagement, and delivery quality - Strong commercial acumen \u2014 experience\
    \ owning a P&L or practice financials, with a track record of growing services\
    \ revenue - Executive-level communication skills with confidence presenting to\
    \ C-suite stakeholders on both technical solutions and business impact - Strategic\
    \ mindset with the ability to anticipate market shifts (AI, FDE models, consumption-based\
    \ services) and translate them into actionable offerings - Strong program and\
    \ project management discipline; project management certification preferred BONUS\
    \ POINTS FOR THE FOLLOWING: - Prior experience at Snowflake or a direct competitor\
    \ in the data cloud / analytics space - Existing relationships with ANZ enterprise\
    \ customers and systems integrators - Experience scaling professional services\
    \ through partner delivery channels in the Australian market - Background in AI/ML\
    \ implementation services or data platform modernisation programs - Track record\
    \ of contributing to or leading regional pricing and packaging strategy for services\
    \ WHY JOIN OUR SERVICES TEAM AT SNOWFLAKE? The ANZ Services Delivery practice\
    \ is at an inflection point \u2014 growing demand, expanding customer base, and\
    \ a greenfield opportunity to shape how we deliver value in this market. You'll\
    \ have the autonomy to build and define the practice, backed by global frameworks\
    \ and a leadership team that invests in its people. This is a rare chance to combine\
    \ strategic leadership with hands-on impact in a region where Snowflake is experiencing\
    \ rapid adoption. Snowflake is growing fast, and we\u2019re scaling our team to\
    \ help enable and accelerate our growth. We are looking for people who share our\
    \ values, challenge ordinary thinking, and push the pace of innovation while building\
    \ a future for themselves and Snowflake. How do you want to make your impact?\
    \ For jobs located in the United States, please visit the job posting on the Snowflake\
    \ Careers Site for salary and benefits information: careers.snowflake.com http://careers.snowflake.com"
