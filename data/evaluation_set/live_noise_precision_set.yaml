  posted_at: '2025-03-31T14:08:49-04:00'
  first_seen_at: '2026-06-25T00:04:34+00:00'
  source_url: https://job-boards.greenhouse.io/anthropic/jobs/4610158008
  description_text: "About Anthropic Anthropic\u2019s mission is to create reliable,\
    \ interpretable, and steerable AI systems. We want AI to be safe and beneficial\
    \ for our users and for society as a whole. Our team is a quickly growing group\
    \ of committed researchers, engineers, policy experts, and business leaders working\
    \ together to build beneficial AI systems. About the role: You want to build and\
    \ run elegant and thorough machine learning experiments to help us understand\
    \ and steer the behavior of powerful AI systems. You care about making AI helpful,\
    \ honest, and harmless, and are interested in the ways that this could be challenging\
    \ in the context of human-level capabilities. You could describe yourself as both\
    \ a scientist and an engineer. As a Research Engineer on Alignment Science, you'll\
    \ contribute to exploratory experimental research on AI safety, with a focus on\
    \ risks from powerful future systems (like those we would designate as ASL-3 or\
    \ ASL-4 under our&nbsp; Responsible Scaling Policy ), often in collaboration with\
    \ other teams including Interpretability, Fine-Tuning, and the Frontier Red Team.\
    \ Our blog provides an overview of topics that the Alignment Science team is either\
    \ currently exploring or has previously explored. For the London team, we are\
    \ opportunistically hiring for the following research areas: AI Control:&nbsp;\
    \ Creating methods to ensure advanced AI systems remain safe and harmless in unfamiliar\
    \ or adversarial scenarios. Alignment Stress-testing : &nbsp;Creating&nbsp; model\
    \ organisms of misalignment &nbsp;to improve our empirical understanding of how\
    \ alignment failures might arise. Note: Currently, the team's hub is in San Francisco,\
    \ so we require all candidates to be based at least 25% in London and travel to\
    \ San Francisco occasionally. Additionally, we are prioritizing growing our San\
    \ Francisco teams, so you may not hear back on your application to the London\
    \ team unless we see an unusually strong fit. For this role, we conduct all interviews\
    \ in Python. Representative Projects: Testing the robustness of our safety techniques\
    \ by training language models to subvert our safety techniques, and seeing how\
    \ effective they are at subverting our interventions. Run multi-agent reinforcement\
    \ learning experiments to test out techniques like&nbsp; AI Debate . Build tooling\
    \ to efficiently evaluate the effectiveness of novel LLM-generated jailbreaks.\
    \ Write scripts and prompts to efficiently produce evaluation questions to test\
    \ models\u2019 reasoning abilities in safety-relevant contexts. Contribute ideas,\
    \ figures, and writing to research papers, blog posts, and talks. Run experiments\
    \ that feed into key AI safety efforts at Anthropic, like the design and implementation\
    \ of our&nbsp; Responsible Scaling Policy . You may be a good fit if you: Have\
    \ significant software, ML, or research engineering experience Have some experience\
    \ contributing to empirical AI research projects Have some familiarity with technical\
    \ AI safety research Prefer fast-moving collaborative projects to extensive solo\
    \ efforts Pick up slack, even if it goes outside your job description Care about\
    \ the impacts of AI Strong candidates may also: Have experience authoring research\
    \ papers in machine learning, NLP, or AI safety Have experience with LLMs Have\
    \ experience with reinforcement learning Have experience with Kubernetes clusters\
    \ and complex shared codebases Candidates need not have: 100% of the skills needed\
    \ to perform the job Formal certifications or education credentials The annual\
    \ compensation range for this role is listed below.&nbsp; For sales roles, the\
    \ range provided is the role\u2019s On Target Earnings (\"OTE\") range, meaning\
    \ that the range includes both the sales commissions/sales bonuses target and\
    \ annual base salary for the role. Annual Salary: \xA3260,000 &mdash; \xA3370,000\
    \ GBP Logistics Minimum education: Bachelor\u2019s degree or an equivalent combination\
    \ of education, training, and/or experience Required field of study:&nbsp; A field\
    \ relevant to the role as demonstrated through coursework, training, or professional\
    \ experience Minimum years of experience: Years of experience required will correlate\
    \ with the internal job level requirements for the position Location-based hybrid\
    \ policy: Currently, we expect all staff to be in one of our offices at least\
    \ 25% of the time. However, some roles may require more time in our offices. Visa\
    \ sponsorship: &nbsp;We do sponsor visas! However, we aren't able to successfully\
    \ sponsor visas for every role and every candidate. But if we make you an offer,\
    \ we will make every reasonable effort to get you a visa, and we retain an immigration\
    \ lawyer to help with this. We encourage you to apply even if you do not believe\
    \ you meet every single qualification. Not all strong candidates will meet every\
    \ single qualification as listed.&nbsp; Research shows that people who identify\
    \ as being from underrepresented groups are more prone to experiencing imposter\
    \ syndrome and doubting the strength of their candidacy, so we urge you not to\
    \ exclude yourself prematurely and to submit an application if you're interested\
    \ in this work. We think AI systems like the ones we're building have enormous\
    \ social and ethical implications. We think this makes representation even more\
    \ important, and we strive to include a range of diverse perspectives on our team.\
    \ Your safety matters to us. To protect yourself from potential scams, remember\
    \ that Anthropic recruiters only contact you from&nbsp;@anthropic.com&nbsp;email\
    \ addresses. In some cases, we may partner with vetted recruiting agencies who\
    \ will identify themselves as working on behalf of Anthropic. Be cautious of emails\
    \ from other domains. Legitimate Anthropic recruiters will never ask for money,\
    \ fees, or banking information before your first day. If you're ever unsure about\
    \ a communication, don't click any links\u2014visit&nbsp; anthropic.com/careers\
    \ &nbsp;directly for confirmed position openings. How we're different We believe\
    \ that the highest-impact AI research will be big science. At Anthropic we work\
    \ as a single cohesive team on just a few large-scale research efforts. And we\
    \ value impact \u2014 advancing our long-term goals of steerable, trustworthy\
    \ AI \u2014 rather than work on smaller and more specific puzzles. We view AI\
    \ research as an empirical science, which has as much in common with physics and\
    \ biology as with traditional efforts in computer science. We're an extremely\
    \ collaborative group, and we host frequent research discussions to ensure that\
    \ we are pursuing the highest-impact work at any given time. As such, we greatly\
    \ value communication skills. The easiest way to understand our research directions\
    \ is to read our recent research. This research continues many of the directions\
    \ our team worked on prior to Anthropic, including: GPT-3, Circuit-Based Interpretability,\
    \ Multimodal Neurons, Scaling Laws, AI &amp; Compute, Concrete Problems in AI\
    \ Safety, and Learning from Human Preferences. Come work with us! Anthropic is\
    \ a public benefit corporation headquartered in San Francisco. We offer competitive\
    \ compensation and benefits, optional equity donation matching, generous vacation\
    \ and parental leave, flexible working hours, and a lovely office space in which\
    \ to collaborate with colleagues. Guidance on Candidates' AI Usage: &nbsp;Learn\
    \ about&nbsp; our policy for using AI in our application process."
