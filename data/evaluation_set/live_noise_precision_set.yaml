  description_text: "Celonis is the global leader in Process Intelligence and the\
    \ pioneer of Process Mining technology. As one of the world\u2019s fastest-growing\
    \ enterprise SaaS companies, we are changemakers pushing the boundaries of what\u2019\
    s possible. We invest heavily in advanced AI capabilities\u2014specifically our\
    \ Process Intelligence Graph\u2014to turn data insights into immediate business\
    \ action. We believe there is a massive opportunity to unlock global productivity\
    \ and sustainability by placing intelligence at the core of every business process.\
    \ Join our mission to make processes work for people, companies, and the planet.\
    \ Role Description As a Senior Applied AI Engineer, you will work directly with\
    \ our most strategic customers to understand their objectives and key challenges,\
    \ identify high-impact opportunities for AI, and turn them into measurable business\
    \ value. You will be building Celonis solutions using the world\u2019s leading\
    \ Process Intelligence (PI) platform - in combination with the largest AI and\
    \ ML technology partners, such as Microsoft, OpenAI and Databricks. With Celonis\u2019\
    \ Process Intelligence (PI) platform we feed operational context to AI so it understands\
    \ our customers\u2019 business and enables them to industrialize AI unlocking\
    \ real ROI on AI deployments and at scale. There is no AI without PI. You will\
    \ prototype these solutions, demonstrate their value to Executives and ensure\
    \ successful implementation, adoption and value realization in order to increase\
    \ the footprint of Celonis at those customers. This customer-facing role is ideal\
    \ for people who enjoy working directly with customers and turning complex business\
    \ challenges into practical AI solutions. The focus is on problem framing, solution\
    \ design, and business impact rather than pure software engineering . While you\
    \ will prototype AI solutions, the primary goal is delivering meaningful value\
    \ for customers. Native-level French proficiency is required for this role. Candidates\
    \ must be able to lead customer workshops, conduct executive presentations, and\
    \ manage stakeholder interactions in French. Key Responsibilities: Identify High-Impact\
    \ AI Opportunities: Work closely with enterprise customers to understand their\
    \ strategic priorities and operational challenges, identifying where AI can deliver\
    \ measurable business value. Design AI-Powered Solutions: Translate complex business\
    \ problems into scalable AI solution architectures combining the Celonis Process\
    \ Intelligence platform with modern AI technologies. Prototype &amp; Demonstrate\
    \ Value: Rapidly build prototypes and proof-of-value solutions that demonstrate\
    \ tangible outcomes to business and technical stakeholders. Lead AI Innovation\
    \ with Customers: Facilitate workshops, hackathons, and innovation sessions with\
    \ customers to explore new ways AI can transform their operations. Drive Adoption\
    \ and Business Impact: Partner with customer teams to ensure successful implementation,\
    \ adoption, and realization of measurable value from AI deployments. Develop Domain\
    \ Expertise: Build deep expertise in specific industries or business domains (e.g.,\
    \ supply chain, finance) and help scale that knowledge across the organization.\
    \ You might be a great fit if you... have 5+ years of experience in&nbsp; solutions\
    \ consulting, data / AI consulting, technical pre-sales, sales engineering, value\
    \ engineering, or customer-facing solution-architecture or AI roles enjoy translating\
    \ business challenges into technical solutions can communicate complex technical\
    \ concepts to business and executive stakeholders have a good understanding of\
    \ business processes across sectors (such as Supply Chain or Finance) with the\
    \ ability to translate high-level business needs into specific AI use cases. demonstrate\
    \ strong presentation skills to both internal and external stakeholders (including\
    \ executives), whether whiteboarding sessions or formal readouts and demos. have\
    \ some experience prototyping solutions with Python and modern AI frameworks are\
    \ familiar with Generative AI architectures such as RAG, prompt engineering, or\
    \ agent-based systems hold a Bachelor\u2019s Degree required (Masters Degree in\
    \ computer science, engineering, mathematics or related fields, or equivalent\
    \ work experience is a nice-to-have). possess native-level or near-native French\
    \ language skills (written and spoken), with the ability to confidently engage\
    \ French-speaking customers, facilitate workshops, and present to executive stakeholders.\
    \ Nice to have (big plus): Experience building or deploying generative AI applications\
    \ Familiarity with tools such as LangChain, LlamaIndex, or other LLM orchestration\
    \ frameworks Industry experience in domains such as supply chain, finance, or\
    \ operations What Celonis can offer you: Pioneer Innovation: Work with the global\
    \ leader in Process Mining and the Process Intelligence Graph to shape the future\
    \ of AI-driven business operations. Ownership from Day 1: Every full-time \"Celonaut\"\
    \ is an owner, receiving Restricted Stock Units (RSUs) and merit-based refresh\
    \ grants. Unrivaled Family Support: Benefit from our inclusive parental leave\
    \ policy\u201424 weeks of fully paid leave for primary carers and 12 weeks for\
    \ supporting carers, available from your first day of employment. Work-Life Integration:\
    \ Enjoy Unlimited PTO (in applicable regions) and generous PTO globally, as well\
    \ as a flexible hybrid work model that balances remote focus with vibrant office\
    \ collaboration. Continuous Growth: Elevate your skills through our 70-20-10 learning\
    \ framework, mentorship programs, and access to a dedicated learning platform.\
    \ Holistic Well-being: Prioritize your health with subsidized Wellhub memberships,\
    \ mental health counseling, and dedicated \"Wellness Weeks\" that prioritize work/life\
    \ balance. Drive Sustainability: Participate in annual Impact Days, where you\
    \ receive paid time off to volunteer for community and environmental causes with\
    \ your local office, or virtually. Global Inclusion &amp; Belonging: Find community\
    \ through our Inclusion Think Tank and participate in our annual Inclusion Days,\
    \ ensuring every voice is heard and valued. Value-Driven Impact: Join a mission-led\
    \ organization where our core values\u2014Live for Customer Value, The Best Team\
    \ Wins, We Own It, and Earth Is Our Future\u2014drive every decision. About Us:\
    \ Celonis makes processes work \u2014 for people, companies, and the planet. Powered\
