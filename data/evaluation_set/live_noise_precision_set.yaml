  description_text: "Company Description We\u2019re http://checkout.comCheckout.com\
    \ http://Checkout.com. You might not know our name, but companies like eBay, Spotify,\
    \ Klarna, Uber, and Sony do, because we\u2019re behind many of the digital experiences\
    \ you use every day. We are where the world checks out, enabling over 10 billion\
    \ transactions daily for more than one billion global shoppers. Whether you want\
    \ to book a holiday, order food, renew a subscription, or check out online, there\u2019\
    s a good chance our tech powers the payments behind the scenes. Our platform helps\
    \ the most ambitious businesses deliver effortless digital experiences, at scale.\
    \ If you want to do career-defining work, you\u2019ve come to the right place.\
    \ We move fast, think globally, and believe great teams are built by hiring exceptional\
    \ people with conviction, curiosity, and the desire to make an impact. With 20\
    \ offices across six continents and London as our HQ, we\u2019re shaping the future\
    \ of fintech \u2013 and we\u2019re just getting started. The Mission: We are looking\
    \ for a proactive business builder who wants to become an expert in the global\
    \ payments landscape. In this role, you aren't just a \"lead generator\" - you\
    \ are a strategic partner to Sales. You will use a blend of highly relevant, strategic\
    \ outreach, AI-driven insights, and deep technical research to open doors at the\
    \ world\u2019s most prestigious brands. We expect you to master the complexities\
    \ of the payments industry to source and support high-intent opportunities that\
    \ drive actual revenue.. What You\u2019ll Do: - Master the Payments Craft: Rapidly\
    \ develop a deep, technical understanding of our product suite and global payment\
    \ trends to act as a consultant to prospective merchants. - Strategic Account\
    \ Mapping: Conduct in-depth research into organizational structures and competitive\
    \ landscapes to identify and engage high-value strategic accounts. - Advanced\
    \ Discovery: Conduct high-level discovery calls that move past the \"pitch\" to\
    \ uncover deep technical and business challenges for the merchant. - Drive Growth\
    \ Momentum: Maintain a high-performing operating rhythm in daily outreach, consistently\
    \ striving for excellence while contributing to a high-standard team environment.\
    \ - Support the Sales Lifecycle: Partner closely with Sales to move deals through\
    \ the funnel, providing support on follow-ups and maintaining momentum to ensure\
    \ successful financial go-lives. - Cross-Functional Leadership: Partner with Solutions\
    \ Engineering, Underwriting, and Product teams to align internal stakeholders\
    \ and accelerate the sales cycle. - Leverage AI & Sales Tech: Proactively use\
    \ AI-driven systems (e.g., Salesforce, intent-data tools) and advanced analytics\
    \ to optimize lead generation, territory planning, and pipeline accuracy. - Operational\
    \ Rigor: Maintain a data-backed approach to your territory, utilizing qualification\
    \ frameworks (like MEDDIC) and keeping the CRM (Salesforce) as a source of truth.\
    \ What You Bring: - Proactive Ownership: You take end-to-end accountability for\
    \ your territory and outcomes, proactively plan your quarter to overachieve. -\
    \ Intellectual Curiosity: A relentless drive to learn the mechanics of complex\
    \ financial technology and industry dynamics. - Exceptional Communication & Presence:\
    \ Excellent listening and communication skills (written, verbal, and in person).\
    \ You have the confidence and clarity to engage effectively with stakeholders\
    \ at all levels - from internal product leads to C-suite executives at global\
    \ brands. - Technical & AI Fluency: A desire to leverage the latest sales technology\
    \ and AI tools to work smarter, not just harder. - Exceptional Resilience: A fundamentally\
    \ positive approach that maintains momentum through setbacks and challenges. -\
    \ Coachability: A track record of actively seeking feedback and immediately implementing\
    \ it to improve your performance. - Persistence & Precision: A high level of attention\
    \ to detail combined with a steadfast commitment to excellence in a fast-paced\
    \ environment. - Team Impact & Collective Success: You believe in winning as a\
    \ team and contribute to a supportive, inclusive environment where everyone can\
    \ perform at their best. You are a positive cultural force who shares feedback\
    \ respectfully and collaborates cross-functionally to help the entire organization\
    \ improve. Additional Information Bring all of you to work We create the conditions\
    \ for high performers to thrive, through real ownership, fewer blockers, and work\
    \ that makes a difference from day one. Here, you\u2019ll move fast, take on meaningful\
    \ challenges, and be recognized for the impact you deliver. It\u2019s a place\
    \ where ambition gets met with opportunity, and where your growth is in your hands.\
    \ We work as one team, and we back each other to succeed. So whatever your background\
    \ or identity, if you\u2019re ready to grow and make a difference, you\u2019ll\
    \ be right at home here. It\u2019s important we set you up for success and make\
    \ our process as accessible as possible. So let us know in your application, or\
    \ tell your recruiter directly, if you need anything to make your experience or\
    \ working environment more comfortable. Life at Checkout.com http://Checkout.com\
    \ We understand that work is just one part of your life. Our hybrid working model\
    \ offers flexibility, with three days per week in the office to support collaboration\
    \ and connection. Curious about what it\u2019s like to be part of our team? Visit\
    \ our Careers Page https://www.checkout.com/careers to learn more about our culture,\
    \ open roles, and what drives us. For a closer look at daily life at Checkout.com\
    \ http://Checkout.com, follow us on LinkedIn https://www.linkedin.com/company/checkout/life/\
    \ and Instagram https://www.instagram.com/checkout_com/"
