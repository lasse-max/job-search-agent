  description_text: "About Parloa Parloa\u2019s mission is to make every customer\
    \ conversation feel effortless for both customers and the companies serving them.\
    \ As agentic AI accelerates, Parloans are shaping the foundation of a new era\
    \ in customer experience - one where customer support is no longer transactions,\
    \ but meaningful exchanges. It is not just a vision; Parloa has powered over ONE\
    \ BILLION interactions between global enterprise brands and their customers, like\
    \ Booking.com , HealthEquity, Allianz, SAP, BarmeniaGothaer, and TUI already deploying\
    \ Parloa at scale. About the role: We are on a mission to transform how people\
    \ interact with companies by making every conversation seamless, personalized,\
    \ and human-like. Our AI Agent Management Platform empowers enterprises to create\
    \ and manage AI voice and chat agents at scale, turning interactions into lasting\
    \ relationships. As our Staff Product Designer - Consumer Experience , you will\
    \ drive the realisation of the design vision for consumer-facing, multimodal experiences\
    \ across voice, chat, and beyond. You will guide your cross-functional product\
    \ team to translate this vision into intuitive, trustworthy, and engaging interfaces\
    \ that make AI agents feel effortless to use. This is an opportunity to lead design\
    \ at the heart of how people experience AI, shaping consumer-grade interfaces\
    \ that will influence the future of Agentic AI. Areas of ownership: Bring the\
    \ design vision to life in your product team, ensuring clarity and usability across\
    \ consumer-facing, multimodal experiences. Partner closely with product managers,\
    \ engineers, and AI specialists to align on priorities, user needs, technical\
    \ feasibility, and business impact. Balance simplicity and delight, ensuring interfaces\
    \ feel natural and human-like across voice, chat, and graphical touch-points.\
    \ Lead UX strategy for your product team with a focus on multimodal consumer interactions,\
    \ ensuring research insights shape both near-term design choices and the long-term\
    \ vision. Prototype and test interaction models that make AI agents intuitive\
    \ and trustworthy for everyday users. Take end-to-end ownership of design in your\
    \ product team, shaping direction and delivering high-quality, hands-on work.\
    \ &nbsp; Who you are: 8+ years of experience in product design with a proven track\
    \ record in consumer-facing products, including two years in a lead capacity.\
    \ Strong expertise in designing multimodal experiences, ideally across voice,\
    \ chat, and mobile. Ability to translate a design vision into coherent, high-quality\
    \ execution within a cross-functional team. Strong interaction and visual design\
    \ skills, with a portfolio that demonstrates elegant, user-centered solutions\
    \ in consumer contexts. Experience collaborating with product managers and engineers\
    \ to drive outcomes and influence priorities. A research-driven mindset, grounded\
    \ in user research, usability testing, and data-informed decision making. Excellent\
    \ communication and storytelling skills, with the ability to align and inspire\
    \ cross-functional teams. Nice to have:&nbsp; Experience designing consumer-facing\
    \ products that integrate AI or conversational interfaces. Background in designing\
    \ multimodal experiences that combine voice, chat, and graphical interfaces. Familiarity\
    \ with design systems in a scaling organization. Knowledge of accessibility best\
    \ practices and inclusive design principles for multimodal products. Interest\
    \ in emerging interaction models such as ambient computing, AR/VR, or wearables.\
    \ &nbsp; Our recruiting process: Recruiter Interview \u2192 Hiring Manager Interview\
    \ \u2192 Portfolio Walkthrough \u2192&nbsp; Live Whiteboard Session \u2192 Engineering\
    \ Lead Interview \u2192 Bar Raiser Interview &nbsp; Why Parloa? We\u2019re at\
    \ the beginning of a new era in customer experience, one where AI doesn\u2019\
    t just respond, but understands, reasons, and takes action. We\u2019re building\
    \ agentic AI that enterprises trust with their most important customer moments:\
    \ complex questions, high volumes, real stakes. When millions of people reach\
    \ out to a brand, those interactions aren\u2019t just support tickets; they\u2019\
    re defining experiences. We\u2019re here to raise the standard: making every conversation\
    \ seamless, intelligent, and genuinely helpful. If you care about shaping how\
    \ businesses and customers connect at scale- and want your work to matter in real,\
    \ everyday moments - this is where you do it. At Parloa, ownership isn\u2019t\
    \ a buzzword; it means being accountable for outcomes, not just tasks. We operate\
    \ in a category that\u2019s evolving fast, where the bar is high, and the problems\
    \ are complex. We hire people who think in solutions, communicate with clarity,\
    \ and follow through. People who are comfortable making decisions, taking responsibility,\
    \ and raising the standard for themselves and those around them. We\u2019ve grown\
    \ beyond the earliest startup phase, but we\u2019ve kept the intensity: fast execution,\
    \ direct feedback, and a strong expectation to contribute meaningfully from day\
    \ one. Backed by leading global investors like General Catalyst, EQT Ventures,\
    \ and Altimeter Capital, we\u2019re scaling with a clear ambition: to become the\
    \ global category leader in enterprise-grade conversational AI. &nbsp; Parloa\
    \ is committed to upholding the highest data protection standards for our clients'\
    \ and employees' data. All our employees are instrumental in ensuring the utmost\
    \ care, GDPR, and ISO compliance, including ISO 27001, in handling sensitive information.\
    \ Parloa is an e-verify employer in the USA. Please click here to learn more .\
    \ * We provide equal opportunities to all qualified applicants regardless race,\
    \ gender, sexual orientation, age, religion, national origin, disability status,\
    \ socioeconomic background and other characteristics."
