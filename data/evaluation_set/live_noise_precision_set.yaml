  description_text: "Who we are Helsing is a defence AI company. Our mission is to\
    \ protect our democracies. We aim to achieve technological leadership, so that\
    \ open societies can continue to make sovereign decisions and control their ethical\
    \ standards. &nbsp; As democracies, we believe we have a special responsibility\
    \ to be thoughtful about the development and deployment of powerful technologies\
    \ like AI. We take this responsibility seriously. &nbsp; We are an ambitious and\
    \ committed team of engineers, AI specialists and customer-facing programme managers.\
    \ &nbsp;We are looking for mission-driven people to join our European teams \u2013\
    \ and apply their skills to solve the most complex and impactful problems. We\
    \ embrace an open and transparent culture that welcomes healthy debates on the\
    \ use of technology in defence, its benefits, and its ethical implications. &nbsp;\
    \ The role Being an integrated element of Production Quality, as Incoming Inspector\
    \ in Helsings Production environment you are responsible for the Quality Assurance\
    \ Gate on supplied goods into our warehouse by verification of conformity, as\
    \ well outbound quality aspects on customer deliverables or supplier returns in\
    \ close relation with our Logistic, &nbsp;Supply Chain - and further Production-Quality\
    \ functions. The day-to-day Execute incoming goods inspection based on applicable\
    \ specifications and secure required documentation Maintain and process reporting\
    \ of non-conform material including conform handling and marking Contribute to\
    \ and drive root cause corrective action and improvement activities Oversight\
    \ and control of blocked / quarantined material in your area including scrap control\
    \ Ensure process compliance to internal QMS, EN9100 and others applicable standards\
    \ You should apply if you Can show up with a professional education in electronics,\
    \ mechanics or mechatronics with min. 3 years of quality assurance experience\
    \ in electronics (machinery or plant engineering, automotive), experience in warehouse\
    \ inbound QA is of advantage Demonstrate applied and proven experience on inspection\
    \ methods by visual means or via the use of standard test / measurement equipment\
    \ and able to read, understand, and apply technical documents ( Engineering drawings\
    \ / Inspection procedures ) Have the experience in maintaining IT Software applications\
    \ like MS Office, QA SW if applicable. SAP experience is of advantage. Can work\
    \ independently as well in a team and subordinate him/herself with the ability\
    \ to assert oneself and respect other positions Maintain a process oriented attitude\
