    \ causal inference). - Collaborate with engineering teams to design and build\
    \ tools and infrastructure to enable optimization at scale and deploy ML systems\
    \ to production. - Partner with Product, Engineering, Risk, and other cross-functional\
    \ teams to inform and influence product strategy and investment decisions. - Clearly\
    \ and persuasively communicate complex data insights and technical recommendations\
    \ to both technical and non-technical audiences, ensuring your findings influence\
    \ stakeholders at all levels. - Mentor and coach junior data scientists and engineers.\
    \ Qualifications: - Advanced degree (PhD or MS) in a quantitative field such as\
    \ Statistics, Engineering, Computer Science, Economics, or related disciplines.\
    \ - 5+ years of industry experience in data science or applied ML. - Proven experience\
    \ in experimentation and causal inference to drive data-informed product decisions\
    \ with concrete impact. - Strong experience in deploying ML systems to production\
    \ is a big plus. - Demonstrated ability to operate as a technical leader, defining\
    \ and developing critical systems and influencing product strategy in high-growth\
    \ environments. - Proficient in SQL and Python/R. - Experience using LLM, AI and\
    \ Agent to improve processes and ML models Why Join Us: - Opportunity to work\
