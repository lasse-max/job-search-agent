  description_text: "Company Description We\u2019re http://checkout.comCheckout.com\
    \ http://Checkout.com. You might not know our name, but companies like eBay, Spotify,\
    \ Klarna, Uber, and Sony do, because we\u2019re behind many of the digital experiences\
    \ you use every day. We are where the world checks out, enabling over 10 billion\
    \ transactions daily for more than one billion global shoppers. Whether you want\
    \ to book a holiday, order food, renew a subscription, or check out online, there\u2019\
    s a good chance our tech powers the payments behind the scenes. Our platform helps\
    \ the most ambitious businesses deliver effortless digital experiences, at scale.\
    \ If you want to do career-defining work, you\u2019ve come to the right place.\
    \ We move fast, think globally, and believe great teams are built by hiring exceptional\
    \ people with conviction, curiosity, and the desire to make an impact. With 20\
    \ offices across six continents and London as our HQ, we\u2019re shaping the future\
    \ of fintech \u2013 and we\u2019re just getting started. Checkout.com http://Checkout.com\
    \ is seeking a talented Treasury Markets Manager to join our Treasury team, based\
    \ in London. The successful candidate will be working on the buildout / enhancement\
    \ and execution of market risk management capabilities for the firm. In response\
    \ to the continued scaling and expansion of Checkout.com http://Checkout.com in\
    \ terms of volume, geographic footprint, payment methods, currencies supported,\
    \ and product diversity, you will be contributing to the implementation of a Treasury\
    \ market risk management framework, monitoring and managing these risks and providing\
    \ best in class execution. About You - 7-10 years of treasury/markets experience\
    \ - Market facing/execution experience in FX, Money Markets, HQLA management,\
    \ Cash Management - Understanding of Treasury market risks (FX, interest rate)\
    \ - Experience of market risk management frameworks - Quantitative and analytical\
    \ skills, including modeling skills - Strong communication skills and an ability\
    \ to build and leverage cross-functional relationships - Good understanding of\
    \ Treasury concepts and how they impact Treasury Markets - Willingness to work\
    \ with Payments, Analytics, Liquidity teams within Treasury as well as other teams\
    \ such Accounting, New Projects, Product teams. This will also include working\
    \ with Regional Treasury teams in APAC, MENA and US. - Experience and desire in\
    \ setting up Treasury investment infrastructure (risk, systems,negotiating with\
    \ external counterparties) - Experience of working through change and implementing\
    \ new processes - Attention to detail and proactivity are essential. - Basic knowledge\
    \ of regulatory frameworks, including either banking or EMI/PI regulations What\
    \ You Will Be Doing - Support in all aspects of the day to day monitoring, analysis\
    \ and management of the legal entities and regional Treasury market risks (primarily\
    \ FX, and interest rate risk), that are incurred by Checkout.com http://Checkout.com\
    \ in the ordinary course of business - Implement and execute hedging/trading strategies,\
    \ supporting management of cash flows by currency - Execute external market facing\
    \ transactions (FX execution, Cash deployment, HQLA portfolio management, Money\
    \ markets, etc), managing within structural limits and as per parameters outlined\
    \ by Treasury mandates - Ensure end to end trade execution including exchanging\
    \ trade confirms and ensuring appropriate follow up with counterparties / middle\
    \ office teams to ensure settlement - Ensure Treasury contribution to the profitability\
    \ of Checkout.com http://Checkout.com - Enhance the Treasury Markets infrastructure\
    \ for the team including setting up trading counterparties, document negotiation\
    \ along with legal, enhancing existing risk management / product capabilities.\
    \ - Understand current business model and payment flows, to understand and identify\
    \ market risks to help design and implement a market risk management framework\
    \ - Contribute to the design and set up of MI reports, procedures and controls\
    \ to mitigate/manage these risks - Support documentation of policies and procedures\
    \ associated with the above - Participate in new product and expansion initiatives\
    \ including testing and implementing process - Maintain close awareness of market\
    \ conditions by reading market reports and interacting with market counterparties\
    \ - Produce management information on Treasury P&L & analysis of drivers Additional\
    \ Information Bring all of you to work We create the conditions for high performers\
    \ to thrive, through real ownership, fewer blockers, and work that makes a difference\
