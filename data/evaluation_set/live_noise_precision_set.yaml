    \ deployment for fleet-specific mission-critical services, preventing outages\
    \ that could hinder vehicle launch or maintenance. Write designs and code software/automation\
    \ for global infrastructure Serve as the first responder for fleet and supply\
    \ infrastructure by leading incident response efforts. You\u2019ll participate\
    \ in a sustainable on-call rotation, while championing a culture of blameless\
    \ retrospectives to drive continuous improvement Be a technical leader -- work\
    \ with SREs, SWE partners and PMs to develop and set the technical direction and\
    \ architectural guidelines for Waymo's software development &nbsp; You have: 6+\
    \ years of experience architecting and maintaining mission-critical systems in\
    \ C++, Java, or Python Proven ability to conduct deep-dive performance profiling\
    \ and lead large-scale refactoring efforts to improve system maintainability and\
    \ latency Demonstrated success managing massive distributed systems and a drive\
    \ to solve the unique production engineering challenges found at the intersection\
