  description_text: "ABOUT AIRWALLEX Airwallex is the only unified payments and financial\
    \ platform for global businesses. Powered by our unique combination of proprietary\
    \ infrastructure and software, we empower over 200,000 businesses worldwide \u2013\
    \ including Brex, Rippling, Navan, Qantas, SHEIN and many more \u2013 with fully\
    \ integrated solutions to manage everything from business accounts, payments,\
    \ spend management and treasury, to embedded finance at a global scale. Proudly\
    \ founded in Melbourne, we have a team of over 2,200 of the brightest and most\
    \ innovative people in tech across 26 offices around the globe. Valued at US$8\
    \ billion and backed by world-leading investors including T. Rowe Price, Visa,\
    \ Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and\
    \ Lone Pine Capital, Airwallex is leading the charge in building the global payments\
    \ and financial platform of the future. If you\u2019re ready to do the most ambitious\
    \ work of your career, join us. ATTRIBUTES WE VALUE We hire successful builders\
    \ with founder-like energy who want real impact, accelerated learning, and true\
    \ ownership. You bring strong role-related expertise and sharp thinking, and you\u2019\
    re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles.\
    \ You move fast with good judgment, dig deep with curiosity, and make decisions\
    \ from first principles, balancing speed and rigor. You're humble and collaborative;\
    \ turn zero\u2011to\u2011one ideas into real products, and you \u201Cget stuff\
    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. WHAT YOU\u2019LL DO\
    \ At Airwallex, trust is foundational to every customer relationship. Before a\
    \ business can move money, issue cards, manage spend, or scale globally, we need\
    \ to know who they are, help the right people access the right capabilities, and\
    \ protect their accounts from fraud, abuse, and accidental misuse. The Identity\
    \ & User Security team owns some of the most critical moments in the customer\
    \ journey: onboarding decisioning, identity verification, user authentication,\
    \ account recovery, roles & permissions, and customer notifications. These products\
    \ sit at the intersection of customer experience, compliance, risk, platform scalability,\
    \ and account security. As a Senior Product Manager on the team, you will define\
    \ and scale the systems that help legitimate customers get onboarded and stay\
    \ secure \u2014 while making it harder for bad actors to exploit the platform.\
    \ You\u2019ll work across Product, Engineering, Design, Risk, Compliance, Operations,\
    \ Security, and Data Science to build global capabilities that are simple for\
    \ customers, powerful for internal teams, and resilient enough for a fast-growing\
    \ financial platform. This is a high-ownership role for a product manager who\
    \ enjoys complex systems, regulated environments, customer journey design, and\
    \ building platform capabilities with real-world business impact. This role will\
    \ be based in Singapore or Sydney. Your Impact - Own and evolve core identity\
    \ and user security journeys across onboarding, identity verification, user authentication,\
    \ account recovery, authorization, and customer/security notifications. - Define\
    \ the product strategy and roadmap for how Airwallex verifies users, grants access,\
    \ protects accounts, and communicates with customers during high-trust moments.\
    \ - Improve customer experience while strengthening trust and risk controls, balancing\
    \ onboarding conversion, account security, fraud prevention, compliance requirements,\
    \ and operational efficiency. - Design scalable identity, access, and recovery\
    \ capabilities that work across different customer types, business structures,\
    \ regions, products, and regulatory requirements. - Shape Airwallex\u2019s customer\
    \ notification strategy across the entire user lifecycle, including when to notify,\
    \ what channel to use, how to drive action, and how to manage growth, trust, fatigue,\
    \ deliverability, cost, and abuse. REQUIREMENTS - Strategic Tech PM Leadership:\
    \ 6+ years of experience owning complex, scalable platform/B2B products (SaaS,\
    \ payments, infra) from discovery to rollout, with proven technical fluency to\
    \ debate architecture, APIs, and data pipelines with engineering. - Risk & Compliance\
    \ Navigation: Strong track record in regulated, policy-heavy environments (fintech,\
    \ banking, security), successfully leading cross-functional alignment across Engineering,\
    \ Risk, Compliance, and Legal. - Data-Driven & Execution-Focused: Expert at defining\
    \ product metrics, running self-serve analyses (SQL/dashboards), and distilling\
    \ complex technical or risk-related concepts into clear communication for both\
    \ engineers and executives. PREFERRED QUALIFICATIONS - Platform & Identity Expertise:\
    \ Proven experience building scalable platform capabilities (APIs, SDKs, services)\
    \ consumed by multiple teams, with specific expertise in IAM, authN/authZ, policy\
    \ engines, or global notification systems. - Security, Fraud & Risk Mitigation:\
    \ Strong background in fraud prevention, security engineering, and account abuse,\
    \ including designing cost-effective mitigations against vectors like phishing\
    \ and SMS pumping. - Global Scale & Operations: Track record of shipping features\
    \ across multiple countries, navigating diverse regulatory regimes, and managing\
    \ platform versioning, SLAs, and technical documentation at scale. APPLICANT SAFETY\
    \ POLICY: FRAUD AND THIRD-PARTY RECRUITERS To protect you from recruitment scams,\
    \ please be aware that Airwallex will not ask for bank details, sensitive ID numbers\
    \ (i.e. passport), or any form of payment during the application or interview\
    \ process. All official communication will come from an @airwallex.com http://airwallex.com\
    \ email address. Please apply only through careers.airwallex.com http://careers.airwallex.com\
    \ or our official LinkedIn page. Airwallex does not accept unsolicited resumes\
    \ from search firms/recruiters. Airwallex will not pay any fees to search firms/recruiters\
    \ if a candidate is submitted by a search firm/recruiter unless an agreement has\
    \ been entered into with respect to specific open position(s). Search firms/recruiters\
    \ submitting resumes to Airwallex on an unsolicited basis shall be deemed to accept\
    \ this condition, regardless of any other provision to the contrary. EQUAL OPPORTUNITY\
    \ Airwallex is proud to be an equal opportunity employer. We value diversity and\
    \ anyone seeking employment at Airwallex is considered based on merit, qualifications,\
    \ competence and talent. We don\u2019t regard color, religion, race, national\
    \ origin, sexual orientation, ancestry, citizenship, sex, marital or family status,\
    \ disability, gender, or any other legally protected status when making our hiring\
    \ decisions. If you have a disability or special need that requires accommodation,\
    \ please let us know."
