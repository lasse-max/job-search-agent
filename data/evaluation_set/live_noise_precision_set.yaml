    \ independently managed complex license applications and understand the nuances\
    \ of both German (BAFA) and U.S. (re-)export control laws Can classify complex\
    \ technology: You possess the technical literacy to classify goods and software\
    \ according to national and international regulations Are a clear communicator:\
    \ You can translate complex legal requirements into actionable advice for technical\
    \ and non-technical stakeholders alike Drive outcomes through autonomy: You are\
    \ comfortable taking independent responsibility for projects, from permit management\
    \ to supporting cross-functional IT compliance initiatives Note: We operate in\
    \ an industry where women, as well as other minority groups, are systematically\
    \ &nbsp; under-represented. We encourage you to apply even if you don\u2019t meet\
    \ all the listed qualifications; ability and impact cannot be summarised in a\
    \ few bullet points. Nice to Have Experience in a fast-paced software or tech\
    \ environment Prior experience supporting IT and Hardware projects&nbsp; Knowledge\
    \ of U.S. re-export regulations (EAR/ITAR) in a European context Join Helsing\
    \ and work with world-leading experts in their fields &nbsp; Helsing\u2019s work\
    \ is important. You\u2019ll be directly contributing to the protection of democratic\
    \ countries while balancing both ethical and geopolitical concerns The work is\
    \ unique. We operate in a domain that has highly unusual technical requirements\
