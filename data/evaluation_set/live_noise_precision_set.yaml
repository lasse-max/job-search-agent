  description_text: "About Mistral At Mistral AI, we believe in the power of AI to\
    \ simplify tasks, save time, and enhance learning and creativity. Our technology\
    \ is designed to integrate seamlessly into daily working life. We democratize\
    \ AI through high-performance, optimized, open-source and cutting-edge models,\
    \ products and solutions. Our comprehensive AI platform is designed to meet enterprise\
    \ needs, whether on-premises or in cloud environments. Our offerings include Vibe,\
    \ the AI assistant for life and work. We are a dynamic, collaborative team passionate\
    \ about AI and its potential to transform society. Our diverse workforce thrives\
    \ in competitive environments and is committed to driving innovation. Our teams\
    \ are distributed between France, USA, UK, Germany and Singapore. We are creative,\
    \ low-ego and team-spirited. Join us to be part of a pioneering company shaping\
    \ the future of AI. Together, we can make a meaningful impact. See more about\
    \ our culture on https://mistral.ai/careers. Role summary We are seeking an Applied\
    \ AI Engineer to build the customer-facing cyber service and use-cases on top\
    \ of our cyber harnesses. You will turn \"we have agents\" into \"we shipped something\
    \ a client uses.\" This role is about composing red-team/blue-team agentic workflows,\
    \ configuring harnesses for real-world scenarios, and delivering value directly\
    \ to clients. Your work will bridge the gap between our foundational cyber harnesses\
