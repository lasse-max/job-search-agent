  description_text: "REQ# FEQ427R66 Solutions Architect \u2013 Data &amp; AI (Presales)&nbsp;\
    \ At Databricks, our Solutions Architects combine customer engagement with hands-on\
    \ technical expertise. You will work closely with customers to understand their\
    \ challenges and demonstrate how the Databricks platform can solve them \u2013\
    \ not just conceptually, but in practice. This role sits within our sales organization\
    \ and is ideal for someone who enjoys working at the intersection of business,\
    \ data, and AI \u2014 and who is motivated by turning ideas into working solutions.\
    \ What you\u2019ll do Partner with Account Executives to drive technical sales\
    \ cycles and customer outcomes Lead customer workshops, discovery sessions, and\
    \ technical deep-dives across multiple stakeholders Build and deliver proof-of-concepts,\
    \ demos, and solution prototypes using real data Translate business requirements\
    \ into practical, scalable data and AI solutions Act as a trusted advisor, while\
    \ also being able to go hands-on to validate solutions end-to-end Work through\
    \ technical challenges with customers, iterating and resolving issues as they\
    \ arise Contribute reusable assets, patterns, and best practices that accelerate\
    \ adoption across customers What we\u2019re looking for Customer-facing mindset\
    \ Experience working with customers in a presales, consulting, or advisory capacity\
    \ Ability to communicate complex topics to both technical and non-technical audiences\
    \ Comfortable leading discussions that connect business goals to technical decisions\
    \ Hands-on technical foundation Experience with Python (or similar) and familiarity\
    \ with distributed data processing and compute and working with large-scale datasets\
    \ Understanding of data pipelines and modern data architectures Ability to work\
    \ practically with data (e.g. building PoCs, exploring datasets, troubleshooting)\
    \ Comfortable reasoning through code, explaining how it works, and adapting it\
    \ when things don\u2019t behave as expected Data &amp; AI understanding Familiarity\
    \ with analytics, data science, or machine learning workflows Understanding of\
    \ how data platforms support AI use cases (e.g. feature pipelines, model training,\
    \ inference) Interest in modern AI capabilities, combined with an understanding\
    \ of how they operate on real data systems Architecture &amp; platform understanding\
    \ Familiarity with cloud platforms and data technologies Ability to design solutions\
    \ that consider scalability, performance, reliability, and data volumes Awareness\
    \ of trade-offs in architecture decisions and ability to adapt designs based on\
    \ constraints What makes you successful in this role You are comfortable switching\
    \ between business dialogue and technical execution You don\u2019t just describe\
    \ solutions \u2014 you can build, validate, and iterate on them in practice You\
    \ take ownership of technical challenges and push problems forward, even when\
    \ things are not working as expected You apply structured thinking in discovery\
    \ and can connect requirements to scalable technical solutions You understand\
    \ that AI solutions depend on solid data foundations You are curious and continuously\
    \ deepen your technical expertise About Databricks Databricks is the data and\
    \ AI company. More than 10,000 organizations worldwide \u2014 including Comcast,\
    \ Cond\xE9 Nast, Grammarly, and over 50% of the Fortune 500 \u2014 rely on the\
    \ Databricks Data Intelligence Platform to unify and democratize data, analytics\
    \ and AI. Databricks is headquartered in San Francisco, with offices around the\
    \ globe and was founded by the original creators of Lakehouse, Apache Spark\u2122\
    , Delta Lake and MLflow. To learn more, follow Databricks on&nbsp; Twitter ,&nbsp;\
    \ LinkedIn &nbsp; and &nbsp; Facebook . Benefits At Databricks, we strive to provide\
    \ comprehensive benefits and perks that meet the needs of all of our employees.\
    \ For specific details on the benefits offered in your region click here . Our\
    \ Commitment to Diversity and Inclusion At Databricks, we are committed to fostering\
    \ a diverse and inclusive culture where everyone can excel. We take great care\
    \ to ensure that our hiring practices are inclusive and meet equal employment\
    \ opportunity standards. Individuals looking for employment at Databricks are\
    \ considered without regard to age, color, disability, ethnicity, family or marital\
    \ status, gender identity or expression, language, national origin, physical and\
    \ mental ability, political affiliation, race, religion, sexual orientation, socio-economic\
    \ status, veteran status, and other protected characteristics. Compliance If access\
    \ to export-controlled technology or source code is required for performance of\
    \ job duties, it is within Employer's discretion whether to apply for a U.S. government\
    \ license for such positions, and Employer may decline to proceed with an applicant\
    \ on this basis alone."
