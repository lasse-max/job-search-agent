    \ Data Intelligence Platform to unify and democratize data, analytics and AI.\
    \ Databricks is headquartered in San Francisco, with offices around the globe\
    \ and was founded by the original creators of Lakehouse, Apache Spark\u2122, Delta\
    \ Lake and MLflow. To learn more, follow Databricks on&nbsp; Twitter ,&nbsp; LinkedIn\
    \ &nbsp; and &nbsp; Facebook . Benefits At Databricks, we strive to provide comprehensive\
    \ benefits and perks that meet the needs of all of our employees. For specific\
    \ details on the benefits offered in your region click here . Our Commitment to\
    \ Diversity and Inclusion At Databricks, we are committed to fostering a diverse\
    \ and inclusive culture where everyone can excel. We take great care to ensure\
    \ that our hiring practices are inclusive and meet equal employment opportunity\
    \ standards. Individuals looking for employment at Databricks are considered without\
    \ regard to age, color, disability, ethnicity, family or marital status, gender\
    \ identity or expression, language, national origin, physical and mental ability,\
    \ political affiliation, race, religion, sexual orientation, socio-economic status,\
