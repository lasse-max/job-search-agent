    \ to shape direction, not just execute against requirements Demonstrated ability\
    \ to prototype and design across multiple touchpoints and surfaces Excellent written\
    \ and verbal communication skills, with the ability to influence through clear\
    \ design rationale and artifacts Preferred qualifications Think in systems and\
    \ design solutions that scale across users, workflows, and surfaces Have strong\
    \ product judgment and influence beyond the UI Care deeply about quality from\
    \ concept through implementation Are comfortable operating in fast-moving environments\
    \ where priorities may shift in response to policy, operational, or regulatory\
    \ needs"
