    \ important we set you up for success and make our process as accessible as possible.\
    \ So let us know in your application, or tell your recruiter directly, if you\
    \ need anything to make your experience or working environment more comfortable.\
    \ Life at Checkout.com http://Checkout.com We understand that work is just one\
    \ part of your life. Our hybrid working model offers flexibility, with three days\
    \ per week in the office to support collaboration and connection. Curious about\
    \ what it\u2019s like to be part of our team? Visit our Careers Page https://www.checkout.com/careers\
    \ to learn more about our culture, open roles, and what drives us. For a closer\
    \ look at daily life at Checkout.com http://Checkout.com, follow us on LinkedIn\
    \ https://www.linkedin.com/company/checkout/life/ and Instagram https://www.instagram.com/checkout_com/"
