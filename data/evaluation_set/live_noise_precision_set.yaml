    \ and prior experience interacting with regulators, ideally including AUSTRAC\
    \ (e.g. in the context of reviews, audits, information requests or inspections).\
    \ - In\u2011depth familiarity with Australian AML/CTF laws, rules and regulatory\
    \ guidance, and how they apply to digital payments, cross\u2011border flows and\
    \ e\u2011commerce use\u2011cases. - Hands\u2011on experience with SMR investigation\
    \ and filing (or equivalent STR/SAR process), IFTI or other cross\u2011border\
    \ reporting, and managing transaction\u2011monitoring and name\u2011screening\
    \ escalations end\u2011to\u2011end from alert to closure or reporting. - Strong\
    \ stakeholder management skills, with the ability to credibly engage and challenge\
    \ senior internal stakeholders and external partners (e.g. banks, schemes, regulators)\
    \ while role\u2011modelling Airwallex values and behaviours. Preferred qualifications:\
    \ - Experience working in the payments, fintech or e\u2011commerce sectors, ideally\
    \ supporting cross\u2011border or digital products, card issuing/acquiring or\
    \ embedded finance propositions. - Recognised professional certification in a\
    \ compliance or financial crime discipline (e.g. CAMS, ICA, ACAMS, AICD governance\
    \ training or equivalent). - Experience operating within a global or regional\
    \ FCC function, partnering across multiple jurisdictions and time zones and contributing\
