  description_text: "The role Factor is our newest brand - a healthy, ready-to-eat\
    \ meal delivery service, and one of the fastest-growing parts of the HelloFresh\
    \ Group\u2019s European business.&nbsp; We\u2019re looking for a Nutrition Manager,\
    \ with a Registered Dietitian designation, to own and raise the bar on nutritional\
    \ excellence across the brand. You\u2019ll make sure every meal we ship meets\
    \ the dietary needs of our customers, run the nutrition consultation programme\
    \ that supports customers and prospects, and be the custodian of the nutrition\
    \ data behind our entire product range. Reporting to the Head of Product and working\
    \ alongside Culinary, Kitchen Ops, Procurement, and Regulatory, you\u2019ll have\
    \ end-to-end ownership of nutrition in a small, fast-moving team, helping us build\
    \ the future of the ready-to-eat category in Europe! What you\u2019ll do 1. Own\
    \ our nutritional integrity and standards Own and maintain the nutrition database\
    \ for every recipe and ingredient, keeping it accurate and proactively spotting\
    \ opportunities to improve the nutritional quality of our products. Maintain,\
    \ clarify, and improve our internal nutrition standards, run competitive benchmarking,\
    \ and lead projects to sharpen our nutrition analysis assumptions and inputs.\
    \ Advise on nutrition and ingredient claims, aligning with both brand positioning\
    \ and regulatory expectations. 2. Partner on recipe and product development Partner\
    \ closely with Culinary to review and approve recipe formulations, troubleshooting\
    \ constraints and optimising our recipes for customer value. Approve new SKUs\
    \ and ingredient substitutions from a nutritional standpoint, coordinating with\
    \ Sourcing and Regulatory to ensure compliance and accuracy in labelling. 3. Build\
    \ and run the nutrition consultation programme Develop, manage, and scale our\
    \ nutrition consultation programme - including bringing on and coordinating part-time\
    \ dietitians, reporting on program quality and effectiveness, and hosting customer-facing\
    \ sessions as needed. Respond to customer nutrition enquiries and feed customer\
    \ insights back into product and content strategy. 4. Lead nutrition content and\
    \ education Create nutrition-focused content for PR, social media, and customer\
    \ education, and support marketing and growth initiatives with credible, engaging\
    \ messaging. What you\u2019ll bring 3+ years practising as a Registered Dietitian,\
    \ with an active certification/licence in the EU . Deep knowledge across a wide\
    \ range of dietary lifestyles, such as GLP-1 support, ketogenic, low/slow carb,\
    \ vegan and vegetarian diets, and more. A strong grasp of local and broader pan-European\
    \ dietary trends, regulations, and restrictions, and a strong appetite for staying\
    \ current with the latest research on the science of nutrition. Experience in\
    \ a client-facing role where trust-building, coaching, and guidance were central\
    \ to success. Experience in recipe development or new product development. Who\
    \ you are Highly pragmatic: you believe \u201Cperfect\u201D is the enemy of \u201C\
    better\u201D, and you can balance the priorities of many different departments\
    \ to help us serve our customers\u2019 best interests. Entrepreneurial: you enjoy\
    \ working in small teams, taking ownership of new opportunities, and are constantly\
    \ looking for ways to improve on things. Intellectually curious: you love learning\
    \ new things and spend your free time deepening&nbsp; your knowledge.&nbsp; Highly\
