    \ our processes. Architect Versatile Workflows: Design and implement custom Jira\
    \ configurations that are robust enough for a regulated bank but flexible enough\
    \ for an agile tech company. Data-Driven Storytelling: Utilize advanced reporting\
    \ and analytics to provide leadership with clear visibility into operational health\
    \ and project progress. Technical Mentorship: Act as a subject matter expert,\
    \ coaching teams on best practices and ensuring our internal documentation is\
    \ a \"gold standard\" resource. What you need to be successful: Professional Seniority:\
    \ 5+ years (minimum 3+) of hands-on experience in Jira, JSM, and Confluence administration\
    \ within enterprise environments. Conceptual Agility: You are comfortable working\
    \ from high-level briefs and enjoy the process of \"discovery\"\u2014asking the\
    \ right questions to build a clear, structured path forward. Financial Services\
    \ Context: Experience in a regulated environment is a strong plus, helping you\
    \ balance innovation with compliance and security standards. The Technical Edge:\
    \ * Core: Deep proficiency in JQL, Automations, Atlassian APIs, Assets and Scriptrunner\
    \ (Groovy). Communication Mastery: You can navigate conversations with both technical\
    \ and non-technical stakeholders, ensuring everyone is aligned on the solution.\
    \ Fluent English is a must. Deep expertise: in Jira administration, workflow customization,\
    \ stakeholder management, and best practices for scalable implementation across\
    \ diverse teams Nice to have:&nbsp; Familiarity with Atlassian Analytics or the\
    \ Forge framework. Knowledge about ITIL/ITSM Knowledge of product and software\
    \ development lifecycle Coaching skills What\u2019s in it for you: Accelerate\
    \ your career growth by joining one of Europe\u2019s most talked about disruptors\
    \ \U0001F680. Employee benefits that range from a competitive personal development\
    \ budget, work from home budget, discounts to fitness &amp; wellness memberships,\
    \ language apps and public transportation.&nbsp; As an N26 employee you will have\
    \ access to a Premium subscription on your personal N26 bank account. As well\
    \ as subscriptions for friends and family members.&nbsp;&nbsp;&nbsp;&nbsp; Additional\
    \ day of annual leave for each year of service.&nbsp;&nbsp; A high degree of autonomy\
    \ and access to cutting edge technologies - all while working with a friendly\
    \ team of peers of diverse nationalities, experiences, and backgrounds.&nbsp;\
    \ A relocation package with visa support for those who need it. Who we are N26\
    \ has reimagined banking for today\u2019s digital world. Technology and design\
    \ empower everything we do and it\u2019s how we are building the global banking\
    \ platform the world loves to use. We've eliminated physical branches, paperwork,\
    \ and hidden fees for an elegant digital experience and supreme savings. Giving\
    \ people the power to live and bank their way is what gets us out of bed in the\
    \ morning and inspires the work that we do.&nbsp; We are headquartered in Berlin\
    \ with offices in multiple cities across Europe, including Vienna and Barcelona,\
    \ and a 1,500-strong team of more than 80 nationalities.&nbsp; Do you see yourself\
    \ thriving in this role? We\u2019d love to see your application even if you don\u2019\
    t meet 100% of the criteria. You may just be the right fit for this or other roles!\
    \ Equal opportunities for all At N26, we believe our strength lies in our people\
    \ and the varied perspectives they bring. We strive to build diverse teams that\
    \ drive innovation and business success. We actively seek talent from all backgrounds\
    \ and welcome applications from all genders, cultures, sexual orientations, abilities,\
    \ neurodiversities, and ages. We are committed to providing an excellent and accessible\
