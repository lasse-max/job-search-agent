  source_url: https://jobs.ashbyhq.com/xero/09788644-a31f-4c2c-a3a6-1aaedf0fccee
  description_text: 'The role & impact As a Senior Business Operations Manager, you
    will own how our team finds, creates, and shares knowledge and to push that forward
    with AI in a meaningful way. You''ll be the person who turns our knowledge environments
    into knowledge bases people actually want to use. That means building smart architecture,
    connecting AI agents and search tools, and making it easy for lawyers, advisors
    and business users to get the right answer fast. By designing a robust knowledge
    framework and implementing intelligent AI integrations, you will eliminate friction,
    empower self-service, and allow our global team to focus on strategic initiatives
    that safeguard and accelerate Xero''s growth. Beyond knowledge management, you''ll
    be part of the team managing the operational engine of the function: the tech
    stack, the processes, the reporting, and the vendor relationships. This is a 12
    month Fixed Term Contract role based in Melbourne or Sydney. The team & how they
    connect Xero''s Risk, Ethics, Advocacy & Legal (REAL) Operations team sits at
    the intersection of law, technology, and business strategy, working closely with
    the team that works across everything from commercial contracts and privacy to
    employment, industry and government advocacy and regulatory matters. We focus
    on optimising workflows and fostering a collaborative environment where cutting-edge
    technology simplifies everyday tasks. Together, we ensure the wider REAL team
    operates seamlessly to support Xero''s global mission. The team is currently working
    on OR initially, the role will focus on - Owning our Knowledge Management environment
    end to end, defining its architecture, establishing governance, and maintaining
    day-to-day content quality - Building and implementing AI agent integrations that
    surface the right knowledge assets at the right moment, without people having
    to know exactly where to look - Driving the adoption of technology solutions and
    workflow automation tools to improve team efficiency - Developing metrics and
    analytics to track knowledge usage, platform health, and the effectiveness of
    our AI integrations Where and how you can work Xero supports a flexible, hybrid
    working environment designed to help you do the best work of your life. Based
    in our Melbourne or Sydney office, you will have the opportunity to split your
    time between working from home and collaborating in person. We embrace dedicated
    in-person days to bring teams together for purposeful connection, planning, and
    culture building. Here are some of the things we are looking for - You bring deep
    operational expertise gained within a corporate legal, risk or compliance department
    or a specialised legal operations environment. - You''ve worked hands-on with
    Confluence (or similar) as more than just a wiki. You''ve thought about its architecture,
    wrestled with its governance, and rebuilt a space or two from the ground up -
    Your background includes successful experience leading the selection, implementation,
    and management of AI technology solutions. - A strong capability to analyse and
    translate metrics into clear strategic insights is something you possess. - You
    have outstanding communication skills, making it easy for you to build trusted
    relationships with senior stakeholders and external partners globally. - Your
    natural approach is highly collaborative, allowing you to navigate change and
    simplify intricate operational challenges effectively. Apply even if your experience
    isn''t a perfect match! At Xero, we hire based on your skills, passion, and the
    unique perspective you can bring to enhance our culture and team.'
