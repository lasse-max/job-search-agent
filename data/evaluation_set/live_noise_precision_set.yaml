    \ Airwallex to scale. Your contributions will directly influence innovation, set\
    \ best practices, and establish the foundation for our expanding AI portfolio.\
    \ WHAT YOU'LL DO If you are passionate about building AI solutions that directly\
    \ impact customers, thrive on solving tough technical challenges, and embrace\
    \ a product-focused mindset, we invite you to shape the future of Finance and\
    \ AI with us. This role is based in Singapore. RESPONSIBILITIES: - Build AI solutions\
