    \ &nbsp;-&nbsp;the heart of our checkout experience&nbsp;- as part of our Demand&nbsp;Division.&nbsp;Your\
    \ work will directly&nbsp;impact&nbsp;how millions of people pay, how quickly\
    \ their transactions are processed, and how much revenue we generate. We continuously\
    \ work to improve payment authorization and conversion rates, increase payment\
    \ efficiency and revenue protection, and ensure data reliability. At the same\
    \ time,&nbsp;we\u2019re&nbsp;integrating local payment methods across different\
    \ markets and tackling complex engineering challenges along the way. &nbsp; We\
    \ build our core services using&nbsp; Kotlin and Spring Boot , and our interfaces\
    \ with TypeScript and React.js . We also&nbsp;maintain&nbsp;some legacy PHP systems\
    \ \u2014 you don\u2019t need to love it, but you should be open to working with\
    \ it when needed. &nbsp; Our Payments Team consists of four backend engineers,\
    \ two frontend&nbsp;engineers&nbsp;and an&nbsp;Engineering Manager.&nbsp; About\
    \ the Role Build the systems that move money fast, safely, and at scale &nbsp;\
    \ Design and ship features used by millions of users &nbsp; Write clean, tested,\
    \ production-ready code &nbsp; Own features from idea to release &nbsp; Work closely\
    \ with business, UX, frontend, and backend engineers &nbsp; Review code, pair\
    \ program, and ship often &nbsp; Improve existing systems and clean up legacy\
    \ code &nbsp; About You 3-4&nbsp;years of experience building backend or full-stack\
    \ web applications, including at least 2 years working with Kotlin in a commercial\
    \ setup &nbsp; Some experience with frontend development&nbsp;with JavaScript/Typescript\
    \ and&nbsp;any modern&nbsp;framework&nbsp;(React.js, Vue.js, Angular)&nbsp; &nbsp;\
    \ Open to working with PHP in legacy systems when needed - prior experience is\
    \ not required, the team will support your learning Strong object-oriented programming\
    \ skills with a focus on clean architecture and maintainable design &nbsp; Solid\
    \ experience working with relational databases &nbsp; Hands-on experience with\
    \ automated testing (unit, integration, component or UI) Hands-on experience deploying\
    \ applications to production environments using CI/CD pipelines Clear written\
    \ and spoken English communication skills A collaborative, team-first mindset\
    \ &nbsp; Nice to have &nbsp;-&nbsp; we\u2019ll &nbsp;support you in developing\
    \ these skills if needed: &nbsp; Containerization and orchestration tools such\
    \ as Docker and k8s &nbsp; Familiarity with event-driven architectures and messaging\
