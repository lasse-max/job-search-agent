  description_text: "FEQ327R184 At Databricks, we are on a mission to empower our\
    \ customers to solve the world's toughest data problems by utilizing the the Databricks\
    \ Data Intelligence Platform. As a Delivery Solutions Architect (DSA), you will\
    \ play an important role during this journey. You will collaborate with our sales\
    \ and field engineering teams to accelerate the adoption and growth of the Databricks\
    \ platform in your customers. You will also help ensure customer success by increasing\
    \ focus and technical accountability to our most complex customers who need guidance\
    \ to accelerate usage on Databricks workloads that they have already selected,\
    \ helping them maximise the value they get of our platform and the return on investment.\
