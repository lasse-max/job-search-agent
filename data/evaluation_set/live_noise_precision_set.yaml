    \ issuing, banking or Fintech space. Executive engagement skills and presence,\
    \ with an ability to establish strong relationships with key decision makers and\
    \ build credibility at all levels. Effective group-facilitation skills and confidence\
    \ in proposing and leading customer meetings to gain strategic footing and pursue\
    \ opportunities. Thorough understanding of the software development lifecycle\
    \ and API architectures. A background in writing code in any of Stripe\u2019s\
    \ primary deployment languages (Ruby, Python, JavaScript, Java, Go, etc.) is a\
    \ plus. Superior verbal and written communication skills in English. Preferred\
    \ qualifications Prior experience in consulting. Experience at a growth-stage\
    \ internet or software company."
