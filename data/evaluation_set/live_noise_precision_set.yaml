  description_text: "About Parloa Parloa\u2019s mission is to make every customer\
    \ conversation feel effortless for both customers and the companies serving them.\
    \ As agentic AI accelerates, Parloans are shaping the foundation of a new era\
    \ in customer experience - one where customer support is no longer transactions,\
    \ but meaningful exchanges. It is not just a vision; Parloa has powered over ONE\
    \ BILLION interactions between global enterprise brands and their customers, with\
    \ companies like Booking.com , HealthEquity, Allianz, SAP, BarmeniaGothaer, and\
    \ TUI already deploying Parloa at scale.&nbsp; About the role: We are on a mission\
    \ to make creating and managing AI voice agents as easy as hiring and onboarding\
    \ a human. Today, our platform serves highly technical users who configure advanced\
    \ agent logic. Tomorrow, we envision an experience that keeps the depth and flexibility\
    \ experts need while becoming more elegant, scalable, and intuitive. As our Staff\
    \ Product Designer , you will drive the realisation of the design vision for expert-facing\
    \ workflows such as AI agent setup, configuration tools, and workflow orchestration.\
    \ You will guide your cross-functional product team in translating this vision\
    \ into coherent, usable, and technically feasible product experiences that turn\
    \ complexity into clarity. This is an opportunity to lead design for the core\
    \ of our platform and define how experts build the next generation of conversational\
    \ AI agents. Areas of ownership: Translate the design vision into your product\
    \ team\u2019s execution, ensuring clarity and usability across expert-facing workflows.\
    \ Partner closely with product managers, engineers, and AI specialists to align\
    \ on priorities, user needs, technical feasibility, and business impact. Balance\
    \ depth and usability, ensuring powerful configuration capabilities remain approachable\
    \ and efficient for expert users. Lead UX strategy within your product area, ensuring\
    \ research insights shape both near-term decisions and long-term improvements.\
    \ Prototype and explore advanced interaction models for workflows, logic building,\
    \ and AI orchestration. Contribute hands-on design work while also setting direction\
    \ and raising the quality of output within your product team. Who you are: 8+\
    \ years of experience in product design with a proven track record in complex\
    \ domains, including two years in a lead capacity. Experience designing with AI\
    \ tools as part of your workflow, for example, prototyping with generative design,\
    \ exploring AI-assisted research, or testing adaptive experiences. Ability to\
    \ design for configuration-heavy, expert-facing tools, balancing flexibility with\
    \ clarity and efficiency. Strong systems thinking skills, with the ability to\
    \ structure multi-layered flows with roles, states, and dynamic logic. Experience\
    \ collaborating with product managers and engineers to drive product outcomes\
    \ and influence strategic priorities. Mastery of interaction and visual design,\
    \ with a portfolio that demonstrates elegant handling of highly complex interfaces.\
    \ A research-driven mindset, grounded in user research, usability testing, and\
    \ data-informed decision making. Technical fluency, with the ability to collaborate\
    \ confidently with engineers and product managers. Strong communication and storytelling\
    \ skills, with the ability to align and inspire cross-functional teams and leadership.\
    \ Nice to have:&nbsp; Demonstrated experience creating human-AI interaction models\
    \ that balance usability, transparency, and trust. Demonstrated experience designing\
    \ tools and platforms that enable others to configure or manage AI systems, for\
    \ example, workflow builders, agent setup tools, or machine learning configuration\
    \ interfaces. Background or interest in conversational interfaces, automation\
    \ tooling, or multimodal interaction design. Familiarity with design systems in\
    \ a scaling team. Knowledge of voice technologies or telephony ecosystems. Our\
    \ recruiting process: Recruiter Interview \u2192 Hiring Manager Interview \u2192\
    \ Portfolio Walkthrough \u2192&nbsp; Live Whiteboard Session \u2192 Bar Raiser\
    \ Interview Why Parloa? We\u2019re at the beginning of a new era in customer experience,\
    \ one where AI doesn\u2019t just respond, but understands, reasons, and takes\
    \ action. We\u2019re building agentic AI that enterprises trust with their most\
    \ important customer moments: complex questions, high volumes, real stakes. When\
    \ millions of people reach out to a brand, those interactions aren\u2019t just\
    \ support tickets; they\u2019re defining experiences. We\u2019re here to raise\
    \ the standard: making every conversation seamless, intelligent, and genuinely\
    \ helpful. If you care about shaping how businesses and customers connect at scale-\
    \ and want your work to matter in real, everyday moments - this is where you do\
    \ it. At Parloa, ownership isn\u2019t a buzzword; it means being accountable for\
    \ outcomes, not just tasks. We operate in a category that\u2019s evolving fast,\
    \ where the bar is high, and the problems are complex. We hire people who think\
    \ in solutions, communicate with clarity, and follow through. People who are comfortable\
    \ making decisions, taking responsibility, and raising the standard for themselves\
    \ and those around them. We\u2019ve grown beyond the earliest startup phase, but\
    \ we\u2019ve kept the intensity: fast execution, direct feedback, and a strong\
    \ expectation to contribute meaningfully from day one. Backed by leading global\
    \ investors like General Catalyst, EQT Ventures, and Altimeter Capital, we\u2019\
    re scaling with a clear ambition: to become the global category leader in enterprise-grade\
    \ conversational AI. &nbsp; Parloa is committed to upholding the highest data\
    \ protection standards for our clients' and employees' data. All our employees\
    \ are instrumental in ensuring the utmost care, GDPR, and ISO compliance, including\
    \ ISO 27001, in handling sensitive information. Parloa is an e-verify employer\
    \ in the USA. Please click here to learn more . * We provide equal opportunities\
    \ to all qualified applicants regardless race, gender, sexual orientation, age,\
    \ religion, national origin, disability status, socioeconomic background and other\
    \ characteristics."
