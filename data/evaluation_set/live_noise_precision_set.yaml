  description_text: "At Flix, we offer a tech-driven environment where innovation\
    \ meets real-world impact, with competitive pay, strong growth opportunities,\
    \ and a culture of collaboration and ownership. &nbsp; As a Full-stack&nbsp;Engineer\
    \ with a strong backend focus (Kotlin) you will help us build the future of payments\
