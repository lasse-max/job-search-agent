  description_text: "About Mistral At Mistral AI, we believe in the power of AI to\
    \ simplify tasks, save time, and enhance learning and creativity. Our technology\
    \ is designed to integrate seamlessly into daily working life. We democratize\
    \ AI through high-performance, optimized, open-source and cutting-edge models,\
    \ products and solutions. Our comprehensive AI platform is designed to meet enterprise\
    \ needs, whether on-premises or in cloud environments. Our offerings include le\
    \ Chat, the AI assistant for life and work. We are a dynamic, collaborative team\
    \ passionate about AI and its potential to transform society.Our diverse workforce\
    \ thrives in competitive environments and is committed to driving innovation.\
    \ Our teams are distributed between France, USA, UK, Germany and Singapore. We\
    \ are creative, low-ego and team-spirited. Join us to be part of a pioneering\
    \ company shaping the future of AI. Together, we can make a meaningful impact.\
    \ See more about our culture on https://mistral.ai/careers. Role Summary As an\
    \ AI Deployment Strategist, you will drive the adoption and deployment of Mistral\u2019\
    s AI solutions, working closely with our defence customers from strategic vision\
    \ to production implementation. This role sits at the intersection of business\
    \ strategy, AI innovation, and hands-on deployment, ensuring our customers achieve\
    \ transformative outcomes. You will partner with senior executives to design AI\
    \ roadmaps, collaborate with the Applied AI team to deliver solutions in production,\
    \ and ensure seamless transitions from presales to postsales. Your work will directly\
    \ contribute to customer success, bridging the gap between strategy and execution.\
    \ This role is ideal for those who thrive in a fast-paced environment, enjoy solving\
    \ complex business challenges, and are passionate about turning AI potential into\
    \ real-world impact. What You Will Do Strategic Discovery & Vision Setting \u2022\
    \ Lead executive-level workshops with leaders in Singapore defence to identify\
    \ mission-critical challenges and opportunities where Mistral\u2019s AI can drive\
    \ step-change improvements. \u2022 Co-create AI adoption roadmaps with government\
    \ and institutional customers, articulating the \u201Cart of the possible\u201D\
    \ while addressing regulatory, ethical, and operational constraints. \u2022 Collaborate\
    \ with Account Executives to develop business cases, quantify ROI, and align solutions\
    \ with defence objectives\u2014such as digital transformation, citizen services,\
    \ and operational efficiency. AI Solution Design & Deployment \u2022 Architect\
    \ end-to-end AI solutions, integrating Mistral\u2019s models and platform into\
    \ defence workflows and technical infrastructure. \u2022 Partner with the Applied\
    \ AI team to design, prototype, and deploy AI solutions in production, ensuring\
    \ scalability, compliance \u2022 Own the execution of pilot projects and proofs-of-value,\
    \ demonstrating the potential of our technology and paving the way for full-scale\
    \ deployment Value Realization & Customer Success \u2022 Serve as a trusted advisor\
    \ to defence customers, guiding their AI strategy and ensuring they maximize the\
    \ value of their investment in Mistral. \u2022 Monitor key performance indicators\
    \ (KPIs) tied to both business and societal outcomes, and communicate progress\
    \ to executive sponsors and political stakeholders. \u2022 Proactively identify\
    \ expansion opportunities within public sector accounts, building on initial successes\
    \ to drive long-term partnerships. Cross-Functional Collaboration \u2022 Act as\
    \ the bridge between defence customers and Mistral\u2019s internal teams, synthesizing\
    \ feedback to influence product and research roadmaps. \u2022 Develop reusable\
    \ assets, best practices, and playbooks to scale go-to-market efforts and ensure\
    \ consistent delivery excellence About You \u2022 5+ years in a client-facing\
    \ strategic and technical role (e.g., data science consulting, value engineering,\
    \ or technical sales). \u2022 5+ years experience working within the Singapore\
    \ defence ecosystem \u2022 You hold a degree in a relevant scientific field (e.g.,\
    \ Computer Science, Data Science, Engineering, etc.) \u2022 Foundational knowledge\
    \ of AI/ML/Data Science, with the credibility to advise both technical and non-technical\
    \ audiences. \u2022 Hands-on experience building and deploying AI applications\
    \ (Python, JavaScript, or similar) to demonstrate value. \u2022 Strong business\
    \ acumen and problem-solving skills, with the ability to structure ambiguous challenges\
    \ into actionable solutions. \u2022 Executive presence and communication skills\
    \ to influence senior stakeholders (VP, C-level). \u2022 Hands on experience building\
    \ and deploying AI applications (Python) \u2022 Resilient, results-driven, and\
    \ comfortable leading through influence in a collaborative environment. \u2022\
    \ Experience with sales qualification frameworks (e.g., MEDDPICC) and value-based\
    \ selling is a plus. Why This Role Matters You will play a pivotal role in shaping\
    \ how enterprises adopt and deploy AI, ensuring Mistral\u2019s solutions deliver\
    \ measurable impact. By partnering with the Applied AI team, you\u2019ll help\
    \ turn strategic visions into production-ready solutions, making Mistral an indispensable\
    \ partner for our customers. Benefits \U0001F4B0 Competitive cash salary and equity\
    \ \U0001F691 Health Insurance \U0001F94E Sport : $90 for gym membership allowance\
    \ \U0001F955 Food : $200 monthly allowance for meals (solution might evolve as\
    \ we grow bigger) \U0001F6B4 Transportation : $120/month for public transport\
    \ or Parking charges reimbursed"
