  source_url: https://careers.hellofresh.com/global/en/job/8007586?gh_jid=8007586
  description_text: "The role: What's in the Box As a Strategic Demand Capacity Planner,\
    \ you will play a pivotal role in shaping the long-term alignment between European\
    \ market demand and our global supplier, production, and logistics networks. Sitting\
    \ within the Central Planning team and nested in the International Operations\
    \ department, you will report directly to the Associate Director of Strategic\
    \ Planning. Your mission is to bridge the gap between commercial ambition and\
    \ operational reality. By working closely with Product, Marketing, and Forecasting\
    \ teams, you will translate long-range demand signals into actionable capacity\
    \ strategies, ensuring our network is prepared for future growth and evolving\
    \ market shifts. Please note that this position is a 24-month fixed-term contract\
    \ (with the aim of converting it to a permanent position afterwards). What you\u2019\
    ll do: The Recipe Support the Forecasting team in developing a long-term forecast\
    \ for strategic decision-making. Conduct industry research on supplier and logistics\
    \ network trends, as well as developments in digital technology for planning tools.\
    \ Analyze and monitor capacity utilization in our operational country clusters\
    \ (suppliers, production, logistics network), enabling proactive risk management\
    \ of our supply chain rather than reactive, wasteful incident handling. Assist\
    \ in scenario planning and ad-hoc simulations on our supplier and fulfillment\
    \ network for demand alteration activities affecting our end-to-end capacities\
    \ Translate forecasted demand into actionable procurement and production plans,\
    \ making tactical decisions to prevent financial waste Promote the development\
    \ and implementation of the HelloFresh Planning Target Operating Model including\
    \ the deployment of an Advanced Planning Tool What you\u2019ll bring: The Ingredients\
    \ 4+ years of professional experience in a similar role. A university degree in\
    \ Business Administration, Supply Chain Management, Logistics, Economics, Industrial\
    \ Engineering, or a related field. Initial experience in strategic roles at the\
    \ intersection of demand and supply, or a background in consulting, is considered\
    \ an advantage. Strong analytical skills with the ability to leverage data to\
    \ inform decision-making. Interest in senior stakeholder management and a desire\
    \ to drive value by orchestrating cross-functional problem-solving initiatives\
    \ across operational functions. Effective communication skills in English; German\
    \ language skills are a plus. Ability to collaborate across international and\
    \ cross-functional teams. A business-oriented mindset combined with a data- and\
    \ process-driven approach to work. What we offer: The Toppings Elevate your lifestyle!\
    \ Join one of Europe's fastest-growing tech powerhouses in a dynamic phase of\
    \ expansion. Immerse yourself in a diverse global community of 90+ nationalities.\
    \ Enjoy a competitive compensation package that goes beyond the norm, with perks\
    \ like a HelloFresh- subsidized Pension Scheme, Berlin relocation support, and\
    \ a Hybrid working model. Exclusive discounts on your weekly HelloFresh box and\
    \ office meals. Invest in your growth with an annual learning &amp; development\
    \ budget, German language learning budget, and access to the HelloFresh Academy.\
    \ Plus, we've got your well-being covered with mental health support, transportation\
    \ perks, and working-parent-friendly benefits. From our 24/7 gym access,wellbeing\
    \ platforms like Headspace and Spill, to sabbatical leave options, HelloFresh\
    \ is not just a workplace; it's a lifestyle of perks and possibilities! Are you\
    \ the missing ingredient? If this sounds like a tasty opportunity, we\u2019d be\
    \ excited to hear from you. We aim to review your profile and respond within 5\
    \ business days. &nbsp; #JD1002"
