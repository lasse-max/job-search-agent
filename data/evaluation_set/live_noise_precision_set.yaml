  description_text: "ABOUT AIRWALLEX Airwallex is the only unified payments and financial\
    \ platform for global businesses. Powered by our unique combination of proprietary\
    \ infrastructure and software, we empower over 200,000 businesses worldwide \u2013\
    \ including Brex, Rippling, Navan, Qantas, SHEIN and many more \u2013 with fully\
    \ integrated solutions to manage everything from business accounts, payments,\
    \ spend management and treasury, to embedded finance at a global scale. Proudly\
    \ founded in Melbourne, we have a team of over 2,200 of the brightest and most\
    \ innovative people in tech across 26 offices around the globe. Valued at US$8\
    \ billion and backed by world-leading investors including T. Rowe Price, Visa,\
    \ Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and\
    \ Lone Pine Capital, Airwallex is leading the charge in building the global payments\
    \ and financial platform of the future. If you\u2019re ready to do the most ambitious\
    \ work of your career, join us. ATTRIBUTES WE VALUE We hire successful builders\
    \ with founder-like energy who want real impact, accelerated learning, and true\
    \ ownership. You bring strong role-related expertise and sharp thinking, and you\u2019\
    re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles.\
    \ You move fast with good judgment, dig deep with curiosity, and make decisions\
    \ from first principles, balancing speed and rigor. You're humble and collaborative;\
    \ turn zero\u2011to\u2011one ideas into real products, and you \u201Cget stuff\
    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. About the team You'll\
    \ be part of a collaborative and high-impact Internal Audit team that plays a\
    \ critical role in supporting Airwallex\u2019s objectives. We provide independent\
    \ assurance and actionable insights to senior management and the Board, ensuring\
    \ robust risk management, regulatory compliance, and operational excellence. Our\
    \ team is passionate about driving continuous improvement and supporting Airwallex\u2019\
    s mission to be a global fintech leader. What you'll do As the Internal Audit\
    \ Manager \u2013 Compliance, you will design and execute risk-based audit plans,\
    \ leveraging data analytics and your expertise in financial crime and regulatory\
    \ compliance. You\u2019ll work closely with business stakeholders to deliver actionable\
    \ insights, drive remediation, and support Airwallex\u2019s growth in a dynamic\
    \ fintech environment. Responsibilities: - Develop comprehensive, risk-based audit\
    \ plans and testing procedures for risk and compliance audits, prioritizing areas\
    \ with the highest potential for non-compliance or financial loss. - Execute audit\
    \ fieldwork, assess the design and operating effectiveness of controls, and deliver\
    \ insightful, actionable reports to senior management and the Audit Committee.\
    \ - Develop and implement data analysis tools (e.g. using Python, Databricks,\
    \ Looker) to improve audit efficiency and effectiveness, and leverage analytics\
    \ to identify emerging risks and anomalies. - Manage internal business stakeholders,\
    \ communicate complex risk and compliance issues clearly, and ensure that audit\
    \ recommendations are understood and implemented. - Monitor and track completion\
    \ of management action plans, and follow up to ensure timely remediation of audit\
    \ findings. - Stay abreast of regulatory changes and industry best practices,\
    \ and promote a culture of continuous improvement and operational excellence.\
    \ Who you are We're looking for people who meet the minimum requirements for this\
    \ role. The preferred qualifications are great to have, but are not mandatory.\
    \ Minimum qualifications: - Bachelor\u2019s degree or above in Accounting, Finance,\
    \ Business Administration, or a related field. - At least 5-8 years of solid working\
    \ experience as a professional auditor and/or financial industry practitioner\
    \ (e.g., at a bank, card scheme, or electronic money institution). - Core audit\
    \ and business skills, particularly in Financial Crime Compliance, Fraud, Card\
    \ Scheme Compliance (Issuing and Acquiring), and Enterprise Risk Management. -\
    \ Experience with one or more banking regulators (e.g., MAS, APRA, DNB, FCA) and\
    \ strong knowledge of relevant regulatory requirements and industry best practices.\
    \ - Detail-oriented, positive attitude, and self-motivated with a willingness\
    \ to be hands-on. - Good interpersonal skills with the ability to present complex\
    \ and sensitive issues to senior management and influence change. - Fluency in\
    \ written and spoken English. Preferred qualifications: - Professional qualifications\
    \ such as CIA, CPA, CAMS, FRM, or similar. - Experience with data analysis tools\
    \ (e.g., Python, Databricks, Looker). - Experience in fintech or financial services,\
    \ especially in a fast-paced, global environment. APPLICANT SAFETY POLICY: FRAUD\
    \ AND THIRD-PARTY RECRUITERS To protect you from recruitment scams, please be\
    \ aware that Airwallex will not ask for bank details, sensitive ID numbers (i.e.\
    \ passport), or any form of payment during the application or interview process.\
    \ All official communication will come from an @airwallex.com http://airwallex.com\
    \ email address. Please apply only through careers.airwallex.com http://careers.airwallex.com\
    \ or our official LinkedIn page. Airwallex does not accept unsolicited resumes\
    \ from search firms/recruiters. Airwallex will not pay any fees to search firms/recruiters\
    \ if a candidate is submitted by a search firm/recruiter unless an agreement has\
    \ been entered into with respect to specific open position(s). Search firms/recruiters\
    \ submitting resumes to Airwallex on an unsolicited basis shall be deemed to accept\
    \ this condition, regardless of any other provision to the contrary. EQUAL OPPORTUNITY\
    \ Airwallex is proud to be an equal opportunity employer. We value diversity and\
    \ anyone seeking employment at Airwallex is considered based on merit, qualifications,\
    \ competence and talent. We don\u2019t regard color, religion, race, national\
    \ origin, sexual orientation, ancestry, citizenship, sex, marital or family status,\
    \ disability, gender, or any other legally protected status when making our hiring\
    \ decisions. If you have a disability or special need that requires accommodation,\
    \ please let us know."
