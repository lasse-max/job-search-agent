    \ range of vehicle platforms and product use cases. The Waymo Driver has provided\
    \ over ten million rider-only trips, enabled by its experience autonomously driving\
    \ over 100 million miles on public roads and tens of billions in simulation across\
    \ 15+ U.S. states. Waymo Operations exists to deliver the Waymo Driver to the\
    \ world. We are a global team building and scaling the world's first and leading\
    \ autonomous fleet and operations platform. From component sourcing to end customer\
    \ management, we enable and create value for Waymo through scaled and orchestrated\
    \ deployment of the Waymo Driver. At Waymo, we are dedicated to building a culture\
    \ that promotes inclusivity and celebration. We value diverse backgrounds, perspectives,\
    \ and experiences; recognize that inclusive actions lead to equitable outcomes;\
    \ and support and encourage all team members to share their ideas to help Waymo\
    \ better serve the communities in which we operate. We are looking for a high-impact\
    \ Program Manager to lead our Ops Safety &amp; Readiness initiatives across the\
    \ UK and expansion in Europe. This isn't just about maintaining the status quo;\
    \ it\u2019s about building the engine that keeps our markets safe, standardized,\
    \ and scalable.&nbsp;In this role, you\u2019ll be driving the implementation of\
    \ programs that define how we operate safely and effectively in rapid growth.\
    \ This role will report to the Manager of Operations Safety and Readiness. You\
    \ will: Manuals &amp; Playbooks: Author and publish local market playbooks that\
    \ cover both general operations and safety-specific protocols. Safety Assurance\
    \ Program Orchestration: Provide coordinated support for critical readiness programs,\
