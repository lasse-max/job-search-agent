    \ how customers process petabytes of data every day and make it simpler for them\
    \ to draw value from their data.&nbsp; This role requires coordinating all product\
    \ activities from vision to implementation, including engaging customers to understand\
    \ their needs, developing long-term product strategy, defining product roadmaps,\
    \ working with engineering to build those products, and coordinating with various\
    \ internal stakeholders (both pre- and post-launch) to ensure product success.\
    \ The impact you will have: Own the end-to-end product management process Gather\
    \ customer requirements, design features and collaborate with engineering to deliver\
    \ a polished market-ready product Drive launches with product marketing through\
    \ blog posts, release notes, webinars Define and measure OKRs for your products\
    \ Drive the prioritization and development of features, measurably reducing the\
    \ cost and time needed for operating ETL and machine learning workflows. What\
    \ we look for: 6+ yrs of experience Bachelors degree in Computer Science or similar\
    \ field Experience in Product Management (inbound, outbound, cross-functional\
    \ processes) Technical skills Solid understanding of cloud infrastructure (AWS,\
    \ Azure) Strong data analysis and operationalization skills (SQL, rollups, building\
    \ operational dashboards) About Databricks Databricks is the data and AI company.\
