  company: OpenAI
  company_tier: 1
  role_title: IT Logistics Lead, Singapore
  department: IT
  employment_type: FullTime
  location: Singapore
  posted_at: '2026-06-10T16:45:48.139+00:00'
  first_seen_at: '2026-06-25T00:04:19+00:00'
  source_url: https://jobs.ashbyhq.com/openai/fa7431e0-cecb-4d9d-b953-70832a57dd9f
  description_text: "About the Team The IT Logistics team ensures every OpenAI employee\
    \ has the hardware, peripherals, and secure device support they need to work effectively\
    \ from day one. We manage the full lifecycle of company-owned equipment, from\
    \ procurement and inventory tracking to onboarding, refreshes, repairs, returns,\
    \ redeployment, and offboarding. We partner closely with IT Support, Procurement,\
    \ Finance, Security, People Operations, Workplace, and regional vendors to keep\
    \ global device logistics reliable, accurate, and scalable. About the Role We\
    \ are looking for an IT Logistics Lead based in Singapore to own and scale IT\
    \ logistics across APAC. This person will be the primary logistics owner in the\
    \ region, which means the role combines hands-on inventory execution with regional\
    \ program leadership, vendor management, asset management ownership, contractor\
    \ oversight, and continuous improvement of logistics systems and processes. This\
    \ role is intentionally technical. The right candidate can manage physical inventory\
    \ and vendor relationships while also improving the systems that make those operations\
    \ visible and reliable. They should be comfortable working in Oomnitza or similar\
    \ asset management systems, using AI and automation to reduce manual work, and\
    \ building repeatable workflows that improve inventory accuracy, hardware readiness,\
    \ high-risk travel execution, procurement visibility, and asset lifecycle controls.\
    \ In this role, you will: - Own APAC IT logistics operations from Singapore, including\
    \ receiving, tagging, staging, secure storage, cycle counts, device readiness,\
    \ shipping, returns, repairs, redeployment, and hardware fulfillment. - Manage\
    \ APAC hardware procurement vendor relationships. - Own the APAC High-risk travel\
    \ program end to end, including intake, tracking, escalations, reporting, handoffs,\
    \ and continuous improvement. - Manage a defined portion of the Oomnitza asset\
    \ management environment and related logistics systems, including asset data quality,\
    \ lifecycle states, reporting, workflow improvements, audit readiness, stakeholder\
    \ visibility, and technical enhancements that leverage APIs, integrations, automations,\
    \ and MCP servers to streamline workflows across logistics systems and automate\
    \ repeatable processes. - Use AI, automation, and lightweight tooling to improve\
    \ logistics processes, reconcile asset data, document SOPs, surface exceptions,\
    \ and reduce repetitive manual work. - Support onboarding, offboarding, replacement,\
    \ refresh, and urgent hardware needs while maintaining a high bar for data accuracy\
    \ and security controls. - Onboard and oversee regional contractors as the team\
    \ scales, including SOPs, quality checks, escalation paths, and execution standards.\
    \ - Partner with IT Support, Procurement, Finance, Security, People Operations,\
    \ Workplace, APAC office stakeholders, and vendors to improve the employee hardware\
    \ experience. - Regularly identify and deliver enhancements to logistics processes,\
    \ systems, and regional operating cadences. You might thrive in this role if you\
    \ have: - Experience leading IT logistics, hardware lifecycle, inventory, warehouse,\
    \ procurement, or asset management operations in a fast-moving environment. -\
    \ Strong hands-on inventory discipline, including receiving, tagging, staging,\
    \ cycle counts, reconciliation, secure storage, shipping, returns, and repair\
    \ workflows. - Experience with Oomnitza or comparable asset management systems,\
    \ with the ability to improve data quality, workflows, reporting, and operational\
    \ controls. - Technical experience building or improving system integrations and\
    \ automations, including leveraging APIs, webhooks, workflow orchestration tools,\
    \ or similar tooling to connect logistics, asset, ticketing, procurement, vendor,\
    \ and reporting systems. - AI fluency or practical experience using AI-enabled\
    \ tools to improve operational workflows, documentation, analysis, reporting,\
    \ or automation. - Vendor management experience across procurement, repairs, reverse\
    \ logistics, SLAs, escalations, and regional shipping constraints. - Strong judgment\
    \ around security, asset controls, auditability, and sensitive hardware workflows.\
    \ - Clear communication, strong ownership, and the ability to work across time\
    \ zones with internal stakeholders, vendors, and contractors. - Comfort being\
    \ the sole regional logistics owner while also building the systems, documentation,\
    \ and contractor model needed to scale. Workplace & Location This role is based\
    \ in Singapore and is expected to be onsite five days per week. The role includes\
    \ hands-on hardware handling and stockroom work, regional coordination across\
    \ APAC time zones, and close partnership with global IT Logistics and IT Support\
    \ teams. About OpenAI OpenAI is an AI research and deployment company dedicated\
    \ to ensuring that general-purpose artificial intelligence benefits all of humanity.\
    \ We push the boundaries of the capabilities of AI systems and seek to safely\
    \ deploy them to the world through our products. AI is an extremely powerful tool\
    \ that must be created with safety and human needs at its core, and to achieve\
    \ our mission, we must encompass and value the many different perspectives, voices,\
    \ and experiences that form the full spectrum of humanity. We are an equal opportunity\
    \ employer, and we do not discriminate on the basis of race, religion, color,\
    \ national origin, sex, sexual orientation, age, veteran status, disability, genetic\
    \ information, or other applicable legally protected characteristic. For additional\
    \ information, please see OpenAI\u2019s Affirmative Action and Equal Employment\
    \ Opportunity Policy Statement https://cdn.openai.com/policies/eeo-policy-statement.pdf.\
    \ Background checks for applicants will be administered in accordance with applicable\
    \ law, and qualified applicants with arrest or conviction records will be considered\
    \ for employment consistent with those laws, including the San Francisco Fair\
    \ Chance Ordinance, the Los Angeles County Fair Chance Ordinance for Employers,\
    \ and the California Fair Chance Act, for US-based candidates. For unincorporated\
    \ Los Angeles County workers: we reasonably believe that criminal history may\
    \ have a direct, adverse and negative relationship with the following job duties,\
    \ potentially resulting in the withdrawal of a conditional offer of employment:\
    \ protect computer hardware entrusted to you from theft, loss or damage; return\
    \ all computer hardware in your possession (including the data contained therein)\
    \ upon termination of employment or end of assignment; and maintain the confidentiality\
    \ of proprietary, confidential, and non-public information. In addition, job duties\
    \ require access to secure and protected information technology systems and related\
    \ data security obligations. To notify OpenAI that you believe this job posting\
    \ is non-compliant, please submit a report through this form https://form.asana.com/?d=57018692298241&k=5MqR40fZd7jlxVUh5J-UeA.\
    \ No response will be provided to inquiries unrelated to job posting compliance.\
    \ We are committed to providing reasonable accommodations to applicants with disabilities,\
    \ and requests can be made via this link https://form.asana.com/?k=bQ7w9h3iexRlicUdWRiwvg&d=57018692298241.\
