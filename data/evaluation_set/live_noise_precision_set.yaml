    \ Marketing to continuously improve Snowflake\u2019s products and marketing ON\
    \ DAY ONE WE WILL EXPECT YOU TO HAVE: - 4 years of industry experience with a\
    \ minimum of 2 within a pre-sales environment working directly with consulting\
    \ & System Integration (GSI/RSI) partners - Outstanding presenting skills to both\
    \ technical and executive audiences, whether impromptu on a whiteboard or using\
    \ presentations and demos - Broad range of experience within large-scale Database\
    \ and/or Data Warehouse technology, ETL, analytics and cloud technologies - Hands-on\
