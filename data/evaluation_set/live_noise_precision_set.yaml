  source_url: https://jobs.ashbyhq.com/openai/d27df2d1-c628-4efa-91fd-fcc05ac46d9b
  description_text: "About OpenAI OpenAI is an AI research and deployment company\
    \ working to ensure that artificial general intelligence benefits everyone. We\
    \ build and deploy powerful AI systems with a focus on real-world impact, safety,\
    \ and responsible adoption. Our work sits at the intersection of technology, business,\
    \ and society, and comes with both opportunity and scrutiny. Our communications\
    \ team supports this mission by clearly and authentically explaining our technology,\
    \ products, and approach, helping business leaders, partners, developers, and\
    \ policymakers understand how AI can be adopted responsibly and at scale to deliver\
    \ tangible benefits. THE ROLE We\u2019re looking for a senior consumer and product\
    \ communications lead for APAC, based in Singapore, to shape how OpenAI and its\
    \ products are understood by people across the region. Reporting to the Head of\
    \ Communications for APAC, this role owns regional consumer and product communications\
    \ strategy and execution, with a focus on helping audiences understand the everyday\
    \ value of products like ChatGPT and Codex, building trust, and supporting long-term\
    \ adoption across APAC markets. You\u2019ll shape how OpenAI is understood by\
    \ consumers, creators, developers, local communities, and the media. This is a\
    \ builder role for someone equally comfortable setting regional strategy, developing\
    \ strong narratives, and helping local teams turn global priorities into work\
    \ that resonates in their markets. You\u2019ll partner closely with global teams,\
    \ local communications leaders, and cross-functional partners to deliver impact\
    \ on the ground. WHAT YOU\u2019LL DO - Set and execute the APAC consumer and product\
    \ communications strategy, aligned with regional priorities and global narratives\
    \ - Develop clear, accessible narratives that explain the everyday benefits and\
    \ usefulness of OpenAI\u2019s products, including ChatGPT and Codex, for audiences\
    \ across APAC - Work with local comms leads to turn global launches, product updates,\
    \ and research into locally relevant stories, campaigns, and media moments - Lead\
    \ earned strategy for consumer and product audiences across the region, including\
    \ consumer, technology, lifestyle, culture, and creator media - Identify and build\
    \ stories that show how people across APAC are using OpenAI\u2019s products in\
    \ meaningful, practical, and locally relevant ways - Help define the regional\
    \ approach to consumer education, product storytelling, and creator or influencer\
    \ engagement, working closely with local teams and relevant global partners -\
    \ Support local teams in building strong, repeatable consumer communications programmes\
    \ across priority APAC markets, not just one-off launch moments WHAT YOU BRING\
    \ - 12+ years\u2019 experience in consumer, product, or technology communications\
    \ - Deep experience developing consumer-facing narratives for technology products\
    \ and translating complex capabilities into clear, relatable benefits - Strong\
    \ earned media experience, with relationships across consumer, technology, lifestyle,\
    \ and culture media - A good understanding of how products become part of everyday\
    \ life, and how communications can help drive understanding, trust, and adoption\
    \ - Proven experience partnering closely with product, marketing, legal, policy,\
    \ and research teams - Experience operating at exec level and advising leaders\
    \ in high-profile, ambiguous environments - Ability to flex confidently across\
    \ product, consumer, corporate, and policy topics with sound judgement - Experience\
    \ working in international or regional roles within global companies and complex\
    \ operating environments YOU\u2019LL THRIVE IN THIS ROLE IF - You like building\
    \ from scratch and shaping how a company shows up with everyday users - You have\
    \ a creative, audience-first mindset and go beyond traditional product PR and\
    \ media relations - You are interested in what makes technology feel useful, relatable,\
    \ and worth adopting in different markets - You care as much about trust and understanding\
    \ as you do about reach - You are comfortable moving between big regional strategy\
    \ and the practical work needed to help local teams succeed - You\u2019re comfortable\
    \ navigating complexity, scrutiny, and fast change - You want to work in a small,\
    \ senior team where autonomy and judgement really matter About OpenAI OpenAI is\
    \ an AI research and deployment company dedicated to ensuring that general-purpose\
    \ artificial intelligence benefits all of humanity. We push the boundaries of\
    \ the capabilities of AI systems and seek to safely deploy them to the world through\
    \ our products. AI is an extremely powerful tool that must be created with safety\
    \ and human needs at its core, and to achieve our mission, we must encompass and\
    \ value the many different perspectives, voices, and experiences that form the\
    \ full spectrum of humanity. We are an equal opportunity employer, and we do not\
    \ discriminate on the basis of race, religion, color, national origin, sex, sexual\
    \ orientation, age, veteran status, disability, genetic information, or other\
    \ applicable legally protected characteristic. For additional information, please\
    \ see OpenAI\u2019s Affirmative Action and Equal Employment Opportunity Policy\
    \ Statement https://cdn.openai.com/policies/eeo-policy-statement.pdf. Background\
    \ checks for applicants will be administered in accordance with applicable law,\
    \ and qualified applicants with arrest or conviction records will be considered\
    \ for employment consistent with those laws, including the San Francisco Fair\
    \ Chance Ordinance, the Los Angeles County Fair Chance Ordinance for Employers,\
    \ and the California Fair Chance Act, for US-based candidates. For unincorporated\
    \ Los Angeles County workers: we reasonably believe that criminal history may\
    \ have a direct, adverse and negative relationship with the following job duties,\
    \ potentially resulting in the withdrawal of a conditional offer of employment:\
    \ protect computer hardware entrusted to you from theft, loss or damage; return\
