  description_text: "Waymo is an autonomous driving technology company with the mission\
    \ to be the world's most trusted driver. Since its start as the Google Self-Driving\
    \ Car Project in 2009, Waymo has focused on building the Waymo Driver\u2014The\
    \ World's Most Experienced Driver\u2122\u2014to improve access to mobility while\
    \ saving thousands of lives now lost to traffic crashes. The Waymo Driver powers\
    \ Waymo\u2019s fully autonomous ride-hail service and can also be applied to a\
    \ range of vehicle platforms and product use cases. The Waymo Driver has provided\
    \ over ten million rider-only trips, enabled by its experience autonomously driving\
    \ over 100 million miles on public roads and tens of billions in simulation across\
    \ 15+ U.S. states. Our Driver may be autonomous, but Waymo's finances are steered\
    \ by experts like you. The Finance and Accounting group manages all aspects of\
    \ our finances and serves as trusted advisors for all our strategic and enterprise\
    \ endeavors. Along with managing compilation of our financial statements, looking\
    \ after our cash and overseeing compliance, we partner closely with the business\
    \ in overseeing company wide resource allocation, developing cutting edge compensation\
    \ initiatives and generating detailed financial analyses to drive the business\
    \ forward. We also develop advanced capital strategies to support the company's\
    \ short- and long-term future. In this hybrid role, you will report to the Head\
    \ of Strategic Finance, Commercial Finance and Corporate FP&amp;A. You will: Collaborate\
    \ on the Deal Lifecycle: Partner cross-functionally to co-develop complex fleet\
    \ partnership models, ensuring all underlying financial projections seamlessly\
    \ align with Waymo's annual and long-term capital deployment goals Shape Partnership\
    \ Frameworks: Collaborate closely with Business Development and Strategy teams\
    \ to structure fleet partnership deals, playing a key role in supporting negotiations\
    \ with external partners and establishing financial guardrails Synthesize Executive\
    \ Insights: Develop and present data-driven recommendations to leadership, translating\
    \ multi-dimensional financial interdependencies into clear strategies that influence\
    \ deal direction Govern Post-Deal Performance: Collaborate with FP&amp;A to define\
    \ and lead the post-deal evaluation framework, monitoring deal health and optimizing\
    \ the long-term deployment of capital Champion Operational Excellence: Standardize\
    \ financial templates and streamline cross-functional data inputs, increasing\
    \ the velocity and success of the broader Finance team through process innovation\
    \ You have: 10+ Years of High-Impact Experience: A background in Investment Banking,\
    \ Private Equity, Public Markets Investing, Corporate Development, or Corporate\
    \ Strategy with a focus on complex deal execution, including a minimum of 2+ years\
    \ of buy-side experience and 2+ years of corporate experience Expert Financial\
    \ Modeling: Advanced ability to build \"from scratch\" models for diverse transaction\
    \ types, including Joint Ventures, structured partnerships, M&amp;A and unique\
    \ restructuring arrangements Cross-Functional Leadership: Proven experience navigating\
    \ complex stakeholder dynamics and coordinating efforts across multiple business\
    \ functions to solve multi-dimensional problems Transaction Proficiency: Deep\
    \ experience in the end-to-end deal process, specifically in valuation, due diligence,\
    \ and translating commercial terms into executable financial structures Strategic\
    \ Communication: Exceptional ability to distill vast data sets into principled\
    \ recommendations that align executives and cross-functional partners on challenging\
    \ decisions We prefer: Industry Expertise: Experience within the automotive, mobility,\
    \ or hardware-based technology sectors, particularly in capital-intensive or fleet-based\
    \ operations Advanced Degree: An MBA or professional certification (e.g., CFA\
    \ or CPA) that complements your technical financial modeling expertise Post-Close\
    \ Integration: Experience in the integration or operational management phase of\
    \ a partnership to better inform pre-deal structuring Mentorship Mindset: A history\
    \ of modeling strong teamwork and having a demonstrable positive impact on the\
    \ growth and velocity of junior teammates The expected base salary range for this\
    \ full-time position across US locations is listed below. Actual starting pay\
    \ will be based on job-related factors, including exact work location, experience,\
    \ relevant training and education, and skill level. Your recruiter can share more\
    \ about the specific salary range for the role location or, if the role can be\
    \ performed remote, the specific salary range for your preferred location, during\
    \ the hiring process.&nbsp; Waymo employees are also eligible to participate in\
    \ Waymo\u2019s discretionary annual bonus program, equity incentive plan, and\
    \ generous Company benefits program, subject to eligibility requirements.&nbsp;\
    \ Salary Range $200,000 &mdash; $247,000 USD"
