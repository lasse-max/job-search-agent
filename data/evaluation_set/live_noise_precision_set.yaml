    \ or SaaS companies, with at least 5 years pricing experience Proven record designing\
    \ pricing strategies for technical products (APIs, cloud or developer tools).\
    \ Deep understanding of usage\u2011, seat\u2011 and license\u2011based pricing\
    \ models; familiarity with PLG and enterprise motions. Strong analytical and financial\
    \ modelling skills; comfortable with data\u2011driven experiments. Excellent stakeholder\
    \ management and communication skills; able to influence without authority. Bonus:\
    \ exposure to AI/LLM pricing levers (fine\u2011tuning, custom models) and fast\u2011\
    growth tech startups. Hiring process Introduction call \u2013 30 min Hiring manager\
    \ interview \u2013 45 min Interview with the Revenue Operations team \u2013 30\
    \ min Interview with the Finance team \u2013 30 min Deep\u2011dive interview with\
    \ case study presentation \u2013 60 min Culture\u2011fit discussion \u2013 30\
    \ min Reference checks"
