    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. About the team The\
    \ Legal, Risk & Compliance (LRC) team at Airwallex is a collaborative group of\
    \ legal minds and risk management experts. We\u2019re passionate about safeguarding\
    \ Airwallex\u2019s operations, fostering a culture of compliance and ethical conduct,\
    \ and ensuring we navigate the global financial landscape with integrity. We provide\
    \ expert guidance and support to all areas of the business, proactively identifying,\
    \ mitigating, and managing legal and financial risks. What you\u2019ll do As Senior\
    \ Compliance Manager & Deputy MLRO \u2013 Financial Crime (AML/CTF), you will\
    \ be a senior member of the ANZ Financial Crime Compliance (FCC) team and a key\
    \ second\u2011line advisor for Airwallex\u2019s Australian business. You will\
    \ help design and uplift our AML/CTF and broader financial crime compliance program\
    \ in line with Australian regulation and Airwallex\u2019s global standards, with\
    \ a particular focus on policies and procedures, SMR/IFTI reporting, and continuous\
    \ improvement of FCC processes. You\u2019ll work cross\u2011functionally with\
    \ Product, Commercial, Operations, Data, Legal and global FCC colleagues on high\u2011\
    risk cases and strategic commercial opportunities, ensuring our controls effectively\
    \ prevent, detect and report financial crime while enabling sustainable growth.\
    \ This role can be based in Sydney or Melbourne. Responsibilities: - Develop and\
    \ maintain Australian FCC policies, standards and detailed procedures (e.g. KYC/OCDD,\
    \ EDD, name\u2011screening, transaction monitoring, SMR/IFTI reporting) and drive\
    \ ongoing uplift of the local AML/CTF Program in line with the AML/CTF Act, AML/CTF\
    \ Rules, AUSTRAC guidance and group\u2011wide standards. - Provide senior oversight\
    \ of financial crime investigations arising from transaction monitoring alerts,\
    \ name\u2011screening hits, internal referrals and external requests, ensuring\
    \ robust documentation, clear rationales and appropriate escalation decisions.\
    \ - Review and, where required, approve and submit Suspicious Matter Reports (SMRs)\
    \ and International Funds Transfer Instructions (IFTIs) to AUSTRAC, and lead ongoing\
    \ uplift of SMR/IFTI processes, including SLAs, workflow design, backlog management\
    \ and quality assurance. - Lead or support cross\u2011division work on high\u2011\
    risk customers, industries and complex commercial deals, providing clear, risk\u2011\
    based FCC advice to Commercial, Product, Expansion, Operations and Legal, and\
    \ helping structure controls that satisfy regulatory and banking\u2011partner\
    \ expectations. - Partner with Product, Data and Operations to enhance Australian\
    \ transaction\u2011monitoring and name\u2011screening controls (rule design, typology\
    \ coverage, escalation pathways), and to remediate issues identified through internal\
    \ audit, independent reviews, AUSTRAC\u2011mandated external audits and internal\
    \ issue registers. - Contribute to Australian FCC governance and reporting by\
    \ preparing high\u2011quality MI and commentary for local leadership, risk/audit\
    \ committees and Boards, including key risk indicators, SMR/IFTI metrics, audit\
    \ and review outcomes, and the status of remediation and control uplift initiatives.\
    \ Who you are We're looking for people who meet the minimum requirements for this\
