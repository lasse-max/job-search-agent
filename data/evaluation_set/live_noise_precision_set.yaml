    \ and post-training, working on evaluations and making sure the model\u2019s performance\
    \ beats expectations. \u2022 Develop the necessary tools and frameworks to facilitate\
    \ data generation, model training, evaluation and deployment. \u2022 Collaborate\
    \ with cross-functional teams to tackle complex use cases using agents and RAG\
    \ pipelines. \u2022 Manage research projects and communications with client research\
    \ teams. About you \u2022 You are fluent in English, and have excellent communication\
    \ skills. You are at ease explaining complex technical concepts to both technical\
