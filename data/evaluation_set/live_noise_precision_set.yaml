  description_text: "Airbnb was born in 2007 when two hosts welcomed three guests\
    \ to their San Francisco home, and has since grown to over 5 million hosts who\
    \ have welcomed over 2 billion guest arrivals in almost every country across the\
    \ globe. Every day, hosts offer unique stays and experiences that make it possible\
    \ for guests to connect with communities in a more authentic way. The Community\
    \ You Will Join: The Homes team plays a key role in shaping the Airbnb stays experience\
    \ . As a multidisciplinary team, we partner with Hosts to conceptualize and develop\
    \ high-quality, repeatable, and commercially viable offerings that align with\
    \ our brand values.&nbsp; Airbnb is seeking a Market Manager, with a primary focus\
    \ on Italy, to support and grow our network of Hosts and Partners. This role will\
    \ be part of the Homes EMEA team and report to the Field Operations Manager. The\
    \ Difference You will Make: As an Acquisition Manager, you will be responsible\
    \ for supply acquisition and onboarding&nbsp; of high quality professional inventory.\
    \ You will build Airbnb\u2019s strong market presence in Italy&nbsp; and collaborate\
    \ with other teams as the local in-market expert. As someone who knows the Airbnb\
    \ mission and values inside out, you will drive all phases of supply acquisition\
    \ and market success from acquisition strategy development to strategic partner\
    \ relationship management. You will help develop and iterate scalable, localized\
    \ supply acquisition strategies in your territory aiming to secure our long-term\
    \ success. A Typical Day:&nbsp; Prospect and onboard new, high quality professional\
    \ hosts in your assigned territory, continuously building and managing a strong\
    \ pipeline Create and deploy scaled strategies to effectively acquire Professional\
    \ Hosts in your region Represent Airbnb in external meetings with Professional\
    \ Hosts, showing up as a credible and knowledgeable market expert Analyze data\
    \ and utilize data-driven recommendations to identify and act on strategic opportunities\
    \ in your region to drive sales growth Develop deep knowledge of your assigned\
    \ geographic markets&nbsp; Build and manage partner relationships within your\
    \ assigned territory Maintain a baseline understanding of the technical integration\
    \ of various software partners so that you can provide the right support to your\
    \ clients Educate clients on all significant product changes and cascade feedback\
    \ on product and policy to relevant internal stakeholders Respond to and deliver\
    \ exceptional service to your professional hosts in a timely and efficient manner\
    \ Work cross-functionally with product, communications, public policy and customer\
    \ support teams to ensure our long-term market success Your Expertise: 6+ years\
    \ of experience in sales&nbsp; 2+ years of hospitality/travel industry experience\
    \ (nice to have) Strong time management and prioritization skills Strong B2B sales/new\
    \ business development experience Ability to work at both strategic and tactical\
    \ levels, with a proven track record to execute in ambiguous environments Excellent\
    \ communication skills and ability to communicate effectively with clients Experience\
    \ building and strengthening relationships with external partners Comfortable\
    \ performing data analysis and making decisions based on the results Available\
    \ to travel to assigned markets Ability to work within tight deadlines, adjust\
    \ to changes in priorities, and balance short-term needs with long-term strategic\
    \ initiatives Hospitality/travel industry experience in the region is a plus Highly\
    \ proficient in using CRM software - Salesforce experience is a plus Charismatic\
    \ self-starter who is resourceful and self-sufficient Fluency in Italian and English\
    \ Our Commitment To Inclusion &amp; Belonging: Airbnb is committed to working\
    \ with the broadest talent pool possible. We believe diverse ideas foster innovation\
    \ and engagement, and allow us to attract creatively-led people, and to develop\
    \ the best products, services and solutions. All qualified individuals are encouraged\
    \ to apply. How We'll Take Care of You: Our job titles may span more than one\
    \ career level. The actual base pay is dependent upon many factors, such as: training,\
    \ transferable skills, work experience, business needs and market demands. The\
    \ base pay range shown below is annualized, is subject to change and may be modified\
    \ in the future. This role may also be eligible for bonus, equity, benefits, and\
    \ Employee Travel Credits. Italy Annual Pay Range \u20AC51.000 &mdash; \u20AC\
    58.000 EUR"
