    \ and implement robust API and system architecture for new AI applications. -\
    \ Collaborate closely with a cross-functional team to bring these AI solutions\
    \ to life. - Embrace the challenges of a fast-paced, high-growth environment with\
    \ a focus on innovation. WHO YOU ARE We're looking for people who meet the minimum\
    \ qualifications for this role. The preferred qualifications are great to have,\
