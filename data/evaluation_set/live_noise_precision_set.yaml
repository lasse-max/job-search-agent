    \ that makes it easy to turn insights into action and fosters a culture of creativity,\
    \ experimentation, and continuous improvement. You will be an essential part of\
    \ this mission, using your technical expertise to demonstrate how our Data Intelligence\
    \ Platform can help customers solve their complex data challenges. You'll work\
    \ with a collaborative, customer-focused team that values innovation and creativity,\
    \ using your skills to create customized solutions to help our customers achieve\
    \ their goals and guide their businesses forward. Join us in our quest to change\
    \ how people work with data and make a better world! The impact you will have:&nbsp;\
    \ Form successful relationships with clients throughout Vietnam, providing technical\
    \ and business value to Databricks customers in collaboration with Account Executives.\
    \ Operate as an expert in big data analytics to excite customers about Databricks.\
    \ You will develop into a \u2018champion\u2019 and trusted advisor on multiple\
    \ issues of architecture, design, and implementation to lead to the successful\
    \ adoption of the Databricks Data Intelligence Platform. Scale best practices\
    \ in your field and support customers by authoring reference architectures, how-tos,\
    \ and demo applications, and help build the Databricks community in your region\
    \ by leading workshops, seminars, and meet-ups. Grow your knowledge and expertise\
    \ to the level of a technical and/or industry specialist. What we look for: Engage\
    \ customers in technical sales, challenge their questions, guide clear outcomes,\
    \ and communicate technical and value propositions. Develop customer relationships\
    \ and build internal partnerships with account executives and teams. Prior experience\
    \ with coding in a core programming language (i.e., Python, Java, Scala) and willingness\
    \ to learn a base level of Spark. Proficient with Big Data Analytics technologies,\
    \ including hands-on expertise with complex proofs-of-concept and public cloud\
    \ platform(s).&nbsp;&nbsp; Experienced in use case discovery, scoping, and delivering\
    \ complex solution architecture designs to multiple audiences requiring an ability\
