  department: Corporate Security
  employment_type: FullTime
  location: Singapore
  posted_at: '2026-06-01T19:18:23.006+00:00'
  first_seen_at: '2026-06-25T00:04:19+00:00'
  source_url: https://jobs.ashbyhq.com/openai/e4d4a64f-1c99-4fde-a0b0-ba86d2440c12
  description_text: "About the Team The Physical Security Engineering team designs,\
    \ deploys, and sustains the systems that protect OpenAI\u2019s people, facilities,\
    \ and critical infrastructure. We work across global office campuses, warehouses,\
    \ labs and data centers, partnering with IT, Facilities, Construction, and Security\
    \ Operations to ensure all environments meet stringent safety, reliability, and\
    \ compliance requirements. Our team owns security architecture from early site\
    \ due-diligence through construction, commissioning, and long-term lifecycle management.\
    \ Role and Responsibilities OpenAI\u2019s corporate footprint is expanding quickly\
    \ across APAC, and our physical security technology needs to scale with the same\
    \ level of reliability, consistency, and care. The Corporate Security Technology\
    \ Group owns the access control, video surveillance, and supporting infrastructure\
    \ that help protect OpenAI\u2019s people, offices, and events. This role will\
    \ be the regional technical owner for designing, operating, troubleshooting, and\
    \ improving those systems across APAC. This person will partner closely with CorpSec,\
    \ Workplace/REW, IT/NetEng, and security integrators to bring new offices online,\
    \ maintain system health, resolve regional escalations, and improve how our physical\
    \ security systems are documented, supported, and used. We\u2019re looking for\
    \ someone with deep subject matter expertise in Windows OS/Servers, networking\
    \ and switching, and systems integration support, with the ability to diagnose\
    \ issues across the full stack from endpoint devices and network infrastructure\
    \ through servers, databases, and enterprise security platforms. What you\u2019\
    ll do - Own day-to-day technical support and administration for physical security\
    \ systems across APAC, including access control, video management, and related\
    \ infrastructure. - Support new office buildouts by reviewing designs, coordinating\
    \ vendors, validating system readiness, and ensuring clean operational turnover.\
    \ - Troubleshoot complex issues across Genetec, Windows OS/Servers, databases,\
    \ networking, switching, integrations, and field hardware. - Partner with IT/NetEng\
    \ on connectivity, identity, infrastructure, firewall, VLAN, switch configuration,\
    \ IP schema, routing, and device connectivity dependencies. - Support integrations\
    \ between physical security systems and adjacent enterprise systems, including\
    \ identity, access management, monitoring, and operational workflows. - Create\
    \ and maintain drawings, site documentation, operating procedures, and training\
    \ materials for administrators and end users. - Help reduce operational toil by\
    \ improving standards, documentation, monitoring, vendor handoffs, and repeatable\
    \ support practices. What\u2019s success? APAC sites open and operate with reliable,\
    \ well-documented physical security systems. Regional partners know who owns technical\
    \ decisions, urgent issues are diagnosed quickly, and vendors are held to a clear\
    \ quality bar. The hire raises the operating standard for APAC while helping the\
    \ global team create more repeatable deployment, support, integration, and troubleshooting\
    \ practices. Non-negotiable outcomes - No avoidable access control, video coverage,\
    \ or system reliability gaps caused by unclear ownership, weak vendor follow-through,\
    \ or poor technical turnover. - Faster and cleaner resolution of regional incidents,\
    \ odd-hour escalations, and new office launch issues. - Strong technical ownership\
    \ across Windows OS/Servers, networking, switching, physical security platforms,\
    \ and integration dependencies. - Strong partnership with CorpSec Operations/Protection,\
    \ Workplace/REW, IT/NetEng, and regional vendors. - Better documentation, training,\
    \ and handoff processes for admins, end users, and cross-functional partners.\
    \ - A scalable regional support model that can keep pace with OpenAI\u2019s APAC\
    \ growth. About OpenAI OpenAI is an AI research and deployment company dedicated\
    \ to ensuring that general-purpose artificial intelligence benefits all of humanity.\
    \ We push the boundaries of the capabilities of AI systems and seek to safely\
    \ deploy them to the world through our products. AI is an extremely powerful tool\
    \ that must be created with safety and human needs at its core, and to achieve\
    \ our mission, we must encompass and value the many different perspectives, voices,\
    \ and experiences that form the full spectrum of humanity. We are an equal opportunity\
    \ employer, and we do not discriminate on the basis of race, religion, color,\
    \ national origin, sex, sexual orientation, age, veteran status, disability, genetic\
    \ information, or other applicable legally protected characteristic. For additional\
    \ information, please see OpenAI\u2019s Affirmative Action and Equal Employment\
    \ Opportunity Policy Statement https://cdn.openai.com/policies/eeo-policy-statement.pdf.\
    \ Background checks for applicants will be administered in accordance with applicable\
    \ law, and qualified applicants with arrest or conviction records will be considered\
    \ for employment consistent with those laws, including the San Francisco Fair\
    \ Chance Ordinance, the Los Angeles County Fair Chance Ordinance for Employers,\
    \ and the California Fair Chance Act, for US-based candidates. For unincorporated\
    \ Los Angeles County workers: we reasonably believe that criminal history may\
    \ have a direct, adverse and negative relationship with the following job duties,\
    \ potentially resulting in the withdrawal of a conditional offer of employment:\
    \ protect computer hardware entrusted to you from theft, loss or damage; return\
    \ all computer hardware in your possession (including the data contained therein)\
    \ upon termination of employment or end of assignment; and maintain the confidentiality\
    \ of proprietary, confidential, and non-public information. In addition, job duties\
    \ require access to secure and protected information technology systems and related\
    \ data security obligations. To notify OpenAI that you believe this job posting\
    \ is non-compliant, please submit a report through this form https://form.asana.com/?d=57018692298241&k=5MqR40fZd7jlxVUh5J-UeA.\
    \ No response will be provided to inquiries unrelated to job posting compliance.\
