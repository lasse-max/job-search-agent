  description_text: "ABOUT AIRWALLEX Airwallex is the only unified payments and financial\
    \ platform for global businesses. Powered by our unique combination of proprietary\
    \ infrastructure and software, we empower over 200,000 businesses worldwide \u2013\
    \ including Brex, Rippling, Navan, Qantas, SHEIN and many more \u2013 with fully\
    \ integrated solutions to manage everything from business accounts, payments,\
    \ spend management and treasury, to embedded finance at a global scale. Proudly\
    \ founded in Melbourne, we have a team of over 2,200 of the brightest and most\
    \ innovative people in tech across 26 offices around the globe. Valued at US$8\
    \ billion and backed by world-leading investors including T. Rowe Price, Visa,\
    \ Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and\
    \ Lone Pine Capital, Airwallex is leading the charge in building the global payments\
    \ and financial platform of the future. If you\u2019re ready to do the most ambitious\
    \ work of your career, join us. ATTRIBUTES WE VALUE We hire successful builders\
    \ with founder-like energy who want real impact, accelerated learning, and true\
    \ ownership. You bring strong role-related expertise and sharp thinking, and you\u2019\
    re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles.\
    \ You move fast with good judgment, dig deep with curiosity, and make decisions\
    \ from first principles, balancing speed and rigor. You're humble and collaborative;\
    \ turn zero\u2011to\u2011one ideas into real products, and you \u201Cget stuff\
    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. THE OPPORTUNITY: LEAD\
    \ OUR ONBOARDING TEAM The Onboarding team plays a pivotal role in Airwallex's\
    \ mission by facilitating the rapid integration of businesses into our platform.\
    \ As a data-driven team, we utilize extensive analytics to refine our processes\
    \ and ensure the efficiency and effectiveness of our operations. Our primary mission\
    \ involves building the orchestration for Know Your Customer (KYC), Request for\
    \ Information (RFI), and risk-based operations to maintain the highest standards\
    \ of compliance as we handle sensitive financial data. We empower business customers\
    \ through robust, secure, and intuitive user and account management solutions.\
    \ This team is instrumental in our regional expansion, helping to onboard a growing\
    \ number of customers into new and existing markets. By supporting global expansion,\
    \ we are also tasked with increasing the coverage of our product offerings, ensuring\
    \ that businesses worldwide can benefit from our innovative financial solutions.\
    \ Through our efforts, we aim to streamline the onboarding process, reduce barriers\
    \ to entry, and build a scalable, automated environment that empowers businesses\
    \ to thrive in the digital economy. WHAT YOU\u2019LL DO - Technical Strategy &\
    \ Product Execution - Partner with Product and Design to define roadmap, scope,\
    \ and success metrics; translate customer needs into an executable plan. - Work\
    \ closely with product managers and key stakeholders to define product roadmap,\
    \ prioritize projects and ship incrementally to production. - Engage with the\
    \ Product Manager into building a backlog that continuously contributes to the\
    \ execution of the roadmap. - Drive strong delivery practices: planning, prioritisation,\
    \ execution, and continuous improvement. - Own the technical strategy and architecture\
    \ for services and APIs, with a focus on scalability, reliability, security, and\
    \ maintainability. - Stay hands-on where it matters: guide design reviews, de-risk\
    \ complex initiatives, and raise the bar on engineering quality. - Architectural\
    \ Ownership & Quality - Serve as the accountable owner for the architecture and\
    \ system quality across our services. - Analyze and validate the technique design\
    \ for the software functions from the team. - Review code from team members and\
    \ ensure the standards. - Drive design and code quality: institute standards,\
    \ reviews, and automated checks that raise the bar without slowing teams down.\
    \ - Guide the evolution of application and platform infrastructure to reduce operational\
    \ overhead and improve developer productivity. - Establish operational excellence\
    \ for production systems (monitoring, incident response, postmortems, reliability\
    \ improvements), and ensure auditability/traceability is built in. - Champion\
    \ secure coding practices, robust authentication/authorization, and proactive\
    \ vulnerability management. WHO YOU ARE - 8+ years of backend engineering experience\
    \ with a deep foundation in distributed systems, high-availability architectures,\
    \ and designing for availability/consistency challenges. - Proficiency in modern\
    \ JVM ecosystems (Java 17+, Kotlin, Spring / Spring Boot) including multi-threading,\
    \ high concurrency, IO/NIO, and network communication. - Expert knowledge of design\
    \ patterns, microservices architecture, and event-driven/streaming systems (e.g.,\
    \ Kafka). - Hands-on experience with GCP/AWS, Docker, and Kubernetes, combined\
    \ with a strong grasp of observability tools like Splunk, Grafana, and Prometheus.\
    \ - Experience in developing large-scale system control interfaces and a track\
    \ record of building API- and integration-heavy systems in production. - You take\
    \ initiative and skillfully navigate complex technical challenges to deliver impactful\
    \ results. PREFERRED QUALIFICATIONS / WHAT WILL SET YOU APART - Experience in\
    \ Fintech, Risk, or regulated financial domains (KYC, Onboarding, or Payments).\
    \ - Experience building complex, asynchronous workflows and identity orchestration.\
    \ - Familiarity with building products using AI & LLMs. - Polyglot experience\
    \ with other modern languages such as Scala, Javascript, Python, or Golang. APPLICANT\
    \ SAFETY POLICY: FRAUD AND THIRD-PARTY RECRUITERS To protect you from recruitment\
    \ scams, please be aware that Airwallex will not ask for bank details, sensitive\
    \ ID numbers (i.e. passport), or any form of payment during the application or\
    \ interview process. All official communication will come from an @airwallex.com\
    \ http://airwallex.com email address. Please apply only through careers.airwallex.com\
    \ http://careers.airwallex.com or our official LinkedIn page. Airwallex does not\
    \ accept unsolicited resumes from search firms/recruiters. Airwallex will not\
    \ pay any fees to search firms/recruiters if a candidate is submitted by a search\
    \ firm/recruiter unless an agreement has been entered into with respect to specific\
    \ open position(s). Search firms/recruiters submitting resumes to Airwallex on\
    \ an unsolicited basis shall be deemed to accept this condition, regardless of\
    \ any other provision to the contrary. EQUAL OPPORTUNITY Airwallex is proud to\
    \ be an equal opportunity employer. We value diversity and anyone seeking employment\
    \ at Airwallex is considered based on merit, qualifications, competence and talent.\
    \ We don\u2019t regard color, religion, race, national origin, sexual orientation,\
    \ ancestry, citizenship, sex, marital or family status, disability, gender, or\
    \ any other legally protected status when making our hiring decisions. If you\
    \ have a disability or special need that requires accommodation, please let us\
    \ know."
