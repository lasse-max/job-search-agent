  description_text: "About the Team OpenAI\u2019s mission is to ensure the responsible\
    \ and widespread adoption of artificial intelligence. In support of that mission,\
    \ the Ads Solutions team partners closely with advertisers to deeply understand\
    \ their businesses and needs, helping inform the development of products and solutions\
    \ that drive meaningful revenue growth and long-term success on the platform\u2014\
    while maintaining strong standards for user trust and platform integrity. About\
    \ the Role This role is focused on driving new and expanded advertising revenue\
    \ and ensuring successful business results for advertisers. You will own the full\
    \ sales cycle \u2014 from prospecting to deal closure, developing long-term commercial\
    \ partnerships to help advertisers achieve their business objectives while ensuring\
    \ a strong and responsible experience on our platform. You\u2019ll work closely\
    \ with Customer Success Managers and key cross-functional partners to ensure advertisers\
    \ achieve successful outcomes after the sale, while maintaining primary ownership\
    \ of revenue growth and commercial strategy. This role is based in our Singapore\
    \ office. We use a hybrid work model of 3 days in the office per week and offer\
    \ relocation assistance to new employees. In this role, you will: - Prospect,\
    \ qualify, and close new advertising opportunities, leading the full sales cycle\
    \ from initial engagement through contract execution - Own and achieve a defined\
    \ revenue target within an assigned territory or vertical - Develop and execute\
    \ structured account plans to drive advertiser ROI and long-term revenue growth\
    \ - Build and maintain relationships with senior-level advertising decision-makers,\
    \ delivering strategic guidance and actively gathering their feedback - Structure\
    \ and negotiate complex commercial agreements - Quantify opportunities through\
    \ clear, data-driven business cases aligned to advertiser objectives - Lead cross-functional\
    \ collaboration across Product, Engineering, Marketing, Policy, and Operations\
    \ to support complex deals - Partner with Customer Success Managers to ensure\
    \ seamless post-sale transitions and coordinated expansion strategies - Maintain\
    \ rigorous pipeline management and accurate revenue forecasting You might thrive\
    \ in this role if you: - Have 10+ years of experience in performance marketing,\
    \ digital marketing, or client-facing strategy and consulting roles - Have 3+\
    \ years of experience as proven advisor influencing executives and clients - Have\
    \ experience owning revenue targets and closing complex deals - Can build structured\
    \ business cases and influencing senior stakeholders (internally and externally)\
    \ - Have strong verbal and written communication skills - Can operate in ambiguous,\
    \ fast-changing environments - Understand the client\u2019s business and priorities\
    \ to define success metrics and align on partnership goals - Can translate analytical\
    \ insights into compelling commercial narratives About OpenAI OpenAI is an AI\
    \ research and deployment company dedicated to ensuring that general-purpose artificial\
    \ intelligence benefits all of humanity. We push the boundaries of the capabilities\
    \ of AI systems and seek to safely deploy them to the world through our products.\
    \ AI is an extremely powerful tool that must be created with safety and human\
    \ needs at its core, and to achieve our mission, we must encompass and value the\
    \ many different perspectives, voices, and experiences that form the full spectrum\
    \ of humanity. We are an equal opportunity employer, and we do not discriminate\
