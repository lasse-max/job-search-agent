  description_text: "ABOUT US At Sierra, we\u2019re creating a platform to help businesses\
    \ build better, more human customer experiences with AI. We are primarily an in-person\
    \ company based in San Francisco, with growing offices in Atlanta, New York, London,\
    \ Paris, Madrid, Munich, Singapore, Tokyo, and Sydney. We are guided by a set\
    \ of values that are at the core of our actions and define our culture: Trust,\
    \ Customer Obsession, Craftsmanship, Intensity, and Family. These values are the\
    \ foundation of our work, and we are committed to upholding them in everything\
    \ we do. Our co-founders are Bret Taylor https://www.linkedin.com/in/brettaylor/\
    \ and Clay Bavor https://www.linkedin.com/in/claybavor/. Bret currently serves\
    \ as Board Chair of OpenAI. Previously, he was co-CEO of Salesforce (which had\
    \ acquired the company he founded, Quip) and CTO of Facebook. Bret was also one\
    \ of Google's earliest product managers and co-creator of Google Maps. Before\
    \ founding Sierra, Clay spent 18 years at Google, where he most recently led Google\
    \ Labs. Earlier, he started and led Google\u2019s AR/VR effort, Project Starline,\
    \ and Google Lens. Before that, Clay led the product and design teams for Google\
    \ Workspace. WHAT YOU\u2019LL DO - Greet visitors and oversee the day-to-day functioning\
    \ of the office. - Ensure the office environment is welcoming, clean, and organized\
    \ by managing office supplies, equipment, and kitchen inventory. - Coordinate\
    \ with building management for office maintenance and repairs. - Help the admin\
    \ team organize company happy hours, in-office trainings, team lunches and celebratory\
    \ events. - Hand out and track company merch for new hires. Send merch packages/gifts\
    \ when necessary (new baby, partnership, thank you, etc.), executing new inventory\
    \ orders when necessary. - Address any office-related issues promptly and effectively,\
    \ fostering a positive work environment. - Partner with facilities and real estate\
    \ team on office improvements. - Maintain a high level of confidentiality and\
    \ discretion with all materials and information. - Please note this is a 6-month\
    \ contract position and is ineligible for full-time benefits below. WHAT YOU\u2019\
    LL BRING - 2+ years of Office Management or similar experience. - Strong interpersonal\
    \ and communication skills and the ability to build relationships with a wide\
    \ variety of individuals. - A methodical, process-driven mentality that is focused\
    \ on both accuracy and efficiency. Ability to multitask and meet deadlines with\
    \ quality products. - Ability to build relationships, partnering effectively with\
    \ cross-functional teams and external partners. - Excellent time management skills,\
    \ willingness to quickly shift tasks and priorities, and the ability to anticipate\
    \ the needs of others before they arise. - Ability to lift, move, and organize\
    \ office supplies or equipment weighing up to 20 pounds as needed. EVEN BETTER...\
    \ - Experience supporting and coordinating office moves, space planning, and layout\
    \ changes. - Track record of developing workplace programs that enhance employee\
    \ experience. OUR VALUES - Trust: We build trust with our customers with our accountability,\
    \ empathy, quality, and responsiveness. We build trust in AI by making it more\
    \ accessible, safe, and useful. We build trust with each other by showing up for\
    \ each other professionally and personally, creating an environment that enables\
    \ all of us to do our best work. - Customer Obsession: We deeply understand our\
    \ customers\u2019 business goals and relentlessly focus on driving outcomes, not\
    \ just technical milestones. Everyone at the company knows and spends time with\
    \ our customers. When our customer is having an issue, we drop everything and\
    \ fix it. - Craftsmanship: We get the details right, from the words on the page\
    \ to the system architecture. We have good taste. When we notice something isn\u2019\
    t right, we take the time to fix it. We are proud of the products we produce.\
    \ We continuously self-reflect to continuously self-improve. - Intensity: We know\
    \ we don\u2019t have the luxury of patience. We play to win. We care about our\
    \ product being the best, and when it isn\u2019t, we fix it. When we fail, we\
    \ talk about it openly and without blame so we succeed the next time. - Family:\
    \ We know that balance and intensity are compatible, and we model it in our actions\
    \ and processes. We are the best technology company for parents. We support and\
    \ respect each other and celebrate each other\u2019s personal and professional\
    \ achievements. WHAT WE OFFER We want our benefits to reflect our values and offer\
    \ the following to full-time employees: - Flexible (unlimited) paid time off -\
    \ Medical, dental, and vision benefits for you and your family - Life insurance\
    \ and disability benefits - Retirement plan dependent on country of employment\
    \ - Parental leave - Fertility and family building benefits through Carrot - Lunch,\
    \ as well as delicious snacks and coffee to keep you energized - Discretionary\
    \ benefit stipend giving people the ability to spend where it matters most - Free\
    \ alphorn lessons These benefits are further detailed in Sierra's policies, may\
    \ vary by region, and are subject to change at any time, consistent with the terms\
    \ of any applicable compensation or benefits plans. Eligible full-time employees\
    \ can participate in Sierra's equity plans subject to the terms of the applicable\
    \ plans and policies. BE YOU, WITH US We're working to bring the transformative\
    \ power of AI to every organization in the world. To do so, it is important to\
    \ us that the diversity of our employees represents the diversity of our customers.\
    \ We believe that our work and culture are better when we encourage, support,\
    \ and respect different skills and experiences represented within our team. We\
    \ encourage you to apply even if your experience doesn't precisely match the job\
    \ description. We strive to evaluate all applicants consistently without regard\
    \ to race, color, religion, gender, national origin, age, disability, veteran\
    \ status, pregnancy, gender expression or identity, sexual orientation, citizenship,\
    \ or any other legally protected class."
