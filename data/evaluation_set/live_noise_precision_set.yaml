  description_text: "Company Description We\u2019re http://checkout.comCheckout.com\
    \ http://Checkout.com. You might not know our name, but companies like eBay, Spotify,\
    \ Klarna, Uber, and Sony do, because we\u2019re behind many of the digital experiences\
    \ you use every day. We are where the world checks out, enabling over 10 billion\
    \ transactions daily for more than one billion global shoppers. Whether you want\
    \ to book a holiday, order food, renew a subscription, or check out online, there\u2019\
    s a good chance our tech powers the payments behind the scenes. Our platform helps\
    \ the most ambitious businesses deliver effortless digital experiences, at scale.\
    \ If you want to do career-defining work, you\u2019ve come to the right place.\
    \ We move fast, think globally, and believe great teams are built by hiring exceptional\
    \ people with conviction, curiosity, and the desire to make an impact. With 20\
    \ offices across six continents and London as our HQ, we\u2019re shaping the future\
    \ of fintech \u2013 and we\u2019re just getting started. Job Description In Enterprise\
    \ Technical Account Management (TAM), you will be instrumental in building and\
    \ maintaining strategic relationships with key clients, ensuring their satisfaction\
    \ by resolving their technical issues, optimizing their payment solutions and\
    \ delivering exceptional service with your technical expertise and strong interpersonal\
    \ skills. What you\u2019ll be doing: - Relationship Management: Build and nurture\
    \ long-term relationships with key clients, serving as their primary point of\
    \ contact for technical matters. - Customer Success: Understand our clients' business\
    \ needs and goals, proactively identify opportunities to optimize their payment\
    \ solutions, and ensure successful adoption and utilization of our products. -\
    \ Technical Support: Provide expert guidance and troubleshooting assistance to\
    \ clients, addressing their technical inquiries, resolving issues promptly, and\
    \ ensuring minimal disruption to their payment infrastructure through deep understanding\
    \ of their integrations and how our products work together. - Training and Demo:\
    \ Help upselling efforts with merchant demonstrations and technical training -\
    \ hold workshops and refreshers on our product offering to keep clients up-to-date\
    \ with new features and deliverables. - Project Management: Lead and coordinate\
