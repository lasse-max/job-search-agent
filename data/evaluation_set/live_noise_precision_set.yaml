  description_text: "Airbnb was born in 2007 when two hosts welcomed three guests\
    \ to their San Francisco home, and has since grown to over 5 million hosts who\
    \ have welcomed over 2 billion guest arrivals in almost every country across the\
    \ globe. Every day, hosts offer unique stays and experiences that make it possible\
    \ for guests to connect with communities in a more authentic way. The Difference\
    \ You will Make: As the Luxe Market Manager Field Manager for EMEA and APAC, you\
    \ will lead the team of on-the-ground market experts responsible for growing Airbnb\
    \ Luxe\u2019s supply across the region\u2019s most desirable destinations. You\
    \ will set the strategy, coach the team, and own the results \u2014 ensuring Airbnb\
    \ Luxe continues to expand its portfolio of extraordinary homes while maintaining\
    \ the quality standards that define the tier. This role sits at the intersection\
    \ of people leadership, commercial strategy, and luxury market expertise. You\u2019\
    ll guide a team of Luxe Market Managers through the full supply lifecycle \u2014\
    \ from prospecting and acquisition to host account management and portfolio optimization\
    \ \u2014 while serving as the senior regional voice for Luxe internally and externally.\
    \ You are equally comfortable shaping a regional growth strategy, coaching a team\
    \ member through a complex host negotiation, and rolling up your sleeves to solve\
    \ the challenges that come with operating across diverse, fast-evolving markets.\
    \ A Typical Day:&nbsp; Team Leadership &amp; Development Lead, coach, and develop\
    \ a team of Luxe Market Managers across EMEA and APAC, setting clear expectations\
    \ and creating a culture of excellence, accountability, and continuous growth.\
    \ Serve as the go-to leader for your team \u2014 providing business coaching,\
    \ clear direction, and hands-on support on complex host relationships, market\
    \ launches, and escalations. Identify and develop emerging talent, preparing team\
    \ members for expanded roles and greater responsibility. Build and sustain a positive,\
    \ driven, and inclusive team culture grounded in collaboration and high performance.\
    \ Regional Strategy &amp; Supply Growth Own the end-to-end supply strategy for\
    \ EMEA and APAC, setting priorities across acquisition, host quality, and portfolio\
    \ optimization. Guide territory-level strategies, directing teams to tailor their\
    \ approach based on market maturity, host segmentation, and the competitive landscape.\
    \ Design and scale acquisition programs that bring exceptional new homes into\
    \ the Luxe portfolio \u2014 including through direct outreach, luxury real estate\
    \ partnerships, and property manager relationships. Identify untapped markets\
    \ and supply opportunities across EMEA and APAC, translating market insights into\
    \ actionable growth plans. Host Relationships &amp; Quality Standards Champion\
    \ the Luxe brand and quality standards across the region, ensuring every home\
    \ in the portfolio delivers an experience that meets the expectations of Airbnb\u2019\
    s most discerning guests. Support your team in building and maintaining relationships\
    \ with high-end hosts, estate managers, and luxury property management companies.\
    \ Serve as a senior escalation point for complex host relationships and cross-functional\
    \ issues, ensuring resolution without compromising host trust or portfolio quality.\
    \ Performance &amp; Cross-Functional Collaboration Own regional business performance,\
    \ ensuring markets meet supply, revenue, and quality KPIs. Partner with Luxe leadership,\
    \ Guest Services, Content &amp; Quality, Marketing, RevOps, Policy, and Product\
    \ to launch initiatives that strengthen host performance and accelerate supply\
    \ growth. Cascade market insights and host feedback to internal stakeholders to\
    \ influence product and policy decisions. Share playbooks and proven strategies\
    \ across the global Luxe team to fuel broader growth. Your Expertise: Experience\
    \ 10+ years of experience in sales, business development, luxury hospitality,\
    \ or marketplace management, with 4+ years leading and scaling field-based teams.\
    \ Deep knowledge of the EMEA and/or APAC luxury travel and real estate landscape,\
    \ with a demonstrated ability to drive local growth across diverse and complex\
    \ markets. Proven track record of meeting or exceeding supply acquisition and\
    \ revenue targets through a team, in a fast-paced, metrics-driven environment.\
    \ Experience building and managing high-value partnerships with luxury real estate\
    \ professionals, property managers, or estate operators. Familiarity with CRM\
    \ tools and performance dashboards, with the ability to maintain pipeline rigor\
    \ and drive data-informed decisions across your team. Skills &amp; Competencies\
    \ A bold, compassionate leader with a strong bias for action and a proven ability\
    \ to develop, coach, and empower high-performing teams. Strong executive presence\
    \ with the ability to build credibility and influence senior decision-makers both\
    \ internally and within the luxury industry. Analytical and strategic thinker\
    \ who uses data and market insights to shape portfolio strategies across diverse\
    \ and evolving markets. Sharp market instincts \u2014 you can quickly assess a\
    \ territory, identify emerging opportunities, and translate that into strategy\
    \ your team can execute. Exceptional written and verbal communication skills;\
    \ able to craft compelling narratives for internal stakeholders and senior host\
    \ audiences alike. Highly organized and adept at managing multiple markets, priorities,\
    \ and stakeholder relationships simultaneously. Mindset Deep alignment with Airbnb\u2019\
    s mission and a genuine passion for the luxury travel and homes space. A consultative,\
    \ relationship-first approach \u2014 you build trust before you drive results.\
    \ Proactive and solutions-oriented; you identify barriers early and bring clear\
    \ recommendations, not just problems. Collaborative by nature \u2014 you understand\
    \ that success in this role requires tight partnership across the team and the\
    \ broader Luxe organization. Location Specific Requirements: This role requires\
    \ the ability to travel up to 50% of the year across EMEA and APAC markets and\
    \ for team offsites. English proficiency required. Additional language skills\
    \ are a strong plus. Our Commitment To Inclusion &amp; Belonging: Airbnb is committed\
    \ to working with the broadest talent pool possible. We believe diverse ideas\
    \ foster innovation and engagement, and allow us to attract creatively-led people,\
    \ and to develop the best products, services and solutions. All qualified individuals\
    \ are encouraged to apply. How We'll Take Care of You: Our job titles may span\
    \ more than one career level. The actual base pay is dependent upon many factors,\
