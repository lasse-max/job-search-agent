  description_text: "Requisition ID: FEQ427R217 Sr. Solutions Architect (Lakewatch\
    \ - EMEA)&nbsp; The Solutions Architect (Lakewatch) team executes on Databricks\u2019\
    \ strategic Product Operating Model that provides enhanced focus on earlier stage,\
    \ highly prioritized product lines in order to establish product market fit, and\
    \ set the course for rapid revenue growth. They are part of a global go-to-market\
    \ team mandate, though individually will cover a specific, local region.&nbsp;\
    \ Clients may span across one or more business units and verticals. By working\
    \ in partnership with direct account teams, they will jointly engage clients,\
    \ foster the necessary relationships, position in-depth the specific product line,\
    \ so as to provide compelling reasons for clients to adopt and grow the usage\
    \ of the given product.&nbsp; They understand the appropriate approach, the guardrails,\
    \ and the steps needed to successfully adopt the product line, as clients deliver\
    \ on their business objectives. The Solutions Architect (Lakewatch) is paired\
    \ with an Account Executive aligned to the product line with specific targets\
    \ accordingly. Together, they will devise and implement a strategy across their\
    \ assigned set of accounts, develop presentations, demos and other assets and\
    \ deliver them such that customers make an informed decision as they decide to\
    \ adopt the product-line in a meaningful way. The Lakewatch product-line requires\
    \ the following core technical competencies: 5+ years of cybersecurity engineering,\
    \ security operations (SecOps), or security architecture expertise, with a proven\
    \ track record of designing and delivering customer-facing security solutions\
    \ (of which 3+ years are in a customer-facing, pre-sales or consulting role).\
    \ Experience with design and implementation of data and AI applications in cybersecurity,\
    \ including anomaly detection, behavioral analytics, and agentic AI workflows\
    \ for triage and investigation. Deep familiarity with SIEM platforms (Splunk,\
    \ Microsoft Sentinel, QRadar, or similar), including deployment, tuning, detection\
    \ engineering, and migration strategies. Familiarity with SOAR platforms is also\
    \ desirable. Strong understanding of the security telemetry landscape: endpoint\
    \ (EDR/XDR), network (firewall, DNS, proxy), identity (Okta, Entra ID), cloud\
    \ (AWS CloudTrail, Azure Activity Log, GCP Audit), and SaaS application logs.\
    \ Familiarity with standards such as OCSF. Experience with \u201Cdetection-as-code\u201D\
    \ workflows, including rule authoring in SQL or YAML, CI/CD integration for detection\
    \ pipelines, and MITRE ATT&amp;CK framework mapping. Credibility in influencing\
    \ security analytics products with the market insight needed to shape and prioritize\
    \ roadmap capabilities. The impact you will have Provide technical leadership\
    \ to guide strategic customers to successful implementations on big data projects,\
    \ ranging from architectural design to data engineering to model deployment Collaborate\
    \ with GTM leadership and account teams to design and execute high-impact engagement\
    \ strategies across your territory, driving Lakewatch adoption from initial data\
    \ offload through full SIEM augmentation or replacement. As a trusted advisor,\
    \ serve as an expert Solutions Architect building technical credibility with CISOs,\
    \ security architects, SOC leadership, and security analysts to drive product\
    \ adoption and vision. Enable clients at scale through workshops, POC execution,\
    \ and developing customer-facing collateral that increases technical knowledge\
    \ and demonstrates the value of an open agentic SIEM architecture. Influence product\
    \ roadmap by translating field-derived, data-driven insights into strategic recommendations\
    \ for Product and Engineering teams. Handle the most complex technical challenges\
    \ in this product line by acting as the tier-3 escalation point for the field,\
    \ ensuring customer success in mission-critical security environments. Establish\
    \ and refine the sales qualification and POC intake process, ensuring well-scoped\
    \ engagements that maximize customer success and minimize friction for R&amp;D.\
    \ &nbsp; Competencies &amp; Responsibilities 5+ years in a customer-facing, pre-sales\
    \ or consulting role influencing technical executives, driving high-level security\
    \ strategy and product adoption. Experience with design and implementation of\
    \ data and AI applications in cybersecurity, including anomaly detection, behavioral\
    \ analytics, and agentic AI workflows for triage and investigation. Proficient\
    \ in programming, debugging, and problem-solving using SQL and Python and with\
    \ AI tools. Experience collaborating with Global System Integrators (GSIs) and\
    \ third-party consulting organizations to drive customer outcomes in cybersecurity.\
    \ Hands-on experience building solutions within major public cloud environments\
    \ (AWS, Azure, or GCP), with an understanding of cloud-native security logging\
    \ and monitoring. Deep experience in security operations, with broad familiarity\
    \ across one or more of the following: data engineering, data warehousing, AI/ML\
    \ for security, data governance, and streaming. Undergraduate degree (or higher)\
    \ in a technical field such as Computer Science, Cybersecurity, Applied Mathematics,\
    \ Engineering or similar. About Databricks Databricks is the data and AI company.\
    \ More than 10,000 organizations worldwide \u2014 including Comcast, Cond\xE9\
    \ Nast, Grammarly, and over 50% of the Fortune 500 \u2014 rely on the Databricks\
    \ Data Intelligence Platform to unify and democratize data, analytics and AI.\
    \ Databricks is headquartered in San Francisco, with offices around the globe\
    \ and was founded by the original creators of Lakehouse, Apache Spark\u2122, Delta\
    \ Lake and MLflow. To learn more, follow Databricks on&nbsp; Twitter ,&nbsp; LinkedIn\
    \ &nbsp; and &nbsp; Facebook . Benefits At Databricks, we strive to provide comprehensive\
    \ benefits and perks that meet the needs of all of our employees. For specific\
    \ details on the benefits offered in your region click here . Our Commitment to\
    \ Diversity and Inclusion At Databricks, we are committed to fostering a diverse\
    \ and inclusive culture where everyone can excel. We take great care to ensure\
    \ that our hiring practices are inclusive and meet equal employment opportunity\
    \ standards. Individuals looking for employment at Databricks are considered without\
    \ regard to age, color, disability, ethnicity, family or marital status, gender\
    \ identity or expression, language, national origin, physical and mental ability,\
    \ political affiliation, race, religion, sexual orientation, socio-economic status,\
    \ veteran status, and other protected characteristics. Compliance If access to\
    \ export-controlled technology or source code is required for performance of job\
    \ duties, it is within Employer's discretion whether to apply for a U.S. government\
    \ license for such positions, and Employer may decline to proceed with an applicant\
    \ on this basis alone."
