  description_text: "About Mistral At Mistral AI, we believe in the power of AI to\
    \ simplify tasks, save time, and enhance learning and creativity. Our technology\
    \ is designed to integrate seamlessly into daily working life. We democratize\
    \ AI through high-performance, optimized, open-source and cutting-edge models,\
    \ products and solutions. Our comprehensive AI platform is designed to meet enterprise\
    \ as well as personal needs. Our offerings include Le Chat, La Plateforme, Mistral\
    \ Code and Mistral Compute - a suite that brings frontier intelligence to end-users.\
    \ We are a dynamic, collaborative team passionate about AI and its potential to\
    \ transform society. Our diverse workforce thrives in competitive environments\
    \ and is committed to driving innovation. Our teams are distributed between France,\
    \ USA, UK, Germany and Singapore. We are creative, low-ego and team-spirited.\
    \ Join us to be part of a pioneering company shaping the future of AI. Together,\
    \ we can make a meaningful impact. See more about our culture on https://mistral.ai/careers.\
    \ Role Summary As our Senior Technical Writer / Developer Educator, you will drive\
    \ the quality, technical accuracy, and clarity of developer-facing documentation\
    \ at Mistral AI. This is an individual contributor role focused on hands-on excellence,\
    \ strategic content design, and ensuring that developers can successfully integrate\
    \ with and deploy Mistral products. You will work closely with Engineering, Product,\
    \ and Support teams, combining technical validation with compelling storytelling\
    \ to create documentation that developers love. What You Will Do Technical Documentation\
    \ & Strategy Author and maintain high-quality, technically accurate documentation\
    \ for APIs, SDKs, tutorials, deployment guides, and release notes Contribute to\
    \ documentation strategy and content roadmap, identifying gaps and proposing solutions\
    \ Develop a clear, consistent editorial voice and narrative approach across documentation\
    \ Create information architecture and content structures for complex technical\
    \ topics, especially on-premises deployment scenarios Hands-On Technical Validation\
    \ Test all APIs, features, and deployment workflows before documenting Validate\
    \ documentation by reproducing user workflows; catch inaccuracies, edge cases,\
    \ and unclear instructions before publication Experiment with and understand the\
    \ technical depth needed for both self-serve and on-premises documentation Own\
    \ the responsibility that what you ship works, is testable, and solves real developer\
    \ problems Collaboration & Cross-Functional Impact Work closely with Engineering\
    \ and Product to understand feature scope, technical requirements, and deployment\
    \ complexities Participate in technical reviews, design discussions, and release\
    \ planning to ensure documentation is integrated early Gather feedback from Support,\
    \ DevRel, and users to identify documentation pain points and opportunities Advocate\
    \ for clarity and user experience in product design and documentation decisions\
    \ Quality, Consistency & Standards Help define and enforce tone guidelines, content\
    \ standards, and documentation best practices Ensure consistency in terminology,\
    \ voice, and narrative across documentation\u2014self-serve vs. on-premises, API\
    \ reference vs. tutorials Document as if you're telling a story: show why a feature\
    \ matters, what problem it solves, not just how it works Use modern documentation\
    \ tools and practices\u2014Markdown, Git, headless CMS, and AI tools\u2014to streamline\
    \ production About You 5+ years in technical writing, developer documentation,\
    \ or developer education (SaaS, APIs, infrastructure, or AI/ML preferred) Proven\
    \ ability to write for technical audiences\u2014APIs, deployment guides, code\
    \ examples, system architecture Experience validating technical accuracy through\
    \ hands-on testing and experimentation Comfortable with Markdown, Git, and technical\
    \ documentation tools (Docusaurus, Sphinx, or similar) Experience with API testing\
    \ and validation (Postman, curl, or REST clients) Familiarity with code examples,\
    \ including Python, JavaScript, or CLI workflows Ability to understand and test\
    \ complex deployment scenarios (Docker, Kubernetes, on-premises infrastructure\
    \ a plus) Fluent English (primary working language); French is a bonus"
