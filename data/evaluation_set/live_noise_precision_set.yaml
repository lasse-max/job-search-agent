  source_url: https://jobs.ashbyhq.com/airwallex/4a4154c1-d00e-452e-9d65-5acb2f76c653
  description_text: "ABOUT AIRWALLEX Airwallex is the only unified payments and financial\
    \ platform for global businesses. Powered by our unique combination of proprietary\
    \ infrastructure and software, we empower over 200,000 businesses worldwide \u2013\
    \ including Brex, Rippling, Navan, Qantas, SHEIN and many more \u2013 with fully\
    \ integrated solutions to manage everything from business accounts, payments,\
    \ spend management and treasury, to embedded finance at a global scale. Proudly\
    \ founded in Melbourne, we have a team of over 2,200 of the brightest and most\
    \ innovative people in tech across 26 offices around the globe. Valued at US$8\
    \ billion and backed by world-leading investors including T. Rowe Price, Visa,\
    \ Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and\
    \ Lone Pine Capital, Airwallex is leading the charge in building the global payments\
    \ and financial platform of the future. If you\u2019re ready to do the most ambitious\
    \ work of your career, join us. ATTRIBUTES WE VALUE We hire successful builders\
    \ with founder-like energy who want real impact, accelerated learning, and true\
    \ ownership. You bring strong role-related expertise and sharp thinking, and you\u2019\
    re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles.\
    \ You move fast with good judgment, dig deep with curiosity, and make decisions\
    \ from first principles, balancing speed and rigor. You're humble and collaborative;\
    \ turn zero\u2011to\u2011one ideas into real products, and you \u201Cget stuff\
    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. About the Role: Airwallex\
    \ is revolutionising global banking, and the EMEA Revenue Strategy & Operations\
    \ team is key to building our product-market fit and shaping our growth strategy.\
    \ As part of this team, you will identify high-impact and cross-functional priorities\
    \ and support the team to deliver them. Success in this role means that the EMEA\
    \ team successfully delivers against its current commercial growth ambition and\
    \ makes the strategic moves now to ensure sustainable growth for the future. You\
    \ will work as part of a lean, data-driven world-class team. You will interact\
    \ with stakeholders across the business - including Sales, Marketing, Operations,\
    \ Product, Engineering, Compliance and Legal across EMEA and globally. What You'll\
    \ Do... - Drive revenue growth by optimising the go-to-market strategy for Airwallex\
    \ products and channels in EMEA with detailed local market knowledge - Drive product\
    \ strategy, working closely with commercial and product functions and senior stakeholders\
    \ across EMEA and globally to expand and localise Airwallex\u2019 product offering\
    \ in EMEA and bring new products to market - Lead a variety of expansion projects\
    \ to expand Airwallex\u2019 presence in EMEA by partnering with a wide range of\
    \ stakeholders throughout the business - Support commercial teams in key initiatives\
    \ and decisions (e.g. lead market research to identify business opportunities,\
    \ analyse pricing strategies, implement data-driven vertical strategies and go-to-market\
    \ experiments) - Build & maintain operational and financial models to support\
    \ everyday business operations, including revenue forecasting, reporting and ad\
    \ hoc analyses What You Bring... - You\u2019re success-oriented with a bias for\
    \ action, holding yourself accountable for getting things done and driving tangible\
    \ outcomes - You\u2019re an analytical, strategic thinker who has the ability\
    \ to simplify and communicate even the most complex problems - You confidently\
    \ navigate ambiguity, remaining highly adaptable to context-switch and juggle\
    \ multiple workstreams in a fast-paced startup environment - You collaborate seamlessly\
    \ across functions and cultures, excelling at influencing without authority and\
    \ building trust with senior stakeholders - You bring maturity and emotional intelligence,\
    \ deftly navigating competing priorities and complex organisational dynamics within\
    \ a highly visible team - You operate with a team-first, low-ego approach, bringing\
    \ intellectual honesty to your work and focusing on how we win as a group What\
    \ You Have... - 5+ years of work experience, ideally with a mix of top-tier strategy\
    \ consulting, high-growth startups, and/or commercial/product leadership roles\
    \ - Strong analytical skills, including data modelling and working with data reporting\
    \ tools (Looker, Tableau) - An outstanding record of academic achievement - Excellent\
    \ written and verbal communication and presentation skills - Experience in high-growth\
    \ fintech, financial services, or technology environments is a strong advantage,\
    \ particularly if you have prior exposure to navigating product roadmaps, complex\
    \ ecosystems, and cross-functional business processes At Airwallex you\u2019ll\
    \ have the ability to make an impact in a rapidly growing, global fintech. We\
    \ want you to share in our success, which is why you\u2019ll be offered a competitive\
    \ salary plus valuable equity within Airwallex. We also like to ensure we create\
    \ the best environment for our people by providing a collaborative open office\
    \ space with a fully stocked kitchen, operating on a hybrid model (3-4 days in\
    \ the office). We organise regular team-building events and we give our people\
    \ the freedom to be creative. APPLICANT SAFETY POLICY: FRAUD AND THIRD-PARTY RECRUITERS\
    \ To protect you from recruitment scams, please be aware that Airwallex will not\
    \ ask for bank details, sensitive ID numbers (i.e. passport), or any form of payment\
    \ during the application or interview process. All official communication will\
    \ come from an @airwallex.com http://airwallex.com email address. Please apply\
    \ only through careers.airwallex.com http://careers.airwallex.com or our official\
    \ LinkedIn page. Airwallex does not accept unsolicited resumes from search firms/recruiters.\
    \ Airwallex will not pay any fees to search firms/recruiters if a candidate is\
    \ submitted by a search firm/recruiter unless an agreement has been entered into\
    \ with respect to specific open position(s). Search firms/recruiters submitting\
    \ resumes to Airwallex on an unsolicited basis shall be deemed to accept this\
    \ condition, regardless of any other provision to the contrary. EQUAL OPPORTUNITY\
    \ Airwallex is proud to be an equal opportunity employer. We value diversity and\
    \ anyone seeking employment at Airwallex is considered based on merit, qualifications,\
    \ competence and talent. We don\u2019t regard color, religion, race, national\
    \ origin, sexual orientation, ancestry, citizenship, sex, marital or family status,\
    \ disability, gender, or any other legally protected status when making our hiring\
    \ decisions. If you have a disability or special need that requires accommodation,\
    \ please let us know."
