  description_text: "Since we opened our doors in 2009, the world of commerce has\
    \ evolved immensely, and so has Square. After enabling anyone to take payments\
    \ and never miss a sale, we saw sellers stymied by disparate, outmoded products\
    \ and tools that wouldn\u2019t work together. So we expanded into software and\
    \ started building integrated, omnichannel solutions \u2013 to help sellers sell\
    \ online, manage inventory, offer buy now, pay later functionality, book appointments,\
    \ engage loyal buyers, and hire and pay staff. Across it all, we\u2019ve embedded\
    \ financial services tools at the point of sale, so merchants can access a business\
    \ loan and manage their cash flow in one place. Afterpay furthers our goal to\
    \ provide omnichannel tools that unlock meaningful value and growth, enabling\
    \ sellers to capture the next generation shopper, increase order sizes, and compete\
    \ at a larger scale. Today, we are a partner to sellers of all sizes \u2013 large,\
    \ enterprise-scale businesses with complex operations, sellers just starting,\
    \ as well as merchants who began selling with Square and have grown larger over\
    \ time. As our sellers grow, so do our solutions. There is a massive opportunity\
    \ in front of us. We\u2019re building a significant, meaningful, and lasting business,\
    \ and we are helping sellers worldwide do the same. Square's Strategic Account\
    \ Management organization is seeking an experienced sales professional to drive\
    \ growth and retention of Enterprise accounts within our Services vertical. This\
    \ team partners with some of Square's largest services-vertical sellers \u2014\
    \ diverse businesses spanning sports &amp; entertainment, health &amp; beauty,\
    \ home services, and professional services. In this role, you'll serve as a trusted\
    \ advisor to services executives and operators, helping them evaluate their tech\
    \ stack and scale using Square's ecosystem. You Will Own and maintain relationships\
    \ across a portfolio of ~50 enterprise services sellers, driving account expansion,\
    \ retention, and satisfaction Consult with business owners and executives to uncover\
    \ opportunities across payments, business management, and banking tools Design\
    \ and implement customized solutions that drive measurable business results Act\
    \ as the voice of the customer, advocating for enterprise services seller needs\
    \ with Product, Engineering, and Operations teams Collaborate cross-functionally\
    \ with Account Executives, Product Managers, and Solution Engineers to deliver\
    \ integrated, scalable outcomes Visit customers in-person where appropriate for\
    \ negotiations and/or churn prevention Negotiate and manage contracts and pricing,\
    \ ensuring mutual wins and long-term success Deliver white-glove support, resolving\
    \ critical issues and proactively driving engagement You Have 5+ years of experience\
    \ in account management or sales, ideally within SaaS, payments, or business management\
    \ software Proven success growing and retaining a book of business at the enterprise\
    \ level Consistent over-performance on key metrics and revenue targets Strong\
    \ discovery and consultative selling skills Experience in the services industry\
    \ (sports &amp; entertainment, health &amp; beauty, home services, and professional\
    \ services) preferred, but not required Technical solutioning skills, including\
    \ requirements gathering and translating customer needs into scalable solutions\
    \ Demonstrated success retaining and expanding strategic accounts Experience negotiating\
    \ contracts and pricing with senior stakeholders Exceptional written and verbal\
    \ communication skills Creative, strategic problem-solver who thrives in ambiguous\
    \ environments Growth mindset, empathetic collaborator, and positive team player\
    \ Pay Transparency: Block takes a market-based approach to pay, and pay may vary\
    \ depending on your location. U.S. locations are categorized into one of four\
    \ zones based on a cost of labor index for that geographic area. The successful\
    \ candidate's starting pay will be determined based on job-related skills, experience,\
    \ qualifications, work location, and market conditions. These ranges may be modified\
    \ in the future. To find a location's zone designation, please refer to this resource\
