    \ around a product. \u2022 Developer product expertise: Deep understanding of\
    \ developer-facing products, developer tools and the day-to-day workflows of software\
    \ engineers. Strong empathy for developers and a proven ability to build products\
    \ that integrate naturally into how they code, test and ship software. \u2022\
    \ Generative AI and science collaboration: Solid understanding of how GenAI and\
    \ large language models are built, trained and deployed. Experience working closely\
    \ with AI or applied science teams, translating research advances into scalable,\
    \ production-ready products. Now, it would be ideal if you have: \u2022 Engineering\
    \ background: Previous experience as a software engineer or strong hands-on engineering\
    \ background. Passion for building, experimenting and coding on personal or side\
    \ projects, with a deep appreciation for technical constraints and trade-offs.\
    \ \u2022 LLM product experience: Direct experience building or scaling LLM-powered\
    \ products, with a strong understanding of how generative AI impacts product discovery,\
    \ roadmapping, evaluation, and iteration cycles."
