    \ and timelines, track progress to completion, and ensure successful go\u2011\
    live. - Revenue & Cost Analytics - Perform deep\u2011dive revenue and cost analysis\
    \ across products, markets, and channels. - Identify revenue anomalies or leakage,\
    \ and work with business teams to resolve issues. - Explore and size cost\u2011\
    saving opportunities, including channel optimization, pricing inputs, and product\
    \ design impacts. - Stakeholder Collaboration - Collaborate closely with Finance,\
    \ Product, Engineering, Ops, and Data teams to ensure end\u2011to\u2011end consistency\
    \ from transaction to reporting. - Prepare clear analysis and recommendations\
    \ for leaders Minimum Qualifications: - 6+ years of relevant working experience\
    \ in finance, accounting, audit, or product finance roles. - Bachelor\u2019s degree\
    \ or above in Accounting, Finance, Economics, or related discipline. - Big 4 experience\
    \ preferred. - Solid understanding of IFRS; exposure to US GAAP preferred. - Strong\
    \ analytical skills and attention to detail; comfortable working with large datasets.\
    \ - Proven experience in cross\u2011functional collaboration and project management.\
    \ - Proactive, ambitious about building systematic / automated / AI\u2011driven\
