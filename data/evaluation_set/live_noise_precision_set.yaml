  description_text: "Who is Quantium? Quantium is a world leader in data science and\
    \ artificial intelligence. Established in Australia in 2002, Quantium is a global\
    \ team of more than 1,200 people across 14 locations with a unique blend of capabilities\
    \ across product and consulting services to help businesses unlock value from\
    \ data and analytics. Quantium partners with the world's largest corporations\
    \ to forge a better, more intelligent world. wiqConsumer is Quantium's dedicated\
    \ FMCG vertical, built in partnership with Woolworths to revolutionise how insights\
    \ are shared with trade partners. The team combines Quantium's world-class data\
    \ science capability with Woolworths' rich data assets to deliver cutting-edge\
    \ analytical products, giving FMCG suppliers a complete view of their customers\
    \ and categories. It's a high-growth, high-impact environment where commercial\
    \ ambition and data innovation meet. As Commercial Director \u2013 FMCG, you will\
    \ be the senior commercial leader for wiqConsumer, owning the full P&amp;L for\
    \ your vertical and driving revenue growth through deep partnerships with FMCG\
    \ trade partners. This is a career-defining opportunity for a commercially seasoned\
    \ FMCG leader to sit at the intersection of data science and the FMCG supplier\
    \ landscape. How will you make an impact? P&amp;L ownership: Own and drive the\
    \ commercial performance of the wiqConsumer vertical, including revenue targets,\
    \ client retention and financial accountability across your portfolio. Strategic\
    \ growth: Develop and execute robust go-to-market strategies that deepen existing\
    \ partnerships and open new commercial opportunities with FMCG trade partners.\
    \ Client partnerships : Build and sustain high-value relationships with senior\
    \ stakeholders across FMCG supplier businesses, acting as the face of Quantium\
    \ in negotiations, industry forums and commercial discussions. Commercial negotiation:\
    \ Lead complex contract negotiations and renewal conversations, leveraging deep\
    \ knowledge of the FMCG landscape to close and grow accounts. Team leadership:\
    \ Lead, inspire and develop a high-performing commercial team, setting clear direction,\
    \ fostering a culture of accountability and continuous improvement, and investing\
    \ in the growth of your people. The superpowers you'll be bringing to the team\
    \ FMCG commercial expertise: A demonstrable track record of driving revenue growth\
    \ and managing P&amp;Ls in a senior commercial, sales or category leadership role,\
    \ with deep knowledge of the FMCG supplier landscape and how trade partners think,\
    \ buy and make decisions. Strategic acumen: Ability to translate market trends\
    \ and customer intelligence into actionable commercial strategies that deliver\
    \ sustainable growth. Relationship builder: Exceptional ability to build trusted,\
    \ enduring partnerships at all levels, from category managers to C-suite executives.\
    \ People leadership: A genuine commitment to developing others, with a track record\
    \ of building cohesive, high-performing teams and creating an environment where\
    \ people do their best work. Remember \u2014 you might not tick all the boxes,\
    \ but don't let that stop you from applying. We're more interested in how you\
    \ lead, how you think commercially, and the impact you've had. What could your\
    \ Quantium experience look like? Working at Quantium will allow you to challenge\
    \ your imagination. You will get to solve complex commercial problems using rigour,\
    \ precision and by asking great questions, but it also means you can think big,\
    \ outside the box and push your impact to the max. By joining the Quantium team,\
    \ you'll get to: Forge your path: So many of our team have moved across different\
    \ teams or geographies. You'll be in the driver's seat, and we empower you to\
    \ make your career your own. Find your kind: Embrace diversity and connect with\
    \ your tribe (think foodies, dog lovers, readers, or runners). Make an impact:\
    \ Leave your mark. Your contributions resonate, regardless of your role or rank.\
    \ On top of the Quantium experience, you will enjoy a range of great benefits.\
    \ Some of these include: Competitive remuneration: We know our team go above and\
    \ beyond, which is why we reward with market-leading remuneration including an\
    \ attractive annual bonus scheme. Flexible work arrangements: Achieve work-life\
    \ balance at your own pace with hybrid and flexible work arrangements. Quantium\u2019\
    s recruitment process involves the collection and use of personal information,\
    \ see our&nbsp; Candidate Data Collection Notice for more information. T his provides\
    \ information on how we collect, use &amp; store your personal information, including\
    \ potential disclosure to our majority shareholder, Woolworths Group Limited.\
    \ &nbsp;"
