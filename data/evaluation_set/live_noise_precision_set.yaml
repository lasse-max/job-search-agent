  description_text: "Celonis is the global leader in Process Intelligence and the\
    \ pioneer of Process Mining technology. As one of the world\u2019s fastest-growing\
    \ enterprise SaaS companies, we are changemakers pushing the boundaries of what\u2019\
    s possible. We invest heavily in advanced AI capabilities\u2014specifically our\
    \ Process Intelligence Graph\u2014to turn data insights into immediate business\
    \ action. We believe there is a massive opportunity to unlock global productivity\
    \ and sustainability by placing intelligence at the core of every business process.\
    \ Join our mission to make processes work for people, companies, and the planet.\
    \ Location: Madrid for an onboarding period of 2 years and a possible relocation\
    \ to Amsterdam after. Customer base will be in the Benelux region, involving travel\
    \ to meet clients in person. The Team As an Associate Applied AI Engineer, you\
    \ are part of our Value Engineering team and are the trusted advisor for customers\
    \ working on the intersection of technology and business. As a so-called Value\
    \ Engineer (VE), you partner with sales and customers to create compelling and\
    \ innovative technical solutions to critical business problems leveraging cutting\
    \ edge (AI) capabilities within our Celonis Process Intelligence Platform. A great\
    \ VE understands the customer, the technology, and the sales cycle making it what\
    \ may be the most interesting, challenging, and fulfilling role in Enterprise\
    \ Software. You will be joining the Global VE Center of Excellence which is an\
    \ international, diverse, and dynamic organization at the core of the Celonis\
    \ Value Engineering team supporting our local field teams. As a team, we enjoy\
    \ working in a fast-paced environment and share a sense of belonging to a community\
    \ that wants to learn and grow together. The team culture is one based on building\
    \ trust, continuous development, and improvement through coaching &amp; mentoring.&nbsp;\
    \ The Role Talented individuals launch their careers in the enterprise software\
    \ world by joining the Orbit Graduate Program as an Associate Value Engineer.\
    \ The 12-month program is a unique experience to fast start your career in the\
    \ SaaS Industry that highlights hands-on learning, mentorship, and a team culture\
