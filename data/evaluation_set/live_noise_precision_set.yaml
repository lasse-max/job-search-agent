    s business by increasing gross profit/revenue, delivering new customers, and signaling\
    \ the Afterpay &amp; Cash App brand strength to the market. As an Mid-Market Account\
    \ Manager, you will be on the front lines of a fast-growing payments business\
    \ - partnering with business owners and leading a broad portfolio of companies.\
    \ You will be responsible for managing a book of business spanning verticals and\
    \ geographies. Beyond being responsible for revenue outcomes across your portfolio,\
    \ you will also be tasked with deepening partner relationships and ensuring long-term\
    \ mutual success and retention of our merchant partnerships.&nbsp; A successful\
    \ candidate thrives in a challenging, fast-paced environment, has a passion for\
    \ nurturing and expanding client relationships, and exhibits a strong sense of\
    \ ownership to drive results for Cash App and Afterpay. This role requires an\
    \ organized individual who is an effective identifying top opportunities for growth\
    \ with a high degree of business acumen. The ideal candidate has demonstrated\
    \ excellence in account management or sales at the mid-market level and proven\
    \ abilities in data-driven decision making and leading cross-functional teams\
    \ to manage product and commercial initiatives. You Will Be the Voice of Cash\
    \ App and Afterpay: Represent Block to Mid-Market Merchants as a thought-leader\
    \ in the payments landscape and demonstrate Block\u2019s value as a growth driver\
    \ for our commerce partners&nbsp; Quarterback Deals: Be responsible for negotiations\
    \ (expansions &amp; renewals) and execution for the Block organization through\
    \ methodical deal management based on milestone tracking, KPIs, and partner alignment\
    \ on opportunities of mutual interest Craft Account Strategy: Develop cohesive,\
    \ well-researched and data-driven portfolio plans for your book of business that\
    \ maximize growth for Block and the partner. Deliver powerful narratives that\
    \ educate existing partners of Cash App &amp; Afterpay\u2019s value proposition.\
    \ Effectively communicate with senior decision makers at the largest brands in\
    \ the world. Negotiate hard yet pragmatically, using data and principles to inform\
    \ your strategy.&nbsp;&nbsp; Be a Team Player: Partner closely with cross-functional\
    \ teams to drive deals forward, including Sales, Marketing, Finance, Product,\
    \ Risk, Legal, Operations, Customer Service; and with external partners\u2019\
    \ cross-functional teams Build Cash App &amp; Afterpay\u2019s Network: Develop\
    \ and grow Block\u2019s relationships with leading brands, including their senior\
    \ executives.&nbsp; Be the Voice of the Merchant: Represent market feedback and\
    \ sentiment internally, advocating for your clients while balancing against the\
    \ needs and constraints of our business, by aggregating and delivering key insights\
    \ across the organization in a structured, consistent, and proactive manner. You\
    \ Have An obsession with our products and a motivation fueled by feeling the impact\
    \ of your work as more consumers build financial wellness with Cash App &amp;\
    \ Afterpay 6+ years experience in high-growth environments in an account management,\
    \ business development, sales, GTM or strategy role, preferably in a fast-moving\
    \ technology or financial services company&nbsp; Strong executive presence, with\
    \ demonstrated ability to influence and earn trust with senior leaders and other\
    \ stakeholders, ask the right questions, and use sound business judgment internally\
    \ and externally at large companies, including at the C-suite level&nbsp; A demonstrated\
    \ track record of driving revenue growth A high familiarity and comfort with how\
    \ product development works, preferably in payments. You hold your own interfacing\
    \ with stakeholders across disciplines (technical, marketing, product), and you\
    \ have credibility with your internal product and engineering colleagues.&nbsp;\
    \ A self-starter mentality and deep comfort operating in ambiguity and frequent\
    \ change, while still delivering results A hunger to problem solve with analytical\
    \ rigor. You\u2019re a killer relationship manager and strategic thinker who comes\
    \ armed to internal and external conversations with the right data and analysis\
    \ to make a convincing argument. You are an expert negotiator with a strong understanding\
    \ of commercial contracts and financial models.&nbsp; Creative storytelling abilities,\
    \ able to seek out relevant, meaningful data and build business cases to inform\
    \ partners on Block\u2019s value proposition An unwavering obsession with the\
    \ details Pay Transparency Block takes a market-based approach to pay, and pay\
    \ may vary depending on your location. U.S locations are categorized into one\
