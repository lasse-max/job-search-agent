    \ technical role (eg: Technical Operations, Software Engineer, etc.) or a technical\
    \ user facing role (e.g. Solutions Architecture, Integration Engineer). Write\
    \ high-quality code that scales effectively. Expertise in SQL and data visualization,\
    \ proven experience analyzing complex datasets. Comfort with developer tools (e.g.\
    \ git). Strong technical problem-solving skills, able to understand technical\
    \ systems using a variety of methods. These include reading/writing code, reading\
    \ documentation or partner specifications, debugging, asking well-formed questions\
    \ to domain experts, or digging into raw data. Excellent written and verbal communication\
    \ across technical and non-technical audiences. A strong interest in understanding\
    \ the root cause of issues and building a durable solution. Preferred qualifications\
    \ Experience with accounting, financial reporting, and/or compliance domains.\
    \ Experience leveraging LLMs to streamline processes and reduce manual work. &nbsp;"
