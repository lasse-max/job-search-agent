  description_text: "ABOUT US At Sierra, we\u2019re creating a platform to help businesses\
    \ build better, more human customer experiences with AI. We are primarily an in-person\
    \ company based in San Francisco, with growing offices in Atlanta, New York, London,\
    \ Paris, Madrid, Munich, Singapore, Tokyo, and Sydney. We are guided by a set\
    \ of values that are at the core of our actions and define our culture: Trust,\
    \ Customer Obsession, Craftsmanship, Intensity, and Family. These values are the\
    \ foundation of our work, and we are committed to upholding them in everything\
    \ we do. Our co-founders are Bret Taylor https://www.linkedin.com/in/brettaylor/\
    \ and Clay Bavor https://www.linkedin.com/in/claybavor/. Bret currently serves\
    \ as Board Chair of OpenAI. Previously, he was co-CEO of Salesforce (which had\
    \ acquired the company he founded, Quip) and CTO of Facebook. Bret was also one\
    \ of Google's earliest product managers and co-creator of Google Maps. Before\
    \ founding Sierra, Clay spent 18 years at Google, where he most recently led Google\
    \ Labs. Earlier, he started and led Google\u2019s AR/VR effort, Project Starline,\
    \ and Google Lens. Before that, Clay led the product and design teams for Google\
    \ Workspace. WHAT YOU'LL DO - Build Enterprise-grade AI Agents: As an Agent PM\
    \ at Sierra, you will be responsible for partnering directly with our engineers\
    \ and customers to build and ship AI agents that handle thousands of customer\
    \ conversations a day. - Engage with Customers: In the role, you will engage with\
    \ all levels of our customers\u2019 businesses: - Discover and assess their requirements.\
    \ - Prepare and present demonstrations of Sierra\u2019s agent. - Address and overcome\
    \ technical challenges in the business process by working with technical counterparts.\
    \ - Develop and improve Sierra virtual agents to fit and anticipate our customers\u2019\
    \ needs and business processes. - Become trusted advisors and drive strategic\
    \ technical strategies for our customers. - Shape the Product Roadmap: Work with\
    \ Sierra\u2019s engineering and product development teams to scope and implement\
    \ new features essential to the success of your customers. WHAT YOU\u2019LL BRING\
    \ - 5-7+ years experience in product development of highly technical products.\
    \ - Past experience in Product Management or other similar product development\
    \ roles at or above the level of Senior Product Manager. - Experience crafting\
    \ and tailoring a message for potential customers, including executives. - Ability\
    \ to communicate highly technical concepts to both non-technical and technically\
    \ proficient audiences, including recent AI developments. - Degree in a technical\
    \ or related field, or equivalent professional experience. EVEN BETTER... - AI-related\
    \ experience (experience with product development for AI agents a plus). - Some\
    \ coding experience with React, Typescript, and Go. - MBA or equivalent professional\
    \ experience (while this is a product management role, you will have the opportunity\
    \ to lean into broader business roles). - Past roles that interface with end customers\
    \ to influence software development. OUR VALUES - Trust: We build trust with our\
    \ customers with our accountability, empathy, quality, and responsiveness. We\
    \ build trust in AI by making it more accessible, safe, and useful. We build trust\
    \ with each other by showing up for each other professionally and personally,\
    \ creating an environment that enables all of us to do our best work. - Customer\
