  description_text: "Since we opened our doors in 2009, the world of commerce has\
    \ evolved immensely, and so has Square. After enabling anyone to take payments\
    \ and never miss a sale, we saw sellers stymied by disparate, outmoded products\
    \ and tools that wouldn\u2019t work together. So we expanded into software and\
    \ started building integrated, omnichannel solutions \u2013 to help sellers sell\
    \ online, manage inventory, offer buy now, pay later functionality, book appointments,\
    \ engage loyal buyers, and hire and pay staff. Across it all, we\u2019ve embedded\
    \ financial services tools at the point of sale, so merchants can access a business\
    \ loan and manage their cash flow in one place. Afterpay furthers our goal to\
    \ provide omnichannel tools that unlock meaningful value and growth, enabling\
    \ sellers to capture the next generation shopper, increase order sizes, and compete\
    \ at a larger scale. Today, we are a partner to sellers of all sizes \u2013 large,\
    \ enterprise-scale businesses with complex operations, sellers just starting,\
    \ as well as merchants who began selling with Square and have grown larger over\
    \ time. As our sellers grow, so do our solutions. There is a massive opportunity\
    \ in front of us. We\u2019re building a significant, meaningful, and lasting business,\
    \ and we are helping sellers worldwide do the same. The Role Join the Square Account\
    \ Management team and help our merchants grow their business! The Account Management\
    \ team partners with high-value Australian business owners to help them get the\
    \ most from Square - offering tailored guidance to help merchants reach their\
    \ goals. As an Enterprise Strategic Account Manager on our Strategic team, you\u2019\
    ll be at the forefront of helping diverse, dynamic business owners thrive with\
    \ Square. Reporting to our Strategic Enterprise lead, your role is all about building\
    \ meaningful &amp; long-term partnerships with clients across different industries\u2014\
    understanding their unique needs, crafting innovative solutions, and championing\
    \ them within Square. In this role, you\u2019ll become a creative problem-solver,\
    \ finding ways to tailor our products to suit an array of complex business scenarios.\
    \ As a trusted advisor, you\u2019ll not only support clients day-to-day but also\
    \ uncover new growth opportunities, expanding partnerships and negotiating win-win\
    \ solutions that fuel their success. This is your chance to be a pivotal force\
    \ in your clients' journeys, advocating for them with decision-makers and turning\
    \ their challenges into achievements. You will also identify ways to expand Square's\
    \ reach with customers and act as an internal advocate for Square's highest-value\
    \ sellers. The ideal candidate will have worked in Enterprise account management,\
    \ consulting, partnerships or sales and will be well-versed in working with and\
    \ presenting to senior decision makers, including business owners, IT, finance\
    \ and operations. They will have experience managing projects with multiple company\
    \ partners on behalf of customers. Internally at Square, you will work in collaboration\
    \ with product, engineering, finance, implementation, marketing, legal and sales\
    \ to ensure successful establishment and growth of our customers. You Will Build\
    \ partnerships and establish lasting relationships with existing sellers to retain\
    \ and grow our presence with large upmarket organisations across retail, F&amp;B\
    \ and events Take full ownership of your managed book and oversee business prioritisation,\
    \ contracting, technology strategy and ongoing account management Discover the\
    \ challenges and aspiration of sellers within your book, using Square's platform\
    \ and product portfolio to enable their success through up-sell and cross-sell\
    \ opportunities Partner with sales colleagues to establish and grow newly on-boarded,\
    \ high-value sellers Be the \"voice of the seller\" curating analysis of product\
    \ performance from your managed book, and provide relevant feedback to inform\
    \ for product roadmap decision-making You Have 7+ years experience in account\
    \ management, business development, consulting, partnerships, or sales focused\
    \ on technical products, with significant experience managing enterprise-level\
    \ accounts Experience achieving revenue metric goals across both growth and retention\
