    \ forensics, ideally including macOS environments. Strong understanding of attacker\
    \ behaviors, investigation methodologies, evidence handling, and the MITRE ATT&CK\
    \ framework. Experience building incident response runbooks, forensic workflows,\
    \ tabletop exercises, and post-incident review practices. Ability to automate\
    \ investigative or response workflows using Python, Go, or similar languages.\
    \ Excellent written and verbal communication skills, with the ability to communicate\
    \ clearly with engineers, legal teams, executives, and other stakeholders. A calm,\
    \ methodical, and pragmatic approach, combined with a strong sense of ownership.\
    \ Experience mentoring others or helping build an incident response capability\
    \ is highly valued. Hiring Process Introduction call: 30 minutes Hiring Manager\
    \ interview: 30 minutes Technical panel: 60 minutes Culture and values discussion:\
    \ 30 minutes Reference checks Location: Paris, France Working model: Hybrid Scope:\
    \ Global Level: Senior / Staff"
