    product deliveries, you will empower teams to make confident, data-driven decisions.
    Ultimately, your work will directly influence how internal teams and external
    customers interact with our intelligence systems. The team / how they connect
    You will join a multidisciplinary team of approximately fifty specialists, including
    data engineers, data scientists, applied scientists, market insights professionals,
