  description_text: "ABOUT AIRWALLEX Airwallex is the only unified payments and financial\
    \ platform for global businesses. Powered by our unique combination of proprietary\
    \ infrastructure and software, we empower over 200,000 businesses worldwide \u2013\
    \ including Brex, Rippling, Navan, Qantas, SHEIN and many more \u2013 with fully\
    \ integrated solutions to manage everything from business accounts, payments,\
    \ spend management and treasury, to embedded finance at a global scale. Proudly\
    \ founded in Melbourne, we have a team of over 2,200 of the brightest and most\
    \ innovative people in tech across 26 offices around the globe. Valued at US$8\
    \ billion and backed by world-leading investors including T. Rowe Price, Visa,\
    \ Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and\
    \ Lone Pine Capital, Airwallex is leading the charge in building the global payments\
    \ and financial platform of the future. If you\u2019re ready to do the most ambitious\
    \ work of your career, join us. ATTRIBUTES WE VALUE We hire successful builders\
    \ with founder-like energy who want real impact, accelerated learning, and true\
    \ ownership. You bring strong role-related expertise and sharp thinking, and you\u2019\
    re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles.\
    \ You move fast with good judgment, dig deep with curiosity, and make decisions\
    \ from first principles, balancing speed and rigor. You're humble and collaborative;\
    \ turn zero\u2011to\u2011one ideas into real products, and you \u201Cget stuff\
    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. We are targeting this\
    \ role to be based in Singapore. About the team You will join the Global Treasury\
    \ Payment Network (GTPN) product team. GTPN is Airwallex\u2019s core money-movement\
    \ platform \u2013 it powers how customers collect money, manage treasury & liquidity,\
    \ and send payouts globally through accounts, wallets, FX and direct debit rails.\
    \ We are a highly collaborative and technical group responsible for building the\
    \ infrastructure that powers international money movement at Airwallex. The team\u2019\
    s impact stretches across our platform, enabling customers to move funds globally\
    \ at scale while directly supporting company growth targets and strategic priorities.\
    \ We value curiosity, customer obsession, and fast-paced, cross-functional execution.\
    \ As a team, we aim to craft reliable, scalable products, iterate rapidly, and\
    \ foster individual career growth through mentorship and learning opportunities.\
    \ What you'll do This strategic leadership role as a product leader gives you\
    \ full ownership of Airwallex\u2019s money movement infrastructure roadmap. You'll\
    \ drive strategy, assess and integrate new financial partners, and deliver infrastructure\
    \ products that support scale, speed, and enhanced reliability. You'll also drive\
    \ the construction of new rails in new markets, manage cards and e-wallet payouts,\
    \ and align with our company's mission of being the future of global banking.\
    \ As a product leader/director, you\u2019ll collaborate deeply with financial\
    \ partnership, engineering, commercial, and operations teams to solve complex\
    \ challenges and support ongoing product innovation. You\u2019ll manage and mentor\
    \ a high-performing team of Product Managers, act as the subject matter expert\
    \ for money movement within Airwallex, and champion fast iteration on product\
    \ launches and feature enhancements. Responsibilities - Own the full lifecycle\
    \ of global money movement infrastructure, from strategy and roadmap planning\
    \ to partner assessment, solution design, and delivery. - Leverage AI/ML insights\
    \ to optimize payment routing, reduce transaction costs, detect fraud, and improve\
    \ operational efficiency. - Communicate product strategy and prioritization with\
    \ conviction, informed by deep user research, market insights, and competitive\
    \ analysis. - Manage and mentor a high-performing team of Product Managers, driving\
    \ impactful outcomes in payments, settlements, and infrastructure projects. -\
    \ Collaborate with financial partners, engineering, operations, and commercial\
    \ teams to build scalable, reliable, and compliant infrastructure that supports\
    \ high-volume transactions and complex use cases. - Serve as a subject matter\
    \ expert, providing guidance and insights to stakeholders across business units.\
    \ - Rapidly iterate on new product launches, feature enhancements, and customer\
    \ feedback, continuously improving speed, cost-efficiency, and customer experience\
    \ in money movement and payment operations. WHO YOU ARE We're looking for people\
    \ who meet the minimum qualifications for this role. The preferred qualifications\
    \ are great to have, but are not mandatory. Minimum Requirements - Experience\
    \ in Product Management or Engineering, especially in platform/infrastructure\
    \ or in the technology domain, go-to-market propositions, product design, planning,\
    \ and development. - 3+ years of formal people management experience leading cross-functional\
    \ teams. - Proven ability to balance user needs and commercial strategy to drive\
    \ meaningful product growth. - Track record of taking products from ideation to\
    \ delivery at global scale. - Strong analytical skills, ability to solve complex\
    \ problems, and comfort with data-driven decision-making. - Ability to manage\
    \ tradeoffs between long-term product vision and short-term growth objectives.\
    \ - Success thriving in fast-paced, cross-functional teams delivering rapid execution.\
    \ - Flexibility to work across global time zones. - Exceptional English communication\
    \ skills, with the ability to clearly articulate product strategy to technical\
    \ and non-technical audiences. - Bachelor\u2019s degree in Computer Science, Engineering,\
    \ or a related field. Preferred qualifications - Experience in hyper-growth startup\
    \ environments, financial infrastructure, or technology domains. - Direct experience\
    \ building payments or money movement platforms, or working with card schemes\
    \ (especially in global scale environments) is strongly preferred. - Robust understanding\
    \ of money movement systems, ledgers, payments orchestration, or relevant workflows.\
    \ - Familiarity with risk management, compliance, and regulatory requirements\
    \ in fintech or payments. APPLICANT SAFETY POLICY: FRAUD AND THIRD-PARTY RECRUITERS\
    \ To protect you from recruitment scams, please be aware that Airwallex will not\
    \ ask for bank details, sensitive ID numbers (i.e. passport), or any form of payment\
    \ during the application or interview process. All official communication will\
    \ come from an @airwallex.com http://airwallex.com email address. Please apply\
    \ only through careers.airwallex.com http://careers.airwallex.com or our official\
    \ LinkedIn page. Airwallex does not accept unsolicited resumes from search firms/recruiters.\
    \ Airwallex will not pay any fees to search firms/recruiters if a candidate is\
    \ submitted by a search firm/recruiter unless an agreement has been entered into\
    \ with respect to specific open position(s). Search firms/recruiters submitting\
    \ resumes to Airwallex on an unsolicited basis shall be deemed to accept this\
    \ condition, regardless of any other provision to the contrary. EQUAL OPPORTUNITY\
    \ Airwallex is proud to be an equal opportunity employer. We value diversity and\
    \ anyone seeking employment at Airwallex is considered based on merit, qualifications,\
    \ competence and talent. We don\u2019t regard color, religion, race, national\
    \ origin, sexual orientation, ancestry, citizenship, sex, marital or family status,\
    \ disability, gender, or any other legally protected status when making our hiring\
    \ decisions. If you have a disability or special need that requires accommodation,\
    \ please let us know."
