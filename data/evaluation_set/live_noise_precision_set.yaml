  first_seen_at: '2026-06-25T00:04:51+00:00'
  source_url: https://careers.withwaymo.com/jobs?gh_jid=7458098
  description_text: "Waymo is an autonomous driving technology company with the mission\
    \ to be the world's most trusted driver. Since its start as the Google Self-Driving\
    \ Car Project in 2009, Waymo has focused on building the Waymo Driver\u2014The\
    \ World's Most Experienced Driver\u2122\u2014to improve access to mobility while\
    \ saving thousands of lives now lost to traffic crashes. The Waymo Driver powers\
    \ Waymo\u2019s fully autonomous ride-hail service and can also be applied to a\
    \ range of vehicle platforms and product use cases. The Waymo Driver has provided\
    \ over ten million rider-only trips, enabled by its experience autonomously driving\
    \ over 100 million miles on public roads and tens of billions in simulation across\
    \ 15+ U.S. states. The Software Quality Operations (SWQOPS) team is at the heart\
    \ of ensuring the safety, reliability, and quality of the Waymo Driver. Our mission\
    \ is to build an adaptable and scalable operation, increasingly powered by AI,\
    \ to deliver the crucial insights necessary to confidently deploy and grow Waymo's\
    \ autonomous vehicle service.&nbsp;&nbsp; Waymo is experiencing unprecedented\
    \ growth, rapidly expanding into new cities and launching new vehicle platforms.\
    \ SWQOps, particularly our Technical Specialists, are critical to this expansion,\
    \ enabling us to scale safely and efficiently. &nbsp; Why this team is Essential\
    \ to Waymo's Success: &nbsp; &nbsp; In this role you will: Partner with Engineering\
    \ to design, test, and deploy cutting-edge Machine Learning (ML) and Generative\
    \ AI (Gen-AI) models and tools to drive step-change improvements in issue discovery\
    \ &amp; detection, triage efficiency, and quality assurance. Leverage AI-powered\
    \ insights and traditional triage signals to proactively identify emerging on-road\
    \ issue trends, new risk scenarios, and edge cases. Develop and refine data-driven\
    \ strategies for issue discovery and monitoring, enhanced by ML model outputs\
    \ Serve as the key link between AI/ML development and operational execution. Define\
    \ and document new policies, guidelines, and Standard Operating Procedures (SOPs)\
    \ that integrate AI tools and insights into daily vendor workflows. Design and\
    \ implement robust quality control processes for both human and AI-generated outputs.\
    \ Perform meta-quality checks, validate the integrity of vendor work, and provide\
    \ feedback to improve both human and model performance. Act as the subject matter\
