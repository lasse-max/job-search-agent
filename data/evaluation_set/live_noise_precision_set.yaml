    \ environment, a deep understanding of and established relationships in Australia\u2019\
    s Telecommunications vertical. You will define the go-to-market strategy, influence\
    \ cross-functional teams, coach a high-performing team, and build long-term partnerships\
    \ that accelerate data-driven transformation in the telecommunications industry\
    \ in Australia. The impact you will have: Develop and execute the ANZ Telco growth\
    \ strategy, aligning with global priorities and local government regulations Build,\
    \ mentor, and scale a team of experienced Account Executives and Solution Strategists\
    \ dedicated to the Telco vertical. Create Trust-Based Relationships: Develop long-term,\
    \ executive-level relationships with customers, partners, and internal cross-functional\
    \ teams Drive forecast accuracy, resource planning, and sustainable growth through\
    \ disciplined execution and performance management. Foster a culture that reflects\
    \ our core values: customer obsession, data-driven decision-making, collaboration,\
    \ and accountability. Manage the Front-Line Voice of Databricks: Lead your team\
    \ to effectively communicate Databricks\u2019 value proposition through customer\
    \ interactions, presentations and proposal submissions Distil Customer Needs and\
    \ Value: Enable your team to understand their customer\u2019s commercial goals\
    \ and how they relate to the Databricks value proposition &nbsp; What we look\
    \ for: 10+ years of experience in sales leadership within the telco space, with\
    \ a record of driving double-digit growth. Established relationships with the\
    \ major telcos/service providers in Australia Proven experience leading teams\
    \ serving government or public sector clients within Cloud, SaaS, or Data Analytics\
    \ industries. Deep understanding of Australia\u2019s telco ecosystem, procurement\
    \ frameworks, and their wholesaler structure. Knowledge of machine learning and\
    \ IOT is preferred. Demonstrated success in building new markets, managing complex\
    \ sales cycles, and delivering business outcomes. Experience implementing value-based\
