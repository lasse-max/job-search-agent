  description_text: "Block is one company built from many blocks, all united by the\
    \ same purpose of economic empowerment. The blocks that form our foundational\
    \ teams \u2014 People, Finance, Counsel, Hardware, Information Security, Platform\
    \ Infrastructure Engineering, and more \u2014 provide support and guidance at\
    \ the corporate level. They work across business groups and around the globe,\
    \ spanning time zones and disciplines to develop inclusive People policies, forecast\
    \ finances, give legal counsel, safeguard systems, nurture new initiatives, and\
    \ more. Every challenge creates possibilities, and we need different perspectives\
    \ to see them all. Bring yours to Block. The Role Square services millions of\
    \ diverse merchants across four primary audiences. Trust (Risk/Identity) is at\
    \ the foundation of Square, we protect sellers and Square from bad actors while\
    \ enabling safe growth for businesses of all sizes. We're looking for someone\
    \ who is passionate about building seller trust, who understands the complex intersection\
    \ of risk, identity, and compliance, and can lead Square in scaling our unified\
    \ Trust and Safety solution globally. As Head of Product for Trust and Safety\
    \ you will be responsible for setting the Square-wide strategy for building and\
    \ maintaining seller trust across multiple time horizons. You'll be responsible\
    \ for strategic shifts across Risk and Identity product areas, unifying two organizations\
    \ into a cohesive force, and influence the entire Square ecosystem for the needs\
    \ of trust and seller protection. You'll need to understand and make tradeoffs\
    \ between seller access and ecosystem protection, between growth enablement and\
    \ fraud prevention, and be ultimately accountable for Risk Loss Rate, Seller Trust\
    \ metrics, and the health of the Square ecosystem. You Will Bring a Square-wide\
    \ perspective on Trust and Safety for strategic planning, ensuring trust considerations\
    \ are embedded across all seller-facing products and experiences. Unify the Risk\
    \ and Identity organizations, creating seamless experiences and shared platforms\
    \ that enable sellers to grow with confidence. Lead the product organization across\
    \ multiple product areas including Identity Verification, Risk Management, Disputes,\
    \ Fraud Prevention, Compliance, and Internal Tooling. Own the primary strategic\
    \ initiative to build and maintain trust with sellers throughout their lifecycle,\
    \ from onboarding through account management and remediation. Engage with external\
    \ partners including regulatory bodies, compliance teams, and identity verification\
    \ providers to build out strategic rationale for partnerships and integrations.\
    \ Drive accountability for Risk Loss Rate, Seller Trust metrics, Access expansion\
    \ for trusted sellers, and ecosystem health across all of Square's products. Deeply\
    \ understand regulatory requirements, compliance frameworks, and the fintech landscape\
    \ to shape the GTM and Product strategy for Trust and Safety. Prioritize work\
    \ across Risk and Identity product areas while influencing prioritization of trust\
    \ and compliance capabilities across Square products. Validate product strategies\
    \ through a combination of qualitative seller research, quantitative experimentation,\
    \ and regulatory analysis to ensure intended impact on both seller trust and fraud\
    \ prevention. Drive execution across multiple functions and organizations including\
    \ Product, Engineering, Compliance, Legal, and Operations to deliver on Trust\
    \ and Safety initiatives. You Have 8+ years of product management experience Experience\
    \ leading Product teams across multiple product areas Track record of successful\
    \ platform/infrastructure product development Experience with trust &amp; safety,\
    \ risk, identity, or compliance products Proven ability to drive cross-functional\
    \ alignment across large organizations Experience managing regulatory requirements\
    \ and compliance-driven product development Experience with payments or fintech\
    \ products Background in fraud prevention, identity verification, or KYC/AML Experience\
