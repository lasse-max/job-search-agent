    \ Labs. Earlier, he started and led Google\u2019s AR/VR effort, Project Starline,\
    \ and Google Lens. Before that, Clay led the product and design teams for Google\
    \ Workspace. WHAT YOU'LL DO - GTM technical expert: Design and demo Sierra\u2019\
    s incredible Agent product, offering technical solutions to solve for our customer\u2019\
    s needs, and answering technical questions about our solutions. - Cross-functional\
