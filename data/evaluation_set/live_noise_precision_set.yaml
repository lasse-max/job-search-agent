  source_url: https://jobs.ashbyhq.com/harvey/5f6f2bda-d222-4adf-b09c-13e5f2d78e2f
  description_text: "WHY HARVEY At Harvey, we\u2019re transforming how legal and professional\
    \ services operate. By combining frontier agentic AI, an enterprise-grade platform,\
    \ and deep domain expertise, we\u2019re reshaping how critical knowledge work\
    \ gets done for decades to come. This is a rare chance to help build a generational\
    \ company at a true inflection point. With 1500+ customers in 60+ countries, strong\
    \ product-market fit, and world-class investor support, we\u2019re scaling fast\
    \ and defining a new category in real time. The work is ambitious, the bar is\
    \ high, and the opportunity for growth \u2014 personal, professional, and financial\
    \ \u2014 is unmatched. Our team moves fast, takes ownership, and is deeply committed\
    \ to the mission \u2014 operating with intensity, staying close to our customers,\
    \ and pushing each other for excellence. We live by three values: Decisiveness,\
    \ Simplicity, and Job's Not Finished. We act quickly on clear judgment over perfect\
    \ information, we believe simplicity is what scales, and we're never satisfied\
    \ with where we are. If you want to do the best work of your career alongside\
    \ people who share that drive, we'd love to build with you. At Harvey, the future\
    \ of professional services is being written today \u2014 and we\u2019re just getting\
    \ started. ROLE OVERVIEW We\u2019re seeking an IT Operations Analyst to join our\
    \ Business Technology (BizTech) team and help deliver a seamless employee experience\
    \ through hands-on IT support in our London office. This role will be instrumental\
    \ in ensuring our employees have the tools and technology they need to be productive,\
    \ from their first day of onboarding through their entire lifecycle at Harvey.\
    \ You\u2019ll handle employee onboarding, lifecycle tasks, and aid employees with\
    \ technology issues and workplace technology (A/V). This is a role ideal for someone\
    \ with past experience in a fast-paced environment who is ready to make an impact.\
    \ WHAT YOU'LL DO - Create a great employee experience through hands-on IT support\
    \ for employees in our London office. - Support onboarding and offboarding, including\
    \ provisioning/deprovisioning accounts and setting up new hire equipment. - Troubleshoot\
    \ employee problems with applications, laptops, access, peripherals, printers,\
    \ video conferencing, and networking issues. - Assist with meeting room tech and\
    \ corporate events to ensure smooth hybrid meetings and high-quality A/V experiences.\
    \ - Manage user accounts, access, and security settings across Okta, Google Workspace,\
    \ Slack, and other SaaS tools. - Maintain IT asset inventory and coordinate hardware\
    \ repairs, upgrades, and procurement. - Assist with basic security best practices\
    \ and help enforce IT policies. - Collaborate with the IT team on automation,\
    \ documentation, and process improvements. - Identify and track recurring problems\
    \ and their root causes, working with system owners to solve them permanently.\
    \ WHAT YOU HAVE - Minimum 2+ years of IT support experience in a fast-paced startup\
    \ or tech environment. - Strong troubleshooting skills with macOS, Windows, and\
    \ mobile devices (iOS/Android). - Experience with Google Workspace, Okta (SSO/MFA),\
    \ Slack, and other SaaS tools. - A strong customer service mindset\u2014friendly,\
    \ patient, and proactive\u2014with a relentless focus on quality of experience.\
    \ - Familiarity with basic networking concepts (Wi-Fi, VPNs, firewalls, IP troubleshooting).\
    \ - Strong communication and stakeholder management skills, especially with non-technical\
