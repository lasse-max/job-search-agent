  job_posting_id: 3709
  stable_id: greenhouse:anthropic:4610158008
  company: Anthropic
  company_tier: 1
  role_title: Research Engineer / Scientist, Alignment Science - London
  department: AI Research & Engineering
  employment_type: ''
