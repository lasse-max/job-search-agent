    re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles.\
    \ You move fast with good judgment, dig deep with curiosity, and make decisions\
    \ from first principles, balancing speed and rigor. You're humble and collaborative;\
    \ turn zero\u2011to\u2011one ideas into real products, and you \u201Cget stuff\
    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. ABOUT THE TEAM As the\
    \ pioneers in our new Generative AI department, you will spearhead the development\
    \ of AI agents. These AI agents will transform the way we provide support and\
    \ automation solutions for both our internal teams and external customers. You'll\
    \ have the unique opportunity to shape the architecture and API design of cutting-edge\
    \ systems in support of our customers, automation, search, and data analysis.\
    \ Your role is crucial in driving innovation and setting the standard for future\
    \ developments in this exciting new field. WHAT YOU'LL DO As the staff engineer\
    \ in our new Generative AI department, you will define the technical and strategic\
    \ vision for next-generation AI solutions. By harnessing cutting-edge language\
    \ models, you will drive internal efficiency and transform user experience for\
    \ our customers. Your work will set the standard for AI engineering excellence,\
    \ paving the way for the next wave of intelligent products and services. This\
    \ role is based in Singapore. RESPONSIBILITIES: - Spearhead the creation of AI\
    \ solutions to enable growth and drive internal efficiency across the business.\
    \ - Design and implement robust API and system architecture for new AI applications.\
    \ - Assist in AI application roadmapping and strategy. - Collaborate effectively\
    \ with a diverse, cross-functional team to leverage existing AI technologies,\
    \ and research and implement new ones, to meet product goals. - Providing prompt\
    \ and effective solutions or workarounds in response to application issues or\
    \ software bugs, maintaining high client satisfaction. - Embrace the challenges\
