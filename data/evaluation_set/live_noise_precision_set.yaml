  description_text: "Risk Controlling Manager, Liquidity Risk (ILAAP) About the opportunity\
    \ We are seeking a Manager Risk Controlling to help us further develop and strengthen\
    \ our Risk Controlling function with a focus on the Internal Liquidity Adequacy\
    \ Assessment Process (ILAAP) and overall Liquidity Risk Management. As part of\
    \ the Risk Controlling team, you will lead the development, implementation, and\
    \ analysis of models for liquidity risk controlling, covering both regulatory\
    \ requirements (Pillar I) and internal methodologies. You will ensure that N26\
    \ maintains a robust liquidity position through advanced modelling, stress testing,\
    \ and expert methodological guidance. At N26, we are redefining banking through\
    \ technology and innovation. As a Risk Controlling Manager with a focus on ILAAP\
    \ and liquidity risk, you will have the opportunity to shape the future of risk\
    \ management in a fast-paced, forward-thinking environment. Join us and be part\
    \ of a team that values collaboration, innovation, and excellence. In this role,\
    \ you will: Lead the design, maintenance, and continuous improvement of the ILAAP\
    \ framework, ensuring it accurately reflects the firm's liquidity adequacy and\
    \ risk appetite. Develop and enhance advanced methodologies for measuring liquidity\
    \ risk, including internal liquidity maturity ladders, survival period analysis,\
    \ and intraday liquidity metrics. Spearhead the design and calibration of comprehensive\
    \ liquidity stress scenarios, identifying potential vulnerabilities and challenging\
    \ qualitative assumptions. Ensure full compliance with relevant European and German\
    \ regulatory requirements, such as MaRisk and EBA Guidelines on ILAAP, while overseeing\
    \ regulatory liquidity reporting standards. Establish and maintain the architectural\
    \ design of risk limits for liquidity and funding, providing expert advice on\
    \ limit calibration and remediation strategies. Lead initiatives to improve the\
    \ quality, governance, and lineage of core balance sheet data used in liquidity\
    \ risk and ILAAP calculations. Act as the primary methodological expert and project\
    \ lead for interactions with internal/external auditors and regulators (e.g.,\
    \ EBA, national central banks) regarding the adequacy and robustness of liquidity\
    \ risk practices &nbsp; What you need to be successful: Requirements Experience:\
    \ 5+ years in a Risk Controlling function or a top-tier consultancy (Big Four\
    \ or similar), with subject matter expertise in Liquidity Risk and ILAAP within\
    \ the banking sector. Comprehensive understanding of the ILAAP framework, maturity\
    \ transformation, and the design of liquidity-related KRIs. Soft Skills: Proven\
    \ ability to work autonomously, form robust judgments on complex risk profiles,\
    \ and interface confidently with senior stakeholders and regulators. Language:\
    \ Professional fluency in English. What Will Make You Stand Out Data Proficiency:\
    \ Advanced skills in SQL and Python to drive quantitative analysis and automated\
    \ insights. Governance: Practical experience with Data Governance and Data Quality\
    \ Management frameworks. Certifications such as CFA or FRM. Professional proficiency\
    \ in German is an advantage. What\u2019s in it for you: Accelerate your career\
    \ growth by joining one of Europe\u2019s most talked about disruptors \U0001F680\
    . Employee benefits that range from a competitive personal development budget,\
    \ work from home budget, discounts to fitness &amp; wellness memberships, language\
    \ apps and public transportation.&nbsp; As an N26 employee you will have access\
    \ to a Premium subscription on your personal N26 bank account. As well as subscriptions\
    \ for friends and family members.&nbsp;&nbsp;&nbsp;&nbsp; Additional day of annual\
    \ leave for each year of service.&nbsp;&nbsp; A high degree of autonomy and access\
    \ to cutting edge technologies - all while working with a friendly team of peers\
    \ of diverse nationalities, life experiences and family statuses.&nbsp; A relocation\
    \ package with visa support for those who need it. Who we are N26 has reimagined\
    \ banking for today\u2019s digital world. Technology and design empower everything\
    \ we do and it\u2019s how we are building the global banking platform the world\
    \ loves to use. We've eliminated physical branches, paperwork, and hidden fees\
    \ for an elegant digital experience and supreme savings. Giving people the power\
    \ to live and bank their way is what gets us out of bed in the morning and inspires\
    \ the work that we do.&nbsp; We are headquartered in Berlin with offices in multiple\
    \ cities across Europe, including Vienna and Barcelona, and a 1,500-strong team\
    \ of more than 80 nationalities. Sounds good? Apply now for this position. Equal\
    \ Opportunities: We recognize that our strength lies in our people and the varied\
    \ perspectives they bring to our workforce. We strive to build talented and diverse\
    \ teams to drive our business success and empower our people to reach their full\
    \ potential. We genuinely welcome and encourage applications from people of all\
    \ backgrounds, cultures, genders, sexual orientations, abilities, neurodiversities,\
    \ and ages. We're committed to creating an inclusive workspace where everyone\
    \ feels valued and respected, free from harassment and discrimination. If there's\
    \ anything you need to make the application process work for you, please let us\
    \ know by reaching out to candidate.exp@n26.com.&nbsp; Visit our website to learn\
    \ more about Diversity, Equity, &amp; Inclusion at N26. &nbsp;"
