    \ are seeking a highly skilled and experienced Staff Data Scientist to drive the\
    \ technical direction of our Payments Optimization team. This is a critical Individual\
    \ Contributor (IC) role that will focus on designing and implementing advanced\
    \ algorithms to optimize payments. You will act as a key strategic partner to\
    \ Product, Engineering, and Commercial leaders, identifying complex, unique opportunities\
    \ to improve payments performance and drive product adoption at scale. Responsibilities:\
    \ - Define and drive the technical strategy for multi-objective payments optimization,\
