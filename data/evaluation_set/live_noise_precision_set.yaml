    \ that sounds like you, let\u2019s build what\u2019s next. About the Role: We\
    \ are looking for a Product Finance Manager with strong accounting and financial\
    \ analysis skills to support our rapidly evolving product portfolio. This role\
    \ will partner closely with Product, Engineering, and Operations to design data\
    \ and accounting flows, improve reporting quality, and drive insights on revenue\
    \ and costs. Key Responsibilities: - Accounting & Policy - Define and maintain\
    \ accounting policies for new and existing products under IFRS; US GAAP knowledge\
    \ is a strong plus. - Translate business and product requirements into clear data,\
    \ accounting, and reporting requirements (both financial and management reporting).\
    \ - New Product Launch Support - Participate in product design and launch discussions\
