    \ of employees working globally across office and remote locations, with a culture\
    \ geared toward innovation, collaboration and impact. We\u2019ve been a distributed\
    \ team since day one, and many of our roles can be done remotely from the countries\
    \ where Cash App operates. No matter the location, we tailor our experience to\
    \ ensure our employees are creative, productive, and happy. The Role The North\
    \ American Mid-Market Account Management team at Cash App is responsible for driving\
    \ post-sales revenue to our commerce and payments product suite including buy\
    \ now pay later with Afterpay and pay now with Cash App Pay. We partner with mid-market\
    \ merchants to unlock access to the largest and most engaged network of next generation\
    \ consumers and drive bottom line results.&nbsp; We are looking for a high-energy,\
    \ dynamic and strategic Mid-Market Account Manager to build and execute the strategy\
