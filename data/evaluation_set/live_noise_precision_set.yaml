  description_text: "Since we opened our doors in 2009, the world of commerce has\
    \ evolved immensely, and so has Square. After enabling anyone to take payments\
    \ and never miss a sale, we saw sellers stymied by disparate, outmoded products\
    \ and tools that wouldn\u2019t work together. So we expanded into software and\
    \ started building integrated, omnichannel solutions \u2013 to help sellers sell\
    \ online, manage inventory, offer buy now, pay later functionality, book appointments,\
    \ engage loyal buyers, and hire and pay staff. Across it all, we\u2019ve embedded\
    \ financial services tools at the point of sale, so merchants can access a business\
    \ loan and manage their cash flow in one place. Afterpay furthers our goal to\
    \ provide omnichannel tools that unlock meaningful value and growth, enabling\
    \ sellers to capture the next generation shopper, increase order sizes, and compete\
    \ at a larger scale. Today, we are a partner to sellers of all sizes \u2013 large,\
    \ enterprise-scale businesses with complex operations, sellers just starting,\
    \ as well as merchants who began selling with Square and have grown larger over\
    \ time. As our sellers grow, so do our solutions. There is a massive opportunity\
    \ in front of us. We\u2019re building a significant, meaningful, and lasting business,\
    \ and we are helping sellers worldwide do the same. The Role As a Reseller &amp;\
    \ Channel Partnerships Manager at Square, you will be responsible for developing,\
    \ deploying, and managing partnerships that enrich our products and strengthen\
    \ our go-to-market motions to acquire sellers. This includes working closely with\
    \ cross-functional teams, like our Product, Marketing, Sales, Finance, and Legal\
    \ teams, to develop and drive a high-impact partnerships strategy. This is a critical\
    \ role on the Partnerships team. We are looking for an experienced partnerships\
    \ operator with a track record of leading complex channel partnerships end-to-end,\
    \ strong business, product acumen, the ability to work effectively cross-functionally\
    \ internally and externally, strong communication and interpersonal skills, and\
    \ a desire to drive significant growth of our business. This position reports\
    \ to Square's Partnerships Retail Vertical Lead and will support a key vertical\
    \ and GTM initiatives.&nbsp; &nbsp; You Will: Collaborate with Product and GTM\
    \ teams to develop and execute a holistic partner strategy, from partner integrations\
    \ that enhance Square\u2019s products to channel partners that drive new seller\
    \ acquisition&nbsp; Own and execute partnerships end-to-end, from business development\
    \ to partner launch and management Be accountable to KPI\u2019s and business objectives\
    \ each quarter Become an expert on Square's products, the market landscape, and\
    \ seller needs Determine and prioritize the appropriate mix of partner benefits,\
    \ incentives, and co-marketing + sales opportunities necessary to secure a lucrative\
    \ partnership deal Operate autonomously, being both a proactive executor and strategic\
    \ thinker Lead cross-functional initiatives with internal and external teams Advocate\
    \ for your partners while balancing Square\u2019s goals Qualifications 5+ years\
    \ of professional experience in the technology sector, including 3+ years in partnerships\
    \ at a technology company. Experience with API integrations and/or channel partnerships\
    \ is required. Proven ability to negotiate, sign, launch, and manage partnerships\
    \ from tactical, mid-size opportunities to complex, strategic partners Experience\
    \ growing and distributing new products with partners via compelling economic\
    \ incentives and close collaboration with internal and external sales and marketing\
    \ teams Highly entrepreneurial, proactive, and comfortable working in a fast-paced,\
    \ highly-matrixed environment with the ability to thrive under minimal guidance\
    \ Proven track record of working cross-functionally with various teams, managing\
    \ initiatives at scale, and delivering results Experience building and managing\
    \ relationships with senior business leaders, both internally and externally Able\
    \ to think and communicate creatively, thoughtfully, and with diverse technical\
    \ and non-technical groups, spanning all organizational levels Application Guidelines\
    \ Candidates may submit up to 9 active applications within a 60-day period. Reapplications\
    \ to the same role are accepted 90 days after a previous application has been\
    \ reviewed. Use of AI in Our Hiring Process We may use automated AI tools to evaluate\
    \ job applications for efficiency and consistency. These tools comply with local\
    \ regulations, including bias audits, and we handle all personal data in accordance\
    \ with state and local privacy laws.&nbsp; Contact us here &nbsp;with hiring practice\
    \ or data usage questions. Every benefit we offer is designed with one goal: empowering\
    \ you to do the best work of your career while building the life you want. Remote\
    \ work, medical insurance, flexible time off, retirement savings plans, and modern\
    \ family planning are just some of our offering.&nbsp; Check out our other benefits\
    \ at Block. Block, Inc. (NYSE: XYZ) builds technology to increase access to the\
    \ global economy. Each of our brands unlocks different aspects of the economy\
    \ for more people.&nbsp; Square &nbsp;makes commerce and financial services accessible\
    \ to sellers.&nbsp; Cash App &nbsp;is the easy way to spend, send, and store money.&nbsp;\
    \ Afterpay &nbsp;is transforming the way customers manage their spending over\
    \ time.&nbsp; TIDAL &nbsp;is a music platform that empowers artists to thrive\
    \ as entrepreneurs.&nbsp; Bitkey &nbsp;is a simple self-custody wallet built for\
    \ bitcoin.&nbsp; Proto &nbsp;is a suite of bitcoin mining products and services.\
    \ Together, we\u2019re helping build a financial system that is open to everyone.\
    \ Privacy Policy"
