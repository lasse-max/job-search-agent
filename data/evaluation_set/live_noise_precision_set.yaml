  source_url: https://jobs.ashbyhq.com/xero/2356d3d6-dec9-42ea-ad8e-8f85b374f5bd
  description_text: "The role / impact Xero is at a pivotal moment in APAC, and this\
    \ role sits right at the centre of it. As Head of Technical Innovation, you'll\
    \ own the external product delivery space end to end \u2014 deeply understanding\
    \ what accounting partners and small business customers need, shaping a clear\
    \ product strategy, and driving execution with a network of development partners\
    \ and cross-functional stakeholders across the region. Your work will directly\
    \ shape what Xero's partners and customers experience, translating technical capability,\
    \ AI advancements and real market insight into products and features that solve\
    \ meaningful problems. This is an individual contributor role with a leadership\
    \ mindset at its core. You'll build compelling business cases, develop prototypes\
    \ and proof-of-concepts, maintain Xero's competitive landscape across APAC markets,\
    \ and ensure every launch lands with the internal enablement and documentation\
    \ needed for success. From monitoring regulatory changes across APAC to influencing\
    \ senior stakeholders, you'll be the connective tissue between market opportunity\
    \ and product delivery. The team / how they connect You'll join the APAC Leadership\
    \ Team, a tight-knit group of 10 spread across Singapore and New Zealand, who\
    \ together run the APAC region. The team operates with a high degree of autonomy\
    \ and collaboration, working closely with the Regional Director and a broad range\
    \ of global functions to drive Xero's regional strategy. A culture crew keeps\
    \ the energy up with always-on learning, development initiatives, and the occasional\
    \ bit of fun along the way. The team is currently working on - Building and refining\
    \ the Practice Dream Suite roadmap for accounting partners, and the product suite\
    \ for SME customers across APAC - Establishing development partner relationships\
    \ and exploring grant and subsidy opportunities to grow the region's innovation\
    \ capability - Mapping the competitive landscape across APAC's primary, secondary\
    \ and tertiary markets to inform strategy and positioning - Laying the groundwork\
    \ for an Innovation Hub that will expand into a dedicated, growing team over the\
    \ next few years Where and how you can work This role is based in Singapore. While\
    \ there are no formal rules around office attendance, the expectation is that\
    \ you'll be a visible, active presence in the team \u2014 typically around two\
    \ days per week, with Mondays and Wednesdays as the team's boost days. Beyond\
    \ that, you have the flexibility to work in a way that suits both you and the\
    \ demands of the role. Here are some of the things we are looking for - You bring\
    \ hands-on product experience and a strong technical foundation, including working\
    \ knowledge of APIs and a practical understanding of AI and its applications -\
    \ A track record of translating complex technical concepts into clear, compelling\
    \ narratives for a range of stakeholders \u2014 from engineers to executives -\
    \ Deep familiarity with accounting practice workflows and operations, or the ability\
    \ to get across them quickly - Commercially sharp \u2014 you can identify scalable\
    \ opportunities, build solid business cases, and keep a keen eye on what's viable\
    \ in market - Confidence working cross-functionally and influencing without authority,\
    \ bringing people along rather than pushing them - An understanding of the APAC\
    \ market and regulatory landscape, particularly as it relates to tax, compliance,\
    \ and accounting Apply even if your experience isn't a perfect match! At Xero,\
    \ we hire based on your skills, passion, and the unique perspective you can bring\
    \ to enhance our culture and team."
