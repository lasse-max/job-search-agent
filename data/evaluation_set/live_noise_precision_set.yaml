  source_url: https://jobs.ashbyhq.com/airwallex/1dab9ee6-ceb3-4386-b06a-8c36741990d4
  description_text: "ABOUT AIRWALLEX Airwallex is the only unified payments and financial\
    \ platform for global businesses. Powered by our unique combination of proprietary\
    \ infrastructure and software, we empower over 200,000 businesses worldwide \u2013\
    \ including Brex, Rippling, Navan, Qantas, SHEIN and many more \u2013 with fully\
    \ integrated solutions to manage everything from business accounts, payments,\
    \ spend management and treasury, to embedded finance at a global scale. Proudly\
    \ founded in Melbourne, we have a team of over 2,200 of the brightest and most\
    \ innovative people in tech across 26 offices around the globe. Valued at US$8\
    \ billion and backed by world-leading investors including T. Rowe Price, Visa,\
    \ Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and\
    \ Lone Pine Capital, Airwallex is leading the charge in building the global payments\
    \ and financial platform of the future. If you\u2019re ready to do the most ambitious\
    \ work of your career, join us. ATTRIBUTES WE VALUE We hire successful builders\
    \ with founder-like energy who want real impact, accelerated learning, and true\
    \ ownership. You bring strong role-related expertise and sharp thinking, and you\u2019\
    re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles.\
    \ You move fast with good judgment, dig deep with curiosity, and make decisions\
    \ from first principles, balancing speed and rigor. You're humble and collaborative;\
    \ turn zero\u2011to\u2011one ideas into real products, and you \u201Cget stuff\
    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. ABOUT THE TEAM The\
    \ IT FinEng team is dedicated to building and optimizing Airwallex financial systems\
    \ and processes through innovative technology solutions, ensuring seamless integration\
    \ and support for our global corporate financial operations. We work closely with\
    \ Finance, Operations, and Corporate IT across the business to support the systems\
    \ that run our business. WHAT YOU\u2019LL DO We are seeking an IT engineer to\
    \ implement the optimization of our finance systems. Responsible for the architecture\
    \ and hands-on configuration of our financial infrastructure, you\u2019ll ensure\
    \ it is scalable, secure, and highly efficient. This role is based in Singapore,\
    \ Sydney or Melbourne. RESPONSIBILITIES: - System Architecture & Engineering:\
    \ Lead the technical design and implementation of finance systems, focusing on\
    \ ERP configuration, API integrations, and data pipeline management. - Technical\
    \ Optimization: Continuously improve system performance and reliability, automating\
    \ manual finance processes and enhancing data integrity across platforms. Drive\
    \ continuous improvement initiatives to enhance system performance, user experience,\
    \ and process efficiency. - Integration Management: Design, build and maintain\
    \ integrations between finance systems and other internal or external platforms.\
    \ - Escalated Technical Support: Act as the highest escalation point for complex\
    \ system issues, performing root cause analysis and implementing long-term technical\
    \ fixes. - Stakeholder Collaboration: Partner with the Finance team to translate\
    \ business requirements into technical specifications and executable code. - Security\
    \ & Compliance: Ensure all financial systems adhere to global security standards\
    \ and support audit requirements through automated logging and controls. - Reporting\
    \ and Documentation: Develop and maintain comprehensive technical documentation,\
    \ including system diagrams, integration maps, and technical \"how-to\" guides\
    \ for the broader finEng team. Being able to measure the project outcome metrics\
    \ and business impact. WHO YOU ARE We\u2019re looking for people who meet the\
    \ minimum qualifications for this role. The preferred qualifications are great\
    \ to have, but are not mandatory. MINIMUM QUALIFICATIONS: - Bachelor\u2019s degree\
    \ in Information Technology, Computer Science, Finance, or a related field. -\
    \ Strong technical knowledge of ERP systems and integration technologies. - Proven\
    \ ability to build integrations using APIs, middleware tools, lowcode platform\
    \ or scripting languages (e.g., Python, JavaScript). - Strong understanding of\
    \ finance and procurement processes and requirements. - Excellent problem-solving\
    \ skills and the ability to troubleshoot system issues. - Excellent communication\
    \ and interpersonal skills, with the ability to work collaboratively across departments.\
    \ - Strong time management skills \u2013 able to move fast with limited data and\
    \ context - Strong understanding of business processes \u2013 finance and tax\
    \ requirements in multiple jurisdictions is a bonus - Ability to identify and\
    \ address challenges proactively - Self-motivated and able to manage technical\
    \ projects from conception to deployment in a fast-paced environment. - Ability\
    \ to debate and discuss outcomes, flagging risks and problems early to varying\
    \ stakeholders. - Strong ability to manage through influence, building relationships\
    \ with key people and able to influence decisions to achieve the right outcomes\
    \ PREFERRED QUALIFICATIONS: - Relevant technical certifications (e.g., ERP certified\
    \ administrator/developer). - Experience working in a global fintech environment\
    \ with multi-jurisdictional tax and compliance requirements. APPLICANT SAFETY\
    \ POLICY: FRAUD AND THIRD-PARTY RECRUITERS To protect you from recruitment scams,\
    \ please be aware that Airwallex will not ask for bank details, sensitive ID numbers\
    \ (i.e. passport), or any form of payment during the application or interview\
    \ process. All official communication will come from an @airwallex.com http://airwallex.com\
    \ email address. Please apply only through careers.airwallex.com http://careers.airwallex.com\
    \ or our official LinkedIn page. Airwallex does not accept unsolicited resumes\
    \ from search firms/recruiters. Airwallex will not pay any fees to search firms/recruiters\
    \ if a candidate is submitted by a search firm/recruiter unless an agreement has\
    \ been entered into with respect to specific open position(s). Search firms/recruiters\
    \ submitting resumes to Airwallex on an unsolicited basis shall be deemed to accept\
    \ this condition, regardless of any other provision to the contrary. EQUAL OPPORTUNITY\
    \ Airwallex is proud to be an equal opportunity employer. We value diversity and\
    \ anyone seeking employment at Airwallex is considered based on merit, qualifications,\
    \ competence and talent. We don\u2019t regard color, religion, race, national\
    \ origin, sexual orientation, ancestry, citizenship, sex, marital or family status,\
    \ disability, gender, or any other legally protected status when making our hiring\
    \ decisions. If you have a disability or special need that requires accommodation,\
    \ please let us know."
