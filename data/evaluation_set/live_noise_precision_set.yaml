    \ meticulous, and enjoys engaging customers to investigate issues and deliver\
    \ insights. This role involves working closely with sales, technical account managers,\
    \ and operations teams to engage customers in product, payment, and technical\
    \ conversations. Responsibilities Partner closely with account executives and\
    \ technical account managers to support post-sale engagements focused on the optimization,\
    \ retention, and growth of enterprise customers Manage a book of customers to\
