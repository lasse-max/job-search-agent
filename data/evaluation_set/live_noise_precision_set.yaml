    \ to inform decisions and evaluate impact Work closely with engineering to ensure\
    \ a high bar for craft and implementation quality Contribute to shared patterns\
    \ and systems that help the broader Risk organization build with coherence Who\
    \ you are We're looking for someone who meets the minimum requirements to be considered\
