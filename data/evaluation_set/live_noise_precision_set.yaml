  description_text: "Company Description We\u2019re http://checkout.comCheckout.com\
    \ http://Checkout.com. You might not know our name, but companies like eBay, Spotify,\
    \ Klarna, Uber, and Sony do, because we\u2019re behind many of the digital experiences\
    \ you use every day. We are where the world checks out, enabling over 10 billion\
    \ transactions daily for more than one billion global shoppers. Whether you want\
    \ to book a holiday, order food, renew a subscription, or check out online, there\u2019\
    s a good chance our tech powers the payments behind the scenes. Our platform helps\
    \ the most ambitious businesses deliver effortless digital experiences, at scale.\
    \ If you want to do career-defining work, you\u2019ve come to the right place.\
    \ We move fast, think globally, and believe great teams are built by hiring exceptional\
    \ people with conviction, curiosity, and the desire to make an impact. With 20\
    \ offices across six continents and London as our HQ, we\u2019re shaping the future\
    \ of fintech \u2013 and we\u2019re just getting started. THE ROLE This role will\
    \ be responsible for supporting design & implementation of AI-enabled capabilities\
    \ across Checkout, while ensuring AI technologies are deployed in a safe, governed,\
    \ and resilient manner. The successful candidate will work closely with Engineering,\
    \ Data Governance, GRC, and business teams to embed security into AI systems,\
    \ assess AI-related risks, and help the organisation adopt AI securely at scale.\
    \ As a Cyber Security Engineer I, you will act as the bridge between cyber security\
    \ and emerging AI technologies. You will help shape how Checkout secures AI tools,\
    \ models, data pipelines, and supporting infrastructure, while also identifying\
    \ opportunities to use AI to strengthen cyber defence capabilities. This is a\
    \ hands-on role suited to someone who understands modern security engineering\
    \ and has a strong interest in AI/ML technologies, LLMs, automation, and risk\
    \ management. WHAT YOU\u2019LL BE RESPONSIBLE FOR - Design and implement security\
    \ controls for AI and machine learning solutions, including LLM-based applications,\
    \ model integrations, and supporting cloud infrastructure. - Assess the security,\
    \ privacy, and compliance risks associated with AI systems, including model misuse,\
    \ prompt injection, data leakage, insecure plugins, over-permissioned access,\
    \ and third-party AI services. - Develop standards, guardrails, and reference\
    \ architectures for the secure use of AI across the organisation. - Review AI\
    \ use cases, architectures, and deployments to ensure alignment with cyber security\
    \ policies, regulatory requirements, and internal governance expectations. - Build\
    \ and maintain monitoring, detection, and response capabilities for AI-related\
    \ threats and misuse scenarios. - Identify opportunities to use AI to enhance\
    \ cyber security operations, such as alert triage, threat analysis, playbook automation,\
    \ knowledge retrieval, and workflow optimisation. - Stay current on evolving risks,\
    \ attack techniques, regulations, and industry practices related to AI security\
    \ and AI governance (inline with EU AI Act, ISO42001) WHAT WE\u2019RE LOOKING\
    \ FOR - Experience in cyber security engineering, security architecture, or a\
    \ related security role. - Strong understanding of core security domains such\
    \ as identity and access management, cloud security, application security, data\
    \ protection, logging and monitoring, and incident response. - Knowledge of AI/ML\
    \ and LLM concepts, including model deployment patterns, APIs, embeddings, vector\
    \ stores, prompt handling, and common AI security risks. - Experience securing\
    \ cloud environments and modern development workflows in platforms such as AWS,\
    \ Azure, or GCP. - Familiarity with security risks relevant to AI systems, including\
    \ prompt injection, data exfiltration, insecure model access, supply chain risks,\
    \ model poisoning, and sensitive data exposure. - Experience conducting architecture\
    \ reviews, threat modelling, and security assessments for complex technical solutions.\
    \ - Ability to translate technical risk into clear, practical guidance for both\
    \ engineering and non-technical stakeholders. - Strong collaboration skills and\
    \ the ability to work across cyber security, engineering, data, legal, and business\
    \ teams. - A proactive mindset, with the ability to operate in a fast-moving area\
    \ where standards and best practices continue to evolve. Additional Information\
    \ Bring all of you to work We create the conditions for high performers to thrive,\
    \ through real ownership, fewer blockers, and work that makes a difference from\
    \ day one. Here, you\u2019ll move fast, take on meaningful challenges, and be\
    \ recognized for the impact you deliver. It\u2019s a place where ambition gets\
    \ met with opportunity, and where your growth is in your hands. We work as one\
    \ team, and we back each other to succeed. So whatever your background or identity,\
    \ if you\u2019re ready to grow and make a difference, you\u2019ll be right at\
    \ home here. It\u2019s important we set you up for success and make our process\
    \ as accessible as possible. So let us know in your application, or tell your\
    \ recruiter directly, if you need anything to make your experience or working\
    \ environment more comfortable. Life at Checkout.com http://Checkout.com We understand\
    \ that work is just one part of your life. Our hybrid working model offers flexibility,\
    \ with three days per week in the office to support collaboration and connection.\
    \ Curious about what it\u2019s like to be part of our team? Visit our Careers\
    \ Page https://www.checkout.com/careers to learn more about our culture, open\
    \ roles, and what drives us. For a closer look at daily life at Checkout.com http://Checkout.com,\
    \ follow us on LinkedIn https://www.linkedin.com/company/checkout/life/ and Instagram\
    \ https://www.instagram.com/checkout_com/"
