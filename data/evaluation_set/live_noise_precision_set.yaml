  description_text: "At Flix, we offer a tech-driven environment where innovation\
    \ meets real-world impact, with competitive pay, strong growth opportunities,\
    \ and a culture of collaboration and ownership. &nbsp; We're looking for a Senior\
    \ Product Analyst (m/f/d) to be the analytical backbone of our Customer Experience\
    \ stream in the demand division: one person, broad influence.[PZ1.1] You own how\
    \ we understand our customers as they move through the Flix journey, and you turn\
    \ that understanding into the opportunities the stream acts on. Product Owners\
    \ and CX stream leadership rely on your read of where customers progress, where\
    \ they drop, and where the value is. This is a role with a lot of whitespace.\
    \ The analytics practice in CX is early and the tooling is still settling, so\
    \ you will have real room to shape how product analytics works here rather than\
    \ slotting into a finished machine. That suits someone pragmatic and assertive\
    \ who wants the impact that comes with defining something, not someone who needs\
    \ a fully built environment on day one. About the Role Map and quantify how customers\
    \ move through the Flix journey end to end: where they progress, where they stall,\
    \ where they drop, and what those patterns mean for the business. This is the\
    \ spine of the role and the thing only you will own Identify and size the opportunities\
    \ that fall out of that picture; turn \"here is what customers do\" into \"here\
    \ is where we should act and what it is worth,\" and bring those recommendations\
    \ to product leadership with a clear point of view Set the analytics direction\
    \ for the stream: define the metrics that matter, decide what good measurement\
    \ looks like, and go deep yourself on the select topics where depth changes the\
    \ answer Design, implement, and analyze A/B tests and experiments with statistical\
    \ rigor, and frame the trade-offs so a Product Owner can make the call Build a\
    \ self-service analytics environment for CX so product teams can answer their\
    \ own questions: curated, trustworthy, documented data they can use without going\
    \ through you for every number Coach Product Owners to make better decisions.\
    \ Success is not that you ran every analysis; it is that the people around you\
    \ make sharper, better-evidenced calls, increasingly without you in the room About\
    \ You Proven track record influencing product and business decisions through quantitative\
    \ analysis in a high-growth e-commerce, consumer tech, SaaS, or mobility environment.\
    \ Comfortable owning a recommendation, not just presenting options Strong customer\
    \ journey and funnel analytics: activation, conversion, retention, drop-off, and\
    \ the behaviour behind them across 45+ markets Advanced SQL in Snowflake; confident\
    \ with at least one Business Intelligence and visualisation tool, e.g. Power BI\
    \ Strong statistical literacy (hypothesis testing, A/B and quasi-experimental\
    \ design) and experience reading a result honestly. Pragmatic about rigour, not\
    \ academic about it Ability to leverage AI tooling to accelerate high-quality\
    \ value delivery, treating it as a force multiplier rather than a novelty Strong\
    \ stakeholder enablement instincts: able to make data trustworthy, documented,\
    \ and genuinely self-serve for product and business partners, not just analysts,\
    \ including contributing to semantic layer and metric definitions alongside Data\
    \ and Product. Able to carry an executive audience Familiarity with product analytics\
    \ platforms (e.g. Amplitude, Mixpanel) is a plus; we are likely to invest here\
    \ and you would help shape how we use it. Exposure to conversational AI analytics\
    \ is a plus A pragmatic operator who wants to make an impact, not a researcher\
    \ who wants a clean problem. Assertiveness is required: you will hold a view,\
    \ push product teams, and bring order to a forming practice. A doctorate or heavily\
    \ academic profile is not what we are looking for Comfortable with ambiguity and\
    \ energised by building something that is not fully formed yet Fluent in English;\
    \ autonomous, entrepreneurial, hands-on; comfortable in a fast-paced, agile, multicultural\
    \ environment We recognize that everyone carries a unique set of valuable skills\
    \ and experiences. If you think you could have an impact even though you don't\
    \ meet 100% of the requirements, we still encourage you to apply. We want to hear\
    \ from you! &nbsp; What We Offer Travel perks : 12 free Flix vouchers + 12 discount\
    \ vouchers for friends &amp; family.&nbsp; Work from (M)Anywhere : Depending on\
    \ your role, work from another location for up to 60 days per year.&nbsp; Hybrid\
    \ work model : We are an office-first company, but we offer flexibility to balance\
    \ work and life.&nbsp; Wellbeing support : Access confidential 1:1 counselling,\
    \ courses, and stress management for yourself and up to four family members.&nbsp;\
    \ Learning &amp; Development : Take advantage of language classes, training courses,\
    \ and expert-led sessions to grow your skills.&nbsp; Mentoring Program : Connect\
    \ with experienced colleagues to gain insights and accelerate your career.&nbsp;\
    \ To view more local benefits specific to each office location, please check out\
    \ this link:&nbsp; Locations - Flix Career Why Join Flix? At Flix, we empower\
    \ our teams to push boundaries and shape the future of mobility. As we continue\
    \ to scale globally, we harness cutting-edge technology to make mobility smarter,\
    \ more sustainable, and more affordable. If you\u2019re looking for a place where\
    \ you can drive change and redefine how millions of people travel, Flix is the\
    \ place where you can lead your journey!&nbsp; &nbsp;"
