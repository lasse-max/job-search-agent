    \ and accelerate new business opportunities. Our mission is to increase the GDP\
    \ of the internet, and we have a staggering amount of work ahead. That means you\
    \ have an unprecedented opportunity to put the global economy within everyone's\
    \ reach while doing the most important work of your career. About the team The\
    \ Technical Account Management Support and Services team partners directly with\
    \ our largest and fastest-growing users, supporting them both proactively with\
    \ a consultation model, and reactively to solve their most complex issues, enabling\
    \ them to grow their business. We partner closely with sales to ensure we are\
    \ attaching the right support plans to the right users at the right time. We take\
    \ a user-first approach to how we operate, capturing user feedback on what we\
    \ need to offer to delight them and exceed all expectations. We operate with a\
    \ scaled proactive, preventative mindset to ensure our users have a seamless experience\
    \ with Stripe. What you'll do Stripe is looking for an experienced Sydney-based\
    \ leader to lead and grow the Technical Account Management Support and Services\
    \ team responsible for supporting our largest and most strategic users. The leader\
    \ will lead a high-performing team of TAMs who are motivated by improving the\
    \ lives of Stripe's user base. They will set the standard for strategic user partnership\
    \ and support, influencing globally, partnering closely with the go-to-market\
    \ organizations, product, engineering, and the support organization. They will\
    \ cultivate a user-first culture, with high accountability, collaboration, and\
    \ a scale mentality, a culture that embodies a coaching mindset to unlock potential.\
    \ This role will report to our Senior Manager of Technical Account Management.\
    \ Responsibilities \u2022 Deliver exceptional user experience for Stripe's most\
    \ strategic users. \u2022 Lead a team of highly experienced TAMs, building a measurable\
    \ operation that delivers strong operational results for users. \u2022 Work directly\
    \ with our largest users' leaders as a thought partner for key initiatives and\
    \ expansions. \u2022 Partner closely with senior stakeholders across product,\
    \ engineering, go-to-market, and support. \u2022 Invest in leading and growing\
    \ a great team and culture, where both new and tenured Stripes can thrive. \u2022\
    \ Obsess over delivering incredible user experiences. \u2022 Run this business\
    \ to successfully deliver revenue, user experience, user value, and scalability\
    \ goals for the users and Stripe. \u2022 Set the segment strategy, think globally\
    \ about metrics, and drive clear accountability for the business. Own the P&amp;L.\
    \ \u2022 Partner closely with global leadership to grow the business in a scalable\
    \ way, optimizing for user experience and balancing that with efficiency. \u2022\
    \ Lead the way on user experience for Stripe's Enterprise users, determine what\
    \ excellence looks like, and scale it beyond strategics. \u2022 Build a coaching\
    \ culture that unlocks Stripes' potential, remove roadblocks, and elevate opportunities\
    \ that will enable the business to scale more broadly. \u2022 Maintain metrics\
    \ and analysis of team performance, and provide regular reporting on team performance\
    \ in the form of written analysis and performance reports. \u2022 Transmit and\
    \ foster our values, serving as a beacon of Stripe's user-centric philosophy and\
