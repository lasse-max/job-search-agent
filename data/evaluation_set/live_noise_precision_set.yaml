  description_text: "About Mistral At Mistral AI, we believe in the power of AI to\
    \ simplify tasks, save time and enhance learning and creativity. Our technology\
    \ is designed to integrate seamlessly into daily working life. We democratize\
    \ AI through high-performance, optimized, open-source and cutting-edge models,\
    \ products and solutions. Our comprehensive AI platform is designed to meet enterprise\
    \ needs, whether on-premises or in cloud environments. Our offerings include le\
    \ Chat, the AI assistant for life and work. We are a dynamic, collaborative team\
    \ passionate about AI and its potential to transform society. Our diverse workforce\
    \ thrives in competitive environments and is committed to driving innovation.\
    \ Our teams are distributed between France, USA, UK, Germany and Singapore. We\
    \ are creative, low-ego and team-spirited. Join us to be part of a pioneering\
    \ company shaping the future of AI. Together, we can make a meaningful impact.\
    \ See more about our culture on https://mistral.ai/careers. Role Summary We\u2019\
    re assembling our founding design team to shape how developers and enterprises\
    \ interact with Koyeb and Mistral Cloud\u2014the next generation of AI and infrastructure\
    \ platforms\u2014for the next decade. At Mistral, we\u2019re not just designing\
    \ tools\u2014we\u2019re redefining how the world builds, deploys, and scales AI\
    \ and cloud-native applications. Your work will not only power our infrastructure\
    \ products but also be woven into Mistral Studio, our flagship AI production platform,\
    \ ensuring a seamless experience from model deployment to end-user applications.\
    \ If you\u2019re a designer at heart\u2014obsessed with craft, clarity, and creating\
    \ magical experiences for technical users\u2014let\u2019s talk. About Koyeb &\
    \ Mistral Cloud Koyeb and Mistral Cloud are high-performance, serverless platforms\
    \ for deploying AI inference, APIs, databases, and resource-intensive applications\
    \ across global infrastructure. We abstract away the complexity of Kubernetes,\
    \ instance management, and multi-region deployments, so developers can focus on\
    \ what matters: building and shipping fast. Your designs will bridge the gap between\
    \ raw infrastructure and the polished, user-friendly workflows of Mistral Studio,\
    \ enabling users to deploy, monitor, and scale AI with confidence. What you will\
    \ do Design end-to-end experiences for cloud and infrastructure products, from\
    \ onboarding to advanced workflows (e.g., Kubernetes cluster management, instance\
    \ provisioning, autoscaling, and monitoring). Prototype, iterate, and ship\u2014\
    fast. Turn complex technical concepts into intuitive, elegant interfaces that\
    \ feel inevitable. Collaborate deeply with engineering, product, and research\
    \ teams to balance user needs with technical constraints. Contribute to our design\
    \ system, ensuring consistency, accessibility, and craft (including motion and\
    \ data visualization) across all Mistral products. Solve for scale: Design for\
    \ both power users (DevOps, ML engineers) and newcomers, making infrastructure\
    \ management approachable without sacrificing depth. Integrate your work into\
    \ Mistral Studio, aligning infrastructure tools with our AI production platform\
    \ to create a unified, powerful user journey. Required Qualifications 7+ years\
    \ of product design experience, with a portfolio showcasing complex, technical\
    \ products (e.g., developer tools, cloud platforms, infrastructure, or AI workflows).\
    \ AI-first designer: Comfortable vibe coding, building interactive prototypes,\
    \ and even submitting PRs to ensure design quality and polish. Obsessed with craft\u2014\
    visual, interaction, and motion design. You sweat the details, from empty states\
    \ to error handling. User-centered design. You care more about solving real problems\
    \ than pixels. Independent, resourceful, and biased toward action. You thrive\
    \ in ambiguous, fast-moving environments. You make things happen. Experience with:\
    \ Designing for developers, DevOps, or infrastructure teams (Kubernetes, Docker,\
    \ CI/CD, or similar). Data-heavy interfaces (dashboards, logs, metrics, or observability\
    \ tools). AI/ML workflows (model deployment, inference, or cloud services). Clear\
    \ communicator with a low ego. You can explain technical trade-offs to non-technical\
    \ stakeholders and advocate for users. Joining our design team Founding team:\
    \ Help build the culture, processes, and design language that will define Mistral\u2019\
    s infrastructure and Studio products for years. Designing for good: Shape how\
    \ the world interacts with AI and cloud computing\u2014focusing on sovereignty,\
    \ transparency, and user empowerment. Zero-to-one impact: Design products from\
    \ scratch, not incremental tweaks. Builder energy: We\u2019re all makers at heart,\
    \ focused on shipping great experiences, not politics. Our hiring process Portfolio\
    \ review: Show us explorations and delivered work\u2014we care about how you think.\
    \ Take-home challenge: Tackle a real problem in our space. Team interviews: Chat\
    \ with design, engineering, and leadership. We\u2019re looking for collaborators,\
    \ not egos. Culture fit: We want people who want to be here\u2014who see Mistral\
    \ as more than a job. Next steps? Let\u2019s build the future of cloud, AI infrastructure,\
    \ and Mistral Studio together! \U0001F680"
