    \ Zone C: ($130,900 - $196,300) Zone D: ($123,400 - $185,200) Amounts listed above\
    \ include target variable compensation. We're working to build a more inclusive\
    \ economy where our customers have equal access to opportunity, and we strive\
    \ to live by these same values in building our workplace. Block is an equal opportunity\
    \ employer evaluating all employees and job applicants without regard to identity\
    \ or any legally protected class. We will consider qualified applicants with arrest\
