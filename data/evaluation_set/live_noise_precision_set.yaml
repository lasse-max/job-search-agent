  description_text: "At Snowflake, we are powering the era of the agentic enterprise.\
    \ To usher in this new era, we seek AI-native thinkers across every function who\
    \ are energized by the opportunity to reinvent how they work. You don\u2019t just\
    \ use tools; you possess an innate curiosity, treating AI as a high-trust collaborator\
    \ that is core to how you solve problems and accelerate your impact. We look for\
    \ low-ego individuals who thrive in dynamic and fast-moving environments and move\
    \ with an experimental mindset \u2014 who rapidly test emerging capabilities to\
    \ discover simpler, more powerful ways to deliver results. At Snowflake, your\
    \ role isn't just to execute a function, but to help redefine the future of how\
    \ work gets done. Snowflake partners, from System Integrators (SI), Cloud Service\
    \ Providers (CSP) and Technology Partners (ISV) are an integral part of Snowflake\
    \ business to help customers unlock Power of Snowflake AI Data Cloud. We are seeking\
    \ a highly motivated and proactive individual to drive the technical growth in\
    \ this Partner ecosystem. This role demands a technical expert capable of driving\
    \ success by aligning with key programs and significantly enhancing partner knowledge\
    \ of crucial product features. The candidate must effectively present to both\
    \ technical and executive audiences, utilising methods from whiteboarding to presentations\
    \ and demonstrations, to cultivating strong mind share among Snowflake Partners\
    \ across the ASEAN region. We require a candidate with a demonstrable history\
    \ of successful engagement with major partners and a proven ability to develop\
    \ technical champions within their organisations. Ideal candidates will possess\
    \ a deep understanding of the broader Platform ecosystem, including products and\
    \ the competitive landscape, enabling them to influence and serve as the partners'\
    \ trusted technical advisor. This role requires travel up to 30% within ASEAN\
    \ throughout the quarter to support partner engagement such as enablement, deal\
    \ support and marketing events AS A PARTNER SOLUTION ENGINEER, YOU WILL: - Collaborate\
    \ closely with Snowflake's Partner, Sales, and Solutions Engineering teams to\
    \ promote and implement optimal solutions with our partners. - Design and deliver\
    \ technical training, workshops, and certifications to upskill partner teams on\
    \ Snowflake architecture and best practices based on joint business goals. - Co-develop\
    \ industry-specific solutions and accelerators with partners (e.g., data migration\
    \ frameworks, industry data models, Power of N motions). Aligning Snowflake's\
    \ products to maximise impact on their service offerings. - Present at Snowflake\
    \ and Partner events, lead hackathons, and drive Snowflake awareness and adoption\
    \ within partner organisations. - Partner closely on strategic customer engagements,\
    \ collaborating with partners to define use cases, deliver compelling presentations,\
    \ execute successful Proofs of Concept (POCs), and ensure positive outcomes. -\
    \ Own the technology roadmap with the partners, to build and scale their Snowflake\
    \ practices with reference architectures and delivery methodologies. - Advocate\
    \ for partner and customer needs with Snowflake product teams. OUR IDEAL PARTNER\
    \ SOLUTION ENGINEER WILL HAVE: - Have 10+ years of relevant industry experience.\
    \ - Understanding of sales quota-bearing role requirements - Proven ability to\
    \ navigate ambiguity in a high-growth environment and take ownership to drive\
    \ results - Experience working with Global Systems Integrators, Regional System\
    \ Integrators, Cloud Service Providers and Technology Partners within the region.\
    \ - Developed data domain thought leadership within a partner community. - Deep\
    \ comprehension of Partner revenue models, industry priorities and challenges\
    \ they navigate. - Proven experience in designing and building highly scalable\
    \ data pipelines using Spark, Kafka to ingest data from various systems. - Strong\
    \ SQL and data warehousing fundamentals (cloud DW experience preferred) - Experience\
    \ with Snowflake Technology Partners that specialise in Data Engineering, Data\
    \ Science, Collaboration and Cyber Security. - Hands-on technical experience with\
    \ DevOps and CI/CD processes and tools, such as Azure DevOps, Jenkins, AWS CodePipeline,\
    \ and Google Cloud Build. - Strong experience with major cloud platforms and tooling,\
    \ especially Azure, AWS and Google Cloud. - Experience using Big Data or Cloud\
    \ integration technologies such as Azure Data Factory, AWS Glue, AWS Lambda, etc.\
    \ - Experience with AI/ML use cases is a plus. Snowflake is growing fast, and\
    \ we\u2019re scaling our team to help enable and accelerate our growth. We are\
    \ looking for people who share our values, challenge ordinary thinking, and push\
    \ the pace of innovation while building a future for themselves and Snowflake.\
    \ How do you want to make your impact? For jobs located in the United States,\
    \ please visit the job posting on the Snowflake Careers Site for salary and benefits\
    \ information: careers.snowflake.com http://careers.snowflake.com"
