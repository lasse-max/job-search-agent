    \ data technology (e.g. dbt, spark, containers, devops tooling, orchestration\
    \ tools, git, etc.) - Experience with AI, data science and machine learning technologies\
    \ People want to buy from people who understand them. Our Solution Engineers build\
    \ connections, relationships and trust with our customers that last. We love to\
    \ learn, are open to giving and receiving feedback and are passionate about making\
    \ our customers and each other successful. Think you have what it takes but not\
    \ sure that you tick every box above? Apply anyways! We value the broad range\
    \ of experience our teams bring to the table and believe our customers are more\
    \ successful because of it. Snowflake is growing fast, and we\u2019re scaling\
    \ our team to help enable and accelerate our growth. We are looking for people\
    \ who share our values, challenge ordinary thinking, and push the pace of innovation\
    \ while building a future for themselves and Snowflake. How do you want to make\
    \ your impact? For jobs located in the United States, please visit the job posting\
    \ on the Snowflake Careers Site for salary and benefits information: careers.snowflake.com\
    \ http://careers.snowflake.com"
