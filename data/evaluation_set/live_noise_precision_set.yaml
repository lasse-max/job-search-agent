    \ researchers, strategists, operations, data scientists, and marketers to shape\
    \ products from early strategy through launch and iteration. You'll be joining\
    \ the Risk team, which shapes how businesses get started on Stripe, build trust,\
    \ stay compliant, and grow with confidence. The work spans businesses of every\
