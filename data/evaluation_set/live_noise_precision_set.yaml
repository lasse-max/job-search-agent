    \ P&L inputs and pricing strategy - Data-driven decision making with clear success\
    \ metrics - Comfortable operating across product, engineering, sales, and compliance\
    \ HOW YOU WORK - Customer-obsessed with real merchant empathy - Clear communicator\
    \ across technical and non-technical audiences - High ownership with strong cross-functional\
    \ collaboration BONUS - Experience building PSP-agnostic vaults or forwarding\
