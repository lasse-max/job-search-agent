  description_text: "About the opportunity We are currently seeking an AFC Associate\
    \ / SAR Delegate (D\xE9clarant Tracfin) to join the French MLRO function on a\
    \ CDD/fixed-term basis (6 months). In this role, you will be responsible for coordinating\
    \ and taking ownership of key Anti-Financial Crime Operations activities, including\
    \ decision-making on matters such as: review AML-CFT investigations, support the\
    \ teams in charge of ongoing due diligence and EDD process (including decisions\
    \ on requests for information to the customer), as well as review and submission\
    \ of SARs. You will be the reference point of contact for our AFC and KYC Operations\
    \ team, you will support them with your guidance and participate in their upscaling.\
    \ &nbsp; In this role, you will: Review investigations made by the AFC Operations\
    \ department. Assist AFC Operations on their investigations. Oversee complex case\
    \ investigations, sanctions reviews, and other AFC related processes. Review and\
    \ submit SARs, ensuring quality according to Tracfin and ACPR expectations. Act\
    \ as D\xE9clarant Tracfin. Review complex Authority Requests. Provide individual\
    \ and collective guidelines to AFC operations analysts.&nbsp; Prepare necessary\
    \ templates for AFC Ops communication with customers. Implement and improve local\
    \ procedures based on the local regulatory challenges and the group\u2019s standard.\
    \ Coordination with other operational functions working on the French market.\
    \ What you need to be successful: Background:&nbsp; Graduated in law (Ecole de\
    \ droit/Master II) or from a Grande Ecole - or alike.&nbsp; A Bank Financial Crime\
    \ background, operational experience in an international setting and you are before\
    \ all an excellent investigator - you have experience in SAR drafting (having\
    \ a first experience in a \u2018d\xE9clarant Tracfin\u2019 role is a plus).&nbsp;\
    \ Professional experience gained in anti-financial crime, with at least 3 years\
    \ of experience.&nbsp; Proven experience in operational functions, including&nbsp;\
    \ investigation, and SAR drafting but also transaction monitoring, sanctions and\
    \ adverse media screening.&nbsp; Skills:&nbsp; In-depth knowledge of European\
    \ and French regulations on Financial Crime (KYC, AML, terrorism financing, fraud,\
    \ tax evasion, sanctions\u2026) Deep investigation skills Fluent in French and\
    \ English (spoken and written) Excellent communication skills and ability to work\
    \ with a wide variety of stakeholders Hardworking, strong team player, benevolent\
    \ and resilient Diligent and reliable, solution driven and committed, ability\
    \ to work under pressure Strong analytical, advisory skills, high quality standards\
    \ and attention to detail You should enjoy a fast-paced working environment, show\
    \ high willingness to learn&nbsp; You combine a supportive approach with consistently\
    \ high standards of quality Actively help yourself (and others) to be successful&nbsp;\
    \ Continuously learn and challenge the status quo&nbsp; Think globally, act locally\
    \ What\u2019s in it for you: Accelerate your career growth by joining one of Europe\u2019\
    s most talked about disruptors \U0001F680. Employee benefits that range from a\
    \ work from home budget, discounts to fitness &amp; wellness memberships, Swile\
    \ vouchers, public transportation, work from home/from abroad and more. As an\
