    \ development, with a focus on AI. - Experience building internal or customer-facing\
    \ products with LLMs. - Proficiency in Python. - Expertise in building efficient,\
    \ large-scale software systems. - Skill in writing high-quality, maintainable\
    \ code. - Experience in design and development of large-scale distributed, high\
