  description_text: "ABOUT AIRWALLEX Airwallex is the only unified payments and financial\
    \ platform for global businesses. Powered by our unique combination of proprietary\
    \ infrastructure and software, we empower over 200,000 businesses worldwide \u2013\
    \ including Brex, Rippling, Navan, Qantas, SHEIN and many more \u2013 with fully\
    \ integrated solutions to manage everything from business accounts, payments,\
    \ spend management and treasury, to embedded finance at a global scale. Proudly\
    \ founded in Melbourne, we have a team of over 2,200 of the brightest and most\
    \ innovative people in tech across 26 offices around the globe. Valued at US$8\
    \ billion and backed by world-leading investors including T. Rowe Price, Visa,\
    \ Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and\
    \ Lone Pine Capital, Airwallex is leading the charge in building the global payments\
    \ and financial platform of the future. If you\u2019re ready to do the most ambitious\
    \ work of your career, join us. ATTRIBUTES WE VALUE We hire successful builders\
    \ with founder-like energy who want real impact, accelerated learning, and true\
    \ ownership. You bring strong role-related expertise and sharp thinking, and you\u2019\
    re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles.\
    \ You move fast with good judgment, dig deep with curiosity, and make decisions\
    \ from first principles, balancing speed and rigor. You're humble and collaborative;\
    \ turn zero\u2011to\u2011one ideas into real products, and you \u201Cget stuff\
    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. Job Description: Airwallex\
    \ is a global payments fintech company transforming the way businesses move and\
    \ manage money globally. We have built a global financial infrastructure platform\
    \ to help businesses transact, collect and pay across 130+ countries and 50+ currencies,\
    \ without the constraints of the traditional global financial system. We've grown\
    \ to 19 global locations and have raised over US$800 million in funding. To support\
    \ our ambitious growth plans, we\u2019re looking for smart, collaborative and\
    \ passionate people who are looking to make a genuine impact. As an FIU Operations\
    \ Analyst, you will be responsible for conducting in\u2011depth account activity\
    \ reviews, supporting STR preparation and filing, and coordinating risk\u2011\
    based actions across multiple stakeholders. You will work on escalations from\
    \ TM, KYC, Channel and other Operations teams, as well as proactive investigations\
    \ driven by data and internal dashboards. This role is ideal for someone who is\
    \ curious about new typologies and products, comfortable dealing with ambiguity,\
    \ and excited to build expertise in new regulations, tools and jurisdictions.\
    \ Role: This role mainly focuses on transaction monitoring case handling. It reports\
    \ to the Financial Investigation Unit Operation Manager. Responsibilities: - Support\
    \ STR / SAR lifecycle: prepare investigation summaries, draft STR narratives,\
    \ populate regulator templates, and work with the MLRO / FIU to finalise filings\
    \ within required SLAs. - Conduct account activity reviews (AARs) on customers\
    \ escalated by TM, KYC, Banking Partners, or Compliance teams, including end\u2011\
    to\u2011end transaction analysis, KYC file review, open\u2011source research,\
    \ linked account investigation, comprehensive risk assessment, and formulating\
    \ recommendations. - Perform proactive investigations utilizing internal suspicious\
    \ dashboards, tools, and datasets to identify emerging financial crime patterns\
    \ and high-risk customer relationships. - Execute and coordinate risk controls\
    \ (transaction blocks, account freezes, offboarding, blacklisting, enhanced monitoring)\
    \ per internal policies and FIU guidance. - Maintain precise audit-ready investigation\
    \ records in internal systems, documenting decisions, rationale, evidence and\
    \ timelines comprehensively. - Partner with cross-functional teams (MLRO, FIU,\
    \ TM, KYC, Product, Data, Commercial) to resolve risk concerns, gather data and\
    \ align on customer outcomes. - Identify FIU Ops workflow gaps and inefficiencies,\
    \ proposing pragmatic enhancements to optimize processes and tools. - Participate\
    \ in AML/CTF and sanctions projects; track regulatory updates, share key insights\
    \ and build the team\u2019s in-house expertise. - Support transaction monitoring-related\
    \ and ad-hoc assignments as assigned by the Financial Crime Operations Manager.\
    \ Key Requirements: - A minimum of 5 years of relevant experience in AML Transaction\
    \ Monitoring, preferably within payments, fintech or banking environments with\
    \ exposure to HK, SG and MY markets; must have solid familiarity with common money\
    \ laundering schemes, sanctions compliance, risk-based compliance frameworks,\
    \ risk management practices, and other financial crime compliance requirements.\
    \ - Meticulous in drafting/reviewing STRs and maintaining audit-ready records;\
    \ familiar with the processes and details of STR submission in HK, SG and MY.\
    \ - Meticulous with good analytical skills, detail-oriented, a team player, proficient\
    \ in time management and able to represent Compliance in Group projects - Demonstrate\
    \ ability to effectively review and analyse data/situation and apply judgement\
    \ to resolve issues in a timely manner - Having substantial hands-on experience\
    \ on the following areas is a plus: - International, regional and local regulatory\
    \ knowledge/experience, AML and OFAC risk assessment of Process improvement initiatives\
    \ (KYC, CDD, etc.) - Policy & procedure development (Black/white list maintenance;\
    \ STR writing/review, etc.) - Alert clearing and investigations - Common AML Typology\
    \ Analysis - Vendor solutions in KYC - Transaction Monitoring, Case Management\
    \ or Sanction Compliance - Internet Financing or payment company risk and Compliance\
    \ - Excellent verbal and written communication in both Mandarin and English. -\
    \ Certifications preferred: CAMS, CFCS, ICA Advanced AML. APPLICANT SAFETY POLICY:\
    \ FRAUD AND THIRD-PARTY RECRUITERS To protect you from recruitment scams, please\
    \ be aware that Airwallex will not ask for bank details, sensitive ID numbers\
    \ (i.e. passport), or any form of payment during the application or interview\
    \ process. All official communication will come from an @airwallex.com http://airwallex.com\
    \ email address. Please apply only through careers.airwallex.com http://careers.airwallex.com\
    \ or our official LinkedIn page. Airwallex does not accept unsolicited resumes\
    \ from search firms/recruiters. Airwallex will not pay any fees to search firms/recruiters\
    \ if a candidate is submitted by a search firm/recruiter unless an agreement has\
    \ been entered into with respect to specific open position(s). Search firms/recruiters\
    \ submitting resumes to Airwallex on an unsolicited basis shall be deemed to accept\
    \ this condition, regardless of any other provision to the contrary. EQUAL OPPORTUNITY\
    \ Airwallex is proud to be an equal opportunity employer. We value diversity and\
    \ anyone seeking employment at Airwallex is considered based on merit, qualifications,\
    \ competence and talent. We don\u2019t regard color, religion, race, national\
    \ origin, sexual orientation, ancestry, citizenship, sex, marital or family status,\
    \ disability, gender, or any other legally protected status when making our hiring\
    \ decisions. If you have a disability or special need that requires accommodation,\
    \ please let us know."
