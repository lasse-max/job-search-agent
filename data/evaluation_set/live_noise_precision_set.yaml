  description_text: "About Mistral At Mistral AI, we believe in the power of AI to\
    \ simplify tasks, save time, and enhance learning and creativity. Our technology\
    \ is designed to integrate seamlessly into daily working life. We democratize\
    \ AI through high-performance, optimized, open-source and cutting-edge models,\
    \ products and solutions. Our comprehensive AI platform is designed to meet enterprise\
    \ needs, whether on-premises or in cloud environments. Our offerings include le\
    \ Chat, the AI assistant for life and work. We are a dynamic, collaborative team\
    \ passionate about AI and its potential to transform society. Our diverse workforce\
    \ thrives in competitive environments and is committed to driving innovation.\
    \ Our teams are distributed between France, USA, UK, Germany and Singapore. We\
    \ are creative, low-ego and team-spirited. Join us to be part of a pioneering\
    \ company shaping the future of AI. Together, we can make a meaningful impact.\
    \ See more about our culture on https://mistral.ai/careers. About The Job Mistral\
    \ AI is seeking Applied Scientists and Research Engineers to drive innovative\
    \ research and collaborate with clients on complex research projects. You will\
    \ develop SOTA models across different modalities such as text, image, and speech.\
    \ By developing novel methods and research ideas you will apply these models across\
    \ a diverse set of use cases and domains. Working cross-functionally with both\
    \ external and internal science, engineering, and product teams you will deliver\
    \ high-impact AI solutions that turn the needle. What you will do \u2022 Run pre-training,\
    \ post-training and deploy state of the art models on clusters with thousands\
    \ of GPUs. You don\u2019t panic when you see OOM errors or when NCCL feels like\
    \ not wanting to talk. \u2022 Generate and curate data for pre-training and post-training,\
    \ working on evaluations and making sure the model\u2019s performance beats expectations.\
    \ \u2022 Develop the necessary tools and frameworks to facilitate data generation,\
    \ model training, evaluation and deployment. \u2022 Collaborate with cross-functional\
    \ teams to tackle complex use cases using agents and RAG pipelines. \u2022 Manage\
    \ research projects and communications with client research teams. About you \u2022\
    \ You are fluent in English, and have excellent communication skills. You are\
    \ at ease explaining complex technical concepts to both technical and non-technical\
    \ audiences. \u2022 You\u2019re an expert with PyTorch or JAX. \u2022 You\u2019\
    re not afraid of contributing to a big codebase and can find yourself around independently\
    \ with little guidance. \u2022 You write clean, readable, high-performance, fault-tolerant\
    \ Python code. \u2022 You don\u2019t need roadmaps: you just do. You don\u2019\
    t need a manager: you just ship. \u2022 Low-ego, collaborative and eager to learn.\
    \ \u2022 You have a track record of success through personal projects, professional\
    \ projects or in academia. It would be great if you \u2022 Hold a PhD / master\
    \ in a relevant field (e.g., Mathematics, Physics, Machine Learning), but if you\u2019\
    re an exceptional candidate from a different background, you should apply. \u2022\
    \ Can bring a variety of research experience (agents, multi-modality, robotics,\
    \ diffusion, time-series). \u2022 Have contributed to a large codebase used by\
    \ many (open source or in the industry). \u2022 Have a track record of publications\
    \ in top academic journals or conferences. \u2022 Love improving existing code\
    \ by fixing typing issues, adding tests and improving CI pipelines. Benefits We\
