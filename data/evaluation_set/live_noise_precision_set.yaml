    \ Car Project in 2009, Waymo has focused on building the Waymo Driver\u2014The\
    \ World's Most Experienced Driver\u2122\u2014to improve access to mobility while\
    \ saving thousands of lives now lost to traffic crashes. The Waymo Driver powers\
    \ Waymo\u2019s fully autonomous ride-hail service and can also be applied to a\
    \ range of vehicle platforms and product use cases. The Waymo Driver has provided\
    \ over ten million rider-only trips, enabled by its experience autonomously driving\
    \ over 100 million miles on public roads and tens of billions in simulation across\
    \ 15+ U.S. states. Waymo Operations exists to deliver the Waymo Driver to the\
    \ world. We are a global team building and scaling the world's first and leading\
    \ autonomous fleet and operations platform. From component sourcing to end customer\
    \ management, we enable and create value for Waymo through scaled and orchestrated\
    \ deployment of the Waymo Driver. At Waymo, we are dedicated to building a culture\
    \ that promotes collaboration and celebration. We value our team members' unique\
    \ backgrounds, perspectives, and experiences and support and encourage all team\
    \ members to share their ideas to help Waymo better serve the communities in which\
    \ we operate. In this hybrid role, you will report to the Head of Global Fleet\
    \ Operations &nbsp; You will: Direct the operational rhythm of maintenance partners\
    \ by leading daily readiness stand-ups and weekly performance reviews to track\
    \ KPIs, resolve blockers, and ensure accountability for corrective actions. Drive\
    \ partner accountability through rigorous monitoring of performance dashboards\
    \ and scorecards to identify underperformance trends, deploy corrective actions,\
    \ and manage centralized cost performance against budget targets. Serve as the\
    \ primary escalation lead by driving end-to-end resolution of vendor issues, utilizing\
    \ a centralized tracker to identify root causes and implement permanent corrective\
    \ actions to prevent recurrence. Govern operational integrity by maintaining all\
    \ partner SOPs and playbooks, ensuring strict vendor adherence to the latest Waymo\
    \ standards through robust change control for all process and tool updates. Elevate\
