  description_text: "ABOUT AIRWALLEX Airwallex is the only unified payments and financial\
    \ platform for global businesses. Powered by our unique combination of proprietary\
    \ infrastructure and software, we empower over 200,000 businesses worldwide \u2013\
    \ including Brex, Rippling, Navan, Qantas, SHEIN and many more \u2013 with fully\
    \ integrated solutions to manage everything from business accounts, payments,\
    \ spend management and treasury, to embedded finance at a global scale. Proudly\
    \ founded in Melbourne, we have a team of over 2,200 of the brightest and most\
    \ innovative people in tech across 26 offices around the globe. Valued at US$8\
    \ billion and backed by world-leading investors including T. Rowe Price, Visa,\
    \ Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and\
    \ Lone Pine Capital, Airwallex is leading the charge in building the global payments\
    \ and financial platform of the future. If you\u2019re ready to do the most ambitious\
    \ work of your career, join us. ATTRIBUTES WE VALUE We hire successful builders\
    \ with founder-like energy who want real impact, accelerated learning, and true\
    \ ownership. You bring strong role-related expertise and sharp thinking, and you\u2019\
    re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles.\
    \ You move fast with good judgment, dig deep with curiosity, and make decisions\
    \ from first principles, balancing speed and rigor. You're humble and collaborative;\
    \ turn zero\u2011to\u2011one ideas into real products, and you \u201Cget stuff\
    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. About the Team The\
    \ Financial Crime Compliance (FCC) team at Airwallex is a strategically vital\
    \ function operating under a clear Three Lines of Defence model. As the independent\
    \ second line, FCC owns the global AML/CTF programme, sanctions framework, risk\
    \ assessment methodology, and governance infrastructure across all global entities.\
    \ As Airwallex scales into new markets and deepens its engagement with global\
    \ regulatory bodies, we are building a world-class compliance organization capable\
    \ of managing complex financial crime risks at scale. This is an environment where\
    \ you will tackle high-impact challenges, shape global fintech risk strategies,\
    \ and help establish foundations for long-term growth. What you'll do As Director,\
    \ FCC Monitoring & Testing, you will shape and scale Airwallex\u2019s global financial\
    \ crime compliance monitoring and testing framework, establishing a rigorous,\
    \ data-driven second-line assurance function. You will lead a high-performing\
    \ global team to independently validate the design and operating effectiveness\
    \ of AML, Sanctions, and KYC/KYB controls across all production environments and\
    \ establish a monitoring framework and associated metrics to support executive\
    \ decisioning and ongoing maintenance of program and control operating effectiveness.\
    \ You will work closely with the broader FCC organization, Product, Engineering,\
    \ Operations, and regional leadership to turn testing insights into operational\
    \ accountability, robust remediation, and a defensible compliance posture before\
    \ global regulators and institutional banking partners. This role has a global\
    \ mandate and can be based in the US or EMEA. Responsibilities: - Lead the strategic\
    \ development, execution, and continuous evolution of Airwallex\u2019s Global\
    \ FCC Monitoring & Testing Programme, establishing robust, risk-based testing\
    \ methodologies and annual plans for independent second-line assurance. - Design\
    \ comprehensive testing frameworks to validate core compliance controls across\
    \ customer onboarding, periodic reviews, sanctions screening, transaction monitoring,\
    \ and regulatory reporting workflows, ensuring coverage keeps pace with product\
    \ and market expansion. - Oversee the ongoing FCC monitoring program, including\
    \ establishment of KPIs and operating effectiveness metrics, and coordinating\
    \ with the Head of FCC and AML & Sanctions Governance and Policy Lead to ensure\
    \ transparency and escalation as appropriate within the FCC Governance & Risk\
    \ Management Framework - Advance the transition from traditional sample reviews\
    \ toward continuous, data-enabled assurance by leveraging data analytics, system\
    \ logs, and automated testing scripts to evaluate compliance control performance\
    \ at the population level. - Oversee the independent validation of system-encoded\
    \ controls, including transaction monitoring thresholds, screening logic, and\
    \ customer risk-rating models, ensuring systems function as intended without logic\
    \ drift or hidden control gaps. - Translate complex testing outcomes and thematic\
    \ trends into clear, decision-useful reporting for executive leadership and governance\
    \ forums, providing constructive challenge to stakeholders and tracking the root-cause\
    \ remediation of control deficiencies. - Represent the FCC monitoring and testing\
    \ function during regulatory examinations, internal or external audits, and banking\
    \ partner reviews, confidently defending testing methodologies and control evidence\
    \ while scaling a technically fluent global team. Who you are We're looking for\
    \ people who meet the minimum requirements for this role. The preferred qualifications\
    \ are great to have, but are not mandatory. Minimum qualifications: - Bachelor\u2019\
    s degree in Finance, Accounting, Law, Information Systems, Business Administration,\
    \ or a related quantitative/analytical discipline. - CAMS certification or an\
    \ ICA International Diploma in Governance, Risk, and Compliance (or equivalent\
    \ professional credential). - 12 to 15+ years of experience within FCC quality\
    \ assurance, compliance monitoring, internal audit, or a related second/third-line\
    \ control function inside a fintech, payments, or highly regulated banking environment.\
    \ - At least 5+ years leading a global or multi-jurisdictional monitoring, testing,\
    \ or control validation function at a senior level. - Deep technical knowledge\
    \ of financial crime controls across transaction monitoring, sanctions/PEP screening,\
    \ customer due diligence, and digital KYC/KYB workflows. - Proven mastery of risk-based\
    \ testing methodologies, including scoping, sampling, design and operating effectiveness\
    \ assessments, issue writing, and remediation validation. - A high-ownership,\
    \ pragmatic approach, with excellent written communication and stakeholder management\
    \ skills to challenge senior partners constructively and drive operational accountability.\
    \ Preferred qualifications: - Advanced degree such as an MBA, Master\u2019s in\
    \ Regulatory Compliance, Risk Management, or a related field. - Professional assurance\
    \ or audit certifications such as CAMS-Audit, CISA, or CIA. - Deep fintech and\
    \ platforms experience, including exposure to cloud-native, API-driven, high-growth\
    \ global environments with significant cross-border transaction volume. - Strong\
    \ data literacy, including comfort using SQL, Python, BI dashboards, or automated\
    \ tools to support continuous control validation and population-based testing.\
    \ - Experience partnering directly with Product, Data Science, and Engineering\
    \ teams to validate automated rules, model-driven controls, and rapid deployments\
    \ within an agile product lifecycle. APPLICANT SAFETY POLICY: FRAUD AND THIRD-PARTY\
    \ RECRUITERS To protect you from recruitment scams, please be aware that Airwallex\
    \ will not ask for bank details, sensitive ID numbers (i.e. passport), or any\
    \ form of payment during the application or interview process. All official communication\
    \ will come from an @airwallex.com http://airwallex.com email address. Please\
    \ apply only through careers.airwallex.com http://careers.airwallex.com or our\
