    \ such as MRO, Facilities Management, etc.) for Hello Fresh\u2019s European production\
    \ sites and offices. The role will also be supporting initiatives targeted to\
    \ increase the maturity level of Indirect Procurement\u2019s processes and systems\
    \ landscape. As part of the Operations Procurement team the position will report\
    \ to the respective cluster lead (Director level). We are looking for an ambitious,\
    \ confident, entrepreneurial, and high-spirited Procurement professional with\
    \ a strength for data processing, optimisation &amp; reporting, ability to navigate\
    \ ambiguity, attention to detail and great stakeholder management ability. What\
    \ you\u2019ll do Conduct detailed spend analysis and benchmarking, evaluate market\
    \ and competitive conditions, and use as a basis to create data based category\
    \ strategies and sourcing activities Align and execute a sourcing roadmap with\
    \ key stakeholders in the HQ and the local markets to deliver P&amp;L savings\
    \ and overall procurement value Develop and optimize the supplier portfolio across\
    \ Hello Fresh\u2019s markets Cultivate and manage close (senior level) relationships\
    \ with business partners within Operations to support their objectives and the\
    \ company growth agenda Act as the central point of contact for any Ops Procurement\
    \ related questions Design and maintain category reporting to senior executives\
    \ and internal stakeholders Lead or participate in the implementation of best-in-class\
    \ procurement processes and tools What you\u2019ll bring The Sr. Indirect Procurement\
    \ role will oversee a broad range of categories, including CapEx, Material Handling\
    \ Equipment, Utilities, MRO, and Facilities Management. Candidates should bring\
    \ solid experience across several of these areas; the wider the category exposure,\
    \ the stronger the profile. Proven hands-on experience in at least some of these\
    \ categories is essential. Experience within European markets is a key requirement\
    \ for this role. Minimum of 7 years experience in indirect Procurement. Degree\
    \ in Engineering is preferable (but no mandatory) Deep knowledge of strategic\
    \ sourcing methodology, category management, and supplier management Excellent\
    \ analytical skills, attention to detail, and enjoy working independently Experience\
    \ in spend and market analyses as well as benchmarking with focus on european\
    \ markets. Strong written and verbal communication skills, including preparing\
    \ and delivering presentations and reports Outstanding interpersonal skills with\
    \ proven ability to build trust and credibility with business partners Demonstrated\
    \ change management and project management knowledge Readiness to frequently travel\
    \ nationally/abroad to our sites Fluency in business English, additional German\
    \ language skills are a plus&nbsp; * Please submit your resume in English. What\
    \ we offer Elevate your lifestyle! Join one of Europe's fastest-growing tech powerhouses\
    \ in a dynamic phase of expansion. Initially we offer 2 years contract.&nbsp;\
    \ Immerse yourself in a diverse global community of 90+ nationalities. Enjoy a\
    \ competitive compensation package that goes beyond the norm, with perks like\
    \ a HelloFresh- subsidized Pension Scheme, Berlin relocation support, and a Hybrid\
    \ working model. Elevate your lifestyle with exclusive discounts on your weekly\
