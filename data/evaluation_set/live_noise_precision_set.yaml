  description_text: "ABOUT US At Sierra, we\u2019re creating a platform to help businesses\
    \ build better, more human customer experiences with AI. We are primarily an in-person\
    \ company based in San Francisco, with growing offices in Atlanta, New York, London,\
    \ Paris, Madrid, Munich, Singapore, Tokyo, and Sydney. We are guided by a set\
    \ of values that are at the core of our actions and define our culture: Trust,\
    \ Customer Obsession, Craftsmanship, Intensity, and Family. These values are the\
    \ foundation of our work, and we are committed to upholding them in everything\
    \ we do. Our co-founders are Bret Taylor https://www.linkedin.com/in/brettaylor/\
    \ and Clay Bavor https://www.linkedin.com/in/claybavor/. Bret currently serves\
    \ as Board Chair of OpenAI. Previously, he was co-CEO of Salesforce (which had\
    \ acquired the company he founded, Quip) and CTO of Facebook. Bret was also one\
    \ of Google's earliest product managers and co-creator of Google Maps. Before\
    \ founding Sierra, Clay spent 18 years at Google, where he most recently led Google\
    \ Labs. Earlier, he started and led Google\u2019s AR/VR effort, Project Starline,\
    \ and Google Lens. Before that, Clay led the product and design teams for Google\
    \ Workspace. WHAT YOU'LL DO - Start Selling - On day zero, you will be a player/coach.\
    \ Prospect, build pipeline, manage customers, and close deals, We're looking for\
    \ candidates who are coming from a leadership role, but are open to getting their\
    \ hands dirty. - Lead & develop a high-performing sales team - Over the next year,\
    \ you will hire, onboard, and develop AEs across ANZ. Coach reps on deal strategy,\
    \ pipeline management, and execution. Create a culture of accountability, learning,\
    \ and collaboration. Identify and grow future leaders on your team - Own regional\
    \ performance - Own your regional number and forecast accuracy, Inspect pipeline\
    \ quality and help unblock stalled deals. Drive consistent execution of our sales\
    \ process. Partner with RevOps to ensure clean data and clear insights - Be deeply\
    \ involved in deals - Join key customer and prospect conversations. Help reps\
    \ navigate complex buying committees and late-stage deals. Support pricing, negotiation,\
    \ and close strategy WHAT YOU'LL BRING - 10- 15+ years of experience in an Enterprise\
    \ customer-facing sales role, identifying and closing large accounts. - People\
    \ Leadership Experience: 5+ years managing, mentoring, and developing a high performing\
    \ enterprise sales team. - Enterprise Experience: Experience managing a $1M+ quota,\
    \ and running end-to-end complex deals. - Strong Communication Skills: Exceptional\
    \ verbal and written communication abilities. - Analytical Mindset: Ability to\
    \ analyze market trends, identify opportunities, and make data-driven decisions.\
    \ EVEN BETTER... - Industry Knowledge: Familiarity with the AI landscape, key\
    \ players, and emerging trends. - Experience Building GTM Strategies: Building\
    \ sales teams and sales motions from scratch, or from early stage growth. OUR\
    \ VALUES - Trust: We build trust with our customers with our accountability, empathy,\
    \ quality, and responsiveness. We build trust in AI by making it more accessible,\
    \ safe, and useful. We build trust with each other by showing up for each other\
    \ professionally and personally, creating an environment that enables all of us\
    \ to do our best work. - Customer Obsession: We deeply understand our customers\u2019\
    \ business goals and relentlessly focus on driving outcomes, not just technical\
    \ milestones. Everyone at the company knows and spends time with our customers.\
    \ When our customer is having an issue, we drop everything and fix it. - Craftsmanship:\
