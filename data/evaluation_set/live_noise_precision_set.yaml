  description_text: "Who we are Helsing is a defence AI company. Our mission is to\
    \ protect our democracies. We aim to achieve technological leadership, so that\
    \ open societies can continue to make sovereign decisions and control their ethical\
    \ standards. &nbsp; As democracies, we believe we have a special responsibility\
    \ to be thoughtful about the development and deployment of powerful technologies\
    \ like AI. We take this responsibility seriously. &nbsp; We are an ambitious and\
    \ committed team of engineers, AI specialists and customer-facing programme managers.\
    \ &nbsp;We are looking for mission-driven people to join our European teams \u2013\
    \ and apply their skills to solve the most complex and impactful problems. We\
    \ embrace an open and transparent culture that welcomes healthy debates on the\
    \ use of technology in defence, its benefits, and its ethical implications. &nbsp;\
    \ The role At Helsing we deliver AI-based capabilities and the enabling foundation\
    \ that allow machines to perceive and assist human decision-making. You will have\
    \ the unique opportunity to shape AI capabilities in one of the most challenging\
    \ sectors, where high generalisation capabilities need to be paired with hardware\
    \ constraints and robustness against adversarial attacks. You will be part of\
    \ a computer vision team, where you will be responsible for building computer\
    \ vision models for object recognition and tracking, video understanding, scene\
    \ matching, etc. The day-to-day You will develop computer vision models and pipelines\
    \ that leverage and extend the latest state-of-the-art methods and architectures,\
    \ as well as design experiments and conduct benchmarks to evaluate and improve\
    \ their performance in real-world scenarios. You will also apply and develop techniques\
    \ to adapt them to the target hardware and constraints associated to the downstream\
    \ ML/AI tasks. You will contribute to impactful projects and will collaborate\
    \ with people across several teams and backgrounds. You should apply if you Hold\
    \ an MSc in computer science, machine learning, robotics or related field with\
    \ experience in conceptualising, implementing and thoroughly evaluating advanced\
    \ AI-based systems Have excellent communication skills and the ability to report\
    \ and present research findings clearly and efficiently both internally and externally\
    \ Are passionate about keeping up to date with current research and enjoy reimplementing\
    \ / extending papers on state of the art Deep Learning-based approaches Possess\
    \ solid software engineering skills , writing clean and well-structured code in\
    \ Python, and experience deploying AI software to production including testing,\
    \ QA, and monitoring Note: We operate at an intersection where women, as well\
    \ as other minority groups, are systematically &nbsp; under-represented. We encourage\
    \ you to apply even if you don\u2019t meet all the listed qualifications; ability\
    \ and impact cannot be summarised in a few bullet points. Nice to have PhD in\
    \ computer vision, machine learning, robotics, or related field and have authored\
    \ publications in top-tier journals and conferences (eg, CVPR, NeurIPS, ICLR,\
    \ ICCV, ICRA, IROS) Experience with object detection and categorisation, single\
    \ and multi-object tracking, scene understanding and matching, 3D computer vision.\
    \ Designed, developed, evaluated state of the art AI methods on edge devices with\
    \ limited compute resources and led their end-to-end product delivery Experience\
    \ with simulators, emulators, or synthetic data generators Experience with Rust\
    \ and/or C++ Join Helsing and work with world-leading experts in their fields\
    \ Helsing\u2019s work is important. You\u2019ll be directly contributing to the\
    \ protection of democratic countries while balancing both ethical and geopolitical\
    \ concerns. &nbsp; The work is unique. We operate in a domain that has highly\
    \ unusual technical requirements and constraints, and where robustness, safety,\
    \ and ethical considerations are vital. You will face unique Engineering and AI\
    \ challenges that make a meaningful impact in the world. &nbsp; Our work frequently\
    \ takes us right up to the state of the art in technical innovation, be it reinforcement\
    \ learning, distributed systems, generative AI, or deployment infrastructure.\
    \ The defence industry is entering the most exciting phase of the technological\
    \ development curve. Advances in our field of world are not incremental: Helsing\
    \ is part of, and often leading, historic leaps forward. &nbsp; In our domain,\
    \ success is a matter of order-of-magnitude improvements and novel capabilities.\
    \ This means we take bets, aim high, and focus on big opportunities. Despite being\
    \ a relatively young company, Helsing has already been selected for multiple significant\
    \ government contracts.&nbsp; &nbsp; We actively encourage healthy, proactive,\
    \ and diverse debate internally about what we do and how we choose to do it. Teams\
    \ and individual engineers are trusted (and encouraged) to practise responsible\
    \ autonomy and critical thinking, and to focus on outcomes, not conformity. At\
    \ Helsing you will have a say in how we (and you!) work, the opportunity to engage\
    \ on what does and doesn\u2019t work, and to take ownership of aspects of our\
    \ culture that you care deeply about. &nbsp; What we offer Competitive salary\
    \ and VSOP options Relocation support : up to \u20AC2,500 and 4 weeks temporary\
    \ accommodation Learning : \u20AC500/\xA3450 yearly allowance Health &amp; wellness\
    \ : gym membership and mental health support (Nilo.health) Social : regular company\
    \ events and monthly social allowances Enhanced parental leave : 22 weeks fully\
    \ paid for primary caregivers &amp; 6 weeks for secondary caregivers Family support:\
    \ 5 days of paid family emergency leave, 100% remote work option during pregnancy\
    \ and phased return to work These are the core benefits across all locations,\
    \ there may be additional benefits in certain locations. Helsing is an equal opportunities\
    \ employer. We are committed to equal employment opportunity regardless of race,\
    \ religion, sexual orientation, age, marital status, disability or gender identity.\
    \ Please do not submit personal data revealing racial or ethnic origin, political\
    \ opinions, religious or philosophical beliefs, trade union membership, data concerning\
    \ your health, or data concerning your sexual orientation &nbsp; Helsing's Candidate\
    \ Privacy and Confidentiality Regime can be found here .&nbsp; &nbsp; &nbsp;"
