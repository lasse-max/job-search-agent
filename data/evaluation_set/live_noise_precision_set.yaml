  description_text: "At Snowflake, we are powering the era of the agentic enterprise.\
    \ To usher in this new era, we seek AI-native thinkers across every function who\
    \ are energized by the opportunity to reinvent how they work. You don\u2019t just\
    \ use tools; you possess an innate curiosity, treating AI as a high-trust collaborator\
    \ that is core to how you solve problems and accelerate your impact. We look for\
    \ low-ego individuals who thrive in dynamic and fast-moving environments and move\
    \ with an experimental mindset \u2014 who rapidly test emerging capabilities to\
    \ discover simpler, more powerful ways to deliver results. At Snowflake, your\
    \ role isn't just to execute a function, but to help redefine the future of how\
    \ work gets done. We are looking for a Partner Solution Engineer who is accustomed\
    \ to working with Partners and Systems Integrators. In this role, you will work\
    \ directly with our consulting & SI partners, enabling them on key platform features\
    \ and their business benefits and helping them to grow their Snowflake services\
    \ business and shape their go-to-market. As a Snowflake Partner Solution Engineer,\
    \ you must share our passion for innovating through the AI Data Cloud, thrive\
    \ in a dynamic environment, and have the flexibility and willingness to jump in\
    \ and get things done. You are equally comfortable in both a business and technical\
    \ context, interacting with executives and inspiring technical audiences. IN THIS\
    \ ROLE YOU WILL GET TO: - Present Snowflake technology and vision to decision\
    \ makers and technical contributors at partners, prospects and customers - Work\
    \ hands-on with partners and customers to demonstrate and communicate the value\
    \ of Snowflake technology throughout the sales cycle - Build technical champions\
