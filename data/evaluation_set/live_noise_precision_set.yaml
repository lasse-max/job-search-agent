  description_text: "Company Description We\u2019re http://checkout.comCheckout.com\
    \ http://Checkout.com. You might not know our name, but companies like eBay, Spotify,\
    \ Klarna, Uber, and Sony do, because we\u2019re behind many of the digital experiences\
    \ you use every day. We are where the world checks out, enabling over 10 billion\
    \ transactions daily for more than one billion global shoppers. Whether you want\
    \ to book a holiday, order food, renew a subscription, or check out online, there\u2019\
    s a good chance our tech powers the payments behind the scenes. Our platform helps\
    \ the most ambitious businesses deliver effortless digital experiences, at scale.\
    \ If you want to do career-defining work, you\u2019ve come to the right place.\
    \ We move fast, think globally, and believe great teams are built by hiring exceptional\
    \ people with conviction, curiosity, and the desire to make an impact. With 20\
    \ offices across six continents and London as our HQ, we\u2019re shaping the future\
    \ of fintech \u2013 and we\u2019re just getting started. ABOUT THE TEAM The Account\
    \ Services Group owns the Customer. We sit at the heart of how merchants launch\
    \ on the Checkout Platform, owning the end-to-end journey from a Merchant's first\
    \ API call to their ongoing compliance obligations, and the platform infrastructure\
    \ that makes it possible at global scale. Our domain is to deliver a seamless\
    \ onboarding journey, consistently delivered across APIs, hosted pages, and embedded\
    \ components. From Enterprise merchants to our integration partners, we ensure\
    \ the most intuitive end-to-end experience by intelligently requesting the right\
    \ data at the right time. When a business applies to process payments, our systems\
    \ instantly determine who they are, verify they meet all necessary compliance\
    \ thresholds, select the products they qualify for, and configure their account\
    \ for immediate transacting. This is high-stakes, regulated work. We operate at\
    \ the intersection of engineering, compliance, and commercial strategy - and we\
    \ move fast without cutting corners. THE ROLE Checkout.com http://Checkout.com\
    \ is on a journey from serving enterprise merchants to powering platforms; PayFacs,\
    \ ISVs, and marketplaces that bring thousands of their own merchants onto our\
    \ infrastructure. That shift changes what a merchant account needs to be. Today,\
    \ an account represents a single business. Tomorrow, it needs to represent hierarchies:\
    \ platforms and their sub-merchants, each with their own identity, compliance\
    \ obligations, product eligibility, and configuration. This role sits at the centre\
    \ of that evolution. You will take full ownership of the merchant account experience:\
    \ the foundational data models and services that define who a merchant is on our\
    \ platform, what they can do, and how they relate to the platforms above them.\
    \ Your work shapes the entity model, the onboarding lifecycle, and the APIs that\
    \ every other team, an have risk, configuration, payments, and platforms, builds\
    \ on top of. This is infrastructure that compounds. Get the account model right\
    \ and you unlock Checkout.com http://Checkout.com's ability to serve platform\
    \ business models at global scale. Get it wrong and every team downstream inherits\
    \ the constraints. WHAT YOU'LL DO IN THE NEAR TERM - Take ownership of the entity's\
    \ resource - the core data model that defines who a merchant is on the Checkout\
    \ Platform - and drive forward its adoption and build-out across the organisation.\
    \ - Work with other PMs to evolve our eligibility services, ensuring merchants\
    \ are matched to the right products at the right time. OVER TIME - Establish the\
    \ vision and roadmap to deliver a unified Checkout Account, supporting both Enterprise\
    \ and Platform propositions. - Work across the pillar to drive account adoption,\
    \ becoming the go-to owner of the account model for teams across Checkout.com\
    \ http://Checkout.com. STRATEGY & ROADMAP - Define and own the product roadmap\
    \ for the merchant account domain, translating Checkout.com http://Checkout.com's\
    \ platform strategy into clear, deliverable plans. - Set product OKRs and establish\
    \ the metrics framework to track performance and guide prioritisation. DISCOVERY\
    \ & DELIVERY - Lead end-to-end product development: from problem discovery and\
    \ requirements definition through to API and data model design, launch, and iteration.\
    \ - Work closely with engineering counterparts to design foundational services\
    \ and APIs that are clean, scalable, and built to be depended on by every downstream\
    \ team. CROSS-FUNCTIONAL LEADERSHIP - Build strong partnerships across the organisation,\
    \ including Salesforce (contracting and onboarding alignment), Pricing and Billing,\
    \ risk, configuration, payments, and platforms teams, to ensure the account model\
    \ serves every use case. - Gain a deep understanding of Checkout.com http://Checkout.com's\
    \ merchants and business needs, and use that understanding to sharpen prioritisation\
    \ and drive commercial outcomes. - Communicate product decisions and progress\
    \ to senior stakeholders with clarity and confidence. ABOUT YOU EXPERIENCE - Product\
    \ management experience with a track record of owning complex, infrastructure-level\
    \ or platform products end-to-end. - Experience with API design and data architecture\
    \ - you care deeply about modelling real-world complexity cleanly and building\
    \ systems other teams can depend on. - Comfortable operating in regulated, high-consequence\
    \ domains where correctness matters as much as speed. - Experience in payments,\
    \ fintech, or similarly regulated infrastructure environments is a plus. WHAT\
    \ YOU BRING - You want ownership over outcomes, not just features. You measure\
    \ success by what changes in the world, not by what ships. - You're comfortable\
    \ in high-consequence domains. You understand that in regulated infrastructure,\
    \ getting it right matters \u2014 and you don't cut corners to move faster. -\
    \ You care deeply about API design and data architecture. You take pride in modelling\
    \ real-world complexity cleanly and building abstractions that last. - You're\
    \ energised by foundational work. The idea of building systems that every other\
    \ team depends on excites you, not intimidates you. - Data-driven and outcome-oriented:\
    \ you define clear success metrics and use data to guide priorities. - A clear\
    \ communicator who can influence stakeholders and simplify complex topics for\
    \ different audiences. Additional Information Bring all of you to work We create\
    \ the conditions for high performers to thrive, through real ownership, fewer\
    \ blockers, and work that makes a difference from day one. Here, you\u2019ll move\
    \ fast, take on meaningful challenges, and be recognized for the impact you deliver.\
    \ It\u2019s a place where ambition gets met with opportunity, and where your growth\
    \ is in your hands. We work as one team, and we back each other to succeed. So\
    \ whatever your background or identity, if you\u2019re ready to grow and make\
    \ a difference, you\u2019ll be right at home here. It\u2019s important we set\
    \ you up for success and make our process as accessible as possible. So let us\
    \ know in your application, or tell your recruiter directly, if you need anything\
    \ to make your experience or working environment more comfortable. Life at Checkout.com\
    \ http://Checkout.com We understand that work is just one part of your life. Our\
    \ hybrid working model offers flexibility, with three days per week in the office\
    \ to support collaboration and connection. Curious about what it\u2019s like to\
    \ be part of our team? Visit our Careers Page https://www.checkout.com/careers\
    \ to learn more about our culture, open roles, and what drives us. For a closer\
    \ look at daily life at Checkout.com http://Checkout.com, follow us on LinkedIn\
    \ https://www.linkedin.com/company/checkout/life/ and Instagram https://www.instagram.com/checkout_com/"
