  description_text: "About the opportunity We are seeking a Site Reliability Engineer\
    \ to join the Data Storage Team within the Platform Engineering Domain.&nbsp;\
    \ Platform Engineering's mission is to provide trusted, performant, and self-service\
    \ platforms, enabling product teams to build 'the bank the world loves to use.'\
    \ As part of this, this team is responsible for architecting and operating highly\
    \ scalable, secure and compliant infrastructure solutions that manage our core\
    \ database offering and data storage capabilities. The ideal candidate is a seasoned\
    \ SRE, &nbsp;an enthusiastic learner eager to pioneer novel platform solutions\
    \ and grow with a team that values innovation and mentorship. If your expertise\
    \ meets curiosity, we encourage you to apply. In this role, you will: Develop\
    \ and Implement: Build and maintain platform solutions that improve the reliability,\
    \ security, and scalability of our Database Platform infrastructure. Operational\
    \ Excellence: Apply cloud infrastructure, networking, and CI/CD best practices\
    \ to support our operational data storage solutions. Collaborate: Work closely\
    \ with Product Teams to facilitate seamless database provisioning and ensure operational\
    \ efficiency. Knowledge Sharing: Participate in technical discussions and contribute\
    \ to documentation, fostering a culture of transparency and continuous learning.\
    \ Execution: Contribute to the team\u2019s roadmap by delivering high-quality\
    \ code and infrastructure improvements. Incident Response: Participate in on-call\
    \ rotations and troubleshooting efforts to maintain a stable and predictable environment.\
    \ Observability: Maintain and enhance observability solutions (metrics, logging,\
    \ tracing) to ensure the platform meets its SLOs and availability targets. What\
    \ you need to be successful Background and Skills: Hands-on experience in maintaining\
    \ cloud-based infrastructure, particularly in AWS. Practical experience with operational\
    \ data storage solutions (e.g., PostgreSQL, AmazonRDS, S3 or similar). Hands-on\
    \ experience with container technologies (Docker) and orchestration (Kubernetes/EKS)\
    \ Proficiency in infrastructure as code (Terraform, CloudFormation, or similar).\
    \ Competence in at least one programming language (Python preferred). Hands-on\
    \ experience with CI/CD pipelines (GitHub Actions, ArgoCD, Jenkins, or similar).\
    \ Familiarity with networking and security best practices in cloud environments.\
    \ Familiarity with observability tools (DataDog, Prometheus, Grafana, OpenTelemetry).\
    \ Nice to have: Knowledge of database internals including performance tuning,\
    \ high-availability architecture (replication/failover), and sharding/clustering.\
    \ Backend Engineer experience. Traits: Excellent collaboration and communication\
    \ skills, with the ability to work across teams. Strong sense of ownership, with\
    \ a proactive approach to problem-solving and process improvements. Passion for\
    \ building high-quality, scalable, and secure infrastructure. Eagerness to learn\
    \ and contribute to building platforms as products. What\u2019s in it for you:\
    \ Accelerate your career growth by joining one of Europe\u2019s most talked about\
    \ disruptors. Employee benefits that range from a competitive personal development\
    \ budget, work from home budget, discounts to fitness &amp; wellness memberships,\
    \ language apps and public transportation.&nbsp; Come together with your team\
    \ in the office for a dedicated day of teamwork each week, plus another day of\
    \ your choice, and enjoy the flexibility of remote work the rest of the time.\
    \ Some roles may require additional in-office presence . As an N26 employee you\
    \ will have access to a Premium subscription on your personal N26 bank account.\
    \ As well as subscriptions for friends and family members.&nbsp;&nbsp;&nbsp;&nbsp;\
    \ Additional day of annual leave for each year of service.&nbsp;&nbsp; A high\
    \ degree of autonomy and access to cutting edge technologies - all while working\
    \ with a friendly team of peers of diverse nationalities, life experiences and\
    \ backgrounds.&nbsp; A relocation package with visa support for those who need\
    \ it. Who we are N26 has reimagined banking for today\u2019s digital world. Technology\
    \ and design empower everything we do and it\u2019s how we are building the global\
    \ banking platform the world loves to use. We've eliminated physical branches,\
    \ paperwork, and hidden fees for an elegant digital experience and supreme savings.\
    \ Giving people the power to live and bank their way is what gets us out of bed\
    \ in the morning and inspires the work that we do.&nbsp; We are headquartered\
    \ in Berlin with offices in multiple cities across Europe, including Vienna and\
    \ Barcelona, and a 1,500-strong team of more than 80 nationalities. Sounds good?\
    \ Apply now for this position. Equal Opportunities: We recognize that our strength\
    \ lies in our people and the varied perspectives they bring to our workforce.\
    \ We strive to build talented and diverse teams to drive our business success\
    \ and empower our people to reach their full potential. We genuinely welcome and\
    \ encourage applications from people of all backgrounds, cultures, genders, sexual\
    \ orientations, abilities, neurodiversities, and ages. We're committed to creating\
    \ an inclusive workspace where everyone feels valued and respected, free from\
    \ harassment and discrimination. If there's anything you need to make the application\
    \ process work for you, please let us know by reaching out to candidate.exp@n26.com\
    \ .&nbsp; Visit our&nbsp; website to learn more about Diversity, Equity, &amp;\
    \ Inclusion at N26."
