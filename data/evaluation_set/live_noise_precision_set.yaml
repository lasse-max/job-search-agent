    \ Autonomous Systems \u2013 development and integration of self-governing vehicle\
    \ and control systems Aerodynamics \u2013 vehicle aerodynamic design, simulation,\
    \ and performance optimisation Mechatronics \u2013 combined mechanical, electrical,\
    \ and control systems engineering AI &amp; Software \u2013 artificial intelligence,\
    \ machine learning, and software development within complex engineering environments\
    \ You should apply if you This opportunity is relevant to you if you are a current\
    \ Formula Student Germany participant and are considering one of the following\
