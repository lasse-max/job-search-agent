    \ unit economics) - Partner with Sales and Solutions to win enterprise, multi-PSP\
    \ merchants VAULT: CREDENTIAL PLATFORM - Define core primitives: instruments,\
    \ customers, tokens, multi-instrument linking, metadata - Own PCI DSS 4.x posture\
    \ and translate compliance into merchant value - Ensure first-class integration\
    \ with network tokens and account updater services - Drive interoperability with\
    \ wallets, Flow, and broader Checkout.com http://Checkout.com surfaces FORWARD\
    \ API: PROGRAMMABLE INFRASTRUCTURE - Own credential forwarding: source resolution,\
    \ request construction, encryption, token injection, and response handling - Expand\
    \ beyond fallback use cases (fraud tools, 3DS, loyalty, partner migrations) -\
    \ Ensure reliability, latency, and observability on the critical payment path\
    \ - Build debugging and visibility tools for developers DEVELOPER EXPERIENCE -\
    \ Own the public API surface across Vault and Forward - Drive SDKs, documentation,\
    \ and reference architectures - Reduce integration time from months to days CROSS-FUNCTIONAL\
    \ LEADERSHIP - Partner with Engineering to deliver reliably at scale - Align with\
    \ Risk, Compliance, and Legal on PCI scope, regulation, and scheme changes - Work\
    \ across Authentication, Routing, and other product teams to ensure seamless credential\
    \ flows WHAT YOU\u2019LL BRING PRODUCT & TECHNICAL DEPTH - 5+ years in product\
    \ management, including 3+ years in payments - Experience building developer-facing\
