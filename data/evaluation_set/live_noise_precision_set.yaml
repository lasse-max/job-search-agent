  description_text: "ABOUT AIRWALLEX Airwallex is the only unified payments and financial\
    \ platform for global businesses. Powered by our unique combination of proprietary\
    \ infrastructure and software, we empower over 200,000 businesses worldwide \u2013\
    \ including Brex, Rippling, Navan, Qantas, SHEIN and many more \u2013 with fully\
    \ integrated solutions to manage everything from business accounts, payments,\
    \ spend management and treasury, to embedded finance at a global scale. Proudly\
    \ founded in Melbourne, we have a team of over 2,200 of the brightest and most\
    \ innovative people in tech across 26 offices around the globe. Valued at US$8\
    \ billion and backed by world-leading investors including T. Rowe Price, Visa,\
    \ Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and\
    \ Lone Pine Capital, Airwallex is leading the charge in building the global payments\
    \ and financial platform of the future. If you\u2019re ready to do the most ambitious\
    \ work of your career, join us. ATTRIBUTES WE VALUE We hire successful builders\
    \ with founder-like energy who want real impact, accelerated learning, and true\
    \ ownership. You bring strong role-related expertise and sharp thinking, and you\u2019\
    re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles.\
    \ You move fast with good judgment, dig deep with curiosity, and make decisions\
    \ from first principles, balancing speed and rigor. You're humble and collaborative;\
    \ turn zero\u2011to\u2011one ideas into real products, and you \u201Cget stuff\
    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. ABOUT THE TEAM The\
    \ Product team at Airwallex is a group of passionate builders and problem-solvers\
    \ obsessed with crafting customer-centric solutions that empower businesses to\
    \ operate anywhere, anytime. We combine technical expertise with a deep understanding\
    \ of our customers' needs to design and build unified, intuitive, and scalable\
    \ products. The Product Strategy & Operations function is the governance engine\
    \ for the entire global Product organization. This role will lead the development\
    \ and operationalization of our long-term product vision, ensuring maximum impact\
    \ and efficiency across all product pillars. This is a highly visible, cross-functional\
    \ role that directly impacts our company-wide growth trajectory. WHAT YOU\u2019\
    LL DO Airwallex is looking for a senior leader to step into the Director, Product\
    \ Strategy & Operations role, playing a pivotal part in defining the future product\
    \ landscape and ensuring operational excellence across the entire product lifecycle.\
    \ This role is responsible for bridging the gap between our C-level vision, commercial\
    \ goals, and product execution. This role is based in Singapore. KEY RESPONSIBILITIES:\
    \ - Product Strategy Leadership: Own, develop, and institutionalize the multi-year\
    \ global product strategy, translating executive vision and market intelligence\
    \ into a clear, actionable product roadmap and set of strategic priorities for\
    \ the entire organization. - Strategy execution: Own high-impact, strategic initiatives\
    \ end-to-end, pro-actively identifying opportunities and gaps in our Product roadmap\
    \ and play an integral role in addressing those; this includes active participation\
    \ in M&A and PMI activities - Strategic Initiative Incubation: Run high-priority,\
    \ zero-to-one strategic initiatives, managing cross-functional teams to prove\
    \ commercial viability before transitioning them into established product groups.\
    \ - Strategic Market Insights: Direct and conduct sophisticated market analysis,\
    \ competitive deep dives, and complex data modeling to identify disruptive opportunities,\
    \ validate 'big product bets,' and establish a comprehensive, evidence-based view\
    \ of future customer needs and market white space. - Operational Governance &\
    \ Scalability: Design, implement, and govern robust Product Development Life Cycle\
    \ (PDLC) frameworks, OKR tracking, and product prioritization processes to embed\
    \ operational excellence and accelerate time-to-market across all product teams\
    \ globally. - Cross-Functional Alignment: Serve as the key strategic bridge between\
    \ Product, Engineering, Commercial, Finance, and Legal, ensuring consistent alignment\
    \ on strategic goals, resource allocation, and go-to-market execution standards.\
    \ - Executive Communication & Stakeholder Management: Prepare and deliver high-stakes\
    \ strategic reviews and proposals to the C-Suite (CEO, CPO, etc.), synthesizing\
    \ complex strategic challenges into concise, compelling recommendations that drive\
    \ critical business decisions. WHO YOU ARE You are a proven leader and strategic\
    \ operator with a track record of driving large-scale change within high-growth,\
    \ technically complex environments. MINIMUM QUALIFICATIONS: - 10+ years of experience\
    \ in a highly analytical and strategic role, ideally with leadership experience\
    \ in a top-tier strategy consulting firm and subsequent Product Strategy/Operations\
    \ leadership experience at a leading B2B Fintech or high-growth global technology\
    \ company. - Mastery of first-principles thinking and advanced analytical problem-solving\
    \ to dissect business challenges, model growth scenarios, and establish data-driven\
    \ strategic direction. Outstanding ability to absorb information quickly and identify\
    \ the most critical aspects to address. - Demonstrated experience driving strategy\
    \ formulation and operational change management across a global, multi-product\
    \ organization. - Exceptional executive-level written and verbal communication\
    \ skills, with the ability to synthesize complex, ambiguous concepts into clear,\
    \ persuasive narratives for C-level audiences. - Proven ability to influence and\
    \ manage senior stakeholders without direct reporting authority, fostering collaboration\
    \ and achieving consensus across highly diverse functional teams. - Bachelor\u2019\
    s degree in a quantitative or technical field; an MBA or equivalent advanced degree\
    \ is highly preferred. - Deep domain expertise in global technology, financial\
    \ services, or payments is a significant advantage. APPLICANT SAFETY POLICY: FRAUD\
    \ AND THIRD-PARTY RECRUITERS To protect you from recruitment scams, please be\
    \ aware that Airwallex will not ask for bank details, sensitive ID numbers (i.e.\
    \ passport), or any form of payment during the application or interview process.\
    \ All official communication will come from an @airwallex.com http://airwallex.com\
    \ email address. Please apply only through careers.airwallex.com http://careers.airwallex.com\
    \ or our official LinkedIn page. Airwallex does not accept unsolicited resumes\
    \ from search firms/recruiters. Airwallex will not pay any fees to search firms/recruiters\
    \ if a candidate is submitted by a search firm/recruiter unless an agreement has\
    \ been entered into with respect to specific open position(s). Search firms/recruiters\
    \ submitting resumes to Airwallex on an unsolicited basis shall be deemed to accept\
    \ this condition, regardless of any other provision to the contrary. EQUAL OPPORTUNITY\
    \ Airwallex is proud to be an equal opportunity employer. We value diversity and\
    \ anyone seeking employment at Airwallex is considered based on merit, qualifications,\
    \ competence and talent. We don\u2019t regard color, religion, race, national\
    \ origin, sexual orientation, ancestry, citizenship, sex, marital or family status,\
    \ disability, gender, or any other legally protected status when making our hiring\
    \ decisions. If you have a disability or special need that requires accommodation,\
    \ please let us know."
