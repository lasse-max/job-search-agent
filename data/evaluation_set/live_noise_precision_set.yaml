    \ as well as personal needs. Our offerings include Le Chat, La Plateforme, Mistral\
    \ Code and Mistral Compute - a suite that brings frontier intelligence to end-users.\
    \ We are a dynamic, collaborative team passionate about AI and its potential to\
    \ transform society. Our diverse workforce thrives in competitive environments\
    \ and is committed to driving innovation. Our teams are distributed between France,\
    \ USA, UK, Germany and Singapore. We are creative, low-ego and team-spirited.\
    \ Join us to be part of a pioneering company shaping the future of AI. Together,\
    \ we can make a meaningful impact. See more about our culture on https://mistral.ai/careers.\
    \ Mistral AI participates in the E-Verify program By applying, you agree to our\
    \ Applicant Privacy Policy. Role Summary About the Research Engineering team The\
    \ team spans Platform (shared infra & clean code) and Embedded (inside research\
    \ squads). Engineers can move along the research\u2194production spectrum as needs\
    \ or interests evolve. As a Research Engineer \u2013 ML track, you\u2019ll build\
    \ and optimise the large-scale learning systems that power our open-weight models.\
    \ Working hand-in-hand with Research Scientists, you\u2019ll either join: - Platform\
    \ RE Team: Enhance the shared training framework, data pipelines and cluster tooling\
    \ used by every team; or - Embedded RE Team: Sit inside a research squad (Alignment,\
    \ Pre-training, Multimodal, Safety \u2026) and turn fresh ideas into repeatable,\
    \ scalable code. What will you do \u2022 Accelerate researchers by taking on the\
    \ heavy parts of large-scale ML pipelines and building robust tools. \u2022 Interface\
    \ cutting-edge research with production: integrate checkpoints, streamline evaluation,\
    \ and expose APIs. \u2022 Conduct experiments on the latest deep-learning techniques\
