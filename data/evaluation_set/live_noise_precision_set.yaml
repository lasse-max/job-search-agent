    science, and research capabilities across Australia, New Zealand, the UK, and
    the US. Together, they function as a collaborative network focused on re-evaluating
    and modernising our data stack to deliver deep intelligence. Initially, you will
    focus on: - Navigating and upgrading a fifteen-year-old architectural framework
    into a modern data ecosystem. - Unifying fragmented, duplicated data sources to
    establish a single, trusted source of truth for the business. - Collaborating
