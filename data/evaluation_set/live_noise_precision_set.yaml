    \ and how they relate to the Databricks value proposition &nbsp; What we look\
    \ for: 10+ years of experience in sales leadership within the telco space, with\
    \ a record of driving double-digit growth. Established relationships with the\
    \ major telcos/service providers in Australia Proven experience leading teams\
    \ serving government or public sector clients within Cloud, SaaS, or Data Analytics\
    \ industries. Deep understanding of Australia\u2019s telco ecosystem, procurement\
    \ frameworks, and their wholesaler structure. Knowledge of machine learning and\
    \ IOT is preferred. Demonstrated success in building new markets, managing complex\
