  description_text: "About the Team The IT Services and Support team is responsible\
    \ for delivering seamless, efficient, and reliable workplace technology across\
    \ the organization. We provide frontline IT support, run employee lifecycle operations,\
    \ support conference rooms and events, manage vendors and assets, and continuously\
    \ improve systems, documentation, and workflows to strengthen the employee experience\
    \ as OpenAI grows. About the Role As the APAC Regional IT Support Lead based in\
    \ Singapore, you will be the senior onsite IT owner for the Singapore office while\
    \ serving as the regional lead for IT support across APAC. You will combine high-quality\
    \ hands-on support with regional coordination, operational leadership, and process\
    \ improvement. Your scope includes frontline support, onboarding and offboarding,\
    \ AV and event readiness, vendor and equipment management, office build and workplace\
    \ technology support, executive support, and the design of scalable support workflows\
    \ across offices and time zones. We are looking for someone who is customer-focused,\
    \ technically strong, and able to operate independently in a fast-moving environment.\
    \ You should bring strong judgment, clear communication, and the ability to turn\
    \ ambiguous operational needs into reliable systems that improve the employee\
    \ experience. This role is the onsite IT lead in our Singapore office, serves\
    \ as the regional lead for APAC IT support, requires 5 days in office per week,\
    \ and offers relocation assistance to new employees. In this role, you will: -\
    \ Act as IT Support: Serve as the senior-most onsite point of contact in Singapore\
    \ for troubleshooting hardware, software, network, and collaboration issues, ensuring\
    \ prompt and reliable resolution of employee requests. - Lead APAC Regional Support:\
    \ Partner across offices and time zones to improve coordination, strengthen support\
    \ coverage, and drive a more consistent employee experience across APAC. - Own\
    \ Employee Lifecycle Operations: Lead or support onboarding and offboarding workflows\
    \ including device preparation, account readiness, access coordination, and day-one\
    \ support. - Drive AV and Event Readiness: Support conference rooms, executive\
    \ meetings, events, and other high-visibility gatherings, ensuring workplace technology\
    \ and AV systems are reliable. - Manage Vendors and Equipment: Coordinate procurement,\
    \ repairs, maintenance, inventory tracking, and device management practices to\
    \ maintain secure, standardized, and scalable operations. - Partner on Office\
    \ Build and Workplace Technology: Work closely with Workplace Services, Security,\
    \ and other stakeholders to support office growth, changes, and workplace technology\
    \ readiness in Singapore. - Improve Support Systems and Processes: Identify friction,\
    \ improve documentation, build repeatable workflows, and introduce lightweight\
    \ automation and scalable operational improvements across support, inventory,\
    \ onboarding, and related IT processes. - Provide Executive and White-Glove Support:\
    \ Deliver thoughtful, high-touch support for executives and other critical stakeholders\
    \ when needed. - Collaborate across OpenAI: Communicate clearly with technical\
    \ and non-technical partners, align stakeholders, and drive well-scoped initiatives\
    \ without relying on formal authority. You might thrive in this role if you: -\
    \ Have strong technical expertise in macOS and working knowledge of Windows, along\
    \ with identity and device management tools such as Azure AD, Jamf, and Intune.\
    \ - Have hands-on experience with enterprise collaboration and productivity platforms\
    \ such as Google Workspace, Microsoft 365, Slack, and Atlassian products. - Have\
    \ experience configuring and troubleshooting AV and collaboration systems such\
    \ as Google Meet, Microsoft Teams, and Crestron in office and event settings.\
    \ - Demonstrate excellent written and verbal communication skills and can explain\
    \ technical issues clearly to both technical and non-technical audiences. - Have\
    \ experience leading or coordinating support work across multiple offices, stakeholder\
    \ groups, or time zones. - Have a track record of improving support operations\
    \ through documentation, workflow design, automation, or lightweight scripting.\
    \ - Can manage vendors, inventory, procurement, and workplace technology operations\
    \ with strong execution and attention to detail. - Are effective at cross-functional\
    \ project management and can move initiatives forward through influence, organization,\
    \ and follow-through. - Bring a customer-first mindset, sound operational judgment,\
    \ and the ability to stay calm and effective in high-pressure support situations.\
    \ - Enjoy mentoring more junior teammates, supporting executives, and helping\
    \ scale regional support practices. About OpenAI OpenAI is an AI research and\
    \ deployment company dedicated to ensuring that general-purpose artificial intelligence\
    \ benefits all of humanity. We push the boundaries of the capabilities of AI systems\
    \ and seek to safely deploy them to the world through our products. AI is an extremely\
    \ powerful tool that must be created with safety and human needs at its core,\
    \ and to achieve our mission, we must encompass and value the many different perspectives,\
    \ voices, and experiences that form the full spectrum of humanity. We are an equal\
    \ opportunity employer, and we do not discriminate on the basis of race, religion,\
    \ color, national origin, sex, sexual orientation, age, veteran status, disability,\
    \ genetic information, or other applicable legally protected characteristic. For\
    \ additional information, please see OpenAI\u2019s Affirmative Action and Equal\
