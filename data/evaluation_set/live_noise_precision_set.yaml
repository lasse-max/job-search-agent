  description_text: "ABOUT AIRWALLEX Airwallex is the only unified payments and financial\
    \ platform for global businesses. Powered by our unique combination of proprietary\
    \ infrastructure and software, we empower over 200,000 businesses worldwide \u2013\
    \ including Brex, Rippling, Navan, Qantas, SHEIN and many more \u2013 with fully\
    \ integrated solutions to manage everything from business accounts, payments,\
    \ spend management and treasury, to embedded finance at a global scale. Proudly\
    \ founded in Melbourne, we have a team of over 2,200 of the brightest and most\
    \ innovative people in tech across 26 offices around the globe. Valued at US$8\
    \ billion and backed by world-leading investors including T. Rowe Price, Visa,\
    \ Mastercard, Robinhood Ventures, Sequoia, Salesforce Ventures, DST Global, and\
    \ Lone Pine Capital, Airwallex is leading the charge in building the global payments\
    \ and financial platform of the future. If you\u2019re ready to do the most ambitious\
    \ work of your career, join us. ATTRIBUTES WE VALUE We hire successful builders\
    \ with founder-like energy who want real impact, accelerated learning, and true\
    \ ownership. You bring strong role-related expertise and sharp thinking, and you\u2019\
    re motivated by our mission and operating principles https://www.airwallex.com/us/operating-principles.\
    \ You move fast with good judgment, dig deep with curiosity, and make decisions\
    \ from first principles, balancing speed and rigor. You're humble and collaborative;\
    \ turn zero\u2011to\u2011one ideas into real products, and you \u201Cget stuff\
    \ done\u201D end-to-end. You use AI to work smarter and solve problems faster.\
    \ Here, you\u2019ll tackle complex, high\u2011visibility problems with exceptional\
    \ teammates and grow your career as we build the future of global banking. If\
    \ that sounds like you, let\u2019s build what\u2019s next. ABOUT THE TEAM Corporate\
    \ IT drives our IT support, IT engineering and business engineering functions\
    \ at Airwallex. IT Engineering is the core team that drives our technology experiences\
    \ for Airwallex. From collaboration, automation and video conferencing to managing\
    \ our computers, applications, identity and access management. We design, build\
    \ and run the systems and services our Airwallex teams use to build our product,\
    \ serve our customers and run our business. We partner with every team in the\
    \ business, from Finance to Engineering, People and Support, we help solve problems\
    \ and help drive Airwallex forward. WHAT YOU\u2019LL DO As an IT Engineer, you\u2019\
    ll focus on solving problems and fixing issues our business and IT operations\
    \ teams encounter throughout the day. You\u2019ll work on systems and escalations,\
    \ helping to fix issues and building and implementing solutions to our many challenges.\
    \ This role will have a strong focus on workflows, automation and orchestration\
    \ with our Legal, Risk and Compliance organization as well as serve as a member\
    \ of our IT engineering team. Partnering with our Legal team, you\u2019ll help\
    \ them work faster, leverage AI, build workflows and serve as the engineer to\
    \ the team. This role is highly collaborative, and has a global impact from day\
    \ one. Our LRC teams sit in many countries and regions, and you\u2019ll have a\
    \ significant opportunity to build a new function within the IT engineering team.\
    \ This role is based in Sydney, Melbourne, San Francisco or Singapore. RESPONSIBILITIES\
    \ - Serve as the primary IT engineer for our LRC teams, learning and understanding\
    \ their workflows, ways of working, and how they serve Airwallex, building a model\
    \ to improve and scale their function - Build workflows and orchestrations \u2013\
    \ these touch many systems and will impact many teams - Use low-code/no-code tools\
    \ to build automations/orchestrations (Workato, Okta Workflows, Zapier, etc.)\
    \ - Leverage, design, implement AI with a focus on the LRC function and the unique\
    \ ways of working within an in-house legal function - Work with APIs across major\
    \ vendors (Okta, Google, GCP, Aliyun, etc.) - Build and enhance our AI portfolio,\
    \ with an initial focus on legal-specific tools and implementation (Harvey.ai\
    \ http://Harvey.ai, etc.) - Become a trusted advisor to our LRC team and the IT\
    \ engineering team, acting as an expert and consultant - Build, enhance and grow\
    \ legal applications and serve as the technical owner or primary IT engineer for\
    \ the space (Ironclad, Auditboard, Google Workspace, internal tools, etc.) - Manage\
    \ and build service desks and orchestrations (Atlassian products, i.e. JIRA, Confluence,\
    \ etc.) - Own the full lifecycle of features and products within this space, from\
    \ proof-of-concept to implementation to operations and maintenance \u2013 leading\
    \ projects from start to finish - Handle escalations from other IT teams where\
    \ relevant - Work closely with INFOSEC, People Ops, Engineering and IT teams to\
    \ build systems that scale as we grow globally - Integrate our tools with new\
    \ and existing platforms (cloud, GCP, etc.) and across our SaaS portfolio (SFDC,\
    \ Slack, Google, etc.) - Build and maintain custom tools or services if needed\
    \ - Respond to incidents as part of an on-call roster or in emergencies - Write\
    \ documentation and maintain diagrams of your solutions and applications, ensuring\
    \ readability and understanding - Work with IT Operations and IT Engineering to\
    \ help fill gaps and collaborate on other projects and services - Constantly learn,\
    \ test, evaluate and enhance our products and offerings \u2013 never letting anything\
    \ get stale WHO YOU ARE - Bachelor\u2019s degree in Information Technology, Computer\
    \ Science, or a related field, 5+ years of relevant experience in a similar role.\
    \ - Highly trustworthy and empathetic \u2013 this works with privileged information\
    \ and with some of our most important information, trust is critical - Autonomous\
    \ and able to work with minimal direction while maintaining velocity and delivering\
    \ projects on time \u2013 sometimes with aggressive deadlines and failure-is-not-an-option\
    \ risk - Strong ability to write strong technical documents - Expert level understanding\
    \ of common identity standards, including SAML, OAuth, SSO, etc. - Expert knowledge\
    \ of workflows and common orchestration tools (workato, etc.) - Experience with\
    \ a programming language, such as python, and infrastructure as code (i.e. Terraform)\
    \ - Experience with APIs, able to work with common vendors and integrate into\
    \ our tech stack - Experience using and understanding of cloud infrastructure\
    \ (AWS, GCP, etc.) - Understanding of RBAC, ABAC, PBAC, ACLs and common access\
    \ management principles in security and corporate IT environments - Experience\
    \ working in all SaaS-based systems and applications - Strong understanding of\
    \ MDM systems (macOS, windows; kandji, JAMF, intune, etc.) - Ability to move fast\
    \ and urgently, making correct decisions and assumptions \u2013 sometimes without\
    \ all the information APPLICANT SAFETY POLICY: FRAUD AND THIRD-PARTY RECRUITERS\
    \ To protect you from recruitment scams, please be aware that Airwallex will not\
    \ ask for bank details, sensitive ID numbers (i.e. passport), or any form of payment\
    \ during the application or interview process. All official communication will\
    \ come from an @airwallex.com http://airwallex.com email address. Please apply\
    \ only through careers.airwallex.com http://careers.airwallex.com or our official\
    \ LinkedIn page. Airwallex does not accept unsolicited resumes from search firms/recruiters.\
    \ Airwallex will not pay any fees to search firms/recruiters if a candidate is\
    \ submitted by a search firm/recruiter unless an agreement has been entered into\
    \ with respect to specific open position(s). Search firms/recruiters submitting\
    \ resumes to Airwallex on an unsolicited basis shall be deemed to accept this\
    \ condition, regardless of any other provision to the contrary. EQUAL OPPORTUNITY\
    \ Airwallex is proud to be an equal opportunity employer. We value diversity and\
    \ anyone seeking employment at Airwallex is considered based on merit, qualifications,\
    \ competence and talent. We don\u2019t regard color, religion, race, national\
    \ origin, sexual orientation, ancestry, citizenship, sex, marital or family status,\
    \ disability, gender, or any other legally protected status when making our hiring\
    \ decisions. If you have a disability or special need that requires accommodation,\
    \ please let us know."
