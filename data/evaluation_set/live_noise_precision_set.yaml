    \ AI through high-performance, optimized, open-source and cutting-edge models,\
    \ products and solutions. Our comprehensive AI platform is designed to meet enterprise\
    \ needs, whether on-premises or in cloud environments. Our offerings include le\
    \ Chat, the AI assistant for life and work. We are a dynamic, collaborative team\
    \ passionate about AI and its potential to transform society. Our diverse workforce\
    \ thrives in competitive environments and is committed to driving innovation.\
    \ Our teams are distributed between France, USA, UK, Germany and Singapore. We\
    \ are creative, low-ego and team-spirited. Join us to be part of a pioneering\
    \ company shaping the future of AI. Together, we can make a meaningful impact.\
    \ See more about our culture on https://mistral.ai/careers. Role summary We are\
    \ seeking a talented and experienced Product Manager to define and execute the\
    \ product strategy for our GenAI-native coding assistant for developers, one of\
    \ our most strategic new product lines : Mistral Vibe. Built on top of the most\
    \ performant coding AI models in the market, with more models to come, this product\
    \ is developed within a leading open source GenAI company that is already deeply\
    \ trusted by the global developer and engineering community. The ambition is clear:\
    \ make this assistant the preferred tool developers code with and establish it\
    \ as a market leader in its category. As Product Manager, you will contribute\
    \ to this product end to end, from vision to execution. You will define the product\
    \ strategy, PMF, GTM and growth roadmap and lead the development of a product\
    \ already backed by a strong pipeline of enterprise customers. Working closely\
    \ with world-class science, engineering and go-to-market teams, you will scale\
    \ adoption across individual developers and enterprises, grow an existing product\
    \ motion and consolidate and expand the team around it. Your work will directly\
    \ contribute to building a hundreds of millions revenue stream for Mistral while\
    \ delivering a tool that significantly increases the productivity and creativity\
    \ of thousands of developers across the globe. \U0001F4CD Location: Paris or London\
    \ What you will do Define the Future \u2022 Set the vision: Shape and evangelize\
    \ a compelling product strategy for Mistral\u2019s GenAI-native coding assistant,\
    \ ensuring alignment with company goals and market opportunities. \u2022 Spot\
    \ the gaps: Lead market and UX research to uncover unmet needs, competitive whitespaces,\
    \ and emerging trends enterprise product management. \u2022 Validate product direction:\
    \ Engage directly with customers and partners to validate positioning, value propositions\
    \ and feature priorities. Build & Ship \u2022 Own the lifecycle: Drive end-to-end\
    \ product development, from ideation to launch and iteration\u2014balancing speed,\
    \ quality, and user delight. \u2022 Champion the user: Partner with design and\
    \ research to craft intuitive, high-impact and developer first experiences, using\
    \ data and feedback to refine continuously. Scale & Execute \u2022 Go-to-market:\
    \ Collaborate with marketing and sales to launch products successfully, including\
    \ pricing, positioning, and adoption strategies. \u2022 Align stakeholders: Rally\
    \ science, engineering, design and business teams around priorities, trade-offs\
    \ and timelines. \u2022 Prioritize ruthlessly: Maintain a dynamic roadmap that\
    \ delivers quick wins while advancing long-term bets. \u2022 Evangelize Mistral\
    \ Vibe: Act as a product ambassador through customer engagements, thought leadership,\
    \ writing, and participation in industry and developer events. Required Qualifications\
    \ \u2022 Product leadership: 10+ years of experience in product management within\
    \ high-performing product organizations. Deep mastery of best-in-class PM practices,\
    \ including product strategy and roadmap definition, market and user research,\
    \ data analysis, prioritization, experimentation and A/B testing, performance\
    \ metrics and structured collaboration with engineering and science teams. We\
    \ are open to candidates coming from strong engineering backgrounds who have transitioned\
    \ or wants to transition into product leadership roles too. \u2022 Business and\
    \ GTM acumen: Proven experience owning product vision and strategy for enterprise-focused\
    \ products. Strong track record defining and executing go-to-market strategies,\
    \ including positioning, pricing, packaging, promotion and driving meaningful\
    \ revenue growth through product-led initiatives. \u2022 Builder mindset: Demonstrated\
    \ experience operating in ambiguous, fast-growing environments. Strong background\
