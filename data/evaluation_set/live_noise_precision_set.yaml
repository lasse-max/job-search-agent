  description_text: "A World-Changing Company Palantir builds the world\u2019s leading\
    \ software for data-driven decisions and operations. By bringing the right data\
    \ to the people who need it, our platforms empower our partners to develop lifesaving\
    \ drugs, forecast supply chain disruptions, locate missing children, and more.\
    \ What We're About At its core, the Deployment Strategist role centres around\
    \ leveraging data in operational and real-world action. Our customers come to\
    \ us with a hunch that the only way to protect their troops, manufacture high-quality\
    \ products, structure effective healthcare policies, or deliver aid to refugees\
    \ safely is to make better use of their data. Deployment Strategists are responsible\
    \ for turning that hunch into reality. If you believe in the transformational\
    \ power of data and technology and in your own ability to bring that power to\
    \ bear against complex problems, we want to meet you. What We Do As a Deployment\
    \ Strategist, you'll work as part of a driven and creative team of Engineers,\
    \ Product Designers, and other Deployment Strategists to deploy software against\
    \ the most challenging problems our world faces. Your mission is to synthesise\
    \ disconnected streams of thought into a cohesive understanding of what the most\
    \ important problem is, what the data means, what the product needs, what users\
    \ are motivated by, and where the impact could be. Deployment Strategists are\
    \ do-ers who immerse themselves in our customers' most intricate workflows, partner\
    \ with customer teams and explore the data, and dive into the product landscape\
    \ to enable us to scale. A select number of Deployments Strategists may also be\
    \ deployed to Palantir internal teams and problems. In this role, the problems\
    \ you'll tackle will require a curious and analytical mindset, a sharp intuition\
    \ for product, and a strong degree of user empathy to ultimately empower our customers\
    \ to make better decisions."
