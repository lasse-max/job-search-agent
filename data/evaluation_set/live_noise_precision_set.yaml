  description_text: "Company Description We\u2019re http://checkout.comCheckout.com\
    \ http://Checkout.com. You might not know our name, but companies like eBay, Spotify,\
    \ Klarna, Uber, and Sony do, because we\u2019re behind many of the digital experiences\
    \ you use every day. We are where the world checks out, enabling over 10 billion\
    \ transactions daily for more than one billion global shoppers. Whether you want\
    \ to book a holiday, order food, renew a subscription, or check out online, there\u2019\
    s a good chance our tech powers the payments behind the scenes. Our platform helps\
    \ the most ambitious businesses deliver effortless digital experiences, at scale.\
    \ If you want to do career-defining work, you\u2019ve come to the right place.\
    \ We move fast, think globally, and believe great teams are built by hiring exceptional\
    \ people with conviction, curiosity, and the desire to make an impact. With 20\
    \ offices across six continents and London as our HQ, we\u2019re shaping the future\
    \ of fintech \u2013 and we\u2019re just getting started. Checkout.com http://checkout.com/\
    \ is looking for an enthusiastic and talented Sales Engineer to join our fast-growing\
    \ team in London to support our clients with integrating our revolutionary online\
    \ payments platform. This is a mid-level position, and the successful candidate\
    \ will be responsible for providing technical leadership and guidance to our clients,\
    \ predominantly in the UK, throughout the entire sales lifecycle. As a Sales Engineer,\
    \ you are responsible for technical ownership of client relationships from initial\
    \ contact in the sales cycle throughout the solutioning, integration, and go-live\
    \ stages of the customer journey. The ability to solve business and technical\
    \ requirements through the application of Checkout.com http://checkout.com/ products\
    \ and solutions is core to the success of the position. Along the way, you'll\
    \ collaborate closely with various in-house talents across Technology and Business\
    \ to position our capabilities, products, services and solutions effectively with\
    \ prospects. The ideal candidate will need to be an independent, high-achieving\
    \ individual, able to stand out in an entrepreneurial environment and outperform\
    \ performance targets through personal drive. What you will be doing: - Support\
    \ the commercial team to position Checkout.com http://checkout.com/\u2019s products,\
    \ solutions, and services, and ultimately, help to win deals. You will be a key\
    \ partner to Account Executives on all matters related to product, payments, regulation,\
    \ and tech. - Understand merchant requirements and technical needs, map this to\
    \ our APIs and products, create solution designs and internal documentation. -\
    \ Run demos, build \u201Cshow-me\u201D payment flows, create POCs, customise and\
    \ create presentations. - Provide thought leadership on all aspects of Payment\
    \ Performance - Acceptance Rate, Fraud Prevention, Tokenisation, Payment Methods,\
    \ and others. - Lead all technical interactions with merchants, from chats and\
    \ calls to meetings and workshops until the deal is won. - Support BID management\
    \ team with RFP and RFI responses. - Enable internal functions, commercial and\
    \ tech, with market and merchant feedback on product capabilities. Champion product\
    \ change and improvement. - Being constantly up to date with industry standards,\
    \ solutions, and tech - Being an expert of Checkout.com http://checkout.com/\u2019\
    s platform and product. About You: - 3-5 years experience as a Sales Engineer\
    \ / Solutions Architect / Pre-Sales Consultant / Implementation Engineer or TAM.\
    \ - Experience working in a technical client-facing role. - Drives results with\
    \ a strong commercial focus and proactive approach. - Clear written and verbal\
    \ English. Able to communicate to both technical (developers, product) and business\
    \ (payments, finance, c-level) stakeholders. - Able to thrive in a fast-paced\
    \ environment. - Ability to translate technical jargon into business speak. -\
    \ Problem\u2011solver. Able to reproduce, isolate and explain issues using logs,\
    \ API responses, and tests. - Highly organised and able to prioritise shifting\
    \ workloads and responsibilities effectively. - Familiar with API based integration\
    \ methods, associated best practices, and related tools/frameworks (REST/JSON\
    \ APIs, Postman). - Experience with at least one common front-end (pure JavaScript,\
    \ React, Angular, etc) and back-end (Java, .NET, Python, Node, etc) technology.\
    \ - Previous exposure to RFI/RFP - Understanding of end-to-end payment flow. -\
    \ Payments industry exposure with an understanding of the related rules and regulations\
    \ and payments schemes. - Experience with 3DS, Network Tokenisation, Apple/Google\
    \ Pay, Open Banking, or fraud\u2011risk engines. Nice to have: - Familiarity with\
    \ PSD2/PSD3/PSR, FCA, ISO-8583. - Additional language is a plus. - Former engineering,\
    \ developer, or product manager background. - Held prior roles in E-commerce industry.\
    \ Additional Information Bring all of you to work We create the conditions for\
    \ high performers to thrive, through real ownership, fewer blockers, and work\
    \ that makes a difference from day one. Here, you\u2019ll move fast, take on meaningful\
    \ challenges, and be recognized for the impact you deliver. It\u2019s a place\
    \ where ambition gets met with opportunity, and where your growth is in your hands.\
    \ We work as one team, and we back each other to succeed. So whatever your background\
    \ or identity, if you\u2019re ready to grow and make a difference, you\u2019ll\
    \ be right at home here. It\u2019s important we set you up for success and make\
