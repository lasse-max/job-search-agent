  description_text: "About Anthropic Anthropic\u2019s mission is to create reliable,\
    \ interpretable, and steerable AI systems. We want AI to be safe and beneficial\
    \ for our users and for society as a whole. Our team is a quickly growing group\
    \ of committed researchers, engineers, policy experts, and business leaders working\
    \ together to build beneficial AI systems. About the role Anthropic's mission\
    \ is to create reliable, interpretable, and steerable AI systems. We want AI to\
    \ be safe and beneficial for our users and for society as a whole. Our team is\
    \ a quickly growing group of committed researchers, engineers, policy experts,\
    \ and business leaders working together to build beneficial AI systems. As a Senior\
    \ Data Center Capacity Delivery Manager at Anthropic, you'll embed with project\
    \ teams responsible for delivery of leased and partnered data center capacity.\
    \ Your primary role will be to lead these partners to deliver on the fastest possible\
    \ schedule while maintaining a safe construction site and protecting the finished\
    \ quality of the data center. Additionally, you'll validate deal readiness, coordinate\
    \ complex stakeholder relationships, maintain regular reporting and status tracking,\
    \ and ensure seamless transitions from project inception through operational readiness.&nbsp;\
    \ This role offers a unique opportunity to shape how Anthropic secures and activates\
    \ the compute infrastructure needed to train and deploy frontier AI systems, working\
    \ at the intersection of real estate, construction, and cutting-edge AI infrastructure.\
    \ Key responsibilities Lead. &nbsp;This is a role where leadership trumps management\
    \ and process. &nbsp;You will be expected to be at one or more project sites in\
    \ adequate amount to shape the culture, approach, and aggressiveness that define\
    \ those extended site teams. The goal is to impact outcomes in a favorable manner.\
    \ You are expected to be a force multiplier that develops and enhances the skillset\
    \ that development partners, contractors, and key trades bring to the project(s)\
    \ you are overseeing. &nbsp;That means being a subject matter expert in the various\
    \ cross functional elements of data center delivery and increasing the team's\
    \ performance with that knowledge and commitment to alignment. Confirm deal readiness\
    \ and serve as the gatekeeper to validate transaction viability from Letter of\
    \ Intent (LOI) through lease execution, ensuring all predevelopment, planning,\
    \ technical and business requirements are met before commitment Partner with landlords\
    \ and developers post-deal to serve as Anthropic's primary point of contact, coordinating\
    \ across internal stakeholders, tracking construction progress, and facilitating\
    \ critical information exchange between development partners and Anthropic stakeholders\
    \ Represent Anthropic in key technical and operational decisions required by partners\
    \ during the development process, ensuring our infrastructure requirements are\
    \ met while maintaining strong partnerships Drive seamless handoffs to operational\
    \ state with heavy focus on engagement across networking and deployment teams,\
    \ enabling rapid workload turn-ups and minimizing time-to-production Prepare and\
    \ present regular executive reporting on progress versus plan for facility development,\
    \ supporting forward capacity planning and strategic decision-making Identify\
    \ and mitigate risks throughout the delivery lifecycle, proactively addressing\
    \ blockers that could impact timeline, cost, or technical requirements Develop\
    \ and refine standardized processes and playbooks for facility delivery, driving\
    \ continuous improvement as Anthropic scales its infrastructure footprint You\
    \ may be a good fit if you: Have 8+ years of experience in the highest level of\
    \ site leadership managing data center delivery, construction projects, or infrastructure\
    \ deployment at scale within Australia.&nbsp; You won\u2019t have a big direct\
    \ team to delegate too but will instead be able to treat the entire cross functional\
    \ organizations at a jobsite as your team. Have a strong understanding of the\
    \ end to end (dirt to delivery) data center development process to include entitlements\
    \ and permitting, planning and supply chain, execution, commissioning, and handover.\
    \ You are not an administrator but an active player in the arena comfortable making\
    \ decisions and guiding delivery execution without the need to consult across\
    \ multiple external parties. You should understand the nuances of data center\
    \ design and construction in Australia- who the players are, what contractual\
    \ norms get in the way of speed of delivery, how teams can be incentivized to\
    \ build and deliver faster than normal. In this role you will often be on an island\
    \ and responsible for your own destiny.&nbsp; You will have free reign to develop\
    \ your own approaches with the mission guidance being your only bounds.&nbsp;\
    \ It's a bonus if you: Understand AI/ML infrastructure requirements, including\
    \ high-density power and advanced cooling systems Have had leadership positions\
    \ (General Superintendent, Project Manager) within a GC or EPC on hyperscale data\
    \ center projects or in self performance of hyperscale data center development\
    \ projects. Prioritize extreme ownership and have the ability to create winning\
    \ cultures across diverse job sites. Are deeply familiar with lease negotiations,\
    \ construction contracts, or real estate development processes and have strategies\
    \ to move those arrangements from traditionally transaction and risk managed arrangements\
    \ to collaborative efforts that align incentives around accelerated delivery of\
    \ facilities. Deadline to apply:&nbsp; None. Applications will be reviewed on\
    \ a rolling basis.&nbsp; Logistics Minimum education: Bachelor\u2019s degree or\
    \ an equivalent combination of education, training, and/or experience Required\
    \ field of study:&nbsp; A field relevant to the role as demonstrated through coursework,\
    \ training, or professional experience Minimum years of experience: Years of experience\
    \ required will correlate with the internal job level requirements for the position\
    \ Location-based hybrid policy: Currently, we expect all staff to be in one of\
    \ our offices at least 25% of the time. However, some roles may require more time\
    \ in our offices. Visa sponsorship: &nbsp;We do sponsor visas! However, we aren't\
    \ able to successfully sponsor visas for every role and every candidate. But if\
    \ we make you an offer, we will make every reasonable effort to get you a visa,\
    \ and we retain an immigration lawyer to help with this. We encourage you to apply\
    \ even if you do not believe you meet every single qualification. Not all strong\
    \ candidates will meet every single qualification as listed.&nbsp; Research shows\
    \ that people who identify as being from underrepresented groups are more prone\
    \ to experiencing imposter syndrome and doubting the strength of their candidacy,\
    \ so we urge you not to exclude yourself prematurely and to submit an application\
    \ if you're interested in this work. We think AI systems like the ones we're building\
    \ have enormous social and ethical implications. We think this makes representation\
    \ even more important, and we strive to include a range of diverse perspectives\
    \ on our team. Your safety matters to us. To protect yourself from potential scams,\
