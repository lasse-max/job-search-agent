  source_url: https://careers.airbnb.com/positions/7774717?gh_jid=7774717
  description_text: "Airbnb was born in 2007 when two hosts welcomed three guests\
    \ to their San Francisco home, and has since grown to over 5 million hosts who\
    \ have welcomed over 2 billion guest arrivals in almost every country across the\
    \ globe. Every day, hosts offer unique stays and experiences that make it possible\
    \ for guests to connect with communities in a more authentic way. The Community\
    \ You Will Join: The Supply team is a unique, multidisciplinary team responsible\
    \ for partnering with our Hosts to conceptualise and develop high-quality, repeatable\
    \ and commercially viable experiences that are in alignment with our brand values.\
    \ In partnership with our cross-company peers, we invent novel ways to foster\
    \ human connection and belonging in our shared physical world. The Difference\
    \ You Will Make: As a Market Lead, you will be responsible for the supply health,\
    \ quality and growth of your book of business by managing professional host accounts.\
    \ Focusing on these responsibilities, you will build Airbnb\u2019s strong market\
    \ presence in your assigned region by collaborating with other teams as the local\
    \ in-market expert. As someone who knows the Airbnb mission and values inside\
    \ out, you will drive all phases of market success, including maintaining the\
    \ experience quality, and nurturing strategic relationships with hosts. A Typical\
    \ Day: Account Management Build and manage partner relationships within assigned\
    \ territory consisting of several hundred Professional Host accounts Directly\
    \ manage top-tier accounts to meet and exceed quarterly/annual sales goals Create\
    \ and deploy scaled strategies to effectively manage &amp; optimize the long tail\
    \ of thousands of Professional Hosts in your region Maintain a baseline understanding\
    \ of the technical integration of various software partners to provide the appropriate\
    \ support to your accounts Educate clients on all significant product changes\
    \ and cascade feedback on product and policy to the relevant internal stakeholders\
    \ Hold regular optimization calls and business reviews with your partners Develop\
    \ strong and long-lasting partnerships Respond to and deliver exceptional service\
    \ to your accounts in a timely and efficient manner, occasionally traveling to\
    \ your market to provide in-person support and guidance Partner cross functionally\
    \ to address optimization bottlenecks Leverage AI extensively to achieve maximum\
    \ speed and high quality in delivery Quality Proven ability to handle operational\
    \ complexity and ability to maximize the impact of resources Support host community\
    \ programs in your region Analyze data and utilize data-driven recommendations\
    \ to identify and action on strategic opportunities in your region to increase\
    \ sales Audit supply quality in the field, addressing areas for improvement. Develop\
    \ deep knowledge of your assigned geographic markets and become the go-to source\
    \ for all information relating to local trends and market dynamics for internal\
    \ and external partners&nbsp; Work cross-functionally with product, communications,\
    \ public policy, and customer support teams to ensure our long-term market success\
