    \ teams to ensure customer insights are integrated into product and service improvements.\
    \ - Monitor and report on key customer experience metrics, identifying opportunities\
    \ for continuous improvement and innovation. WHO YOU ARE We're looking for people\
    \ who meet the minimum requirements for this role. The preferred qualifications\
    \ are great to have, but are not mandatory. Minimum qualifications: - 5-10 years\
