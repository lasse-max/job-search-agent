    \ Statement: At Celonis, we believe our people make us who we are and that \u201C\
    The Best Team Wins\u201D. We know that the best teams are made up of people who\
    \ bring different perspectives to the table. And when everyone feels included,\
    \ able to speak up and knows their voice is heard - that's when creativity and\
    \ innovation happen. Your Privacy: Any information you submit to Celonis as part\
