  description_text: "Company Description We\u2019re http://checkout.comCheckout.com\
    \ http://Checkout.com. You might not know our name, but companies like eBay, Spotify,\
    \ Klarna, Uber, and Sony do, because we\u2019re behind many of the digital experiences\
    \ you use every day. We are where the world checks out, enabling over 10 billion\
    \ transactions daily for more than one billion global shoppers. Whether you want\
    \ to book a holiday, order food, renew a subscription, or check out online, there\u2019\
    s a good chance our tech powers the payments behind the scenes. Our platform helps\
    \ the most ambitious businesses deliver effortless digital experiences, at scale.\
    \ If you want to do career-defining work, you\u2019ve come to the right place.\
    \ We move fast, think globally, and believe great teams are built by hiring exceptional\
    \ people with conviction, curiosity, and the desire to make an impact. With 20\
    \ offices across six continents and London as our HQ, we\u2019re shaping the future\
    \ of fintech \u2013 and we\u2019re just getting started. About the role: Checkout.com\
    \ http://Checkout.com is seeking a Product Manager and leader to join our team\
    \ of product managers working to add and improve our Alternative Payment Method\
    \ (APM) portfolio, with a focus on bank-based payment rails. This role will help\
    \ drive our company OKR of expanding and enhancing the payment methods we offer\
    \ merchants around the world, helping these businesses grow their global footprint.\
    \ The successful candidate will provide cross-functional leadership across product,\
    \ engineering, and business teams, to ensure our APM portfolio is embedded throughout\
    \ Checkout.com http://Checkout.com\u2019s ecosystem, enabling a seamless experience\
    \ for our merchants. They will work across the business and engage with merchants\
    \ to align on the selection of APMs, drive the recommended approach to offer or\
    \ improve them, design the API experience and collaborate with more than twenty\
    \ stakeholder teams to deliver APMs end-to-end. Daily tasks include understanding\
    \ stakeholders\u2019 pain points, driving prioritization for product development,\
    \ and developing new capabilities for our customers. About you: - 3-5 years of\
    \ product management experience. - Experience working in payment methods, especially\
    \ direct debit and - account-to-account payment methods - Data-driven: Skilled\
    \ at leveraging data and business insights to determine strategic priorities and\
    \ drive the product roadmap and execution. - Customer-first: Think from the customer's\
    \ perspective and can balance future opportunities with immediate needs. - End-to-end\
    \ mindset: Think in a structured and diligent manner, understanding all key components\
    \ necessary to drive the ongoing success of a product. - Leadership: Excellent\
    \ at collaborating with stakeholders in product, engineering, commercial, and\
    \ business teams proactively, demonstrating high EQ and influencing skills. -\
    \ Effective communicator: Able to inspire others with a shared vision and simplify\
    \ complex concepts for a wide range of audiences. Key responsibilities: - Set\
    \ the strategy for your portfolio of APMs, including understanding the target\
    \ market, customers and aims for each APM, to determine the best approach for\
    \ delivering the APMs, and how to balance adding new APMs vs working on enhancements\
    \ for the existing portfolio, using qualitative and quantitative research and\
    \ data to make decisions. - Become an expert in your payment methods, working\
    \ closely with the payment partners to understand trends and drivers for success,\
    \ which you will leverage to support our commercial team and drive value for our\
    \ merchants. - Work with engineering and product counterparts to design the API\
    \ and integration for each APM, to deliver an optimal developer experience which\
    \ balances a consistent API experience across Checkout.com http://Checkout.com\u2019\
    s products with the nuances of each different APM. - Build strong partnerships\
    \ with business, product, and technology stakeholders and work with them for their\
    \ buy-in and collaboration to generate momentum for your products - Work with\
    \ other product and engineering leaders to ensure alignment with their roadmaps\
    \ and delivery - Gain a deep understanding of Checkout.com http://Checkout.com\u2019\
    s customers and business \u25CF Foster a team culture that upholds Checkout.com\
    \ http://Checkout.com\u2019s operating principles. Additional Information Bring\
    \ all of you to work We create the conditions for high performers to thrive, through\
    \ real ownership, fewer blockers, and work that makes a difference from day one.\
    \ Here, you\u2019ll move fast, take on meaningful challenges, and be recognized\
    \ for the impact you deliver. It\u2019s a place where ambition gets met with opportunity,\
    \ and where your growth is in your hands. We work as one team, and we back each\
    \ other to succeed. So whatever your background or identity, if you\u2019re ready\
    \ to grow and make a difference, you\u2019ll be right at home here. It\u2019s\
    \ important we set you up for success and make our process as accessible as possible.\
    \ So let us know in your application, or tell your recruiter directly, if you\
    \ need anything to make your experience or working environment more comfortable.\
    \ Life at Checkout.com http://Checkout.com We understand that work is just one\
    \ part of your life. Our hybrid working model offers flexibility, with three days\
    \ per week in the office to support collaboration and connection. Curious about\
    \ what it\u2019s like to be part of our team? Visit our Careers Page https://www.checkout.com/careers\
    \ to learn more about our culture, open roles, and what drives us. For a closer\
    \ look at daily life at Checkout.com http://Checkout.com, follow us on LinkedIn\
    \ https://www.linkedin.com/company/checkout/life/ and Instagram https://www.instagram.com/checkout_com/"
