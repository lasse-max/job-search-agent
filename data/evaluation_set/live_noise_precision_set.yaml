  description_text: "About the team OpenAI\u2019s mission is to build safe artificial\
    \ general intelligence (AGI) which benefits all of humanity. This long-term undertaking\
    \ brings the world\u2019s best scientists, engineers, and business professionals\
    \ into one lab together to accomplish this. In pursuit of this mission, our Go\
    \ To Market (GTM) team is responsible for helping customers learn how to leverage\
    \ and deploy our highly capable AI products across their business. The team is\
    \ made of Sales, Solutions, Support, Marketing, and Partnership professionals\
    \ that work together to create valuable solutions that will help bring AI to as\
    \ many users as possible. About the role Our Sales team has a unique mission to\
    \ help customers understand the deep impact that highly capable AI models can\
