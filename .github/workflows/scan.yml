name: Scheduled Scan

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore SQLite state
        uses: actions/cache@v4
        with:
          path: data/job_search_agent.sqlite
          key: job-search-agent-db-${{ github.run_id }}
          restore-keys: |
            job-search-agent-db-

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run scheduled scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_RECIPIENT_EMAIL: ${{ secrets.DIGEST_RECIPIENT_EMAIL }}
          MONTHLY_MODEL_SPEND_CAP_USD: "15"
        run: job-agent scan-all

      - name: Upload local outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-agent-output
          path: |
            output/latest_digest.html
            output/latest_digest.txt
            data/job_search_agent.sqlite
          if-no-files-found: ignore
